<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: "Open Sans", Arial, sans-serif; font-size: 1rem; background: #f8f9fa; color: #212529; }
a { color: #155799; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Header ── */
.page-header {
  padding: 40px 20px 24px;
  color: #fff;
  text-align: center;
  background: linear-gradient(120deg, #155799, #159957);
}
.page-header h1 { margin: 0 0 6px; font-size: 42px; font-weight: 700; }
.page-header p  { margin: 0 0 14px; opacity: 0.85; }
.btn-github {
  display: inline-block; padding: 0.75rem 1rem; margin-bottom: 1rem;
  color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 0.3rem;
  transition: color 0.2s, background-color 0.2s, border-color 0.2s;
}
.btn-github:hover { background: rgba(255,255,255,0.2); text-decoration: none; color: #fff; }
.nav-table { margin: 0 auto; border-spacing: 0; }
.nav-table td { padding: 4px 6px; }
.btn-nav {
  display: inline-block; padding: 0.75rem 1rem; margin-bottom: 1rem;
  color: rgba(255,255,255,0.7); border-radius: 0.3rem;
  transition: color 0.2s, background-color 0.2s, border-color 0.2s;
}
.btn-nav:hover { background: rgba(255,255,255,0.15); color: #fff; text-decoration: none; }
.btn-nav-active { background: rgba(255,255,255,0.2); color: #fff; font-weight: 600; }

/* ── Controls ── */
.controls {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  padding: 10px 20px; background: #fff; border-bottom: 1px solid #dee2e6;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.controls input[type=search], .controls select {
  font-family: inherit; font-size: inherit;
  padding: 5px 10px; border: 1px solid #ced4da; border-radius: 4px;
  background: #fff; outline: none;
}
.controls input[type=search] { flex: 1 1 200px; min-width: 160px; }
.controls input[type=search]:focus { border-color: #159957; box-shadow: 0 0 0 2px rgba(21,153,87,.15); }
.controls select { cursor: pointer; }
.controls label { color: #555; white-space: nowrap; }
.stat-label { color: #666; white-space: nowrap; }

/* ── Entry List ── */
.entry-list { padding: 12px 20px; max-width: 1100px; margin: 0 auto; }
.entry-card {
  background: #fff; border: 1px solid #e1e4e8; border-radius: 6px;
  margin-bottom: 10px; overflow: hidden; cursor: pointer;
  transition: box-shadow 0.15s;
}
.entry-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }

.entry-header {
  padding: 12px 14px 10px;
}
.entry-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-bottom: 4px; }
.entry-year {
  font-size: 0.75rem; font-weight: 700; color: #fff;
  background: #159957; padding: 2px 7px; border-radius: 3px;
}
.entry-type {
  font-size: 0.75rem; color: #666; background: #f0f0f0;
  padding: 2px 7px; border-radius: 3px; text-transform: lowercase;
}
.entry-authors { color: #555; margin-bottom: 3px; }
.entry-title { font-weight: 600; color: #155799; margin-bottom: 4px; line-height: 1.4; }
.entry-title a { color: #155799; }
.entry-title a:hover { color: #159957; }
.entry-venue { color: #666; margin-bottom: 0; font-style: italic; }
.badge {
  display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 2px 7px;
  border-radius: 3px; text-decoration: none; transition: opacity 0.15s;
}
.badge:hover { opacity: 0.8; text-decoration: none; }
.badge-doi   { background: #dbeafe; color: #1e40af; }
.badge-arxiv { background: #fef3c7; color: #92400e; }
.badge-url   { background: #d1fae5; color: #065f46; }

/* ── Expandable panel ── */
.entry-panel {
  display: none; border-top: 1px solid #e9ecef; background: #f8f9fa;
}
.entry-panel.open { display: block; }
.entry-abstract {
  padding: 10px 14px; line-height: 1.6; color: #333;
  border-bottom: 1px solid #e9ecef;
}
.entry-bibtex-wrap {
  position: relative; padding: 10px 14px;
}
.entry-bibtex {
  font-family: "Courier New", monospace; font-size: 0.8rem;
  white-space: pre-wrap; word-break: break-all; color: #333; margin: 0;
}
.copy-btn {
  position: absolute; top: 10px; right: 14px;
  font-family: inherit; font-size: 0.75rem; cursor: pointer;
  padding: 3px 10px; border-radius: 4px; border: 1px solid #ced4da;
  background: #fff; color: #555; transition: background 0.15s, color 0.15s;
}
.copy-btn:hover { background: #159957; color: #fff; border-color: #159957; }
.copy-btn.copied { background: #159957; color: #fff; border-color: #159957; }

.no-results { text-align: center; color: #888; padding: 40px; }
</style>

atic music recogniser over the last twenty years. However, for tasks such as music printing or compiling a musical database, no such system has yet become commercially available that would help enter the music into the computer. This paper describes problems that have been ignored by the existing research and which the authors have encountered during the development of a music recognition system. It is argued why solutions to these problems will have to be found before an optical character recognition scheme for music can become reliable enough to be regularly used (7 Refs.) management systems; music; optical character recognition; printing", "links": [], "pdf": false, "search": "clarke1990 1990 a. clarke, m. brown, m. thorne problems to be faced by developers of computer based automatic music recognisers proceedings of the international computer music conference · pp. 345--347 several attempts have been made to implement a computer based automatic music recogniser over the last twenty years. however, for tasks such as music printing or compiling a musical database, no such system has yet become commercially available that would help enter the music into the computer. this paper describes problems that have been ignored by the existing research and which the authors have encountered during the development of a music recognition system. it is argued why solutions to these problems will have to be found before an optical character recognition scheme for music can become reliable enough to be regularly used (7 refs.) management systems; music; optical character recognition; printing article", "raw": "@Article{Clarke1990,\n  author   = {Clarke, A. and Brown, M. and Thorne, M.},\n  title    = {Problems to be faced by developers of computer based automatic music recognisers},\n  journal  = {Proceedings of the International Computer Music Conference},\n  year     = {1990},\n  pages    = {345--347},\n  abstract = {Several attempts have been made to implement a computer based automatic music recogniser over the last twenty years. However, for tasks such as music printing or compiling a musical database, no such system has yet become commercially available that would help enter the music into the computer. This paper describes problems that have been ignored by the existing research and which the authors have encountered during the development of a music recognition system. It is argued why solutions to these problems will have to be found before an optical character recognition scheme for music can become reliable enough to be regularly used (7 Refs.) management systems; music; optical character recognition; printing},\n  keywords = {data entry systems; reliability; development problems; computer based automatic music recognisers; music printing; musical database; optical character recognition equipment); C7820 (Humanities)}"}, {"key": "Coueasnon1991", "type": "Article", "year": "1991", "authors": "B. Coüasnon", "title": "Réseaux de neurones appliqués à la reconnaissance de partitions musicales", "venue": "Rapport de DEA", "abstract": "", "links": [], "pdf": false, "search": "coueasnon1991 1991 b. coüasnon réseaux de neurones appliqués à la reconnaissance de partitions musicales rapport de dea  article", "raw": "@Article{Coueasnon1991,\n  author  = {Co{\\\"{u}}asnon, B.},\n  title   = {R{\\'{e}}seaux de neurones appliqu{\\'{e}}s {\\`{a}} la reconnaissance de partitions musicales},\n  journal = {Rapport de DEA},\n  year    = {1991},\n}"}, {"key": "Coueasnon1995c", "type": "Article", "year": "1995", "authors": "B. Coüasnon, B. Rétif", "title": "Utilisation d'une grammaire dans la reconnaissance de partitions d'orchestre", "venue": "Deuxiémes Journées d'Informatique Musicale · pp. 143--152", "abstract": "", "links": [], "pdf": false, "search": "coueasnon1995c 1995 b. coüasnon, b. rétif utilisation d'une grammaire dans la reconnaissance de partitions d'orchestre deuxiémes journées d'informatique musicale · pp. 143--152  article", "raw": "@Article{Coueasnon1995c,\n  author  = {Co{\\\"{u}}asnon, B. and R{\\'{e}}tif, B.},\n  title   = {Utilisation d'une grammaire dans la reconnaissance de partitions d'orchestre},\n  journal = {Deuxi{\\'{e}}mes Journ{\\'{e}}es d'Informatique Musicale},\n  year    = {1995},\n  pages   = {143--152},\n}"}, {"key": "Coueasnon1996", "type": "Article", "year": "1996", "authors": "B. Coüasnon", "title": "Formalisation grammaticale de la connaissance a priori pour l'analyse de documents : Application aux partitions d'orchestre", "venue": "Reconnaissance des formes et intelligence artificielle · pp. 465--474", "abstract": "", "links": [], "pdf": false, "search": "coueasnon1996 1996 b. coüasnon formalisation grammaticale de la connaissance a priori pour l'analyse de documents : application aux partitions d'orchestre reconnaissance des formes et intelligence artificielle · pp. 465--474  article", "raw": "@Article{Coueasnon1996,\n  author  = {Co{\\\"{u}}asnon, B.},\n  title   = {Formalisation grammaticale de la connaissance a priori pour l'analyse de documents : Application aux partitions d'orchestre},\n  journal = {Reconnaissance des formes et intelligence artificielle},\n  year    = {1996},\n  pages   = {465--474},\n}"}, {"key": "Coueasnon1996a", "type": "PhdThesis", "year": "1996", "authors": "B. Coüasnon", "title": "Segmentation et reconnaissance de documents guides par la connaissance a priori : application aux partitions musicales", "venue": "PhD thesis, Universit de Rennes", "abstract": "This thesis deals with Optical Document Recognition. In this domain, reliability is an important point: the user should not have to proofread the whole document.\nReliability can be obtained by first improving the quality of the recognition - mostly by solving segmentation problems - and, second, by having the system itself\ndetect badly recognized zones. To fullfill these objectives, one must use a priori knowledge to solve segmentations problems and to represent redundancy, thus\nallowing error detection. We chose in this thesis to work on Optical Music Recognition for its structured knowledge and because it has many unsolved segmentation\nproblems (mainly linked to information density). For this kind of document strongly syntaxed, we suggest a new method called DMOS (Description and\nMOdification of Segmentation). It consists of a grammatical formalism of position (to define knowledge) and a parser allowing a dynamic modification of the parsed\nstructure. This modification allows us to introduce context (symbolic level) in segmentation (numeric level) in order to improve recognition. With knowledge\nrepresented by a grammar, the DMOS method offers a separation between knowledge and program, and an automatic parser generation (through a compilation\nphase). These two points greatly ease the management of complex knowledge. Using the formalism of position we have been able to define a grammar of the music\nnotation. The present system is already able to recognize some full scores with polyphonic staves by correcting some type of segmentation errors (like symbols\ntouching notes) and by pointing out badly recognized zones.", "links": [], "pdf": false, "search": "coueasnon1996a 1996 b. coüasnon segmentation et reconnaissance de documents guides par la connaissance a priori : application aux partitions musicales phd thesis, universit de rennes this thesis deals with optical document recognition. in this domain, reliability is an important point: the user should not have to proofread the whole document.\nreliability can be obtained by first improving the quality of the recognition - mostly by solving segmentation problems - and, second, by having the system itself\ndetect badly recognized zones. to fullfill these objectives, one must use a priori knowledge to solve segmentations problems and to represent redundancy, thus\nallowing error detection. we chose in this thesis to work on optical music recognition for its structured knowledge and because it has many unsolved segmentation\nproblems (mainly linked to information density). for this kind of document strongly syntaxed, we suggest a new method called dmos (description and\nmodification of segmentation). it consists of a grammatical formalism of position (to define knowledge) and a parser allowing a dynamic modification of the parsed\nstructure. this modification allows us to introduce context (symbolic level) in segmentation (numeric level) in order to improve recognition. with knowledge\nrepresented by a grammar, the dmos method offers a separation between knowledge and program, and an automatic parser generation (through a compilation\nphase). these two points greatly ease the management of complex knowledge. using the formalism of position we have been able to define a grammar of the music\nnotation. the present system is already able to recognize some full scores with polyphonic staves by correcting some type of segmentation errors (like symbols\ntouching notes) and by pointing out badly recognized zones. phdthesis", "raw": "@PhdThesis{Coueasnon1996a,\n  author   = {Co{\\\"{u}}asnon, B.},\n  title    = {Segmentation et reconnaissance de documents guides par la connaissance a priori : application aux partitions musicales},\n  school   = {Universit de Rennes},\n  year     = {1996},\n  address  = {Rennes, France},\n  abstract = {This thesis deals with Optical Document Recognition. In this domain, reliability is an important point: the user should not have to proofread the whole document.\nReliability can be obtained by first improving the quality of the recognition - mostly by solving segmentation problems - and, second, by having the system itself\ndetect badly recognized zones. To fullfill these objectives, one must use a priori knowledge to solve segmentations problems and to represent redundancy, thus\nallowing error detection. We chose in this thesis to work on Optical Music Recognition for its structured knowledge and because it has many unsolved segmentation\nproblems (mainly linked to information density). For this kind of document strongly syntaxed, we suggest a new method called DMOS (Description and\nMOdification of Segmentation). It consists of a grammatical formalism of position (to define knowledge) and a parser allowing a dynamic modification of the parsed\nstructure. This modification allows us to introduce context (symbolic level) in segmentation (numeric level) in order to improve recognition. With knowledge\nrepresented by a grammar, the DMOS method offers a separation between knowledge and program, and an automatic parser generation (through a compilation\nphase). These two points greatly ease the management of complex knowledge. Using the formalism of position we have been able to define a grammar of the music\nnotation. The present system is already able to recognize some full scores with polyphonic staves by correcting some type of segmentation errors (like symbols\ntouching notes) and by pointing out badly recognized zones.},\n  keywords = {Structured Document Analysis, A Priori Knowledge Introduction, Segmentation, Grammar, DCG, Optical Music Recognition},\n}"}, {"key": "DiRiso1992", "type": "PhdThesis", "year": "1992", "authors": "D. Di Riso", "title": "Lettura automatica di partiture musicali", "venue": "PhD thesis, Universit di Salerno", "abstract": "", "links": [], "pdf": false, "search": "diriso1992 1992 d. di riso lettura automatica di partiture musicali phd thesis, universit di salerno  phdthesis", "raw": "@PhdThesis{DiRiso1992,\n  author  = {Di Riso, D.},\n  title   = {Lettura automatica di partiture musicali},\n  school  = {Universit di Salerno},\n  year    = {1992},\n  address = {Salerno, Italy},\n}"}, {"key": "Distasi1993", "type": "Proceedings", "year": "1993", "authors": "R. Distasi, M. Nappi, S. Vitulano", "title": "An automatic system for reading musical scores", "venue": "", "abstract": "In this paper we will show our system for the automated reading of musical scores. The system, a let filtered = [];

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderEntry(e) {
  const linkHtml = e.links.map(([label,url,cls]) =>
    `<a class="badge ${cls}" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(label)}</a>`
  ).join('');

  const titleHtml = e.links[0]
    ? `<a href="${esc(e.links[0][1])}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(e.title)}</a>`
    : esc(e.title);

  const absBlock = e.abstract
    ? `<div class="entry-abstract">${esc(e.abstract)}</div>`
    : '';

  return `
<div class="entry-card" id="card-${esc(e.key)}" onclick="toggleCard(this)">
  <div class="entry-header">
    <div class="entry-chips">
      <span class="entry-year">${esc(e.year)}</span>
      <span class="entry-type">${esc(e.type)}</span>
      ${linkHtml}
    </div>
    <div class="entry-authors">${esc(e.authors)}</div>
    <div class="entry-title">${titleHtml}</div>
    ${e.venue ? `<div class="entry-venue">${esc(e.venue)}</div>` : ''}
  </div>
  <div class="entry-panel" id="panel-${esc(e.key)}">
    ${absBlock}
    <div class="entry-bibtex-wrap">
      <button class="copy-btn" onclick="copyBib(event, this, '${esc(e.key)}')">Copy BibTeX</button>
      <pre class="entry-bibtex" id="bib-${esc(e.key)}">${esc(e.raw.trim())}</pre>
    </div>
  </div>
</div>`;
}

function toggleCard(card) {
  const panel = card.querySelector('.entry-panel');
  panel.classList.toggle('open');
}

function copyBib(event, btn, key) {
  event.stopPropagation();
  const text = document.getElementById('bib-' + key).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy BibTeX'; btn.classList.remove('copied'); }, 1800);
  });
}

function sortEntries(arr, mode) {
  return arr.slice().sort((a,b) => {
    if (mode === 'year_desc') return (b.year||'0').localeCompare(a.year||'0') || a.key.localeCompare(b.key);
    if (mode === 'year_asc')  return (a.year||'0').localeCompare(b.year||'0') || a.key.localeCompare(b.key);
    if (mode === 'author')    return a.authors.localeCompare(b.authors) || (b.year||'0').localeCompare(a.year||'0');
    if (mode === 'key')       return a.key.localeCompare(b.key);
    return 0;
  });
}

function applyFilters() {
  const q    = document.getElementById('q').value.toLowerCase();
  const yr   = document.getElementById('fYear').value;
  const tp   = document.getElementById('fType').value;
  const abs  = document.getElementById('fAbstract').checked;
  const sort = document.getElementById('fSort').value;

  filtered = ENTRIES.filter(e => {
    if (q  && !e.search.includes(q)) return false;
    if (yr && e.year !== yr)         return false;
    if (tp && e.type !== tp)         return false;
    if (abs && !e.abstract)          return false;
    return true;
  });

  filtered = sortEntries(filtered, sort);

  const list = document.getElementById('entryList');
  if (filtered.length === 0) {
    list.innerHTML = '<p class="no-results">No entries match the current filters.</p>';
  } else {
    list.innerHTML = filtered.map(renderEntry).join('');
  }

  document.getElementById('statLabel').textContent =
    `${filtered.length} of ${ENTRIES.length} entries`;
}

// Initial render
applyFilters();
</script>
