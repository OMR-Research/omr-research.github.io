ooktitle = {Proceedings of the 24th International Society for Music Information Retrieval Conference},\n  title     = {Predicting Performance Difficulty From Piano Sheet Music Images},\n  year      = {2023},\n  month     = {Nov},\n  pages     = {708--715},\n  address   = {Milan, Italy},\n  abstract  = {Estimating the performance difficulty of a musical score is crucial in music education for adequately designing the learning curriculum of the students. Although the Music Information Retrieval community has recently shown interest in this task, existing approaches mainly use machine-readable scores, leaving the broader case of sheet music images unaddressed. Based on previous works involving sheet music images, we use a mid-level representation, bootleg score, describing notehead positions relative to staff lines coupled with a transformer model. This architecture is adapted to our task by introducing an encoding scheme that reduces the encoded sequence length to one-eighth of the original size. In terms of evaluation, we consider five datasets -- more than 7500 scores with up to 9 difficulty levels -- , two of them particularly compiled for this work. The results obtained when pretraining the scheme on the IMSLP corpus and fine-tuning it on the considered datasets prove the proposal's validity, achieving the best-performing model with a balanced accuracy of 40.34\\% and a mean square error of 1.33.},\n  file      = {:pdfs/2023 - Predicting Performance Difficulty From Piano Sheet Music Images.pdf:PDF},\n  url       = {https://arxiv.org/abs/2309.16287},\n}\n\n@Misc{Ramoneda2025,\n  author        = {Ramoneda, Pedro and Parada-Cabaleiro, Emilia and Jeong, Dasaem and Serra, Xavier},\n  title         = {Difficulty-Controlled Simplification of Piano Scores with Synthetic Data for Inclusive Music Education},\n  year          = {2025},\n  month     = {Nov},\n  abstract      = {Simplifying complex piano pieces can make music education more inclusive and accessible to learners of all ages and contexts. This work introduces a transformer-based method for adjusting the difficulty of {MusicXML} piano scores. The framework pretrains a model on a large corpus of {MusicXML} files using next-token prediction to learn symbolic music structure, then generates 128 variations for each of more than 3,000 original pieces, mining difficulty-aware training pairs using pretrained difficulty and style similarity models.},\n  archiveprefix = {arXiv},\n  doi           = {10.48550/arXiv.2511.16228},\n  eprint        = {2511.16228},\n  file          = {:pdfs/2025 - Difficulty-Controlled Simplification of Piano Scores with Synthetic Data for Inclusive Music Education.pdf:PDF},\n  primaryclass  = {cs.SD},\n  url           = {https://arxiv.org/abs/2511.16228},\n}\n\n@InProceedings{Rashid2017,\n  author    = {Rashid, Sheikh Faisal and Akmal, Abdullah and Adnan, Muhammad and Aslam, Ali Adnan and Dengel, Andreas},\n  title     = {Table Recognition in Heterogeneous Documents Using Machine Learning},\n  booktitle = {2017 14th IAPR International Conference on Document Analysis and Recognition (ICDAR)},\n  year      = {2017},\n  pages     = {777--782},\n  abstract  = {Tables are an easy way to represent information in a structural form. Table recognition is important for the extraction of such information from document images. Usually, modern OCR systems provide textual information coming from tables without recognizing actual table structure. However, recognition of table structure is important to get the contextual meaning of the contents. Table structure recognition in heterogeneous documents is challenging due to a variety of table layouts. It becomes harder where no physical rulings are present in a table. This work proposes a novel learning based methodology for the recognition of table contents in heterogeneous document images. Textual contents of documents are classified as table or non-table elements using a pre-trained neural network model. The output of the neural network is further enhanced by applying a contextual post processing on each element to correct the classifications errors if any. The system is trained using a subset of UNLV and UW3 document images and depicted more than 97% accuracy on a test set in detection of table and non-table elements.},\n  doi       = {10.1109/ICDAR.2017.132},\n  file      = {:pdfs/2017 - Table Recognition in Heterogeneous Documents Using Machine Learning.pdf:PDF},\n  issn      = {2379-2140},\n  keywords  = {document image processing;learning (artificial intelligence);neural nets;optical character recognition;table layouts;table contents;heterogeneous document images;nontable elements;table recognition;heterogeneous documents;table structure recognition;modern OCR systems;non-table elements;Feature extraction;Optical character recognition software;Layout;Neural networks;Training;Image recognition;Character recognition},\n}\n\n@InProceedings{Redmon2017,\n  author    = {Redmon, Joseph and Farhadi, Ali},\n  title     = {{YOLO9000}: Better, Faster, Stronger},\n  booktitle = {2017 IEEE Conference on Computer Vision and Pattern Recognition (CVPR)},\n  year      = {2017},\n  pages     = {6517--6525},\n  abstract  = {We introduce YOLO9000, a state-of-the-art, real-time object detection system that can detect over 9000 object categories. First we propose various improvements to the YOLO detection method, both novel and drawn from prior work. The improved model, YOLOv2, is state-of-the-art on standard detection tasks like PASCAL VOC and COCO. Using a novel, multi-scale training method the same YOLOv2 model can run at varying sizes, offering an easy tradeoff between speed and accuracy. At 67 FPS, YOLOv2 gets 76.8 mAP on VOC 2007. At 40 FPS, YOLOv2 gets 78.6 mAP, outperforming state-of-the-art methods like Faster RCNN with ResNet and SSD while still running significantly faster. Finally we propose a method to jointly train on object detection and classification. Using this method we train YOLO9000 simultaneously on the COCO detection dataset and the ImageNet classification dataset. Our joint training allows YOLO9000 to predict detections for object classes that dont have labelled detection data. We validate our approach on the ImageNet detection task. YOLO9000 gets 19.7 mAP on the ImageNet detection validation set despite only having detection data for 44 of the 200 classes. On the 156 classes not in COCO, YOLO9000 gets 16.0 mAP. YOLO9000 predicts detections for more than 9000 different object categories, all in real-time.},\n  doi       = {10.1109/CVPR.2017.690},\n  file      = {:pdfs/2017 - YOLO9000 - Better, Faster, Stronger.pdf:PDF},\n  issn      = {1063-6919},\n  keywords  = {image classification;object detection;COCO detection dataset;ImageNet classification dataset;ImageNet detection task;PASCAL VOC;YOLO detection method;YOLO9000;YOLOv2 model;object classification;object detection system;Detectors;Feature extraction;Image resolution;Object detection;Real-time systems;Training},\n}\n\n@InCollection{Ren2015,\n  author    = {Ren, Shaoqing and He, Kaiming and Girshick, Ross and Sun, Jian},\n  title     = {Faster {R-CNN}: Towards Real-Time Object Detection with Region Proposal Networks},\n  booktitle = {Advances in Neural Information Processing Systems 28},\n  publisher = {Curran Associates, Inc.},\n  year      = {2015},\n  editor    = {C. Cortes and N. D. Lawrence and D. D. Lee and M. Sugiyama and R. Garnett},\n  pages     = {91--99},\n  file      = {:pdfs/2015 - Faster R-CNN - Towards Real Time Object Detection with Region Proposal Networks.pdf:PDF;:2015 - Faster R CNN - Towards Real Time Object Detection with Region Proposal Networks - extended.pdf:PDF},\n  url       = {http://papers.nips.cc/paper/5638-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks.pdf},\n}\n\n@InProceedings{Rettinghaus2021,\n  author    = {Rettinghaus, Klaus and Pacha, Alexander},\n  booktitle = {Music Encoding Conference Proceedings 2021},\n  title     = {Building a Comprehensive Sheet Music Library Application},\n  year      = {2021},\n  address   = {University of Alicante, Spain},\n  editor    = {M{\\\"{u}}nnich, Stefan and Rizo, David},\n  abstract  = {Digital symbolic music scores offer many benefits compared to paper-based scores, such as a flexible dynamic layout that allows adjustments of size and style, intelligent navigation features, automatic page-turning, onthe-fly modifications of the score including transposition into a different key, and rule-based annotations that can save hours of manual work by automatically highlighting relevant aspects in the score. However, most musicians still rely on paper because they don’t have access to a digital version of their sheet music, or their digital solution does not provide a satisfying experience. To bring digital scores to millions of musicians, we at Enote are building a mobile application that offers a comprehensive digital library of sheet music. These scores are obtained by a large-scale Optical Music Recognition process, combined with metadata collection and curation. Our material is stored in the MEI format and we rely on Verovio as a central component of our app to present scores and parts dynamically on mobile devices. This combination of the expressiveness of MEI with the beautiful engraving of Verovio allows us to create a flexible, mobile solution that we believe to be a powerful and true alternative to paper scores with practical features like smart annotations or instant transpositions. We also invest heavily into the open-source development of Verovio to make it the gold standard for rendering beautiful digital sheet music.},\n  doi       = {10.17613/fc1c-mx52},\n  file      = {:pdfs/2021 - Building a Comprehensive Sheet Music Library Application.pdf:PDF},\n  url       = {https://hcommons.org/deposits/item/hc:45961/},\n}\n\n@InProceedings{Rettinghaus2022,\n  author    = {Rettinghaus, Klaus and Pacha, Alexander},\n  booktitle = {Music Encoding Conference Proceedings 2021},\n  title     = {Building a Comprehensive Sheet Music Library Application},\n  year      = {2022},\n  pages     = {41--48},\n  abstract  = {This paper describes a mobile application offering a comprehensive digital library of sheet music. The application combines {MEI} expressiveness with Verovio rendering to provide flexible dynamic layout, intelligent navigation, automatic page-turning, on-the-fly transpositions, and rule-based annotations. The work demonstrates how symbolic music encoding and {OMR} output can be integrated into end-user sheet music applications.},\n  doi       = {10.17613/s315-2y29},\n  file      = {:pdfs/2022 - Building a Comprehensive Sheet Music Library Application.pdf:PDF},\n  isbn      = {978-84-1302-173-7},\n  url       = {https://alexanderpacha.com/wp-content/uploads/2022/05/mec-2021-building-a-comprehensive-sheet-music-library-application.pdf},\n}\n\n@InProceedings{Roman2018,\n  author    = {Rom{\\'{a}}n, Miguel A. and Pertusa, Antonio and Calvo-Zaragoza, Jorge},\n  title     = {And End-To-End Framework for Audio-to-Score Music Transcription on Monophonic Excerpts},\n  booktitle = {19th International Society for Music Information Retrieval Conference},\n  year      = {2018},\n  pages     = {34--41},\n  address   = {Paris, France},\n  file      = {:pdfs/2018 - And End to End Framework for Audio to Score Music Transcription on Monophonic Excerpts.pdf:PDF},\n  isbn      = {978-2-9540351-2-3},\n  url       = {http://ismir2018.ircam.fr/doc/pdfs/87_Paper.pdf},\n}\n\n@InProceedings{Ronneberger2015,\n  author    = {Ronneberger, Olaf and Fischer, Philipp and Brox, Thomas},\n  title     = {U-Net: Convolutional Networks for Biomedical Image Segmentation},\n  booktitle = {18th International Conference on Medical Image Computing and Computer-Assisted Intervention (MICCAI)},\n  year      = {2015},\n  editor    = {Navab, Nassir and Hornegger, Joachim and Wells, William M. and Frangi, Alejandro F.},\n  pages     = {234--241},\n  address   = {Munich, Germany},\n  publisher = {Springer International Publishing},\n  abstract  = {There is large consent that successful training of deep networks requires many thousand annotated training samples. In this paper, we present a network and training strategy that relies on the strong use of data augmentation to use the available annotated samples more efficiently. The architecture consists of a contracting path to capture context and a symmetric expanding path that enables precise localization. We show that such a network can be trained end-to-end from very few images and outperforms the prior best method (a sliding-window convolutional network) on the {ISBI} challenge for segmentation of neuronal structures in electron microscopic stacks. Using the same network trained on transmitted light microscopy images (phase contrast and {DIC}) we won the {ISBI} cell tracking challenge 2015 in these categories by a large margin. Moreover, the network is fast. Segmentation of a 512x512 image takes less than a second on a recent {GPU}. The full implementation (based on Caffe) and the trained networks are available at http://lmb.informatik.uni-freiburg.de/people/ronneber/u-net .},\n  doi       = {10.1007/978-3-319-24574-4_28},\n  file      = {:pdfs/2015 - U Net - Convolutional Networks for Biomedical Image Segmentation.pdf:PDF},\n  isbn      = {978-3-319-24574-4},\n}\n\n@Article{Rui2026,\n  author   = {Rui, Ruiqing and Amran, Muhammad Syawal and Nasri, Nurfaradilla Mohamad},\n  journal  = {Future Technology},\n  title    = {Artificial intelligence and digital technologies for piano sight-reading skill development: a scoping review},\n  year     = {2026},\n  file      = {:pdfs/2025 - Sheet Music Digitization.pdf:PDF},\n}\n\n@InProceedings{Samiotis2020,\n  author      = {Samiotis, Ioannis Petros and Qiu, Sihang and Mauri, Andrea and Liem, Cynthia C. S. and Lofi, Christoph and Bozzon, Alessandro},\n  booktitle   = {Proceedings of the 21st International Society for Music Information Retrieval Conference ({ISMIR})},\n  title       = {Microtask Crowdsourcing for Music Score Transcriptions: An Experiment with Error Detection},\n  year        = {2020},\n  pages       = {901--907},\n  abstract    = {This paper designs a crowdsourcing task for detecting errors in music score transcriptions, studying two design parameters: the size of the score excerpt and the modality of presentation in the user interface, with applications to both automated and human-driven transcription workflows.},\n  file        = {:pdfs/2020 - Microtask Crowdsourcing for Music Score Transcriptions An Experiment with Error Detection.pdf:PDF},\n  url         = {https://archives.ismir.net/ismir2020/paper/000257.pdf},\n}\n\n@Book{Sampson1985,\n  title     = {Writing Systems: A Linguistic Introduction},\n  publisher = {Stanford University Press},\n  year      = {1985},\n  author    = {Sampson, Geoffrey},\n  isbn      = {9780804717564},\n  lccn      = {84040708},\n  url       = {https://books.google.cz/books?id=tVcdNRvwoDkC},\n}\n\n@InCollection{Sanchez2018,\n  author    = {S{\\'{a}}nchez, Joan Andreu and Romero, Ver{\\'{o}}nica and Toselli, Alejandro H. and Vidal, Enrique},\n  booktitle = {Document Analysis and Text Recognition},\n  publisher = {World Scientific},\n  title     = {Handwritten Text Recognition Competitions With the tranScriptorium Dataset},\n  year      = {2018},\n  chapter   = {Chapter 8},\n  pages     = {213--239},\n  abstract  = {The following sections are included: Introduction The Bentham Datasets Used in the HTR Contests Contest Protocol and Evaluation Methodology Existing State-of-the-Art Approaches HTR Approaches Employed in the Contests Presentation and Analysis of HTR Contest Results Remarks and Conclusions References},\n  doi       = {10.1142/9789813229273_0008},\n  file      = {:pdfs/2018 - Handwritten Text Recognition Competitions with the TranScriptorium Dataset.pdf:PDF},\n}\n\n@Article{Sauvola2000,\n  author   = {Sauvola, J. and Pietik{\\\"{a}}inen, M.},\n  journal  = {Pattern Recognition},\n  title    = {Adaptive document image binarization},\n  year     = {2000},\n  issn     = {0031-3203},\n  number   = {2},\n  pages    = {225--236},\n  volume   = {33},\n  abstract = {A new method is presented for adaptive document image binarization, where the page is considered as a collection of subcomponents such as text, background and picture. The problems caused by noise, illumination and many source type-related degradations are addressed. Two new algorithms are applied to determine a local threshold for each pixel. The performance evaluation of the algorithm utilizes test images with ground-truth, evaluation metrics for binarization of textual and synthetic images, and a weight-based ranking procedure for the final result presentation. The proposed algorithms were tested with images including different types of document components and degradations. The results were compared with a number of known techniques in the literature. The benchmarking results show that the method adapts and performs well in each case qualitatively and quantitatively.},\n  doi      = {10.1016/S0031-3203(99)00055-2},\n  file     = {:pdfs/2000 - Adaptive Document Image Binarization.pdf:PDF},\n  isbn     = {0818678984},\n  keywords = {adaptive binarization, binarization, document analysis, document segmentation, document understanding, soft decision},\n  pmid     = {84262800005},\n}\n\n@Article{Saxena2017,\n  author    = {Saxena, Lalit Prakash},\n  title     = {Niblack's binarization method and its modifications to real-time applications: a review},\n  journal   = {Artificial Intelligence Review},\n  year      = {2017},\n  doi       = {10.1007/s10462-017-9574-2},\n  file      = {:pdfs/2017 - Niblack's binarization method and its modifications to real-time applications - A Review.pdf:PDF},\n  publisher = {Springer Nature},\n}\n\n@Article{Schmidhuber2015,\n  author    = {Schmidhuber, J{\\\"u}rgen},\n  title     = {Deep learning in neural networks: An overview},\n  journal   = {Neural networks},\n  year      = {2015},\n  volume    = {61},\n  pages     = {85--117},\n  file      = {:pdfs/2015 - Deep Learning in Neural Networks - an Overview.pdf:PDF},\n  publisher = {Elsevier},\n  url       = {https://arxiv.org/pdf/1404.7828.pdf},\n}\n\n@Book{Schobrun2005,\n  title     = {The Everything Reading Music Book: A Step-By-Step Introduction to Understanding Music Notation And Theory},\n  publisher = {Adams Media},\n  year      = {2005},\n  author    = {Schobrun, Marc},\n  series    = {Everything series},\n  isbn      = {1-59337-324-4},\n  abstract  = {This easy-to-follow guide helps you master the fundamentals of music notation and theory in no time.},\n}\n\n@Book{Selfridge-Field1997,\n  title     = {Beyond {MIDI}: The Handbook of Musical Codes},\n  publisher = {MIT Press},\n  year      = {1997},\n  author    = {Selfridge-Field, Eleanor},\n  address   = {Cambridge, MA, USA},\n  isbn      = {0-262-19394-9},\n  url       = {https://mitpress.mit.edu/books/beyond-midi},\n}\n\n@Article{Sermanet2013,\n  author  = {Sermanet, Pierre and Eigen, David and Zhang, Xiang and Mathieu, Micha{\\\"e}l and Fergus, Rob and LeCun, Yann},\n  title   = {Overfeat: Integrated recognition, localization and detection using convolutional networks},\n  journal = {CoRR},\n  year    = {2013},\n  volume  = {abs/1312.6229},\n  file    = {:pdfs/2013 - Overfeat - Integrated Recognition, Localization and Detection Using Convolutional Networks.pdf:PDF},\n  url     = {http://arxiv.org/abs/1312.6229},\n}\n\n@Article{Serra2017,\n  author    = {Serra, Xavier},\n  title     = {The computational study of a musical culture through its digital traces},\n  journal   = {Acta Musicologica. 2017; 89 (1): 24-44.},\n  year      = {2017},\n  comment   = {Overview paper that describes different musicological analyses that the authors have carried out on digital traces of music (machine-readable music scores, audio recording, other textual information).},\n  file      = {:pdfs/2017 - The Computational Study of a Musical Culture Through its Digital Traces.pdf:PDF},\n  publisher = {International Musicological Society},\n}\n\n@InProceedings{Shahab2010,\n  author    = {Shahab, Asif and Shafait, Faisal and Kieninger, Thomas and Dengel, Andreas},\n  title     = {An Open Approach Towards the Benchmarking of Table Structure Recognition Systems},\n  booktitle = {9th International Workshop on Document Analysis Systems},\n  year      = {2010},\n  pages     = {113--120},\n  publisher = {ACM},\n  acmid     = {1815345},\n  doi       = {10.1145/1815330.1815345},\n  file      = {:pdfs/2010 - An Open Approach Towards the Benchmarking of Table Structure Recognition Systems.pdf:PDF},\n  isbn      = {978-1-60558-773-8},\n  keywords  = {benchmarking, ground truth preparation, image segmentation, performance evaluation, performance measures, table structure recognition},\n  address   = {Boston, Massachusetts, USA},\n  url       = {http://doi.acm.org/10.1145/1815330.1815345},\n}\n\n@InProceedings{Shi2022,\n  author    = {Shi, W and Li, Y and Guan, Y and Chen, X and Yang, S and Mo, S},\n  booktitle = {2022 {IEEE} International Conference on Robotics and Biomimetics ({ROBIO})},\n  title     = {Optimized Fingering Planning for Automatic Piano Playing Using Dual-arm Robot System},\n  year      = {2022},\n  pages     = {933--938},\n  doi       = {10.1109/ROBIO55434.2022.10011881},\n  url       = {https://ieeexplore.ieee.org/document/10011881/},\n  file      = {:pdfs/2022 - Optimized Fingering Planning for Automatic Piano Playing Using Dual-arm Robot System.pdf:PDF},\n}\n\n@Article{Siagian2007,\n  author   = {Siagian, Christian and Itti, Laurent},\n  title    = {Rapid Biologically-Inspired Scene Classification Using Features Shared with Visual Attention},\n  journal  = {IEEE Transactions on Pattern Analysis and Machine Intelligence},\n  year     = {2007},\n  volume   = {29},\n  number   = {2},\n  pages    = {300--312},\n  issn     = {0162-8828},\n  abstract = {We describe and validate a simple context-based scene recognition\n\talgorithm for mobile robotics applications. The system can differentiate\n\toutdoor scenes from various sites on a college campus using a multiscale\n\tset of early-visual features, which capture the \"gist\" of the scene\n\tinto a low-dimensional signature vector. Distinct from previous approaches,\n\tthe algorithm presents the advantage of being biologically plausible\n\tand of having low-computational complexity, sharing its low-level\n\tfeatures with a model for visual attention that may operate concurrently\n\ton a robot. We compare classification accuracy using scenes filmed\n\tat three outdoor sites on campus (13,965 to 34,711 frames per site).\n\tDividing each site into nine segments, we obtain segment classification\n\trates between 84.21 percent and 88.62 percent. Combining scenes from\n\tall sites (75,073 frames in total) yields 86.45 percent correct classification,\n\tdemonstrating the generalization and scalability of the approach},\n  doi      = {10.1109/TPAMI.2007.40},\n  file     = {:pdfs/2007 - Rapid Biologically Inspired Scene Classification Using Features Shared with Visual Attention.pdf:PDF},\n  keywords = {computational complexity;image recognition;mobile robots;robot vision;biologically-inspired scene classification;college campus;computational complexity;context-based scene recognition;mobile robotics;outdoor scenes;Computer vision;Educational institutions;Image segmentation;Layout;Mobile robots;Object recognition;Robot sensing systems;Robot vision systems;Robustness;Sonar navigation;Gist of a scene;computational neuroscience;image classification;image statistics;robot localization.;robot vision;saliency;scene recognition;Algorithms;Artificial Intelligence;Attention;Biomimetics;Computer Systems;Image Enhancement;Image Interpretation, Computer-Assisted;Imaging, Three-Dimensional;Information Storage and Retrieval;Pattern Recognition, Automated;Robotics;Visual Perception},\n}\n\n@Article{Sigtia2015,\n  author    = {Sigtia, Siddharth and Benetos, Emmanouil and Dixon, Simon},\n  title     = {An End-to-End Neural Network for Polyphonic Piano Music Transcription},\n  journal   = {{Computing Research Repository}},\n  year      = {2015},\n  volume    = {abs/1508.01774},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/corr/abs-1508-01774},\n  file      = {:pdfs/2015 - An End to End Neural Network for Polyphonic Piano Music Transcription.pdf:PDF},\n  url       = {http://arxiv.org/abs/1508.01774},\n}\n\n@Article{Simard2003,\n  author   = {Simard, Patrice Y. and Steinkraus, Dave and Platt, John C.},\n  journal  = {Seventh International Conference on Document Analysis and Recognition},\n  title    = {{Best practices for convolutional neural networks applied to visual document analysis}},\n  year     = {2003},\n  pages    = {958--963},\n  abstract = {Not Available},\n  doi      = {10.1109/ICDAR.2003.1227801},\n  file     = {:pdfs/2003 - Best Practices for Convolutional Neural Networks Applied to Visual Document Analysis.pdf:PDF},\n  isbn     = {0-7695-1960-1},\n  keywords = {Best practices, CNN, Concrete, Convolution, Handwriting recognition, Industrial training, Information processing, Neural networks, Performance analysis, Support vector machines, Text analysis},\n}\n\n@InProceedings{Simonetta2024,\n  author    = {Simonetta, Federico and Mondal, Rishav and Ludovico, Luca Andrea and Ntalampiras, Stavros},\n  booktitle = {Proceedings of the 32nd {ACM} International Conference on Multimedia},\n  title     = {Optical Music Recognition in Manuscripts from the Ricordi Archive},\n  year      = {2024},\n  abstract  = {The Ricordi archive, a prestigious collection of significant musical manuscripts from renowned opera composers such as Donizetti, Verdi and Puccini, has been digitized. This process has allowed us to automatically extract samples that represent various musical elements depicted on the manuscripts, including notes, staves, clefs, erasures, and composer's annotations, among others. To distinguish between digitization noise and actual music elements, a subset of these images was meticulously grouped and labeled by multiple individuals into several classes. After assessing the consistency of the annotations, we trained multiple neural network-based classifiers to differentiate between the identified music elements. The primary objective of this study was to evaluate the reliability of these classifiers, with the ultimate goal of using them for the automatic categorization of the remaining unannotated data set.},\n  doi       = {10.1145/3678299.3678324},\n  file      = {:pdfs/2024 - Optical Music Recognition in Manuscripts from the Ricordi Archive.pdf:PDF},\n  url       = {https://arxiv.org/abs/2408.10260},\n}\n\n@Article{Simonyan2014,\n  author    = {Simonyan, Karen and Zisserman, Andrew},\n  title     = {Very Deep Convolutional Networks for Large-Scale Image Recognition},\n  journal   = {{Computing Research Repository}},\n  year      = {2014},\n  volume    = {abs/1409.1556},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/corr/SimonyanZ14a},\n  file      = {:pdfs/2014 - Very Deep Convolutional Networks for Large Scale Image Recognition.pdf:PDF},\n  url       = {http://arxiv.org/abs/1409.1556},\n}\n\n@Book{Sloboda2005,\n  title     = {Exploring the musical mind},\n  publisher = {Oxford University Press},\n  year      = {2005},\n  author    = {Sloboda, John},\n  comment   = {https://books.google.at/books?hl=en&lr=&id=xNK6LTIW3D8C&oi=fnd&pg=PR27&dq=Exploring+the+Musical+Mind:+Cognition,+emotion,+ability,+function&ots=1PPm6DlcYJ&sig=-aROR4P0enmLMIJ4xkZD8y-HJPg\\#v=onepage&q&f=true},\n  doi       = {10.1093/acprof:oso/9780198530121.001.0001},\n  journal   = {Cognition, emotion, ability, function},\n  pages     = {102--104},\n  url       = {https://books.google.at/books?id=xNK6LTIW3D8C&printsec=frontcover#v=onepage&q&f=false},\n}\n\n@Misc{SLUB,\n  author       = {{S{\\\"{a}}chsische Landesbibliothek}},\n  title        = {Staats- und Universit{\\\"{a}}tsbibliothek Dresden},\n  howpublished = {\\url{https://www.slub-dresden.de}},\n  year         = {2007},\n  url          = {https://www.slub-dresden.de},\n}\n\n@Misc{Smith1987,\n  author = {Smith, Leland},\n  title  = {SCORE},\n  year   = {1987},\n  url    = {https://en.wikipedia.org/wiki/SCORE_(software)},\n}\n\n@InProceedings{Socher2011,\n  author    = {Socher, Richard and Lin, Cliff Chiung-Yu and Ng, Andrew Y. and Manning, Christopher D.},\n  title     = {Parsing Natural Scenes and Natural Language with Recursive Neural Networks},\n  booktitle = {28th International Conference on Machine Learning},\n  year      = {2011},\n  file      = {:pdfs/2011 - Parsing Natural Scenes and Natural Language with Recursive Neural Networks.pdf:PDF},\n  groups    = {recognition},\n  url       = {http://ai.stanford.edu/~ang/papers/icml11-ParsingWithRecursiveNeuralNetworks.pdf},\n}\n\n@InProceedings{Sordo2015,\n  author    = {Sordo, Mohamed and Ogihara, Mitsunori and Wuchty, Stefan},\n  title     = {Analysis of the Evolution of Research Groups and Topics in the {ISMIR} Conference},\n  booktitle = {16th International Society for Music Information Retrieval Conference},\n  year      = {2015},\n  file      = {:pdfs/2015 - Analysis of the Evolution of Research Groups and Topics in the ISMIR Conference.pdf:PDF},\n  isbn      = {978-84-606-8853-2},\n}\n\n@InProceedings{Spreadbury2015,\n  author    = {Spreadbury, Daniel and Pi{\\'{e}}chaud, Robert},\n  title     = {Standard Music Font Layout ({SMuFL})},\n  booktitle = {First International Conference on Technologies for Music Notation and Representation - TENOR2015},\n  year      = {2015},\n  editor    = {Marc Battier and Jean Bresson and Pierre Couprie and C{\\'{e}}cile Davy-Rigaux and Dominique Fober and Yann Geslin and Hugues Genevois and Fran{\\c{c}}ois Picard and Alice Tacaille},\n  pages     = {146--153},\n  address   = {Paris, France},\n  publisher = {Institut de Recherche en Musicologie},\n  file      = {:pdfs/2015 - Standard Music Font Layout (SMuFL).pdf:PDF},\n  isbn      = {978-2-9552905-0-7},\n  url       = {http://tenor2015.tenor-conference.org/papers/24-Spreadbury-SMuFL.pdf},\n}\n\n@Article{Stadelmann2018,\n  author   = {Stadelmann, Thilo and Amirian, Mohammadreza and Arabaci, Ismail and Arnold, Marek and Duivesteijn, Gilbert Fran{\\c{c}}ois and Elezi, Isamil and Geiger, Melanie and L{\\\"{o}}rwald, Stefan and Meier, Benjamin Bruno and Rombach, Katharina and Tuggener, Lukas},\n  title    = {{Deep Learning in the Wild}},\n  journal  = {ArXiv e-prints},\n  year     = {2018},\n  file     = {:pdfs/2018 - Deep Learning in the Wild.pdf:PDF},\n  keywords = {Computer Science - Machine Learning, Computer Science - Artificial Intelligence, Computer Science - Computer Vision and Pattern Recognition, Statistics - Machine Learning},\n  url      = {https://arxiv.org/abs/1807.04950},\n}\n\n@InProceedings{Stamatopoulos2013,\n  author    = {Stamatopoulos, Nikolaos and Gatos, Basilis and Louloudis, Georgios and Pal, Umpada and Alaei, Alireza},\n  title     = {{ICDAR}2013 Handwriting Segmentation Contest},\n  booktitle = {2013 12th International Conference on Document Analysis and Recognition},\n  year      = {2013},\n  doi       = {10.1109/ICDAR.2013.283},\n  file      = {:pdfs/2013 - ICDAR2013 Handwriting Segmentation Contest.pdf:PDF},\n}\n\n@Article{Stauffer2018,\n  author   = {Stauffer, Michael and Fischer, Andreas and Riesen, Kaspar},\n  title    = {Keyword spotting in historical handwritten documents based on graph matching},\n  journal  = {Pattern Recognition},\n  year     = {2018},\n  volume   = {81},\n  pages    = {240--253},\n  issn     = {0031-3203},\n  abstract = {In the last decades historical handwritten documents have become increasingly available in digital form. Yet, the accessibility to these documents with respect to browsing and searching remained limited as full automatic transcription is often not possible or not sufficiently accurate. This paper proposes a novel reliable approach for template-based keyword spotting in historical handwritten documents. In particular, our framework makes use of different graph representations for segmented word images and a sophisticated matching procedure. Moreover, we extend our method to a spotting ensemble. In an exhaustive experimental evaluation on four widely used benchmark datasets we show that the proposed approach is able to keep up or even outperform several state-of-the-art methods for template- and learning-based keyword spotting.},\n  doi      = {https://doi.org/10.1016/j.patcog.2018.04.001},\n  file     = {:pdfs/2018 - Keyword Spotting in Historical Handwritten Documents Based on Graph Matching.pdf:PDF},\n  keywords = {Handwritten keyword spotting, Graph representation, Bipartite graph matching, Ensemble methods},\n  url      = {http://www.sciencedirect.com/science/article/pii/S0031320318301274},\n}\n\n@Book{Stone1996,\n  title         = {{Music Notation in the Twentieth Century, A Practical Guidebook}},\n  publisher     = {W. W. Norton \\& Company},\n  year          = {1996},\n  author        = {Stone, Kurt},\n  file          = {:pdfs/1996 - Music Notation in the Twentieth Century, a Practical Guidebook.pdf:PDF},\n  keywords      = {music notation},\n}\n\n@PhdThesis{Stutter2025,\n  author   = {Stutter, Joshua J.},\n  school   = {University of Glasgow},\n  title    = {Musical Reuse in the Notre Dame Repertory: Historiography and New Computational Directions},\n  year     = {2025},\n  abstract = {Of the many questions that we may wish to ask of the repertory of twelfth- and thirteenth-century music commonly known as Notre Dame polyphony, issues surrounding musical reuse and borrowing suffuse nearly every aspect. This dissertation tackles the issue of musical reuse in the Notre Dame repertory afresh, placing the notation of the manuscript sources at the centre of the study and considering how the broader issue of reuse can be studied holistically in the twenty-first century. Novel encoding, optical music recognition, and analysis methodologies are developed to approach these problems. Using the novel tools presented as part of this study, new and previously undetected patterns of musical reuse within the repertory are extracted.},\n  doi      = {10.5525/gla.thesis.85172},\n  file     = {:pdfs/2025 - Musical Reuse in the Notre Dame Repertory -- Historiography and New Computational Directions.pdf:PDF},\n  url      = {https://theses.gla.ac.uk/85172/},\n}\n\n@Article{Su2013,\n  author   = {Su, Bolan and Lu, Shijian and Tan, Chew Lim},\n  journal  = {IEEE Transactions on Image Processing},\n  title    = {{Robust document image binarization technique for degraded document images}},\n  year     = {2013},\n  issn     = {1057-7149},\n  number   = {4},\n  pages    = {1408--1417},\n  volume   = {22},\n  abstract = {Segmentation of text from badly degraded document images is a very challenging task due to the high inter/intra-variation between the document background and the foreground text of different document images. In this paper, we propose a novel document image binarization technique that addresses these issues by using adaptive image contrast. The adaptive image contrast is a combination of the local image contrast and the local image gradient that is tolerant to text and background variation caused by different types of document degradations. In the proposed technique, an adaptive contrast map is first constructed for an input degraded document image. The contrast map is then binarized and combined with Canny's edge map to identify the text stroke edge pixels. The document text is further segmented by a local threshold that is estimated based on the intensities of detected text stroke edge pixels within a local window. The proposed method is simple, robust, and involves minimum parameter tuning. It has been tested on three public datasets that are used in the recent document image binarization contest ({DIBCO}) 2009 {\\&} 2011 and handwritten-{DIBCO} 2010 and achieves accuracies of 93.5{\\%}, 87.8{\\%}, and 92.03{\\%}, respectively, that are significantly higher than or close to that of the best-performing methods reported in the three contests. Experiments on the Bickley diary dataset that consists of several challenging bad quality document images also show the superior performance of our proposed method, compared with other techniques.},\n  doi      = {10.1109/TIP.2012.2231089},\n  file     = {:pdfs/2013 - Robust Document Image Binarization Technique for Degraded Document Images.pdf:PDF},\n  keywords = {Adaptive image contrast, binarization, degraded document image binarization, document analysis, document image processing, pixel classification},\n  pmid     = {23221822},\n}\n\n@InProceedings{Szegedy2017,\n  author    = {Szegedy, Christian and Ioffe, Sergey and Vanhoucke, Vincent and Alemi, Alexander A.},\n  title     = {Inception-v4, Inception-ResNet and the Impact of Residual Connections on Learning},\n  booktitle = {Thirty-First AAAI Conference on Artificial Intelligence (AAAI-17)},\n  year      = {2017},\n  file      = {:pdfs/2017 - Inception V4, Inception ResNet and the Impact of Residual Connections on Learning.pdf:PDF},\n  url       = {https://www.aaai.org/ocs/index.php/AAAI/AAAI17/paper/viewPaper/14806},\n}\n\n@Article{Szeto2018,\n  author   = {Szeto, Kimmy},\n  title    = {The Roles of Academic Libraries in Shaping Music Publishing in the Digital Age},\n  journal  = {Johns Hopkins University Press},\n  year     = {2018},\n  volume   = {67},\n  number   = {2},\n  pages    = {303--318},\n  abstract = {Libraries are positioned at the nexus of creative production, music publishing, performance, and research. The academic library community has the potential to play an influential leadership role in shaping the music publishing life cycle, making scores more readily discoverable and accessible, and establishing itself as a force that empowers a wide range of creativity and scholarship. Yet the music publishing industry has been slow to capitalize on the digital market, and academic libraries have been slow to integrate electronic music scores into their collections. In this paper, I will discuss the historical, technical, and human factors that have contributed to this moment, and the critical next steps the academic library community can take in response to the booming digital music publishing market to make a lasting impact through setting technological standards and best practices, developing education in these technologies and related intellectual property issues, and becoming an active partner in digital music publishing and in innovative research and creative possibilities.},\n  doi      = {10.1353/lib.2018.0038},\n}\n\n@Misc{Toiviainen2016,\n  author        = {Toiviainen, P. and Eerola, T.},\n  title         = {{MIDI} toolbox 1.1},\n  howpublished  = {https://github.com/miditoolbox/},\n  year          = {2016},\n  date-modified = {2016-05-18 09:15:01 +0000},\n  journal       = {GitHub repository},\n  publisher     = {GitHub},\n  url           = {https://github.com/miditoolbox/},\n}\n\n@Article{Trier1995,\n  author   = {O. D. Trier and A. K. Jain},\n  title    = {Goal-directed evaluation of binarization methods},\n  journal  = {IEEE Transactions on Pattern Analysis and Machine Intelligence},\n  year     = {1995},\n  volume   = {17},\n  number   = {12},\n  pages    = {1191--1201},\n  issn     = {0162-8828},\n  abstract = {This paper presents a methodology for evaluation of low-level image analysis methods, using binarization (two-level thresholding) as an example. Binarization of scanned gray scale images is the first step in most document image analysis systems. Selection of an appropriate binarization method for an input image domain is a difficult problem. Typically, a human expert evaluates the binarized images according to his/her visual criteria. However, to conduct an objective evaluation, one needs to investigate how well the subsequent image analysis steps will perform on the binarized image. We call this approach goal-directed evaluation, and it can be used to evaluate other low-level image processing methods as well. Our evaluation of binarization methods is in the context of digit recognition, so we define the performance of the character recognition module as the objective measure. Eleven different locally adaptive binarization methods were evaluated, and Niblack's method gave the best performance.},\n  doi      = {10.1109/34.476511},\n  file     = {:pdfs/1995 - Goal Directed Evaluation of Binarization Methods.pdf:PDF},\n  keywords = {document image processing;document handling;character recognition;image segmentation;performance evaluation;goal-directed evaluation;binarization;low-level image analysis;two-level thresholding;scanned gray scale images;document image processing;digit image recognition;character recognition module;Niblack's method;segmentation;Image analysis;Text analysis;Image processing;Humans;Performance evaluation;Character recognition;Image segmentation;Machine vision;Computer vision;Data mining},\n}\n\n@Article{Trier1995a,\n  author   = {Trier, {{\\O}}ivind Due and Taxt, Torfinn},\n  journal  = {1st International Conference on Image Processing},\n  title    = {{Evaluation of binarization methods for utility map images}},\n  year     = {1995},\n  issn     = {0162-8828},\n  pages    = {31--36},\n  volume   = {2},\n  abstract = {This paper presents an evaluation of locally adaptive binarization methods for gray scale images with low contrast, variable background intensity and noise. Such low quality occurs frequently in utility maps and excludes the use of global binarization methods. Only robust locally adaptive binarization methods with no need for on-line tuning of the parameters were considered since the gray scale images of utility maps often consist of a billion (10<sup>9</sup>) pixels or more. Eight locally adaptive binarization methods were tested on five different images. The postprocessing step ({PS}) of Yanowitz and Bruckstein's (1989) method improved all the other best binarization methods. Niblack's (1986) method with {PS} gave the best performance. Eikvil, Taxt and Moen's (1991) method with {PS}, and Yanowitz and Bruckstein's method did almost as well. Comparison was also made on the {CPU} requirement},\n  doi      = {10.1109/ICIP.1994.413515},\n  file     = {:pdfs/1995 - Evaluation of Binarization Methods for Utility Map Images.pdf:PDF},\n  isbn     = {0-8186-6952-7},\n  keywords = {binarization, document images, evaluation, locally adaptive binarization, thresholding, utility maps},\n}\n\n@Article{Uijlings2013,\n  author   = {Uijlings, J. R. R. and van de Sande, K. E. A. and Gevers, T. and Smeulders, A. W. M.},\n  title    = {Selective Search for Object Recognition},\n  journal  = {International Journal of Computer Vision},\n  year     = {2013},\n  volume   = {104},\n  number   = {2},\n  pages    = {154--171},\n  issn     = {1573-1405},\n  abstract = {This paper addresses the problem of generating possible object locations for use in object recognition. We introduce selective search which combines the strength of both an exhaustive search and segmentation. Like segmentation, we use the image structure to guide our sampling process. Like exhaustive search, we aim to capture all possible object locations. Instead of a single technique to generate possible object locations, we diversify our search and use a variety of complementary image partitionings to deal with as many image conditions as possible. Our selective search results in a small set of data-driven, class-independent, high quality locations, yielding 99 {\\%} recall and a Mean Average Best Overlap of 0.879 at 10,097 locations. The reduced number of locations compared to an exhaustive search enables the use of stronger machine learning techniques and stronger appearance models for object recognition. In this paper we show that our selective search enables the use of the powerful Bag-of-Words model for recognition. The selective search software is made publicly available (Software:  http://disi.unitn.it/~uijlings/SelectiveSearch.html ).},\n  doi      = {10.1007/s11263-013-0620-5},\n  file     = {:pdfs/2013 - Selective Search for Object Recognition.pdf:PDF},\n  url      = {https://doi.org/10.1007/s11263-013-0620-5},\n}\n\n@TechReport{Urbano2010,\n  author      = {Urbano, Juli\\'{a}n and Llor{\\'{e}}ns, Juan and Morato, Jorge and S{\\'{a}}nchez-Cuadrado, Sonia},\n  title       = {{MIREX} 2010 Symbolic Melodic Similarity: Local Alignment with Geometric Representations},\n  institution = {Music Information Retrieval Evaluation eXchange},\n  year        = {2010},\n  file        = {:pdfs/2010 - MIREX 2010 Symbolic Melodic Similarity_ Local Alignment with Geometric Representations.pdf:PDF},\n  url         = {https://julian-urbano.info/files/publications/013-mirex-2010-symbolic-melodic-similarity-local-alignment-geometric-representations.pdf},\n}\n\n@TechReport{Urbano2011,\n  author      = {Urbano, Juli\\'{a}n and Llor{\\'{e}}ns, Juan and Morato, Jorge and S{\\'{a}}nchez-Cuadrado, Sonia},\n  title       = {{MIREX} 2011 Symbolic Melodic Similarity: Sequence Alignment with Geometric Representations},\n  institution = {Music Information Retrieval Evaluation eXchange},\n  year        = {2011},\n  file        = {:pdfs/2011 - MIREX 2011 Symbolic Melodic Similarity_ Sequence Alignment with Geometric Representations.pdf:PDF},\n  url         = {https://julian-urbano.info/files/publications/034-mirex-2011-symbolic-melodic-similarity-sequence-alignment-geometric-representations.pdf},\n}\n\n@TechReport{Urbano2012,\n  author      = {Urbano, Juli\\'{a}n and Llor{\\'{e}}ns, Juan and Morato, Jorge and S{\\'{a}}nchez-Cuadrado, Sonia},\n  title       = {{MIREX} 2012 Symbolic Melodic Similarity: Hybrid Sequence Alignment with Geometric Representations},\n  institution = {Music Information Retrieval Evaluation eXchange},\n  year        = {2012},\n  file        = {:pdfs/2012 - MIREX 2012 Symbolic Melodic Similarity_ Hybrid Sequence Alignment with Geometric Representations.pdf:PDF},\n  url         = {https://julian-urbano.info/files/publications/049-mirex-2012-symbolic-melodic-similarity-hybrid-sequence-alignment-geometric-representations.pdf},\n}\n\n@TechReport{Urbano2013,\n  author      = {Urbano, Juli\\'{a}n},\n  title       = {{MIREX} 2013 Symbolic Melodic Similarity: A Geometric Model supported with Hybrid Sequence Alignment},\n  institution = {Music Information Retrieval Evaluation eXchange},\n  year        = {2013},\n  file        = {:pdfs/2013 - MIREX 2013 Symbolic Melodic Similarity - A Geometric Model supported with Hybrid Sequence Alignment.pdf:PDF},\n  url         = {http://hdl.handle.net/10230/27527},\n}\n\n@Article{Vajda2015,\n  author    = {Vajda, Szil{\\'{a}}rd and Rangoni, Yves and Cecotti, Hubert},\n  title     = {Semi-automatic ground truth generation using unsupervised clustering and limited manual labeling: Application to handwritten character recognition},\n  journal   = {Pattern Recognition Letters},\n  year      = {2015},\n  volume    = {58},\n  pages     = {23--28},\n  doi       = {10.1016/j.patrec.2015.02.001},\n  file      = {:pdfs/2015 - Semi-automatic ground truth generation using unsupervised clustering and limited manual labeling - Application to handwritten character recognition.pdf:PDF},\n  publisher = {Elsevier {BV}},\n}\n\n@InProceedings{Villegas2015,\n  author    = {Villegas, Mauricio and S{\\'{a}}nchez, Joan Andreu and Vidal, Enrique},\n  title     = {Optical modelling and language modelling trade-off for Handwritten Text Recognition},\n  booktitle = {2015 13th International Conference on Document Analysis and Recognition (ICDAR)},\n  year      = {2015},\n  pages     = {831--835},\n  abstract  = {Training the models needed for Automatic Handwritten Text Recognition of historical documents generally requires a significant amount of human effort. This is mainly due to the great differences that often exist between collections and to the lack of linguistic resources from the period when the documents were written, which results in a need of manual data labelling effort. This paper presents a study on the reuse of models trained with data from a different collection, focusing on the contribution that the language model and the optical models have on the performance. An empirical evaluation is performed using data from Jeremy Bentham manuscripts with the aim of recognising a manuscript about a very different topic written by Jane Austen.},\n  doi       = {10.1109/ICDAR.2015.7333878},\n  file      = {:pdfs/2015 - Optical Modelling and Language Modelling Trade-off for Handwritten Text Recognition.pdf:PDF},\n  keywords  = {document image processing;history;linguistics;optical character recognition;text detection;Bentham Jeremy manuscript;handwritten text recognition;language modelling;linguistic resource;manual data labelling effort;optical modelling;Adaptation models;Integrated circuits;Integrated optics;Handwritten Text Recognition;Language Models;Model Retraining;Optical Models},\n}\n\n@Article{Vonikakis2011,\n  author   = {Vonikakis, V. and Andreadis, I. and Papamarkos, N.},\n  journal  = {Pattern Analysis and Applications},\n  title    = {{Robust document binarization with {OFF} center-surround cells}},\n  year     = {2011},\n  issn     = {1433-7541},\n  number   = {3},\n  pages    = {219--234},\n  volume   = {14},\n  abstract = {This paper presents a new method for degraded-document binarization, inspired by the attributes of the Human Visual System ({HVS}). It can deal with various types of degradations, such as uneven illumination, shadows, low contrast, smears, and heavy noise densities. The proposed algorithm combines the characteristics of the {OFF} center-surround cells of the {HVS} with the classic Otsu binarization technique. Cells of two different scales are combined, increasing the efficiency of the algorithm and reducing the extracted noise in the final output. A new response function, which regulates the output of the cell according to the local contrast and the local lighting conditions is also introduced. The Otsu technique is used to binarize the outputs of the {OFF} center-surround cells. Quantitative experiments performed on a set of various computer-generated degradations, such as noise, shadow, and low contrast demonstrate the superior performance of the proposed method against six other well-established techniques. Qualitative and {OCR} comparisons also confirm these results.},\n  doi      = {10.1007/s10044-011-0214-1},\n  file     = {:pdfs/2011 - Robust Document Binarization with Off Center Surround Cells.pdf:PDF},\n  isbn     = {3025410795},\n  keywords = {Document binarization, Human visual system, OFF center-surround cells, Thresholding, binarization},\n}\n\n@Article{Vos1989,\n  author  = {Vos, Piet G. and Troost, Jim M.},\n  title   = {Ascending and Descending Melodic Intervals: Statistical Findings and their Perceptual Relevance},\n  journal = {Music Perception},\n  year    = {1989},\n  volume  = {6},\n  number  = {4},\n  pages   = {383--396},\n  doi     = {10.2307/40285439},\n}\n\n@InProceedings{Wauthier2013,\n  author    = {Wauthier, Fabian and Jordan, Michael and Jojic, Nebojsa},\n  title     = {Efficient ranking from pairwise comparisons},\n  booktitle = {30th International Conference on Machine Learning},\n  year      = {2013},\n  pages     = {109--117},\n  file      = {:pdfs/2013 - Efficient Ranking from Pairwise Comparisons.pdf:PDF},\n  groups    = {pairwise},\n}\n\n@Misc{Wei2024,\n  author    = {Wei, Haoran and Liu, Chenglong and Chen, Jinyue and Wang, Jia and Kong, Lingyu and Xu, Yanming and Ge, Zheng and Zhao, Liang and Sun, Jianjian and Peng, Yuang and Han, Chunrui and Zhang, Xiangyu},\n  title     = {General {OCR} Theory: Towards {OCR}-2.0 via a Unified End-to-end Model},\n  year      = {2024},\n  abstract  = {Traditional {OCR} systems ({OCR}-1.0) are increasingly unable to meet people's usage due to the growing demand for intelligent processing of man-made optical characters. In this paper, we collectively refer to all artificial optical signals (e.g., plain texts, math/molecular formulas, tables, charts, sheet music, and even geometric shapes) as ``characters'' and propose the General {OCR} Theory along with an excellent model, namely {GOT}, to promote the arrival of {OCR}-2.0. The {GOT}, with 580M parameters, is a unified, elegant, and end-to-end model, consisting of a high-compression encoder and a long-contexts decoder. As an {OCR}-2.0 model, {GOT} can handle all the above ``characters'' under various {OCR} tasks.},\n  doi       = {10.48550/arXiv.2409.01704},\n  file      = {:pdfs/2024 - General OCR Theory Towards OCR-2.0 via a Unified End-to-end Model.pdf:PDF},\n  url       = {https://arxiv.org/abs/2409.01704},\n}\n\n@InProceedings{Weigl2020,\n  author    = {Weigl, David M. and Goebl, Werner and Hofmann, Alex and Crawford, Tim and Zubani, Federico and Liem, Cynthia C. S. and Porter, Alastair},\n  booktitle = {7th International Conference on Digital Libraries for Musicology},\n  title     = {Read/Write Digital Libraries for Musicology},\n  year      = {2020},\n  address   = {New York, NY, USA},\n  pages     = {48--52},\n  publisher = {Association for Computing Machinery},\n  series    = {DLfM 2020},\n  abstract  = {The Web and other digital technologies have democratised music creation, reception, and analysis, putting music in the hands, ears, and minds of billions of users. Music digital libraries typically focus on an essential subset of this deluge—commercial and academic publications, and historical materials—but neglect to incorporate contributions by scholars, performers, and enthusiasts, such as annotations or performed interpretations of these artifacts, despite their potential utility for many types of users. In this paper we consider means by which digital libraries for musicology may incorporate such contributions into their collections, adhering to principles of FAIR data management and respecting contributor rights as outlined in the EU’s General Data Protection Regulation. We present an overview of centralised and decentralised approaches to this problem, and propose hybrid solutions in which contributions reside in a) user-controlled personal online datastores, b) decentralised file storage, and c) are published and aggregated into digital library collections. We outline the implementation of these ideas using Solid, a Web decentralisation project building on W3C standard technologies to facilitate publication and control over Linked Data. We demonstrate the feasibility of this approach by implementing prototypes supporting two types of contribution: Web Annotations describing or analysing musical elements in score encodings and music recordings; and, music performances and associated metadata supporting performance analyses across many renditions of a given piece. Finally, we situate these ideas within a wider conception of enriched, decentralised, and interconnected online music repositories.}"}, {"key": "Mirex2019ScoreFollowing", "type": "Misc", "year": "2019", "authors": "Yun Hao", "title": "Real-time Audio to Score Alignment (a.k.a Score Following)", "venue": "rlhttps://www.music-ir.org/mirex/wiki/2019:Real-time_Audio_to_Score_Alignment_(a.k.a_Score_Following)", "abstract": "", "links": [["URL", "https://www.music-ir.org/mirex/wiki/2019:Real-time_Audio_to_Score_Alignment_(a.k.a_Score_Following)", "badge-url"]], "pdf": false, "search": "mirex2019scorefollowing 2019 yun hao real-time audio to score alignment (a.k.a score following) rlhttps://www.music-ir.org/mirex/wiki/2019:real-time_audio_to_score_alignment_(a.k.a_score_following)  misc", "raw": "@Misc{Mirex2019ScoreFollowing,\n  author       = {Hao, Yun},\n  title        = {Real-time Audio to Score Alignment (a.k.a Score Following)},\n  howpublished = {\\url{https://www.music-ir.org/mirex/wiki/2019:Real-time_Audio_to_Score_Alignment_(a.k.a_Score_Following)}},\n  year         = {2019},\n  url          = {https://www.music-ir.org/mirex/wiki/2019:Real-time_Audio_to_Score_Alignment_(a.k.a_Score_Following)},\n}"}, {"key": "Mnih2014", "type": "Article", "year": "2014", "authors": "Volodymyr Mnih, Nicolas Heess, Alex Graves, Koray Kavukcuoglu", "title": "Recurrent Models of Visual Attention", "venue": "Computing Research Repository · Vol. abs/1406.6247", "abstract": "", "links": [["arXiv", "http://arxiv.org/abs/1406.6247", "badge-arxiv"]], "pdf": true, "search": "mnih2014 2014 volodymyr mnih, nicolas heess, alex graves, koray kavukcuoglu recurrent models of visual attention computing research repository · vol. abs/1406.6247  article", "raw": "@Article{Mnih2014,\n  author    = {Mnih, Volodymyr and Heess, Nicolas and Graves, Alex and Kavukcuoglu, Koray},\n  title     = {Recurrent Models of Visual Attention},\n  journal   = {{Computing Research Repository}},\n  year      = {2014},\n  volume    = {abs/1406.6247},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/corr/MnihHGK14},\n  file      = {:pdfs/2014 - Recurrent Models of Visual Attention.pdf:PDF},\n  groups    = {handwriting},\n  url       = {http://arxiv.org/abs/1406.6247},\n}"}, {"key": "Mnnich2022", "type": "InCollection", "year": "2022", "authors": "S Münnich", "title": "Adornos Theorie der musikalischen Reproduktion als Herausforderung für die digitale Codierung musikalischer Schrift", "venue": "Wilhelm Fink", "abstract": "", "links": [["URL", "https://brill.com/display/book/9783846766804/BP000027.xml", "badge-url"]], "pdf": true, "search": "mnnich2022 2022 s münnich adornos theorie der musikalischen reproduktion als herausforderung für die digitale codierung musikalischer schrift wilhelm fink  incollection", "raw": "@InCollection{Mnnich2022,\n  author    = {M{\\\"u}nnich, S},\n  booktitle = {Dialektik der Schrift: Zu Adornos Theorie der musikalischen Reproduktion},\n  title     = {Adornos Theorie der musikalischen Reproduktion als Herausforderung f{\\\"u}r die digitale Codierung musikalischer Schrift},\n  year      = {2022},\n  editor    = {Freund, J and Nanni, M and Schermann, JM and Urbanek, N},\n  publisher = {Wilhelm Fink},\n  address   = {Paderborn},\n  isbn      = {978-3-7705-6680-8},\n  url       = {https://brill.com/display/book/9783846766804/BP000027.xml},\n  file      = {:pdfs/2022 - Adornos Theorie der musikalischen Reproduktion als Herausforderung fur die digitale Codierung musikalischer Schrift.pdf:PDF},\n}"}, {"key": "Muge2000", "type": "InProceedings", "year": "2000", "authors": "F. Muge, I. Granado, M. Mengucci, P. Pina, V. Ramos, N. Sirakov et al.", "title": "Automatic Feature Extraction and Recognition for Digital Access of Books of the Renaissance", "venue": "Research and Advanced Technology for Digital Libraries · pp. 1--13 · Springer Berlin Heidelberg", "abstract": "Antique printed books constitute a heritage that should be preserved and used. With novel digitising techniques is now possible to have these books stored in digital format and accessible to a wider public. However it remains the problem of how to use them. DEBORA (Digital accEss to BOoks of the RenAissance) is a European project that aims to develop a system to interact with these books through world-wide networks. The main issue is to build a database accessible through client computers. That will require to built accompanying metadata that should characterise different components of the books as illuminated letters, banners, figures and key words in order to simplify and speed up the remote access. To solve these problems, digital image analysis algorithms regarding filtering, segmentation, separation of text from non-text, lines and word segmentation and word recognition were developed. Some novel ideas are presented and illustrated through examples.", "links": [["DOI", "https://doi.org/10.1007/3-540-45268-0_1", "badge-doi"]], "pdf": true, "search": "muge2000 2000 f. muge, i. granado, m. mengucci, p. pina, v. ramos, n. sirakov et al. automatic feature extraction and recognition for digital access of books of the renaissance research and advanced technology for digital libraries · pp. 1--13 · springer berlin heidelberg antique printed books constitute a heritage that should be preserved and used. with novel digitising techniques is now possible to have these books stored in digital format and accessible to a wider public. however it remains the problem of how to use them. debora (digital access to books of the renaissance) is a european project that aims to develop a system to interact with these books through world-wide networks. the main issue is to build a database accessible through client computers. that will require to built accompanying metadata that should characterise different components of the books as illuminated letters, banners, figures and key words in order to simplify and speed up the remote access. to solve these problems, digital image analysis algorithms regarding filtering, segmentation, separation of text from non-text, lines and word segmentation and word recognition were developed. some novel ideas are presented and illustrated through examples. inproceedings", "raw": "@InProceedings{Muge2000,\n  author    = {Muge, F. and Granado, I. and Mengucci, M. and Pina, P. and Ramos, V. and Sirakov, N. and Caldas Pinto, J. R. and Marcolino, A. and Ramalho, M{\\'a}rio and Vieira, P. and Maia do Amaral, A.},\n  title     = {Automatic Feature Extraction and Recognition for Digital Access of Books of the Renaissance},\n  booktitle = {Research and Advanced Technology for Digital Libraries},\n  year      = {2000},\n  editor    = {Borbinha, Jos{\\'e} and Baker, Thomas},\n  pages     = {1--13},\n  address   = {Berlin, Heidelberg},\n  publisher = {Springer Berlin Heidelberg},\n  abstract  = {Antique printed books constitute a heritage that should be preserved and used. With novel digitising techniques is now possible to have these books stored in digital format and accessible to a wider public. However it remains the problem of how to use them. DEBORA (Digital accEss to BOoks of the RenAissance) is a European project that aims to develop a system to interact with these books through world-wide networks. The main issue is to build a database accessible through client computers. That will require to built accompanying metadata that should characterise different components of the books as illuminated letters, banners, figures and key words in order to simplify and speed up the remote access. To solve these problems, digital image analysis algorithms regarding filtering, segmentation, separation of text from non-text, lines and word segmentation and word recognition were developed. Some novel ideas are presented and illustrated through examples.},\n  doi       = {10.1007/3-540-45268-0_1},\n  file      = {:pdfs/2000 - Automatic Feature Extraction and Recognition for Digital Access of Books of the Renaissance.pdf:PDF},\n  isbn      = {978-3-540-45268-3},\n}"}, {"key": "Ng2008", "type": "Book", "year": "2008", "authors": "Kia Ng, Paolo Nesi", "title": "Interactive Multimedia Music Technologies", "venue": "IGI Global", "abstract": "Many multimedia music content owners and distributors are converting their archives of music scores from paper into digital images, and to machine readable symbolic notation in order to survive in the business world. Interactive Multimedia Music Technologies discusses relevant state-of-the-art technologies and consists of analysis, knowledge, and application scenarios as surveyed, analyzed, and evaluated by industry professionals. Interactive Multimedia Music Technologies exemplifies the newest functionalities of multimedia interactive music to be used for valorizing cultural heritage, content and archives that are not currently distributed due to lack of safety, suitable coding models, and conversion technologies. Interactive Multimedia Music Technologies explains new and innovative methods of promoting music and products for entertainment, distance teaching, valorizing archives, and commercial and non-commercial purposes, and provides new services for those connected via personal computers, mobile and other devices, for both sighted and print-impaired consumers.", "links": [["DOI", "https://doi.org/10.4018/978-1-59904-150-6", "badge-doi"]], "pdf": true, "search": "ng2008 2008 kia ng, paolo nesi interactive multimedia music technologies igi global many multimedia music content owners and distributors are converting their archives of music scores from paper into digital images, and to machine readable symbolic notation in order to survive in the business world. interactive multimedia music technologies discusses relevant state-of-the-art technologies and consists of analysis, knowledge, and application scenarios as surveyed, analyzed, and evaluated by industry professionals. interactive multimedia music technologies exemplifies the newest functionalities of multimedia interactive music to be used for valorizing cultural heritage, content and archives that are not currently distributed due to lack of safety, suitable coding models, and conversion technologies. interactive multimedia music technologies explains new and innovative methods of promoting music and products for entertainment, distance teaching, valorizing archives, and commercial and non-commercial purposes, and provides new services for those connected via personal computers, mobile and other devices, for both sighted and print-impaired consumers. book", "raw": "@Book{Ng2008,\n  title     = {{Interactive Multimedia Music Technologies}},\n  publisher = {IGI Global},\n  year      = {2008},\n  author    = {Ng, Kia and Nesi, Paolo},\n  isbn hagen},\n  year        = {2009},\n  address     = {Copenhagen, Denmark},\n  comment     = {Bsc. Thesis (?)\nSee https://johanbrinch.com/sections/projects/music.html\nWrote his Master's Thesis in 2012},\n  file        = {:pdfs/2009 - Statistical Analysis of Music Corpora.pdf:PDF},\n  school      = {University of Copenhagen},\n  url         = {https://johanbrinch.com/static/papers/brinchj-2008_music.pdf},\n}"}, {"key": "Nivre2005", "type": "InProceedings", "year": "2005", "authors": "Joakim Nivre, Jens Nilsson", "title": "Pseudo-projective Dependency Parsing", "venue": "43rd Annual Meeting on Association for Computational Linguistics · pp. 99--106", "abstract": "", "links": [["DOI", "https://doi.org/10.3115/1219840.1219853", "badge-doi"]], "pdf": true, "search": "nivre2005 2005 joakim nivre, jens nilsson pseudo-projective dependency parsing 43rd annual meeting on association for computational linguistics · pp. 99--106  inproceedings", "raw": "@InProceedings{Nivre2005,\n  author    = {Nivre, Joakim and Nilsson, Jens},\n  title     = {Pseudo-projective Dependency Parsing},\n  booktitle = {43rd Annual Meeting on Association for Computational Linguistics},\n  year      = {2005},\n  pages     = {99--106},\n  address   = {Stroudsburg, PA, USA},\n  publisher = {Association for Computational Linguistics},\n  acmid     = {1219853},\n  doi       = {10.3115/1219840.1219853},\n  file      = {:pdfs/2005 - Pseudo Projective Dependency Parsing.pdf:PDF},\n  location  = {Ann Arbor, Michigan},\n}"}, {"key": "Ntirogiannis2013", "type": "Article", "year": "2013", "authors": "Konstantinos Ntirogiannis, Basilis Gatos, Ioannis Pratikakis", "title": "Performance evaluation methodology for historical document image binarization", "venue": "IEEE Transactions on Image Processing · Vol. 22(2) · pp. 595--609", "abstract": "Document image binarization is of great importance in the document image analysis and recognition pipeline since it affects further stages of the recognition process. The evaluation of a binarization method aids in studying its algorithmic behavior, as well as verifying its effectiveness, by providing qualitative and quantitative indication of its performance. This paper addresses a pixel-based binarization evaluation methodology for historical handwritten/machine-printed document images. In the proposed evaluation scheme, the recall and precision evaluation measures are properly modified using a weighting scheme that diminishes any potential evaluation bias. Additional performance metrics of the proposed evaluation scheme consist of the percentage rates of broken and missed text, false alarms, background noise, character enlargement, and merging. Several experiments conducted in comparison with other pixel-based evaluation measures demonstrate the validity of the proposed evaluation scheme.", "links": [["DOI", "https://doi.org/10.1109/TIP.2012.2219550", "badge-doi"]], "pdf": true, "search": "ntirogiannis2013 2013 konstantinos ntirogiannis, basilis gatos, ioannis pratikakis performance evaluation methodology for historical document image binarization ieee transactions on image processing · vol. 22(2) · pp. 595--609 document image binarization is of great importance in the document image analysis and recognition pipeline since it affects further stages of the recognition process. the evaluation of a binarization method aids in studying its algorithmic behavior, as well as verifying its effectiveness, by providing qualitative and quantitative indication of its performance. this paper addresses a pixel-based binarization evaluation methodology for historical handwritten/machine-printed document images. in the proposed evaluation scheme, the recall and precision evaluation measures are properly modified using a weighting scheme that diminishes any potential evaluation bias. additional performance metrics of the proposed evaluation scheme consist of the percentage rates of broken and missed text, false alarms, background noise, character enlargement, and merging. several experiments conducted in comparison with other pixel-based evaluation measures demonstrate the validity of the proposed evaluation scheme. article", "raw": "@Article{Ntirogiannis2013,\n  author   = {Ntirogiannis, Konstantinos and Gatos, Basilis and Pratikakis, Ioannis},\n  journal  = {IEEE Transactions on Image Processing},\n  title    = {{Performance evaluation methodology for historical document image binarization}},\n  year     = {2013},\n  issn     = {1057-7149},\n  number   = {2},\n  pages    = {595--609},\n  volume   = {22},\n  abstract = {Document image binarization is of great importance in the document image analysis and recognition pipeline since it affects further stages of the recognition process. The evaluation of a binarization method aids in studying its algorithmic behavior, as well as verifying its effectiveness, by providing qualitative and quantitative indication of its performance. This paper addresses a pixel-based binarization evaluation methodology for historical handwritten/machine-printed document images. In the proposed evaluation scheme, the recall and precision evaluation measures are properly modified using a weighting scheme that diminishes any potential evaluation bias. Additional performance metrics of the proposed evaluation scheme consist of the percentage rates of broken and missed text, false alarms, background noise, character enlargement, and merging. Several experiments conducted in comparison with other pixel-based evaluation measures demonstrate the validity of the proposed evaluation scheme.},\n  doi      = {10.1109/TIP.2012.2219550},\n  file     = {:pdfs/2013 - Performance Evaluation Methodology for Historical Document Image Binarization.pdf:PDF},\n  keywords = {Document image binarization, binarization, ground truth, performance evaluation},\n  pmid     = {23008259},\n}"}, {"key": "Palmer1999", "type": "Book", "year": "1999", "authors": "Stephen E. Palmer", "title": "Vision science: Photons to
