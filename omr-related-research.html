International Conference on Acoustics, Speech and Signal Processing · pp. 6645--6649", "abstract": "Recurrent neural networks (RNNs) are a powerful model for sequential data. End-to-end training methods such as Connectionist Temporal Classification make it possible to train RNNs for sequence labelling problems where the input-output alignment is unknown. The combination of these methods with the Long Short-term Memory RNN architecture has proved particularly fruitful, delivering state-of-the-art results in cursive handwriting recognition. However RNN performance in speech recognition has so far been disappointing, with better results returned by deep feedforward networks. This paper investigates deep recurrent neural networks, which combine the multiple levels of representation that have proved so effective in deep networks with the flexible use of long range context that empowers RNNs. When trained end-to-end with suitable regularisation, we find that deep Long Short-term Memory RNNs achieve a test set error of 17.7% on the TIMIT phoneme recognition benchmark, which to our knowledge is the best recorded score.", "links": [["DOI", "https://doi.org/10.1109/ICASSP.2013.6638947", "badge-doi"]], "pdf": true, "search": "graves2013 2013 alex graves, abdel-rahman mohamed, geoffrey hinton speech recognition with deep recurrent neural networks 2013 ieee international conference on acoustics, speech and signal processing · pp. 6645--6649 recurrent neural networks (rnns) are a powerful model for sequential data. end-to-end training methods such as connectionist temporal classification make it possible to train rnns for sequence labelling problems where the input-output alignment is unknown. the combination of these methods with the long short-term memory rnn architecture has proved particularly fruitful, delivering state-of-the-art results in cursive handwriting recognition. however rnn performance in speech recognition has so far been disappointing, with better results returned by deep feedforward networks. this paper investigates deep recurrent neural networks, which combine the multiple levels of representation that have proved so effective in deep networks with the flexible use of long range context that empowers rnns. when trained end-to-end with suitable regularisation, we find that deep long short-term memory rnns achieve a test set error of 17.7% on the timit phoneme recognition benchmark, which to our knowledge is the best recorded score. inproceedings", "raw": "@InProceedings{Graves2013,\n  author    = {Graves, Alex and Mohamed, Abdel-rahman and Hinton, Geoffrey},\n  title     = {Speech recognition with deep recurrent neural networks},\n  booktitle = {2013 IEEE International Conference on Acoustics, Speech and Signal Processing},\n  year      = {2013},\n  pages     = {6645--6649},\n  abstract  = {Recurrent neural networks (RNNs) are a powerful model for sequential data. End-to-end training methods such as Connectionist Temporal Classification make it possible to train RNNs for sequence labelling problems where the input-output alignment is unknown. The combination of these methods with the Long Short-term Memory RNN architecture has proved particularly fruitful, delivering state-of-the-art results in cursive handwriting recognition. However RNN performance in speech recognition has so far been disappointing, with better results returned by deep feedforward networks. This paper investigates deep recurrent neural networks, which combine the multiple levels of representation that have proved so effective in deep networks with the flexible use of long range context that empowers RNNs. When trained end-to-end with suitable regularisation, we find that deep Long Short-term Memory RNNs achieve a test set error of 17.7% on the TIMIT phoneme recognition benchmark, which to our knowledge is the best recorded score.},\n  doi       = {10.1109/ICASSP.2013.6638947},\n  file      = {:pdfs/2013 - Speech Recognition with Deep Recurrent Neural N cations to automatic page turning, computer-aided accompaniment, and interactive music systems. phdthesis", "raw": "@PhdThesis{Henkel2022,\n  author   = {Henkel, Florian},\n  title    = {Multi-modal Deep Learning for On-line Music Following in Score Sheet Images},\n  year     = {2022},\n  school   = {Johannes Kepler University Linz},\n  type     = {{PhD} thesis},\n  abstract = {This thesis addresses online music following, the real-time tracking of a musical performance against a score sheet image. It develops multi-modal deep learning approaches that integrate audio input with visual score representations to enable robust on-line score following, with applications to automatic page turning, computer-aided accompaniment, and interactive music systems.},\n  file     = {:pdfs/2022 - Multi-modal Deep Learning for On-line Music Following in Score Sheet Images.pdf:PDF},\n  url      = {https://epub.jku.at/obvulihs/content/titleinfo/7439006},\n}"}, {"key": "Heussenstamm1987", "type": "Book", "year": "1987", "authors": "George Heussenstamm", "title": "The Norton Manual of Music Notation", "venue": "W. W. Norton & Company", "abstract": "", "links": [], "pdf": false, "search": "heussenstamm1987 1987 george heussenstamm the norton manual of music notation w. w. norton & company  book", "raw": "@Book{Heussenstamm1987,\n  title     = {The Norton Manual of Music Notation},\n  publisher = {W. W. Norton \\& Company},\n  year      = {1987},\n  author    = {Heussenstamm, George},\n  isbn      = {9780393955262},\n}"}, {"key": "Hosang2016", "type": "Article", "year": "2016", "authors": "Jan Hosang, Rodrigo Benenson, Piotr Dollár, Bernt Schiele", "title": "What Makes for Effective Detection Proposals?", "venue": "IEEE Transactions on Pattern Analysis and Machine Intelligence · Vol. 38(4) · pp. 814--830", "abstract": "Current top performing object detectors employ detection proposals\n\tto guide the search for objects, thereby avoiding exhaustive sliding\n\twindow search across images. Despite the popularity and widespread\n\tuse of detection proposals, it is unclear which trade-offs are made\n\twhen using them during object detection. We provide an in-depth analysis\n\tof twelve proposal methods along with four baselines regarding proposal\n\trepeatability, ground truth annotation recall on PASCAL, ImageNet,\n\tand MS COCO, and their impact on DPM, R-CNN, and Fast R-CNN detection\n\tperformance. Our analysis shows that for object detection improving\n\tproposal localisation accuracy is as important as improving recall.\n\tWe introduce a novel metric, the average recall (AR), which rewards\n\tboth high recall and good localisation and correlates surprisingly\n\twell with detection performance. Our findings show common strengths\n\tand weaknesses of existing methods, and provide insights and metrics\n\tfor selecting and tuning proposal methods.", "links": [["DOI", "https://doi.org/10.1109/TPAMI.2015.2465908", "badge-doi"]], "pdf": true, "search": "hosang2016 2016 jan hosang, rodrigo benenson, piotr dollár, bernt schiele what makes for effective detection proposals? ieee transactions on pattern analysis and machine intelligence · vol. 38(4) · pp. 814--830 current top performing object detectors employ detection proposals\n\tto guide the search for objects, thereby avoiding exhaustive sliding\n\twindow search across images. despite the popularity and widespread\n\tuse of detection proposals, it is unclear which trade-offs are made\n\twhen using them during object detection. we provide an in-depth analysis\n\tof twelve proposal methods along with four baselines regarding proposal\n\trepeatability, ground truth annotation recall on pascal, imagenet,\n\tand ms coco, and their impact on dpm, r-cnn, and fast r-cnn detection\n\tperformance. our analysis shows that for object detection improving\n\tproposal localisation accuracy is as important as improving recall.\n\twe introduce a novel metric, the average recall (ar), which rewards\n\tboth high recall and good localisation and correlates surprisingly\n\twell with detection performance. our findings show common strengths\n\tand weaknesses of existing methods, and provide insights and metrics\n\tfor selecting and tuning proposal methods. article", "raw": "@Article{Hosang2016,\n  author   = {Hosang, Jan and Benenson, Rodrigo and Doll{\\'{a}}r, Piotr and Schiele, Bernt},\n  title    = {What Makes for Effective Detection Proposals?},\n  journal  = {IEEE Transactions on Pattern Analysis and Machine Intelligence},\n  year     = {2016},\n  volume   = {38},\n  number   = {4},\n  pages    = {814--830},\n  issn     = {0162-8828},\n  abstract = {Current top performing object detectors employ detection proposals\n\tto guide the search for objects, thereby avoiding exhaustive sliding\n\twindow search across images. Despite the popularity and widespread\n\tuse of detection proposals, it is unclear which trade-offs are made\n\twhen using them during object detection. We provide an in-depth analysis\n\tof twelve proposal methods along with four baselines regarding proposal\n\trepeatability, ground truth annotation recall on PASCAL, ImageNet,\n\tand MS COCO, and their impact on DPM, R-CNN, and Fast R-CNN detection\n\tperformance. Our analysis shows that for object detection improving\n\tproposal localisation accuracy is as important as improving recall.\n\tWe introduce a novel metric, the average recall (AR), which rewards\n\tboth high recall and good localisation and correlates surprisingly\n\twell with detection performance. Our findings show common strengths\n\tand weaknesses of existing methods, and provide insights and metrics\n\tfor selecting and tuning proposal methods.},\n  doi      = {10.1109/TPAMI.2015.2465908},\n  file     = {:pdfs/2016 - What makes for Effective Detection Proposals.pdf:PDF;:2016 - What Makes for Effective Detection Proposals.pdf:PDF},\n  keywords = {object detection;DPM detection performance;Fast R-CNN detection performance;ImageNet;MS COCO;PASCAL;average recall;ground truth annotation recall;object detection;object localisation;proposal localisation accuracy;proposal repeatability;Detectors;Image edge detection;Image segmentation;Measurement;Object detection;Proposals;Training;Computer Vision;Computer vision;detection proposals;object detection},\n}"}, {"key": "Hu2017", "type": "Article", "year": "2017", "authors": "Ronghang Hu, Piotr Dollár, Kaiming He, Trevor Darrell, Ross Girshick", "title": "Learning to Segment Every Thing", "venue": "CoRR · Vol. abs/1711.10370", "abstract": "", "links": [["arXiv", "http://arxiv.org/abs/1711.10370", "badge-arxiv"]], "pdf": true, "search": "hu2017 2017 ronghang hu, piotr dollár, kaiming he, trevor darrell, ross girshick learning to segment every thing corr · vol. abs/1711.10370  article", "raw": "@Article{Hu2017,\n  author        = {Hu, Ronghang and Doll{\\'{a}}r, Piotr and He, Kaiming and Darrell, Trevor and Girshick, Ross},\n  title         = {Learning to Segment Every Thing},\n  journal       = {CoRR},\n  year          = {2017},\n  volume        = {abs/1711.10370},\n  archiveprefix = {arXiv},\n  bibsource     = {dblp computer science bibliography, https://dblp.org},\n  biburl        = {https://dblp.org/rec/bib/journals/corr/abs-1711-10370},\n  file          = {:pdfs/2017 - Learning to Segment Every Thing.pdf:PDF},\n  url           = {http://arxiv.org/abs/1711.10370},\n}"}, {"key": "Huang2016", "type": "TechReport", "year": "2016", "authors": "Allen Huang, Raymond Wu", "title": "Deep Learning for Music", "venue": "Technical Report · Stanford University", "abstract": "", "links": [["arXiv", "https://arxiv.org/abs/1606.04930", "badge-arxiv"]], "pdf": true, "search": "huang2016 2016 allen huang, raymond wu deep learning for music technical report · stanford university  techreport", "raw": "@TechReport{Huang2016,\n  author      = {Huang, Allen and Wu, Raymond},\n  title       = {Deep Learning for Music},\n  institution = {Stanford University},\n  year        = {2016},\n  file ftware for creating synthetic ground-truthed document images journal of imaging · vol. 3(4) · pp. 62 · multidisciplinary digital publishing institute  article", "raw": "@Article{Journet2017,\n  author    = {Journet, Nicholas and Visani, Muriel and Mansencal, Boris and Van-Cuong, Kieu and Billy, Antoine},\n  title     = {{DocCreator}: A New Software for Creating Synthetic Ground-Truthed Document Images},\n  journal   = {Journal of Imaging},\n  year      = {2017},\n  volume    = {3},\n  number    = {4},\n  pages     = {62},\n  doi       = {10.3390/jimaging3040062},\n  file      = {:pdfs/2017 - DocCreator - a New Software for Creating Synthetic Ground Truthed Document Images.pdf:PDF},\n  publisher = {Multidisciplinary Digital Publishing Institute},\n}"}, {"key": "Jung2025b", "type": "Article", "year": "2025", "authors": "Jongmin Jung, Dongmin Kim, Sihun Lee, Seola Cho, Hyungjoon Soh, Irmak Bukey et al.", "title": "U-MusT: A Unified Framework for Cross-modal Translation of Score Images, Symbolic Music, and Performance Audio", "venue": "IEEE Transactions on Audio, Speech, and Language Processing", "abstract": "Traditional Music Information Retrieval (MIR) tasks like Optical Music Recognition (OMR) and Automatic Music Transcription (AMT) typically rely on specialized, single-task models. We challenge this paradigm by proposing a unified framework that trains a single Transformer on multiple cross-modal translation tasks simultaneously. Our approach is enabled by two key contributions: a novel large-scale dataset (YTSV) with over 1,300 hours of paired score-image and audio data, and a unified tokenization scheme that converts all music modalities into a common sequence format. Experiments show our multitask model significantly outperforms specialized baselines, reducing the OMR symbol error rate from 24.58% to a state-of-the-art 13.67%. Most notably, our framework achieves the first successful end-to-end generation of audio directly from a score image, marking a significant breakthrough in cross-modal music understanding and generation.", "links": [["DOI", "https://doi.org/10.1109/TASLPRO.2025.3648794", "badge-doi"], ["URL", "https://ieeexplore.ieee.org/document/11316398/", "badge-url"]], "pdf": true, "search": "jung2025b 2025 jongmin jung, dongmin kim, sihun lee, seola cho, hyungjoon soh, irmak bukey et al. u-must: a unified framework for cross-modal translation of score images, symbolic music, and performance audio ieee transactions on audio, speech, and language processing traditional music information retrieval (mir) tasks like optical music recognition (omr) and automatic music transcription (amt) typically rely on specialized, single-task models. we challenge this paradigm by proposing a unified framework that trains a single transformer on multiple cross-modal translation tasks simultaneously. our approach is enabled by two key contributions: a novel large-scale dataset (ytsv) with over 1,300 hours of paired score-image and audio data, and a unified tokenization scheme that converts all music modalities into a common sequence format. experiments show our multitask model significantly outperforms specialized baselines, reducing the omr symbol error rate from 24.58% to a state-of-the-art 13.67%. most notably, our framework achieves the first successful end-to-end generation of audio directly from a score image, marking a significant breakthrough in cross-modal music understanding and generation. article", "raw": "@Article{Jung2025b,\n  author   = {Jung, Jongmin and Kim, Dongmin and Lee, Sihun and Cho, Seola and Soh, Hyungjoon and Bukey, Irmak and Donahue, Chris and Jeong, Dasaem},\n  journal  = {{IEEE} Transactions on Audio, Speech, and Language Processing},\n  title    = {{U-MusT}: A Unified Framework for Cross-modal Translation of Score Images, Symbolic Music, and Performance Audio},\n  year     = {2025},\n  abstract = {Traditional Music Information Retrieval (MIR) tasks like Optical Music Recognition (OMR) and Automatic Music Transcription (AMT) typically rely on specialized, single-task models. We challenge this paradigm by proposing a unified framework that trains a single Transformer on multiple cross-modal translation tasks simultaneously. Our approach is enabled by two key contributions: a novel large-scale dataset (YTSV) with over 1,300 hours of paired score-image and audio data, and a unified tokenization scheme that converts all music modalities into a common sequence format. Experiments show our multitask model significantly outperforms specialized baselines, reducing the OMR symbol error rate from 24.58\\% to a state-of-the-art 13.67\\%. Most notably, our framework achieves the first successful end-to-end generation of audio directly from a score image, marking a significant breakthrough in cross-modal music understanding and generation.},\n  doi      = {10.1109/TASLPRO.2025.3648794},\n  url      = {https://ieeexplore.ieee.org/document/11316398/},\n  file      = {:pdfs/2025 - U-MusT A Unified Framework for Cross-modal Translation of Score Images, Symbolic Music, and Performance Audio.pdf:PDF},\n}"}, {"key": "Kasturi1988", "type": "Article", "year": "1988", "authors": "Rangachar Kasturi, Lloyd Alan Fletcher", "title": "A Robust Algorithm for Text String Separation from Mixed Text/Graphics Images", "venue": "IEEE Transactions on Pattern Analysis & Machine Intelligence · Vol. 10 · pp. 910--918", "abstract": "", "links": [["DOI", "https://doi.org/10.1109/34.9112", "badge-doi"]], "pdf": true, "search": "kasturi1988 1988 rangachar kasturi, lloyd alan fletcher a robust algorithm for text string separation from mixed text/graphics images ieee transactions on pattern analysis & machine intelligence · vol. 10 · pp. 910--918  article", "raw": "@Article{Kasturi1988,\n  author   = {Kasturi, Rangachar and Fletcher, Lloyd Alan},\n  title    = {A Robust Algorithm for Text String Separation from Mixed Text/Graphics Images},\n  journal  = {IEEE Transactions on Pattern Analysis \\& Machine Intelligence},\n  year     = {1988},\n  volume   = {10},\n  pages    = {910--918},\n  issn     = {0162-8828},\n  doi      = {10.1109/34.9112},\n  file     = {:pdfs/1988 - A Robust Algorithm for Text String Separation from Mixed Text - Graphics Images.pdf:PDF},\n  keywords = {computerized picture processing; computer graphics; text string separation; mixed text/graphics images; document analysis; Hough transform; character recognition; graphics recognition; computer graphics; computerised pattern recognition; computerised picture processing; transforms},\n}"}, {"key": "Katayose1989", "type": "InProceedings", "year": "1989", "authors": "Haruhiro Katayose, H. Kato, M. Imai, Inokuchi S.", "title": "An approach to an artificial music expert", "venue": "International Computer Music Conference · pp. 139--146", "abstract": "", "links": [], "pdf": false, "search": "katayose1989 1989 haruhiro katayose, h. kato, m. imai, inokuchi s. an approach to an artificial music expert international computer music conference · pp. 139--146  inproceedings", "raw": "@InProceedings{Katayose1989,\n  author    = {Katayose, Haruhiro and Kato, H. and Imai, M. and S., Inokuchi},\n  title     = {An approach to an artificial music expert},\n  booktitle = {International Computer Music Conference},\n  year      = {1989},\n  pages     = {139--146},\n}"}, {"key": "Katayose1989a", "type": "Article", "year": "1989", "authors": "Haruhiro Katayose, Seiji Inokuchi", "title": "The Kansei Music System", "venue": "Computer Music Journal · Vol. 13(4) · pp. 72--77 · The MIT Press", "abstract": "", "links": [["URL", "http://www.jstor.org/stable/3679555", "badge-url"]], "pdf": false, "search": "katayose1989a 1989 haruhiro katayose, seiji inokuchi the kansei music system computer music journal · vol. 13(4) · pp. 72--77 · the mit press  article", "raw": "@Article{Katayose1989a,\n  author    = {Katayose, Haruhiro and Inokuchi, Seiji},\n  title     = {The Kansei Music System},\n  journal   = {Computer Music Journal},\n  year      = {1989},\n  volume    = {13},\n  number    = {4},\n  pages     = {72--77},\n  issn      = {01489267, 15315169},\n  publisher = {The MIT Press},\n  url       = {http://www.jstor.org/stable/3679555},\n}"}, {"key": "Keil2017", "type": "Article", "year": "2017", "authors": "Klaus Keil, Jennifer A. Ward", "title": "Applications of RISM data in digital libraries and digital musicology", "venue": "International Journal on Digital Libraries", "abstract": "Information about manuscripts and printed music indexed in RISM (Répertoire International des Sources Musicales), a large, international project that records and describes musical sources, was for decades available solely through book publications, CD-ROMs, or subscription services. Recent initiatives to make the data available on a wider scale have resulted in, most significantly, a freely accessible online database and the availability of its data as open data and linked open data. Previously, the task of increasing the amount of data was primarily carried out by RISM national groups and the Zentralredaktion (Central Office). The current opportunities available by linking to other freely accessible databases and importing data from other resources open new perspectives and prospects. This paper describes the RISM data and their applications for digital libraries and digital musicological projects. We discuss the possibilities and challenges in making available a large and growing quantity of data and how the data have been utilized in external library and musicological projects. Interactive functions in the RISM OPAC are planned for the future, as is closer collaboration with the projects that use RISM data. Ultimately, RISM would like to arrange a ``take and give'' system in which the RISM data are used in external projects, enhanced by the project participants, and then delivered back to the RISM Zentralredaktion.", "links": [["DOI", "https://doi.org/10.1007/s00799-016-0205-3", "badge-doi"]], "pdf": true, "search": "keil2017 2017 klaus keil, jennifer a. ward applications of rism data in digital libraries and digital musicology international journal on digital libraries information about manuscripts and printed music indexed in rism (répertoire international des sources musicales), a large, international project that records and describes musical sources, was for decades available solely through book publications, cd-roms, or subscription services. recent initiatives to make the data available on a wider scale have resulted in, most significantly, a freely accessible online database and the availability of its data as open data and linked open data. previously, the task of increasing the amount of data was primarily carried out by rism national groups and the zentralredaktion (central office). the current opportunities available by linking to other freely accessible databases and importing data from other resources open new perspectives and prospects. this paper describes the rism data and their applications for digital libraries and digital musicological projects. we discuss the possibilities and challenges in making available a large and growing quantity of data and how the data have been utilized in external library and musicological projects. interactive functions in the rism opac are planned for the future, as is closer collaboration with the projects that use rism data. ultimately, rism would like to arrange a ``take and give'' system in which the rism data are used in external projects, enhanced by the project participants, and then delivered back to the rism zentralredaktion. article", "raw": "@Article{Keil2017,\n  author   = {Keil, Klaus and Ward, Jennifer A.},\n  title    = {Applications of {RISM} data in digital libraries and digital musicology},\n  journal  = {International Journal on Digital Libraries},\n  year     = {2017},\n  issn     = {1432-1300},\n  abstract = {Information about manuscripts and printed music indexed in RISM (R{\\'e}pertoire International des Sources Musicales), a large, international project that records and describes musical sources, was for decades available solely through book publications, CD-ROMs, or subscription services. Recent initiatives to make the data available on a wider scale have resulted in, most significantly, a freely accessible online database and the availability of its data as open data and linked open data. Previously, the task of increasing the amount of data was primarily carried out by RISM national groups and the Zentralredaktion (Central Office). The current opportunities available by linking to other freely accessible databases and importing data from other resources open new perspectives and prospects. This paper describes the RISM data and their applications for digital libraries and digital musicological projects. We discuss the possibilities and challenges in making available a large and growing quantity of data and how the data have been utilized in external library and musicological projects. Interactive functions in the RISM OPAC are planned for the future, as is closer collaboration with the projects that use RISM data. Ultimately, RISM would like to arrange a ``take and give'' system in which the RISM data are used in external projects, enhanced by the project participants, and then delivered back to the RISM Zentralredaktion.},\n  doi      = {10.1007/s00799-016-0205-3},\n  file     = {:pdfs/2017 - Applications of RISM Data in Digital Libraries and Digital Musicology.pdf:PDF},\n  url      = {https://doi.org/10.1007/s00799-016-0205-3},\n}"}, {"key": "Khanna2025", "type": "InProceedings", "year": "2025", "authors": "Sandeep Khanna, Atanu Saha, Rahul Kumar Ray, Rakesh Patibanda, Chiranjoy Chattopadhyay", "title": "From Notes to Keys: A VR Learning Environment for Sheet Music Interpretation", "venue": "Document Analysis and Recognition – ICDAR 2025 · pp. 22--39 · Springer Nature Switzerland", "abstract": "Learning to interpret sheet music and play musical instrument er presents a {VR}-based learning environment that provides real-time feedback to reduce cognitive load and enhance the learning experience for piano students through immersive sheet music interpretation.},\n  doi       = {10.1007/978-3-032-04624-6_2},\n  file      = {:pdfs/2025 - From Notes to Keys A VR Learning Environment for Sheet Music Interpretation.pdf:PDF},\n  isbn      = {978-3-032-04624-6},\n  url       = {https://link.springer.com/chapter/10.1007/978-3-032-04624-6_2},\n}"}, {"key": "Kingma2014", "type": "Article", "year": "2014", "authors": "Diederik P. Kingma, Jimmy Lei Ba", "title": "Adam: A Method for Stochastic Optimization", "venue": "Computing Research Repository · Vol. abs/1412.6980", "abstract": "", "links": [["arXiv", "http://arxiv.org/abs/1412.6980", "badge-arxiv"]], "pdf": true, "search": "kingma2014 2014 diederik p. kingma, jimmy lei ba adam: a method for stochastic optimization computing research repository · vol. abs/1412.6980  article", "raw": "@Article{Kingma2014,\n  author    = {Kingma, Diederik P. and Ba, Jimmy Lei},\n  title     = {Adam: A Method for Stochastic Optimization},\n  journal   = {{Computing Research Repository}},\n  year      = {2014},\n  volume    = {abs/1412.6980},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/corr/KingmaB14},\n  file      = {:pdfs/2014 - Adam - a Method for Stochastic Optimization.pdf:PDF},\n  url       = {http://arxiv.org/abs/1412.6980},\n}"}, {"key": "Koehn2005", "type": "InProceedings", "year": "2005", "authors": "Philipp Koehn", "title": "Europarl: A parallel corpus for statistical machine translation", "venue": "MT summit · pp. 79--86", "abstract": "", "links": [["URL", "http://courses.washington.edu/ling473/Project5.pdf", "badge-url"]], "pdf": true, "search": "koehn2005 2005 philipp koehn europarl: a parallel corpus for statistical machine translation mt summit · pp. 79--86  inproceedings", "raw": "@InProceedings{Koehn  Inc.", "abstract": "", "links": [["URL", "http://papers.nips.cc/paper/5128-one-shot-learning-by-inverting-a-compositional-causal-process.pdf", "badge-url"]], "pdf": true, "search": "lake2013 2013 brenden m. lake, ruslan salakhutdinov, joshua b. tenenbaum one-shot learning by inverting a compositional causal process curran associates, inc.  incollection", "raw": "@InCollection{Lake2013,\n  author    = {Lake, Brenden M. and Salakhutdinov, Ruslan and Tenenbaum, Joshua B.},\n  title     = {One-shot learning by inverting a compositional causal process},\n  booktitle = {Advances in Neural Information Processing Systems 26},\n  publisher = {Curran Associates, Inc.},\n  year      = {2013},\n  editor    = {C.J.C. Burges and L. Bottou and M. Welling and Z. Ghahramani and K.Q. Weinberger},\n  pages     = {2526--2534},\n  file      = {:pdfs/2013 - One Shot Learning by Inverting a Compositional Causal Process.pdf:PDF},\n  groups    = {handwriting},\n  url       = {http://papers.nips.cc/paper/5128-one-shot-learning-by-inverting-a-compositional-causal-process.pdf},\n}"}, {"key": "Lavie2007", "type": "InProceedings", "year": "2007", "authors": "Alon Lavie, Abhaya Agarwal", "title": "Meteor: An Automatic Metric for MT Evaluation with High Levels of Correlation with Human Judgments", "venue": "Second Workshop on Statistical Machine Translation · pp. 228--231 · Association for Computational Linguistics", "abstract": "", "links": [["URL", "http://dl.acm.org/citation.cfm?id=1626355.1626389", "badge-url"]], "pdf": true, "search": "lavie2007 2007 alon lavie, abhaya agarwal meteor: an automatic metric for mt evaluation with high levels of correlation with human judgments second workshop on statistical machine translation · pp. 228--231 · association for computational linguistics  inproceedings", "raw": "@InProceedings{Lavie2007,\n  author    = {Lavie, Alon and Agarwal, Abhaya},\n  title     = {Meteor: An Automatic Metric for {MT} Evaluation with High Levels of Correlation with Human Judgments},\n  booktitle = {Second Workshop on Statistical Machine Translation},\n  year      = {2007},\n  pages     = {228--231},\n  address   = {Stroudsburg, PA, USA},\n  publisher = {Association for Computational Linguistics},\n  acmid     = {1626389},\n  file      = {:pdfs/2007 - Meteor - an Automatic Metric for MT Evaluation with High Levels of Correlation with Human Judgments.pdf:PDF},\n  location  = {Prague, Czech Republic},\n  url       = {http://dl.acm.org/citation.cfm?id=1626355.1626389},\n}"}, {"key": "LeCun1998", "type": "Article", "year": "1998", "authors": "Yann LeCun, Léon Bottou, Yoshua Bengio, Patrick Haffner", "title": "Gradient-based learning applied to document recognition", "venue": "Proceedings of the IEEE · Vol. 86(11) · pp. 2278--2324", "abstract": "Multilayer neural networks trained with the back-propagation algorithm constitute the best example of a successful gradient based learning technique. Given an appropriate network architecture, gradient-based learning algorithms can be used to synthesize a complex decision surface that can classify high-dimensional patterns, such as handwritten characters, with minimal preprocessing. This paper reviews various methods applied to handwritten character recognition and compares them on a standard handwritten digit recognition task. Convolutional neural networks, which are specifically designed to deal with the variability of 2D shapes, are shown to outperform all other techniques. Real-life document recognition systems are composed of multiple modules including field extraction, segmentation recognition, and language modeling. A new learning paradigm, called graph transformer networks (GTN), allows such multimodule systems to be trained globally using gradient-based methods so as to minimize an overall performance measure. Two systems for online handwriting recognition are described. Experiments demonstrate the advantage of global training, and the flexibility of graph transformer networks. A graph transformer network for reading a bank cheque is also described. It uses convolutional neural network character recognizers combined with global training techniques to provide record accuracy on business and personal cheques. It is deployed commercially and reads several million cheques per day.", "links": [["DOI", "https://doi.org/10.1109/5.726791", "badge-doi"]], "pdf": true, "search": "lecun1998 1998 yann lecun, léon bottou, yoshua bengio, patrick haffner gradient-based learning applied to document recognition proceedings of the ieee · vol. 86(11) · pp. 2278--2324 multilayer neural networks trained with the back-propagation algorithm constitute the best example of a successful gradient based learning technique. given an appropriate network architecture, gradient-based learning algorithms can be used to synthesize a complex decision surface that can classify high-dimensional patterns, such as handwritten characters, with minimal preprocessing. this paper reviews various methods applied to handwritten character recognition and compares them on a standard handwritten digit recognition task. convolutional neural networks, which are specifically designed to deal with the variability of 2d shapes, are shown to outperform all other techniques. real-life document recognition systems are composed of multiple modules including field extraction, segmentation recognition, and language modeling. a new learning paradigm, called graph transformer networks (gtn), allows such multimodule systems to be trained globally using gradient-based methods so as to minimize an overall performance measure. two systems for online handwriting recognition are described. experiments demonstrate the advantage of global training, and the flexibility of graph transformer networks. a graph transformer network for reading a bank cheque is also described. it uses convolutional neural network character recognizers combined with global training techniques to provide record accuracy on business and personal cheques. it is deployed commercially and reads several million cheques per day. article", "raw": "@Article{LeCun1998,\n  author   = {LeCun, Yann and Bottou, L{\\'e}on and Bengio, Yoshua and Haffner, Patrick},\n  title    = {Gradient-based learning applied to document recognition},\n  journal  = {Proceedings of the IEEE},\n  year     = {1998},\n  volume   = {86},\n  number   = {11},\n  pages    = {2278--2324},\n  issn     = {0018-9219},\n  abstract = {Multilayer neural networks trained with the back-propagation algorithm constitute the best example of a successful gradient based learning technique. Given an appropriate network architecture, gradient-based learning algorithms can be used to synthesize a complex decision surface that can classify high-dimensional patterns, such as handwritten characters, with minimal preprocessing. This paper reviews various methods applied to handwritten character recognition and compares them on a standard handwritten digit recognition task. Convolutional neural networks, which are specifically designed to deal with the variability of 2D shapes, are shown to outperform all other techniques. Real-life document recognition systems are composed of multiple modules including field extraction, segmentation recognition, and language modeling. A new learning paradigm, called graph transformer networks (GTN), allows such multimodule systems to be trained globally using gradient-based methods so as to minimize an overall performance measure. Two systems for online handwriting recognition are described. Experiments demonstrate the advantage of global training, and the flexibility of graph transformer networks. A graph transformer network for reading a bank cheque is also described. It uses convolutional neural network character recognizers combined with global training techniques to provide record accuracy on business and personal cheques. It is deployed commercially and reads several million cheques per day.},\n  doi      = {10.1109/5.726791},\n  file     = {:pdfs/1998 - Gradient Based Learning Applied to Document Recognition.pdf:PDF},\n  keywords = {optical character recognition;multilayer perceptrons;backpropagation;convolution;gradient-based learning;document recognition;multilayer neural networks;back-propagation;gradient based learning technique;complex decision surface synthesis;high-dimensional patterns;handwritten character recognition;handwritten digit recognition task;2D shape variability;document recognition systems;field extraction;segmentation recognition;language modeling;graph transformer networks;GTN;multimodule systems;performance measure minimization;cheque reading;convolutional neural network character recognizers;Neural networks;Pattern recognition;Machine learning;Optical character recognition software;Character recognition;Feature extraction;Multi-layer neural network;Optical computing;Hidden Markov models;Principal component analysis},\n}"}, {"key": "LeCun2015", "type": "Article", "year": "2015", "authors": "Yann LeCun, Yoshua Bengio, Geoffrey Hinton", "title": "Deep learning", "venue": "Nature · Vol. 521(7553) · pp. 436--444", "abstract": "Deep learning allows computational models that are composed of multiple processing layers to learn representations of data with multiple levels of abstraction. These methods have dramatically improved the state-of-the-art in speech recognition, visual object recognition, object detection and many other domains such as drug discovery and genomics. Deep learning discovers intricate structure in large data sets by using the backpropagation algorithm to indicate how a machine should change its internal parameters that are used to compute the representation in each layer from the representation in the previous layer. Deep convolutional nets have brought about breakthroughs in processing images, video, speech and audio, whereas recurrent nets have shone light on sequential data such as text and speech.", "links": [["DOI", "https://doi.org/10.1038/nature14539", "badge-doi"]], "pdf": false, "search": "lecun2015 2015 yann lecun, yoshua bengio, geoffrey hinton deep learning nature · vol. 521(7553) · pp. 436--444 deep learning allows computational models that are composed of multiple processing layers to learn representations of data with multiple levels of abstraction. these methods have dramatically improved the state-of-the-art in speech recognition, visual object recognition, object detection and many other domains such as drug discovery and genomics. deep learning discovers intricate structure in large data sets by using the backpropagation algorithm to indicate how a machine should change its internal parameters that are used to compute the representation in each layer from the representation in the previous layer. deep convolutional nets have brought about breakthroughs in processing images, video, speech and audio, whereas recurrent nets have shone light on sequential data such as text and speech. article", "raw": "@Article{LeCun2015,\n  author   = {LeCun, Yann and Bengio, Yoshua and Hinton, Geoffrey},\n  journal  = {Nature},\n  title    = {Deep learning},\n  year     = {2015},\n  issn     = {1476-4687},\n  number   = {7553},\n  pages    = {436--444},\n  volume   = {521},\n  abstract = {Deep learning allows computational models that are composed of multiple processing layers to learn representations of data with multiple levels of abstraction. These methods have dramatically improved the state-of-the-art in speech recognition, visual object recognition, object detection and many other domains such as drug discovery and genomics. Deep learning discovers intricate structure in large data sets by using the backpropagation algorithm to indicate how a machine should change its internal parameters that are used to compute the representation in each layer from the representation in the previous layer. Deep convolutional nets have brought about breakthroughs in processing images, video, speech and audio, whereas recurrent nets have shone light on sequential data such as text and speech.},\n  doi      = {10.1038/nature14539},\n  url      = {https://doi.org/10.1038/nature14539},\n}"}, {"key": "Lee2016", "type": "InProceedings", "year": "2016", "authors": "Chungkeun Lee, H. Jin Kim, Kyeong Won Oh", "title": "Comparison of faster R-CNN models for object detection", "venue": "2016 16th International Conference on Control, Automation and Systems (ICCAS) · pp. 107--110", "abstract": "Object detection is one of the important problems for autonomous robots.\n\tFaster R-CNN, one of the state-of-the-art object detection methods,\n\tapproaches real time application; nevertheless, computational time\n\tlies borderline of real time application, i.e. 5fps with VGG16 model\n\tin K40 GPU system in [1]. Moreover, computation time depends on model\n\tand image crop size, but precision is also affected; usually, time\n\tand precision have trade-off relation. By adjusting input image size\n\tin spite of downgrading performance, computation time meets criteria\n\tfor one model. Therefore, selection of a model is one of the important\n\tproblems when faster R-CNN based object detection system for an autonomous\n\trobot is constructed. In this paper, we convert several state-of-the-art\n\tmodels from convolution neural network (CNN) for image classification.\n\tThen, we compare converted models with several image crop size in\n\tterms of computation time and detection precision. We will utilize\n\tthose comparison data for selecting a proper detection model in case\n\ta robot needs to perform an object detection task.", "links": [["DOI", "https://doi.org/10.1109/ICCAS.2016.7832305", "badge-doi"]], "pdf": true, "search": "lee2016 2016 chungkeun lee, h. jin kim, kyeong won oh comparison of faster r-cnn models for object detection 2016 16th international conference on control, automation and systems (iccas) · pp. 107--110 object detection is one of the important problems for autonomous robots.\n\tfaster r mance, and production. this work introduces two open-source evaluation testbenches for score following—one quantitative, one qualitative—and the qualscofo dataset for qualitative benchmarking. three score followers of different classes are implemented, with a cqt-based dtw follower consistently outperforming an fft-based approach for polyphonic music with performance deviations. misc", "raw": "@Misc{Lee2022,\n  author      = {Lee, Lin Hao},\n  title       = {Musical Score Following and Audio Alignment},\n  year        = {2022},\n  month     = {May},\n  abstract    = {Real-time tracking of a musical performance's position on a score (score following) is useful in music practice, performance, and production. This work introduces two open-source evaluation testbenches for score following---one quantitative, one qualitative---and the QualScofo dataset for qualitative benchmarking. Three score followers of different classes are implemented, with a {CQT}-based {DTW} follower consistently outperforming an {FFT}-based approach for polyphonic music with performance deviations.},\n  doi         = {10.48550/arXiv.2205.03247},\n  file        = {:pdfs/2022 - Musical Score Following and Audio Alignment.pdf:PDF},\n  url         = {https://arxiv.org/abs/2205.03247},\n}"}, {"key": "Lewis2004", "type": "Article", "year": "2004", "authors": "David D. Lewis, Yiming Yang, Tony G. Rose, Fan Li", "title": "Rcv1: A new benchmark collection for text categorization research", "venue": "The Journal of Machine Learning Research · Vol. 5 · pp. 361--397 · JMLR. org", "abstract": "", "links": [["URL", "http://www.jmlr.org/papers/volume5/lewis04a/lewis04a.pdf", "badge-url"]], "pdf": true, "search": "lewis2004 2004 david d. lewis, yiming yang, tony g. rose, fan li rcv1: a new benchmark collection for text categorization research the journal of machine learning research · vol. 5 · pp. 361--397 · jmlr. org  article", "raw": "@Article{Lewis2004,\n  author    = {Lewis, David D. and Yang, Yiming and Rose, Tony G. and Li, Fan},\n  title     = {Rcv1: A new benchmark collection for text categorization research},\n  journal   = {The Journal of Machine Learning Research},\n  year      = {2004},\n  volume    = {5},\n  pages     = {361--397},\n  file      = {:pdfs/2004 - Rcv1 - a New Benchmark Collection for Text Categorization Research.pdf:PDF},\n  publisher = {JMLR. org},\n  url       = {http://www.jmlr.org/papers/volume5/lewis04a/lewis04a.pdf},\n}"}, {"key": "Lilypond2014", "type": "Misc", "year": "2014", "authors": "The LilyPond Developement Team", "title": "LilyPond - Essay on automated music engraving", "venue": "", "abstract": "", "links": [["URL", "http://www.lilypond.org/", "badge-url"]], "pdf": true, "search": "lilypond2014 2014 the lilypond developement team lilypond - essay on automated music engraving   misc", "raw": "@Misc{Lilypond2014,\n  author   = {{The LilyPond Developement Team}},\n  title    = {LilyPond - Essay on automated music engraving},\n  year     = {2014},\n  file     = {:pdfs/2014 - LilyPond Essay on Automated Music Engraving.pdf:PDF},\n  keywords = {music notation},\n  url      = {http://www.lilypond.org/},\n}"}, {"key": "Lin2014", "type": "InProceedings", "year": "2014", "authors": "Tsung-Yi Lin, Michael Maire, Serge Belongie, James Hays, Pietro Perona, Deva Ramanan et al.", "title": "Microsoft COCO: Common Objects in Context", "venue": "Computer Vision – ECCV 2014 · pp. 740--755 · Springer International Publishing", "abstract": "We present a new dataset with the goal of advancing the state-of-the-art in object recognition by placing the question of object recognition in the context of the broader question of scene understanding. This is achieved by gathering images of complex everyday scenes containing common objects in their natural context. Objects are labeled using per-instance segmentations to aid in precise object localization. Our dataset contains photos of 91 objects types that would be easily recognizable by a 4 year old. With a total of 2.5 million labeled instances in 328k images, the creation of our dataset drew upon extensive crowd worker involvement via novel user interfaces for category detection, instance spotting and instance segmentation. We present a detailed statistical analysis of the dataset in comparison to PASCAL, ImageNet, and SUN. Finally, we provide baseline performance analysis for bounding box and segmentation detection results using a Deformable Parts Model.", "links": [["URL", "https://link.springer.com/chapter/10.1007/978-3-319-10602-1_48", "badge-url"]], "pdf": true, "search": "lin2014 2014 tsung-yi lin, michael maire, serge belongie, james hays, pietro perona, deva ramanan et al. microsoft coco: common objects in context computer vision – eccv 2014 · pp. 740--755 · springer international publishing we present a new dataset with the goal of advancing the state-of-the-art in object recognition by placing the question of object recognition in the context of the broader question of scene understanding. this is achieved by gathering images of complex everyday scenes containing common objects in their natural context. objects are labeled using per-instance segmentations to aid in precise object localization. our dataset contains photos of 91 objects types that would be easily recognizable by a 4 year old. with a total of 2.5 million labeled instances in 328k images, the creation of our dataset drew upon extensive crowd worker involvement via novel user interfaces for category detection, instance spotting and instance segmentation. we present a detailed statistical analysis of the dataset in comparison to pascal, imagenet, and sun. finally, we provide baseline performance analysis for bounding box and segmentation detection results using a deformable parts model. inproceedings", "raw": "@InProceedings{Lin2014,\n  author    = {Lin, Tsung-Yi and Maire, Michael and Belongie, Serge and Hays, James and Perona, Pietro and Ramanan, Deva and Doll{\\'a}r, Piotr and Zitnick, C. Lawrence},\n  title     = {Microsoft {COCO}: Common Objects in Context},\n  booktitle = {Computer Vision -- ECCV 2014},\n  year      = {2014},\n  editor    = {Fleet, David and Pajdla, Tomas and Schiele, Bernt and Tuytelaars, Tinne},\n  pages     = {740--755},\n  address   = {Cham},\n  publisher = {Springer International Publishing},\n  abstract  = {We present a new dataset with the goal of advancing the state-of-the-art in object recognition by placing the question of object recognition in the context of the broader question of scene understanding. This is achieved by gathering images of complex everyday scenes containing common objects in their natural context. Objects are labeled using per-instance segmentations to aid in precise object localization. Our dataset contains photos of 91 objects types that would be easily recognizable by a 4 year old. With a total of 2.5 million labeled instances in 328k images, the creation of our dataset drew upon extensive crowd worker involvement via novel user interfaces for category detection, instance spotting and instance segmentation. We present a detailed statistical analysis of the dataset in comparison to PASCAL, ImageNet, and SUN. Finally, we provide baseline performance analysis for bounding box and segmentation detection results using a Deformable Parts Model.},\n  file      = {:pdfs/2014 - Microsoft COCO - Common Objects in Context.pdf:PDF},\n  isbn      = {978-3-319-10602-1},\n  url       = {https://link.springer.com/chapter/10.1007/978-3-319-10602-1_48},\n}"}, {"key": "Lin2017", "type": "Article", "year": "2017", "authors": "Tsung-Yi Lin, Priya Goyal, Ross Girshick, Kaiming He, Piotr Dollár", "title": "Focal Loss for Dense Object Detection", "venue": "CoRR · Vol. abs/1708.02002", "abstract": "", "links": [["arXiv", "http://arxiv.org/abs/1708.02002", "badge-arxiv"]], "pdf": true, "search": "lin2017 2017 tsung-yi lin, priya goyal, ross girshick, kaiming he, piotr dollár focal loss for dense object detection corr · vol. abs/1708.02002  article", "raw": "@Article{Lin2017,\n  author        = {Lin, Tsung-Yi and Goyal, Priya and Girshick, Ross and He, Kaiming and Doll{\\'{a}}r, Piotr},\n  title         = {Focal Loss for Dense Object Detection},\n  journal       = {CoRR},\n  year          = {2017},\n  volume        = {abs/1708.02002},\n  archiveprefix = {arXiv},\n  bibsource     = {dblp computer science bibliography, http://dblp.org},\n  biburl        = {http://dblp.org/rec/bib/journals/corr/abs-1708-02002},\n  file          = {:pdfs/2017 - Focal Loss for Dense Object Detection.pdf:PDF},\n  url           = {http://arxiv.org/abs/1708.02002},\n}"}, {"key": "Lin2017a", "type": "InProceedings", "year": "2017", "authors": "Tsung-Yi Lin, Piotr Dollár, Ross Girshick, Kaiming He, Bharath Hariharan, Serge Belongie", "title": "Feature Pyramid Networks for Object Detection", "venue": "The IEEE Conference on Computer Vision and Pattern Recognition (CVPR)", "abstract": "", "links": [["URL", "http://openaccess.thecvf.com/content_cvpr_2017/papers/Lin_Feature_Pyramid_Networks_CVPR_2017_paper.pdf", "badge-url"]], "pdf": true, "search": "lin2017a 2017 tsung-yi lin, piotr dollár, ross girshick, kaiming he, bharath hariharan, serge belongie feature pyramid networks for object detection the ieee conference on computer vision and pattern recognition (cvpr)  inproceedings", "raw": "@InProceedings{Lin2017a,\n  author    = {Lin, Tsung-Yi and Doll{\\'{a}}r, Piotr and Girshick, Ross and He, Kaiming and Hariharan, Bharath and Belongie, Serge},\n  title     = {Feature Pyramid Networks for Object Detection},\n  booktitle = {The IEEE Conference on Computer Vision and Pattern Recognition (CVPR)},\n  year      = {2017},\n  file      = {:pdfs/2017 - Feature Pyramid Networks for Object Detection.pdf:PDF},\n  url       = {http://openaccess.thecvf.com/content_cvpr_2017/papers/Lin_Feature_Pyramid_Networks_CVPR_2017_paper.pdf},\n}"}, {"key": "Liu2016", "type": "InProceedings", "year": "2016", "authors": "Wei Liu, Dragomir Anguelov, Dumitru Erhan, Christian Szegedy, Scott Reed, Cheng-Yang Fu et al.", "title": "SSD: Single Shot MultiBox Detector", "venue": "Computer Vision – ECCV 2016 · pp. 21--37 · Springer International Publishing", "abstract": "We present a method for detecting objects in images using a single deep neural network. Our approach, named SSD, discretizes the output space of bounding boxes into a set of default boxes over different aspect ratios and scales per feature map location. At prediction time, the network generates scores for the presence of each object category in each default box and produces adjustments to the box to better match the object shape. Additionally, the network combines predictions from multiple feature maps with different resolutions to naturally handle objects of various sizes. SSD is simple relative to methods that require object proposals because it completely eliminates proposal generation and subsequent pixel or feature resampling stages and encapsulates all computation in a single network. This makes SSD easy to train and straightforward to integrate into systems that require a detection component. Experimental results on the PASCAL VOC, COCO, and ILSVRC datasets confirm that SSD has competitive accuracy to methods that utilize an additional object proposal step and is much faster, while providing a unified framework for both training and inference. For 300x300 input, SSD achieves 74.3% mAP on VOC2007 test at 59 FPS on a Nvidia Titan X and for 512x512 input, SSD achieves 76.9% mAP, outperforming a comparable state of the art Faster R-CNN model. Compared to other single stage methods, SSD has much better accuracy even with a smaller input image size. Code is available at https://github.com/weiliu89/caffe/tree/ssd.", "links": [["URL", "https://link.springer.com/chapter/10.1007%2F978-3-319-46448-0_2", "badge-url"]], "pdf": true, "search": "liu2016 2016 wei liu, dragomir anguelov, dumitru erhan, christian szegedy, scott reed, cheng-yang fu et al. ssd: single shot multibox detector computer vision – eccv 2016 · pp. 21--37 · springer international publishing we present a method for detecting objects in images using a single deep neural network. our approach, named ssd, discretizes the output space of bounding boxes into a set of default boxes over different aspect ratios and scales per feature map location. at prediction time, the network generates scores for the presence of each object category in each default box and produces adjustments to the box to better match the object shape. additionally, the network combines predictions from multiple feature maps with different resolutions to naturally handle objects of various sizes. ssd is simple relative to methods that require object proposals because it completely eliminates proposal generation and subsequent pixel or feature resampling stages and encapsulates all computation in a single network. this makes ssd easy to train and straightforward to integrate into systems that require a detection component. experimental results on the pascal voc, coco, and ilsvrc datasets confirm that ssd has competitive accuracy to methods that utilize an additional object proposal step and is much faster, while providing a unified framework for both training and inference. for 300x300 input, ssd achieves 74.3% map on voc2007 test at 59 fps on a nvidia titan x and for 512x512 input, ssd achieves 76.9% map, outperforming a comparable state of the art faster r-cnn model. compared to other single stage methods, ssd has much better accuracy even with a smaller input image size. code is available at https://github.com/weiliu89/caffe/tree/ssd. inproceedings", "raw": "@InProceedings{Liu2016,\n  author    = {Liu, Wei and Anguelov, Dragomir and Erhan, Dumitru and Szegedy, Christian and Reed, Scott and Fu, Cheng-Yang and Berg, Alexander C.},\n  title     = {{SSD}: Single Shot MultiBox Detector},\n  booktitle = {Computer Vision -- ECCV 2016},\n  year      = {2016},\n  editor    = {Leibe, Bastian and Matas, Jiri and Sebe, Nicu and Welling, Max},\n  pages     = {21--37},\n  address   = {Cham},\n  publisher = {Springer International Publishing},\n  abstract  = {We present a method for detecting objects in images using a single deep neural network. Our approach, named SSD, discretizes the output space of bounding boxes into a set of default boxes over different aspect ratios and scales per feature map location. At prediction time, the network generates scores for the presence of each object category in each default box and produces adjustments to the box to better match the object shape. Additionally, the network combines predictions from multiple feature maps with different resolutions to naturally handle objects of various sizes. SSD is simple relative to methods that require object proposals because it completely eliminates proposal generation and subsequent pixel or feature resampling stages and encapsulates all computation in a single network. This makes SSD easy to train and straightforward to integrate into systems that require a detection component. Experimental results on the PASCAL VOC, COCO, and ILSVRC datasets confirm that SSD has competitive accuracy to methods that utilize an additional object proposal step and is much faster, while providing a unified framework for both training and inference. For 300x300 input, SSD achieves 74.3% mAP on VOC2007 test at 59 FPS on a Nvidia Titan X and for 512x512 input, SSD achieves 76.9% mAP, outperforming a comparable state of the art Faster R-CNN model. Compared to other single stage methods, SSD has much better accuracy even with a smaller input image size. Code is available at https://github.com/weiliu89/caffe/tree/ssd.},\n  file      = {:pdfs/2016 - SSD - Single Shot MultiBox Detector.pdf:PDF},\n  isbn      = {978-3-319-46448-0},\n  url       = {https://link.springer.com/chapter/10.1007%2F978-3-319-46448-0_2},\n}"}, {"key": "Liu2021", "type": "InCollection", "year": "2021", "authors": "Lele Liu, Emmanouil Be between symbolic music formats: A case study with Humdrum, Lilypond, MEI, and MusicXML},\n  booktitle = {Music Encoding Conference 2019},\n  year      = {2019},\n  address   = {Vienna, Austria},\n  file      = {:pdfs/2019 - The Effects of Translation between Symbolic Music Formats_ a Case Study with Humdrum, Lilypond, MEI, and MusicXML.pdf:PDF},\n  url       = {https://music-encoding.org/conference/2019/abstracts_mec2019/The%20effects%20of%20translation%20between%20the%20Humdrum%20%20Lilypond%20%20MEI%20%20and%20MusicXML.pdf},\n}"}, {"key": "Ma2024", "type": "Misc", "year": "2024", "authors": "Yinghao Ma, Anders Øland, Anton Ragni, Bleiz MacSen Del Sette, Charalampos Saitis, Chris Donahue et al.", "title": "Foundation Models for Music: A Survey", "venue": "", "abstract": "In recent years, foundation models (FMs) such as large language models (LLMs) and latent diffusion models have profoundly impacted diverse sectors, including music. This comprehensive review examines state-of-the-art pre-trained models and foundation models in music, spanning from representation learning, generative learning and multimodal learning. Emphasis is placed on the lack of versatility of previous methods on diverse music applications, along with the potential of FMs in music understanding, generation and medical application. By comprehensively exploring the details of the model pre-training paradigm, architectural choices, tokenisation, finetuning methodologies and controllability, we emphasise the important topics that should have been well explored, like instruction tuning and in-context learning, scaling law and emergent ability, as well as long-sequence modelling. A dedicated section presents insights into music agents, accompanied by a thorough analysis of datasets and evaluations essential for pre-training and downstream tasks.", "links": [["arXiv", "https://doi.org/10.48550/arXiv.2408.14340", "badge-arxiv"]], "pdf": true, "search": "ma2024 2024 yinghao ma, anders øland, anton ragni, bleiz macsen del sette, charalampos saitis, chris donahue et al. foundation models for music: a survey  in recent years, foundation models (fms) such as large language models (llms) and latent diffusion models have profoundly impacted diverse sectors, including music. this comprehensive review examines state-of-the-art pre-trained models and foundation models in music, spanning from representation learning, generative learning and multimodal learning. emphasis is placed on the lack of versatility of previous methods on diverse music applications, along with the potential of fms in music understanding, generation and medical application. by comprehensively exploring the details of the model pre-training paradigm, architectural choices, tokenisation, finetuning methodologies and controllability, we emphasise the important topics that should have been well explored, like instruction tuning and in-context learning, scaling law and emergent ability, as well as long-sequence modelling. a dedicated section presents insights into music agents, accompanied by a thorough analysis of datasets and evaluations essential for pre-training and downstream tasks. misc", "raw": "@Misc{Ma2024,\n  author    = {Ma, Yinghao and {\\O}land, Anders and Ragni, Anton and Del Sette, Bleiz MacSen and Saitis, Charalampos and Donahue, Chris and Lin, Chenghua and Plachouras, Christos and Benetos, Emmanouil and Shatri, Elona and Morreale, Fabio and Zhang, Ge and Fazekas, Gy{\\\"o}rgy and Xia, Gus and Zhang, Huan and Manco, Ilaria and Huang, Jiawen and Guinot, Julien and Lin, Liwei and Marinelli, Luca and Lam, Max W. Y. and Sharma, Megha and Kong, Qiuqiang and Dannenberg, Roger B. and Yuan, Ruibin and Wu, Shangda and Wu, Shih-Lun and Dai, Shuqi and Lei, Shun and Kang, Shiyin and Dixon, Simon and Chen, Wenhu and Huang, Wenhao and Du, Xingjian and Qu, Xingwei and Tan, Xu and Li, Yizhi and Tian, Zeyue and Wu, Zhiyong and Wu, Zhizheng and Ma, Ziyang and Wang, Ziyu},\n  title     = {Foundation Models for Music: A Survey},\n  year      = {2024},\n  abstract  = {In recent years, foundation models ({FM}s) such as large language models ({LLM}s) and latent diffusion models have profoundly impacted diverse sectors, including music. This comprehensive review examines state-of-the-art pre-trained models and foundation models in music, spanning from representation learning, generative learning and multimodal learning. Emphasis is placed on the lack of versatility of previous methods on diverse music applications, along with the potential of {FM}s in music understanding, generation and medical application. By comprehensively exploring the details of the model pre-training paradigm, architectural choices, tokenisation, finetuning methodologies and controllability, we emphasise the important topics that should have been well explored, like instruction tuning and in-context learning, scaling law and emergent ability, as well as long-sequence modelling. A dedicated section presents insights into music agents, accompanied by a thorough analysis of datasets and evaluations essential for pre-training and downstream tasks.},\n  doi       = {10.48550/arXiv.2408.14340},\n  file      = {:pdfs/2024 - Foundation Models for Music A Survey.pdf:PDF},\n  url       = {https://arxiv.org/abs/2408.14340},\n}"}, {"key": "Machacek2014", "type": "Article", "year": "2014", "authors": "Matouš Macháček, Ondřej Bojar", "title": "Results of the WMT14 Metrics Shared Task", "venue": "Ninth Workshop on Statistical Machine Translation · pp. 293--301 · Association for Computational Linguistics", "abstract": "", "links": [], "pdf": true, "search": "machacek2014 2014 matouš macháček, ondřej bojar results of the wmt14 metrics shared task ninth workshop on statistical machine translation · pp. 293--301 · association for computational linguistics  article", "raw": "@Article{Machacek2014,\n  author    = {Mach{\\'{a}}{\\v{c}}ek, Matou{\\v{s}} and Bojar, Ond{\\v{r}}ej},\n  title     = {Results of the {WMT}14 Metric    = {e-Score; Impact, Perception and Uses in Music Educational Institutions},\n  booktitle               = {3rd International Conference on Technological Ecosystems for Enhancing Multiculturality},\n  year                    = {2015},\n  editor                  = {Felgueiras M.C., Alves G.R.},\n  pages                   = {449--454},\n  publisher               = {Association for Computing Machinery},\n  abstract                = {Parallel to the very first music expressions as a human activity,\n\tdeveloped under some kind of guidelines and precepts, there have\n\tarisen relentless efforts and attempts to achieve the long-lasting\n\tand stable representation of the musical products being created,\n\tin a way that would allow to recreate them as closely as posible\n\tto the original event.from the very beginning until the present days,\n\thave been many notation systems, formats, and expressions developed\n\twith this purpose in mind. With the incursion and implementation\n\tof the new digital technologies in the musical activity spheres,\n\ta new paradigm emerge in the representation and transmission of the\n\tmusical work, culminating nowadays with the born of a new music document\n\ttypology tha may be called digital music score or e-Score. The aim\n\tof this paper is lay down and approach to this new type of object\n\tfor music texts reading, editing and transmission through a quantitive\n\tresearch, being the scope of the study to analyze and understand\n\thow electronic music scores (e-Score) are received, used and perceived\n\tby music students and teachers in any of the music learning centers\n\tin our country. The main purpose is to provide scientific evidence,\n\tthrough statistical methods, of the level of implementation and use\n\tof these new support type for music knowledge transmission, as well\n\tas the most influential aspects implied in perception of therm amongst\n\tmusical community in Spain.},\n  affiliation             = {E-Lectra (Universidad de Salamanca, Spain},\n  author_keywords         = {Digital e-learning; Digital sheet music; E-Score; Electronic edition; Music education research; Music readers},\n  correspondence_address1 = {Sánchez-Jara, J.M.; E-Lectra (Universidad de SalamancaSpain; email: javiermerchan@usal.es},\n  doi                     = {10.1145/2808580.2808647},\n  file                    = {:pdfs/2015 - e-Score - Impact, perception and uses in music educational institutions.pdf:PDF},\n  isbn                    = {9781450334426},\n  keywords                = {Computer music; Ecology; Ecosystems; Education; Teaching, Digital sheet music; Digital technologies; Educational institutions; Electronic editions; Human activities; Music education; Music readers; Scientific evidence, E-learning},\n  language                = {English},\n}\n\n@Misc{Mirex2019ScoreFollowing,\n  author       = {Hao, Yun},\n  title        = {Real-time Audio to Score Alignment (a.k.a Score Following)},\n  howpublished = {\\url{https://www.music-ir.org/mirex/wiki/2019:Real-time_Audio_to_Score_Alignment_(a.k.a_Score_Following)}},\n  year         = {2019},\n  url          = {https://www.music-ir.org/mirex/wiki/2019:Real-time_Audio_to_Score_Alignment_(a.k.a_Score_Following)},\n}\n\n@Article{Mnih2014,\n  author    = {Mnih, Volodymyr and Heess, Nicolas and Graves, Alex and Kavukcuoglu, Koray},\n  title     = {Recurrent Models of Visual Attention},\n  journal   = {{Computing Research Repository}},\n  year      = {2014},\n  volume    = {abs/1406.6247},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/corr/MnihHGK14},\n  file      = {:pdfs/2014 - Recurrent Models of Visual Attention.pdf:PDF},\n  groups    = {handwriting},\n  url       = {http://arxiv.org/abs/1406.6247},\n}\n\n@InCollection{Mnnich2022,\n  author    = {M{\\\"u}nnich, S},\n  booktitle = {Dialektik der Schrift: Zu Adornos Theorie der musikalischen Reproduktion},\n  title     = {Adornos Theorie der musikalischen Reproduktion als Herausforderung f{\\\"u}r die digitale Codierung musikalischer Schrift},\n  year      = {2022},\n  editor    = {Freund, J and Nanni, M and Schermann, JM and Urbanek, N},\n  publisher = {Wilhelm Fink},\n  address   = {Paderborn},\n  isbn      = {978-3-7705-6680-8},\n  url       = {https://brill.com/display/book/9783846766804/BP000027.xml},\n  file      = {:pdfs/2022 - Adornos Theorie der musikalischen Reproduktion als Herausforderung fur die digitale Codierung musikalischer Schrift.pdf:PDF},\n}\n\n@InProceedings{Muge2000,\n  author    = {Muge, F. and Granado, I. and Mengucci, M. and Pina, P. and Ramos, V. and Sirakov, N. and Caldas Pinto, J. R. and Marcolino, A. and Ramalho, M{\\'a}rio and Vieira, P. and Maia do Amaral, A.},\n  title     = {Automatic Feature Extraction and Recognition for Digital Access of Books of the Renaissance},\n  booktitle = {Research and Advanced Technology for Digital Libraries},\n  year      = {2000},\n  editor    = {Borbinha, Jos{\\'e} and Baker, Thomas},\n  pages     = {1--13},\n  address   = {Berlin, Heidelberg},\n  publisher = {Springer Berlin Heidelberg},\n  abstract  = {Antique printed books constitute a heritage that should be preserved and used. With novel digitising techniques is now possible to have these books stored in digital format and accessible to a wider public. However it remains the problem of how to use them. DEBORA (Digital accEss to BOoks of the RenAissance) is a European project that aims to develop a system to interact with these books through world-wide networks. The main issue is to build a database accessible through client computers. That will require to built accompanying metadata that should characterise different components of the books as illuminated letters, banners, figures and key words in order to simplify and speed up the remote access. To solve these problems, digital image analysis algorithms regarding filtering, segmentation, separation of text from non-text, lines and word segmentation and word recognition were developed. Some novel ideas are presented and illustrated through examples.},\n  doi       = {10.1007/3-540-45268-0_1},\n  file      = {:pdfs/2000 - Automatic Feature Extraction and Recognition for Digital Access of Books of the Renaissance.pdf:PDF},\n  isbn      = {978-3-540-45268-3},\n}\n\n@Book{Ng2008,\n  title     = {{Interactive Multimedia Music Technologies}},\n  publisher = {IGI Global},\n  year      = {2008},\n  author    = {Ng, Kia and Nesi, Paolo},\n  isbn      = {1599041529},\n  abstract  = {Many multimedia music content owners and distributors are converting their archives of music scores from paper into digital images, and to machine readable symbolic notation in order to survive in the business world. Interactive Multimedia Music Technologies discusses relevant state-of-the-art technologies and consists of analysis, knowledge, and application scenarios as surveyed, analyzed, and evaluated by industry professionals. Interactive Multimedia Music Technologies exemplifies the newest functionalities of multimedia interactive music to be used for valorizing cultural heritage, content and archives that are not currently distributed due to lack of safety, suitable coding models, and conversion technologies. Interactive Multimedia Music Technologies explains new and innovative methods of promoting music and products for entertainment, distance teaching, valorizing archives, and commercial and non-commercial purposes, and provides new services for those connected via personal computers, mobile and other devices, for both sighted and print-impaired consumers.},\n  doi       = {10.4018/978-1-59904-150-6},\n  file      = {:pdfs/2008 - Interactive Multimedia Music Technologies.pdf:PDF},\n  keywords  = {others},\n  pages     = {394},\n}\n\n@TechReport{Nielsen2009,\n  author      = {Nielsen, Johan},\n  title       = {Statistical Analysis of Music Corpora},\n  institution = {Dept. of Computer Science, University of Copenhagen},\n  year        = {2009},\n  address     = {Copenhagen, Denmark},\n  comment     = {Bsc. Thesis (?)\nSee https://johanbrinch.com/sections/projects/music.html\nWrote his Master's Thesis in 2012},\n  file        = {:pdfs/2009 - Statistical Analysis of Music Corpora.pdf:PDF},\n  school      = {University of Copenhagen},\n  url         = {https://johanbrinch.com/static/papers/brinchj-2008_music.pdf},\n}\n\n@InProceedings{Nivre2005,\n  author    = {Nivre, Joakim and Nilsson, Jens},\n  title     = {Pseudo-projective Dependency Parsing},\n  booktitle = {43rd Annual Meeting on Association for Computational Linguistics},\n  year      = {2005},\n  pages     = {99--106},\n  address   = {Stroudsburg, PA, USA},\n  publisher = {Association for Computational Linguistics},\n  acmid     = {1219853},\n  doi       = {10.3115/1219840.1219853},\n  file      = {:pdfs/2005 - Pseudo Projective Dependency Parsing.pdf:PDF},\n  location  = {Ann Arbor, Michigan},\n}\n\n@Article{Ntirogiannis2013,\n  author   = {Ntirogiannis, Konstantinos and Gatos, Basilis and Pratikakis, Ioannis},\n  journal  = {IEEE Transactions on Image Processing},\n  title    = {{Performance evaluation methodology for historical document image binarization}},\n  year     = {2013},\n  issn     = {1057-7149},\n  number   = {2},\n  pages    = {595--609},\n  volume   = {22},\n  abstract = {Document image binarization is of great importance in the document image analysis and recognition pipeline since it affects further stages of the recognition process. The evaluation of a binarization method aids in studying its algorithmic behavior, as well as verifying its effectiveness, by providing qualitative and quantitative indication of its performance. This paper addresses a pixel-based binarization evaluation methodology for historical handwritten/machine-printed document images. In the proposed evaluation scheme, the recall and precision evaluation measures are properly modified using a weighting scheme that diminishes any potential evaluation bias. Additional performance metrics of the proposed evaluation scheme consist of the percentage rates of broken and missed text, false alarms, background noise, character enlargement, and merging. Several experiments conducted in comparison with other pixel-based evaluation measures demonstrate the validity of the proposed evaluation scheme.},\n  doi      = {10.1109/TIP.2012.2219550},\n  file     = {:pdfs/2013 - Performance Evaluation Methodology for Historical Document Image Binarization.pdf:PDF},\n  keywords = {Document image binarization, binarization, ground truth, performance evaluation},\n  pmid     = {23008259},\n}\n\n@Book{Palmer1999,\n  title     = {Vision science: Photons to phenomenology},\n  publisher = {MIT press},\n  year      = {1999},\n  author    = {Palmer, Stephen E.},\n  url       = {https://mitpress.mit.edu/books/vision-science},\n}\n\n@InProceedings{Papineni2002,\n  author    = {Papineni, Kishore and Roukos, Salim and Ward, Todd and Zhu, Wei-Jing},\n  title     = {{BLEU}: A Method for Automatic Evaluation of Machine Translation},\n  booktitle = {40th Annual Meeting on Association for Computational Linguistics},\n  year      = {2002},\n  pages     = {311--318},\n  address   = {Stroudsburg, PA, USA},\n  publisher = {Association for Computational Linguistics},\n  acmid     = {1073135},\n  doi       = {10.3115/1073083.1073135},\n  file      = {:pdfs/2002 - BLEU - a Method for Automatic Evaluation of Machine Translation.pdf:PDF},\n  groups    = {evaluation},\n  location  = {Philadelphia, Pennsylvania},\n}\n\n@InProceedings{Payne2023,\n  author    = {Payne, William and Hurst, Amy},\n  booktitle = {Information for a Better World: Normality, Virtuality, Inclusion, and Social Justice},\n  title     = {{``We Avoid PDFs''}: Improving Notation Access for Blind and Visually Impaired Musicians},\n  year      = {2023},\n  month     = {Mar},\n  pages     = {581--597},\n  publisher = {Springer},\n  series    = {Lecture Notes in Computer Science},\n  doi       = {10.1007/978-3-031-28032-0_44},\n  url       = {https://link.springer.com/chapter/10.1007/978-3-031-28032-0_44},\n  file      = {:pdfs/2023 - ``We Avoid PDFs'' Improving Notation Access for Blind and Visually Impaired Musicians.pdf:PDF},\n}\n\n@InProceedings{Payne2025,\n  author    = {Payne, William Christopher and An, Yu Lee},\n  booktitle = {Proceedings of the 27th International {ACM} {SIGACCESS} Conference on Computers and Accessibility},\n  title     = {Access Beyond the Score: Understanding Notation Needs and Workflows of Low Vision Musicians},\n  year      = {2025},\n  month     = {Oct},\n  pages     = {1--14},\n  publisher = {Association for Computing Machinery},\n  series    = {{ASSETS} '25},\n  abstract  = {Music notation is typically shared in print or {PDF} formats that are rarely accessible without intervention for blind and low vision people. This paper focuses on a potentially large population of low vision print music readers who neither read braille nor possess enough vision to read standard-sized scores. Through an interview study with 18 musicians and Teachers of the Visually Impaired ({TVIs}), the authors examine notation needs and adaptive workflows in music learning and performance contexts.},\n  doi       = {10.1145/3663547.3746322},\n  isbn      = {979-8-4007-1195-3},\n  url       = {https://dl.acm.org/doi/10.1145/3663547.3746322},\n  file      = {:pdfs/2025 - Access Beyond the Score Understanding Notation Needs and Workflows of Low Vision Musicians.pdf:PDF},\n}\n\n@InProceedings{Phon-Amnuaisuk2009,\n  author    = {Phon-Amnuaisuk, Somnuk},\n  title     = {Estimating {HMM} Parameters Using Particle Swarm Optimisation},\n  booktitle = {Applications of Evolutionary Computing},\n  year      = {2009},\n  editor    = {Giacobini, Mario and Brabazon, Anthony and Cagnoni, Stefano and Di Caro, Gianni A. and Ek{\\'a}rt, Anik{\\'o} and Esparcia-Alc{\\'a}zar, Anna Isabel and Farooq, Muddassar and Fink, Andreas and Machado, Penousal},\n  pages     = {625--634},\n  address   = {Berlin, Heidelberg},\n  publisher = {Springer Berlin Heidelberg},\n  abstract  = {A Hidden Markov Model (HMM) is a powerful model in describing temporal sequences. The HMM parameters are usually estimated using Baum-Welch algorithm. However, it is well known that the Baum-Welch algorithm tends to arrive at local optimal points. In this report, we investigate the potential of the Particle Swarm Optimisation (PSO) as an alternative method for HMM parameters estimation. The domain in this study is the recognition of handwritten music notations. Three observables: (i) sequence of ink patterns, (ii) stroke information and (iii) spatial information associated with eight musical symbols were recorded. Sixteen HMM models were built from the data. Eight HMM models for eight musical symbols were built from the parameters estimated using the Baum-Welch algorithm and the other eight models were built from the parameters estimated using PSO. The experiment shows that the performances of HMM models, using parameters estimated from PSO and Baum-Welch approach, are comparable. We suggest that PSO or a combination of PSO and Baum-Welch algorithm could be alternative approaches for the HMM parameters estimation.},\n  isbn      = {978-3-642-01129-0},\n}\n\n@Misc{Presgurvic2005,\n  author      = {Presgurvic, G{\\'{e}}rard},\n  title       = {Songbook Romeo \\& Julia},\n  year        = {2005},\n  address     = {Vienna, Austria},\n  editor      = {German translation by Michaela Ronzoni; Arrangement Christian Kolonovits; Piano and vocal arrangement Wolfgang Gattringer},\n  institution = {Vereinigte B{\\\"{u}}hnen Wien},\n  publisher   = {Universal Music Publishing Limited, 8-9 Frith Street, London W1D 3JB},\n  url         = {https://www.musicalvienna.at/de/souvenirs/12/ANDERE-MUSICALS/10/Songbook-Romeo-und-Julia},\n}\n\n@InProceedings{Ramoneda2023,\n  author    = {Ramoneda, Pedro and Valero-Mas, Jose J. and Jeong, Dasaem and Serra, Xavier},\n  b
