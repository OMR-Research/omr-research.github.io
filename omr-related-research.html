ghts", "venue": "Springer Berlin Heidelberg", "abstract": "Advances in the science and technology of Music Information Retrieval (MIR) systems and algorithms are dependent on the development of rigorous measures of accuracy and performance such that meaningful comparisons among current and novel approaches can be made. This is the motivating principle driving the efforts of the International Music Information Retrieval Systems Evaluation Laboratory (IMIRSEL) and the annual Music Information Retrieval Evaluation eXchange (MIREX). Since it started in 2005, MIREX has fostered great advancements not only in many specific areas of MIR, but also in our general understanding of how MIR systems and algorithms are to be evaluated. This chapter outlines some of the major highlights of the past four years of MIREX evaluations, including its organizing principles, the selection of evaluation metrics, and the evolution of evaluation tasks. The chapter concludes with a brief introduction of how MIREX plans to expand into the future using a suite of Web 2.0 technologies to automated MIREX evaluations.", "links": [["DOI", "https://doi.org/10.1007/978-3-642-11674-2_5", "badge-doi"]], "pdf": true, "search": "downie2010 2010 j. stephen downie, andreas f. ehmann, mert bay, m. cameron jones the music information retrieval evaluation exchange: some observations and insights springer berlin heidelberg advances in the science and technology of music information retrieval (mir) systems and algorithms are dependent on the development of rigorous measures of accuracy and performance such that meaningful comparisons among current and novel approaches can be made. this is the motivating principle driving the efforts of the international music information retrieval systems evaluation laboratory (imirsel) and the annual music information retrieval evaluation exchange (mirex). since it started in 2005, mirex has fostered great advancements not only in many specific areas of mir, but also in our general understanding of how mir systems and algorithms are to be evaluated. this chapter outlines some of the major highlights of the past four years of mirex evaluations, including its organizing principles, the selection of evaluation metrics, and the evolution of evaluation tasks. the chapter concludes with a brief introduction of how mirex plans to expand into the future using a suite of web 2.0 technologies to automated mirex evaluations. incollection", "raw": "@InCollection{Downie2010,\n  author    = {Downie, J. Stephen and Ehmann, Andreas F. and Bay, Mert and Jones, M. Cameron},\n  title     = {The Music Information Retrieval Evaluation eXchange: Some Observations and Insights},\n  booktitle = {Advances in Music Information Retrieval},\n  publisher = {Springer Berlin Heidelberg},\n  year      = {2010},\n  pages     = {93--115},\n  address   = {Berlin, Heidelberg},\n  isbn      = {978-3-642-11674-2},\n  abstract  = {Advances in the science and technology of Music Information Retrieval (MIR) systems and algorithms are dependent on the development of rigorous measures of accuracy and performance such that meaningful comparisons among current and novel approaches can be made. This is the motivating principle driving the efforts of the International Music Information Retrieval Systems Evaluation Laboratory (IMIRSEL) and the annual Music Information Retrieval Evaluation eXchange (MIREX). Since it started in 2005, MIREX has fostered great advancements not only in many specific areas of MIR, but also in our general understanding of how MIR systems and algorithms are to be evaluated. This chapter outlines some of the major highlights of the past four years of MIREX evaluations, including its organizing principles, the selection of evaluation metrics, and the evolution of evaluation tasks. The chapter concludes with a brief introduction of how MIREX plans to expand into the future using a suite of Web 2.0 technologies to automated MIREX evaluations.},\n  doi       = {10.1007/978-3-642-11674-2_5},\n  file      = {:pdfs/2010 - The Music Information Retrieval Evaluation Exchange - Some Observations and Insights.pdf:PDF},\n  url       = {https://doi.org/10.1007/978-3-642-11674-2_5},\n}"}, {"key": "Droettboom2003", "type": "InProceedings", "year": "2003", "authors": "Michael Droettboom", "title": "Correcting broken characters in the recognition of historical printed documents", "venue": "Joint Conference on Digital Libraries · pp. 364--366", "abstract": "We present a new technique for dealing with broken characters, one of the major challenges in the optical character recognition (OCR) of degraded historical printed documents. A technique based on graph combinatorics is used to rejoin the appropriate connected components. It has been applied to real data with successful results.", "links": [["DOI", "https://doi.org/10.1109/JCDL.2003.1204889", "badge-doi"]], "pdf": true, "search": "droettboom2003 2003 michael droettboom correcting broken characters in the recognition of historical printed documents joint conference on digital libraries · pp. 364--366 we present a new technique for dealing with broken characters, one of the major challenges in the optical character recognition (ocr) of degraded historical printed documents. a technique based on graph combinatorics is used to rejoin the appropriate connected components. it has been applied to real data with successful results. inproceedings", "raw": "@InProceedings{Droettboom2003,\n  author    = {Droettboom, Michael},\n  title     = {Correcting broken characters in the recognition of historical printed documents},\n  booktitle = {Joint Conference on Digital Libraries},\n  year      = {2003},\n  pages     = {364--366},\n  abstract  = {We present a new technique for dealing with broken characters, one of the major challenges in the optical character recognition (OCR) of degraded historical printed documents. A technique based on graph combinatorics is used to rejoin the appropriate connecte ar": "1992", "authors": "Hoda Fahmy, Dorothea Blostein", "title": "A survey of graph grammars: Theory and applications", "venue": "11th IAPR International Conference on Pattern Recognition · pp. 294--298", "abstract": "", "links": [["URL", "https://www.researchgate.net/publication/3513859_A_survey_of_graph_grammars_theory_and_applications", "badge-url"]], "pdf": true, "search": "fahmy1992 1992 hoda fahmy, dorothea blostein a survey of graph grammars: theory and applications 11th iapr international conference on pattern recognition · pp. 294--298  inproceedings", "raw": "@InProceedings{Fahmy1992,\n  author       = {Fahmy, Hoda and Blostein, Dorothea},\n  title        = {A survey of graph grammars: Theory and applications},\n  booktitle    = {11th IAPR International Conference on Pattern Recognition},\n  year         = {1992},\n  pages        = {294--298},\n  organization = {IEEE},\n  file         = {:pdfs/1992 - A Survey of Graph Grammars_ Theory and Applications.pdf:PDF},\n  url          = {https://www.researchgate.net/publication/3513859_A_survey_of_graph_grammars_theory_and_applications},\n}"}, {"key": "Fasanaro1990", "type": "Article", "year": "1990", "authors": "A. M. Fasanaro, D. L. A. Spitaleri, R. Valiani, D. Grossi", "title": "Dissociation in Musical Reading: A Musician Affected by Alexia without Agraphia", "venue": "Music Perception: An Interdisciplinary Journal · Vol. 7(3) · pp. 259--272 · University of California Press Journals", "abstract": "Previous works have postulated a similarity between music reading\n\tand text reading. Therefore it is interesting to evaluate both of\n\tthese functions in an alexic subject. The patient investigated is\n\ta professional musician who had an ischemic lesion in the left temporoparieto-occipital\n\tregion. Text reading showed pure alexia in which both the phonological\n\tand global routes were damaged. His ability to read correctly via\n\tmatching tests showed that the word-form system was preserved. The\n\treading of musical scores was damaged too and showed a dissociation\n\tbetween the reading of ideograms and rhythms (preserved) and the\n\treading of notes (impaired). The results of note reading were analogous\n\tto those of word reading. Furthermore, the patient could read notes\n\tcorrectly via matching tests. On the basis of these findings, we\n\tpropose a model of music reading where the reading of notes is based\n\ton a representational system analogous to that of words (the so-called\n\tinternal language) whereas reading of ideograms and rhythms occurs\n\tvia an internal representation unrelated to linguistic functions.", "links": [["DOI", "https://doi.org/10.2307/40285464", "badge-doi"], ["URL", "http://mp.ucpress.edu/content/7/3/259", "badge-url"]], "pdf": false, "search": "fasanaro1990 1990 a. m. fasanaro, d. l. a. spitaleri, r. valiani, d. grossi dissociation in musical reading: a musician affected by alexia without agraphia music perception: an interdisciplinary journal · vol. 7(3) · pp. 259--272 · university of california press journals previous works have postulated a similarity between music reading\n\tand text reading. therefore it is interesting to evaluate both of\n\tthese functions in an alexic subject. the patient investigated is\n\ta professional musician who had an ischemic lesion in the left temporoparieto-occipital\n\tregion. text reading showed pure alexia in which both the phonological\n\tand global routes were damaged. his ability to read correctly via\n\tmatching tests showed that the word-form system was preserved. the\n\treading of musical scores was damaged too and showed a dissociation\n\tbetween the reading of ideograms and rhythms (preserved) and the\n\treading of notes (impaired). the results of note reading were analogous\n\tto those of word reading. furthermore, the patient could read notes\n\tcorrectly via matching tests. on the basis of these findings, we\n\tpropose a model of music reading where the reading of notes is based\n\ton a representational system analogous to that of words (the so-called\n\tinternal language) whereas reading of ideograms and rhythms occurs\n\tvia an internal representation unrelated to linguistic functions. article", "raw": "@Article{Fasanaro1990,\n  author    = {Fasanaro, A. M. and Spitaleri, D. L. A. and Valiani, R. and Grossi, D.},\n  title     = {Dissociation in Musical Reading: A Musician Affected by Alexia without Agraphia},\n  journal   = {Music Perception: An Interdisciplinary Journal},\n  year      = {1990},\n  volume    = {7},\n  number    = {3},\n  pages     = {259--272},\n  issn      = {0730-7829},\n  abstract  = {Previous works have postulated a similarity between music reading\n\tand text reading. Therefore it is interesting to evaluate both of\n\tthese functions in an alexic subject. The patient investigated is\n\ta professional musician who had an ischemic lesion in the left temporoparieto-occipital\n\tregion. Text reading showed pure alexia in which both the phonological\n\tand global routes were damaged. His ability to read correctly via\n\tmatching tests showed that the word-form system was preserved. The\n\treading of musical scores was damaged too and showed a dissociation\n\tbetween the reading of ideograms and rhythms (preserved) and the\n\treading of notes (impaired). The results of note reading were analogous\n\tto those of word reading. Furthermore, the patient could read notes\n\tcorrectly via matching tests. On the basis of these findings, we\n\tpropose a model of music reading where the reading of notes is based\n\ton a representational system analogous to that of words (the so-called\n\tinternal language) whereas reading of ideograms and rhythms occurs\n\tvia an internal representation unrelated to linguistic functions.},\n  doi       = {10.2307/40285464},\n  publisher = {University of California Press Journals},\n  url       = {http://mp.ucpress.edu/content/7/3/259},\n}"}, {"key": "Feffer2022", "type": "InProceedings", "year": "2022", "authors": "M Feffer, C Donahue, Z Lipton", "title": "Assistive Alignment of In-the-Wild Sheet Music and Performances", "venue": "Extended Abstracts for the Late-Breaking Demo Session of the 23rd International Society for Music Information Retrieval Conference", "abstract": "", "links": [["URL", "https://archives.ismir.net/ismir2022/latebreaking/000038.pdf", "badge-url"]], "pdf": true, "search": "feffer2022 2022 m feffer, c donahue, z lipton assistive alignment of in-the-wild sheet music and performances extended abstracts for the late-breaking demo session of the 23rd international society for music information retrieval conference  inproceedings", "raw": "@InProceedings{Feffer2022,\n  author    = {Feffer, M and Donahue, C and Lipton, Z},\n  booktitle = {Extended Abstracts for the Late-Breaking Demo Session of the 23rd {International Society for Music Information Retrieval} Conference},\n  title     = {Assistive Alignment of In-the-Wild Sheet Music and Performances},\n  year      = {2022},\n  file      = {:pdfs/2022 - Assistive Alignment of In-the-Wild Sheet Music and Performances.pdf:PDF},\n  url       = {https://archives.ismir.net/ismir2022/latebreaking/000038.pdf},\n}"}, {"key": "Feist2017", "type": "Book", "year": "2017", "authors": "Jonathan Feist", "title": "Berklee Contemporary Music Notation", "venue": "Berklee Press", "abstract": "Learn the nuances of music notation, and create professional looking scores. This reference presents a comprehensive look at contemporary music notation. You will learn the meaning and stylistic practices for many types of notation that are currently in common use, from traditional staffs to lead sheets to guitar tablature. It discusses hundreds of notation symbols, as well as general guidelines for writing music. Berklee College of Music brings together teachers and students from all over the world, and we use notation in a great variety of ways. This book presents our perspectives on notation: what we have found to be the most commonly used practices in today's music industry, and what seems to be serving our community best. It includes a foreword by Matthew Nicholl, who was a long-time chair of Berklee's Contemporary Writing and Production Department. Whether you find yourself in a Nashville recording studio, Hollywood sound stage, grand concert hall, worship choir loft, or elementary school auditorium, this book will help you to create readable, professional, publication-quality notation. Beyond understanding the standard rules and definitions, you will learn to make appropriate choices for your own work, and generally how to achieve clarity and consistency in your notation so that it best serves your music.", "links": [], "pdf": false, "search": "feist2017 2017 jonathan feist berklee contemporary music notation berklee press learn the nuances of music notation, and create professional looking scores. this reference presents a comprehensive look at contemporary music notation. you will learn the meaning and stylistic practices for many types of notation that are currently in common use, from traditional staffs to lead sheets to guitar tablature. it discusses hundreds of notation symbols, as well as general guidelines for writing music. berklee college of music brings together teachers and students from all over the world, and we use notation in a great variety of ways. this book presents our perspectives on notation: what we have found to be the most commonly used practices in today's music industry, and what seems to be serving our community best. it includes a foreword by matthew nicholl, who was a long-time chair of berklee's contemporary writing and production department. whether you find yourself in a nashville recording studio, hollywood sound stage, grand concert hall, worship choir loft, or elementary school auditorium, this book will help you to create readable, professional, publication-quality notation. beyond understanding the standard rules and definitions, you will learn to make appropriate choices for your own work, and generally how to achieve clarity and consistency in your notation so that it best serves your music. book", "raw": "@Book{Feist2017,\n  title     = {Berklee Contemporary Music Notation},\n  publisher = {Berklee Press},\n  year      = {2017},\n  author    = {Feist, Jonathan},\n  isbn      = {978-0876391785},\n  abstract  = {Learn the nuances of music notation, and create professional looking scores. This reference presents a comprehensive look at contemporary music notation. You will learn the meaning and stylistic practices for many types of notation that are currently in common use, from traditional staffs to lead sheets to guitar tablature. It discusses hundreds of notation symbols, as well as general guidelines for writing music. Berklee College of Music brings together teachers and students from all over the world, and we use notation in a great variety of ways. This book presents our perspectives on notation: what we have found to be the most commonly used practices in today's music industry, and what seems to be serving our community best. It includes a foreword by Matthew Nicholl, who was a long-time chair of Berklee's Contemporary Writing and Production Department. Whether you find yourself in a Nashville recording studio, Hollywood sound stage, grand concert hall, worship choir loft, or elementary school auditorium, this book will help you to create readable, professional, publication-quality notation. Beyond understanding the standard rules and definitions, you will learn to make appropriate choices for your own work, and generally how to achieve clarity and consistency in your notation so that it best serves your music.},\n}"}, {"key": "Ferlaino2018", "type": "Article", "year": "2018", "authors": "Michael Ferlaino, Craig A. Glastonbury, Carolina Motta-Mejia, Manu Vatish, Ingrid Granne, Stephen Kennedy et al.", "title": "Towards Deep Cellular Phenotyping in Placental Histology", "venue": "ArXiv e-prints", "abstra 918},\n  doi     = {10.1109/34.9112},\n  file    = {:pdfs/1988 - A Robust Algorithm for Text String Separation from Mixed Text_Graphics Images.pdf:PDF},\n}"}, {"key": "Foscarin2020", "type": "InProceedings", "year": "2020", "authors": "Francesco Foscarin, Andrew McLeod, Philippe Rigaux, Florent Jacquemard, Masahiko Sakai", "title": "ASAP: a dataset of aligned scores and performances for piano transcription", "venue": "Proceedings of the 21st International Society for Music Information Retrieval Conference (ISMIR) · pp. 534--541", "abstract": "This paper presents the ASAP dataset of 222 digital musical scores aligned with 1068 performances (over 92 hours) of Western classical piano music, providing downbeat, beat, time signature, and key signature annotations using a workflow combining score analysis and alignment algorithms.", "links": [["URL", "https://archives.ismir.net/ismir2020/paper/000127.pdf", "badge-url"]], "pdf": true, "search": "foscarin2020 2020 francesco foscarin, andrew mcleod, philippe rigaux, florent jacquemard, masahiko sakai asap: a dataset of aligned scores and performances for piano transcription proceedings of the 21st international society for music information retrieval conference (ismir) · pp. 534--541 this paper presents the asap dataset of 222 digital musical scores aligned with 1068 performances (over 92 hours) of western classical piano music, providing downbeat, beat, time signature, and key signature annotations using a workflow combining score analysis and alignment algorithms. inproceedings", "raw": "@InProceedings{Foscarin2020,\n  author      = {Foscarin, Francesco and McLeod, Andrew and Rigaux, Philippe and Jacquemard, Florent and Sakai, Masahiko},\n  booktitle   = {Proceedings of the 21st International Society for Music Information Retrieval Conference ({ISMIR})},\n  title       = {{ASAP}: a dataset of aligned scores and performances for piano transcription},\n  year        = {2020},\n  pages       = {534--541},\n  abstract    = {This paper presents the ASAP dataset of 222 digital musical scores aligned with 1068 performances (over 92 hours) of Western classical piano music, providing downbeat, beat, time signature, and key signature annotations using a workflow combining score analysis and alignment algorithms.},\n  file        = {:pdfs/2020 - ASAP A Dataset of Aligned Scores and Performances for Piano Transcription.pdf:PDF},\n  url         = {https://archives.ismir.net/ismir2020/paper/000127.pdf},\n}"}, {"key": "GalnCuenca2024", "type": "InProceedings", "year": "2024", "authors": "Alejandro Galán-Cuenca, Jose J. Valero-Mas, Juan C. Martinez-Sevilla, Antonio Hidalgo-Centeno, Antonio Pertusa, Jorge Calvo-Zaragoza", "title": "MUSCAT: a Multimodal mUSic Collection for Automatic Transcription of Real Recordings and Image Scores", "venue": "Proceedings of the 32nd ACM International Conference on Multimedia", "abstract": "MUSCAT is an assortment of acoustic recordings, image sheets, and their score-level annotations in several notation formats. Despite a large number of existing works in the Automatic Music Transcription (AMT) field, there is a shortage of end-to-end Audio-to-Score (A2S) transcription efforts, leading to a lack of benchmark corpora, particularly when dealing with real data. This dataset comprises almost 80 hours of real recordings with varied instrumentation and polyphony degrees, 1251 scanned sheets, and 880 symbolic scores from 37 composers. The work addresses multimodal audio-image music transcription by leveraging both AMT systems for acoustic recordings and Optical Music Recognition (OMR) systems for image scores.", "links": [["DOI", "https://doi.org/10.1145/3664647.3681572", "badge-doi"], ["URL", "https://dl.acm.org/doi/10.1145/3664647.3681572", "badge-url"]], "pdf": true, "search": "galncuenca2024 2024 alejandro galán-cuenca, jose j. valero-mas, juan c. martinez-sevilla, antonio hidalgo-centeno, antonio pertusa, jorge calvo-zaragoza muscat: a multimodal music collection for automatic transcription of real recordings and image scores proceedings of the 32nd acm international conference on multimedia muscat is an assortment of acoustic recordings, image sheets, and their score-level annotations in several notation formats. despite a large number of existing works in the automatic music transcription (amt) field, there is a shortage of end-to-end audio-to-score (a2s) transcription efforts, leading to a lack of benchmark corpora, particularly when dealing with real data. this dataset comprises almost 80 hours of real recordings with varied instrumentation and polyphony degrees, 1251 scanned sheets, and 880 symbolic scores from 37 composers. the work addresses multimodal audio-image music transcription by leveraging both amt systems for acoustic recordings and optical music recognition (omr) systems for image scores. inproceedings", "raw": "@InProceedings{GalnCuenca2024,\n  author    = {Gal{\\'a}n-Cuenca, Alejandro and Valero-Mas, Jose J. and Martinez-Sevilla, Juan C. and Hidalgo-Centeno, Antonio and Pertusa, Antonio and Calvo-Zaragoza, Jorge},\n  booktitle = {Proceedings of the 32nd {ACM} International Conference on Multimedia},\n  title     = {{MUSCAT}: a Multimodal {mUS}ic Collection for Automatic Transcription of Real Recordings and Image Scores},\n  year      = {2024},\n  abstract  = {{MUSCAT} is an assortment of acoustic recordings, image sheets, and their score-level annotations in several notation formats. Despite a large number of existing works in the Automatic Music Transcription ({AMT}) field, there is a shortage of end-to-end Audio-to-Score (A2S) transcription efforts, leading to a lack of benchmark corpora, particularly when dealing with real data. This dataset comprises almost 80 hours of real recordings with varied instrumentation and polyphony degrees, 1251 scanned sheets, and 880 symbolic scores from 37 composers. The work addresses multimodal audio-image music transcription by leveraging both {AMT} systems for acoustic recordings and Optical Music Recognition ({OMR}) systems for image scores.},\n  doi       = {10.1145/3664647.3681572},\n  url       = {https://dl.acm.org/doi/10.1145/3664647.3681572},\n  file      = {:pdfs/2024 - MUSCAT a Multimodal mUSic Collection for Automatic Transcription of Real Recordings and Image Scores.pdf:PDF},\n}"}, {"key": "Gao2003", "type": "InProceedings", "year": "2003", "authors": "Sheng Gao, Namunu Chinthaka Maddage, Chin-Hui Lee", "title": "A hidden Markov model based approach to music segmentation and identification", "venue": "Joint Fourth International Conference on Information, Communications and Signal Processing and the Fourth Pacific Rim Conference on Multimedia · pp. 1576--1580 vol.3", "abstract": "Classification of musical segments is an interesting problem. It is a key technology in the development of content-based audio document indexing and retrieval. In this paper, we apply the feature extraction and modeling techniques commonly used in automatic speech recognition to solving the problem of segmentation and instrument identification of musical passages. The correlation among the different components in the feature space and the auto-correlation of each component are analyzed to demonstrate feasibility in musical signal analysis and instrument class modeling. Our experimental results are first evaluated on 3 instrument categories, i.e. vocal music, instrumental music, and their combinations. Furthermore each category is split into two individual cases to give a 6-class problem. Our results show that good performance could be obtained with simple features, such as mel-frequency cepstral coefficients and cepstral coefficients derived from linear prediction signal analysis. Even with a limited amount of training data, we could give an accuracy of 90.60% in the case of three categories. A slightly worse accuracy of 90.38% is obtained when we double the number of categories to six classes.", "links": [["DOI", "https://doi.org/10.1109/ICICS.2003.1292732", "badge-doi"]], "pdf": true, "search": "gao2003 2003 sheng gao, namunu chinthaka maddage, chin-hui lee a hidden markov model based approach to music segmentation and identification joint fourth international conference on information, communications and signal processing and the fourth pacific rim conference on multimedia · pp. 1576--1580 vol.3 classification of musical segments is an interesting problem. it is a key technology in the development of content-based audio document indexing and retrieval. in this paper, we apply the feature extraction and modeling techniques commonly used in automatic speech recognition to solving the problem of segmentation and instrument identification of musical passages. the correlation among the different components in the feature space and the auto-correlation of each component are analyzed to demonstrate feasibility in musical signal analysis and instrument class modeling. our experimental results are first evaluated on 3 instrument categories, i.e. vocal music, instrumental music, and their combinations. furthermore each category is split into two individual cases to give a 6-class problem. our results show that good performance could be obtained with simple features, such as mel-frequency cepstral coefficients and cepstral coefficients derived from linear prediction signal analysis. even with a limited amount of training data, we could give an accuracy of 90.60% in the case of three categories. a slightly worse accuracy of 90.38% is obtained when we double the number of categories to six classes. inproceedings", "raw": "@InProceedings{Gao2003,\n  author    = {Gao, Sheng and Maddage, Namunu Chinthaka and Lee, Chin-Hui},\n  booktitle = {Joint Fourth International Conference on Information, Communications and Signal Processing and the Fourth Pacific Rim Conference on Multimedia},\n  title     = {A hidden Markov model based approach to music segmentation and identification},\n  year      = {2003},\n  pages     = {1576--1580 vol.3},\n  abstract  = {Classification of musical segments is an interesting problem. It is a key technology in the development of content-based audio document indexing and retrieval. In this paper, we apply the feature extraction and modeling techniques commonly used in automatic speech recognition to solving the problem of segmentation and instrument identification of musical passages. The correlation among the different components in the feature space and the auto-correlation of each component are analyzed to demonstrate feasibility in musical signal analysis and instrument class modeling. Our experimental results are first evaluated on 3 instrument categories, i.e. vocal music, instrumental music, and their combinations. Furthermore each category is split into two individual cases to give a 6-class problem. Our results show that good performance could be obtained with simple features, such as mel-frequency cepstral coefficients and cepstral coefficients derived from linear prediction signal analysis. Even with a limited amount of training data, we could give an accuracy of 90.60% in the case of three categories. A slightly worse accuracy of 90.38% is obtained when we double the number of categories to six classes.},\n  doi       = {10.1109/ICICS.2003.1292732},\n  file      = {:pdfs/2003 - A Hidden Markov Model Based Approach to Music Segmentation and Identification.pdf:PDF},\n  keywords  = {music;hidden Markov models;signal classification;speech recognition;correlation methods;audio signal processing;cepstral analysis;content-based retrieval;indexing;music segmentation;hidden Markov model;musical segment classification;audio indexing;audio retrieval;feature extraction;automatic speech recognition;musical passage identification;component correlations;musical signal analysis;vocal music;instrumental music;cepstral coefficients;linear prediction signal analysis;time-varying signals;Hidden Markov models;Instruments;Signal analysis;Space technology;Cepstral analysis;Indexing;Music information retrieval;Content based retrieval;Feature extraction;Automatic speech recognition},\n}"}, {"key": "GarcaIasci2023", "type": "Misc", "year": "2023", "authors": "Patricia García-Iasci, Javier Merchán Sánchez-Jara", "title": "Jazz Standards: From the Manuscript to Multiple Possibilities Through Computation", "venue": "PhD Research Plan, Universidad de Salamanca", "abstract": "", "links": [["URL", "https://repositorio.grial.eu/handle/grial/2642", "badge-url"]], "pdf": true, "search": "garcaiasci2023 2023 patricia garcía-iasci, javier merchán sánchez-jara jazz standards: from the manuscript to multiple possibilities through computation phd research plan, universidad de salamanca  misc", "raw": "@Misc{GarcaIasci2023,\n  author    = {Garc{\\'\\i}a-Iasci, Patricia and Merch{\\'a}n S{\\'a}nchez-Jara, Javier},\n  title     = {Jazz Standards: From the Manuscript to Multiple Possibilities Through Computation},\n  year      = {2023},\n  howpublished = {PhD Research Plan, Universidad de Salamanca},\n  url       = {https://repositorio.grial.eu/handle/grial/2642},\n  file      = {:pdfs/2023 - Jazz Standards From the Manuscript to Multiple Possibilities Through Computation.pdf:PDF},\n}"}, {"key": "Garfinkle2017", "type": "InProceedings", "year": "2017", "authors": "David Garfinkle, Claire Arthur, Peter Schubert, Julie Cumming, Ichiro Fujinaga", "title": "PatternFinder: Content-Based Music Retrieval with Music21", "venue": "4th International Workshop on Digital Libraries for Musicology · pp. 5--8 · ACM", "abstract": "", "links": [["DOI", "https://doi.org/10.1145/3144749.3144751", "badge-doi"]], "pdf": true, "search": "garfinkle2017 2017 david garfinkle, claire arthur, peter schubert, julie cumming, ichiro fujinaga patternfinder: content-based music retrieval with music21 4th international workshop on digital libraries for musicology · pp. 5--8 · acm  inproceedings", "raw": "@InProceedings{Garfinkle2017,\n  author    = {Garfinkle, David and Arthur, Clai  notación musical, mejorando así la interoperabilidad y la expresividad de los resultados del sistema omr. mastersthesis", "raw": "@MastersThesis{Garrido2022,\n  author   = {Garrido Mu{\\~n}oz, Carlos},\n  title    = {Recuperaci{\\'o}n de Grafos para {Optical Music Recognition}},\n  year     = {2022},\n  month     = {Jun},\n  school   = {Universidad de Alicante},\n  type     = {M{\\`a}ster Universitari en Ci\\`{e}ncia de Dades},\n  abstract = {En busca de mejorar la interpretabilidad de la notaci{\\'o}n musical digitalizada, y dada la naturaleza relacional de la m{\\'u}sica, este trabajo propone recuperar la notaci{\\'o}n musical en forma de grafos para Optical Music Recognition. Se desarrolla un sistema que, a partir de im{\\'a}genes de partituras, genera representaciones en grafo de la notaci{\\'o}n musical, mejorando as{\\'i} la interoperabilidad y la expresividad de los resultados del sistema {OMR}.},\n  file     = {:pdfs/2022 - Recuperación de Grafos para Optical Music Recognition.pdf:PDF},\n  url      = {https://rua.ua.es/dspace/handle/10045/124715},\n}"}, {"key": "Gatos2004", "type": "InProceedings", "year": "2004", "authors": "Basilios Gatos, Ioannis Pratikakis, Stavros J. Perantonis", "title": "An Adaptive Binarization Technique for Low Quality Historical Documents", "venue": "Document Analysis Systems VI · pp. 102--113 · Springer Berlin Heidelberg", "abstract": "Historical document collections are a valuable resource for human history. This paper proposes a novel digital image binarization scheme for low quality historical documents allowing further content exploitation in an efficient way. The proposed scheme consists of five distinct steps: a pre-processing procedure using a low-pass Wiener filter, a rough estimation of foreground regions using Niblack's approach, a background surface calculation by interpolating neighboring background intensities, a thresholding by combining the calculated background surface with the original image and finally a post-processing step in order to improve the quality of text regions and preserve stroke connectivity. The proposed methodology works with great success even in cases of historical manuscripts with poor quality, shadows, nonuniform illumination, low contrast, large signal- dependent noise, smear and strain. After testing the proposed method on numerous low quality historical manuscripts, it has turned out that our methodology performs better compared to current state-of-the-art adaptive thresholding techniques.", "links": [["DOI", "https://doi.org/10.1007/978-3-540-28640-0_10", "badge-doi"]], "pdf": true, "search": "gatos2004 2004 basilios gatos, ioannis pratikakis, stavros j. perantonis an adaptive binarization technique for low quality historical documents document analysis systems vi · pp. 102--113 · springer berlin heidelberg historical document collections are a valuable resource for human history. this paper proposes a novel digital image binarization scheme for low quality historical documents allowing further content exploitation in an efficient way. the proposed scheme consists of five distinct steps: a pre-processing procedure using a low-pass wiener filter, a rough estimation of foreground regions using niblack's approach, a background surface calculation by interpolating neighboring background intensities, a thresholding by combining the calculated background surface with the original image and finally a post-processing step in order to improve the quality of text regions and preserve stroke connectivity. the proposed methodology works with great success even in cases of historical manuscripts with poor quality, shadows, nonuniform illumination, low contrast, large signal- dependent noise, smear and strain. after testing the proposed method on numerous low quality historical manuscripts, it has turned out that our methodology performs better compared to current state-of-the-art adaptive thresholding techniques. inproceedings", "raw": "@InProceedings{Gatos2004,\n  author    = {Gatos, Basilios and Pratikakis, Ioannis and Perantonis, Stavros J.},\n  title     = {An Adaptive Binarization Technique for Low Quality Historical Documents},\n  booktitle = {Document Analysis Systems VI},\n  year      = {2004},\n  editor    = {Marinai, Simone and Dengel, Andreas R.},\n  pages     = {102--113},\n  address   = {Berlin, Heidelberg},\n  publisher = {Springer Berlin Heidelberg},\n  abstract  = {Historical document collections are a valuable resource for human history. This paper proposes a novel digital image binarization scheme for low quality historical documents allowing further content exploitation in an efficient way. The proposed scheme consists of five distinct steps: a pre-processing procedure using a low-pass Wiener filter, a rough estimation of foreground regions using Niblack's approach, a background surface calculation by interpolating neighboring background intensities, a thresholding by combining the calculated background surface with the original image and finally a post-processing step in order to improve the quality of text regions and preserve stroke connectivity. The proposed methodology works with great success even in cases of historical manuscripts with poor quality, shadows, nonuniform illumination, low contrast, large signal- dependent noise, smear and strain. After testing the proposed method on numerous low quality historical manuscripts, it has turned out that our methodology performs better compared to current state-of-the-art adaptive thresholding techniques.},\n  doi       = {10.1007/978-3-540-28640-0_10},\n  file      = {:pdfs/2004 - An Adaptive Binarization Technique for Low Quality Historical Documents.pdf:PDF},\n  isbn      = {978-3-540-28640-0},\n}"}, {"key": "Gatos2006", "type": "Article", "year": "2006", "authors": "Basilios Gatos, Ioannis Pratikakis, Stavros J. Perantonis", "title": "Adaptive degraded document image binarization", "venue": "Pattern Recognition · Vol. 39(3) · pp. 317--327", "abstract" attern Recognition Letters · Vol. 45 · pp. 78--84 · Elsevier", "abstract": "", "links": [["DOI", "https://doi.org/10.1016/j.patrec.2014.02.021", "badge-doi"]], "pdf": true, "search": "george2014 2014 joe george, lior shamir computer analysis of similarities between albums in popular music pattern recognition letters · vol. 45 · pp. 78--84 · elsevier  article", "raw": "@Article{George2014,\n  author    = {George, Joe and Shamir, Lior},\n  title     = {Computer analysis of similarities between albums in popular music},\n  journal   = {Pattern Recognition Letters},\n  year      = {2014},\n  volume    = {45},\n  pages     = {78--84},\n  doi       = {10.1016/j.patrec.2014.02.021},\n  file      = {:pdfs/2014 - Computer Analysis of Similarities between Albums in Popular Music.pdf:PDF},\n  publisher = {Elsevier},\n}"}, {"key": "Gerou2009", "type": "Book", "year": "2009", "authors": "Tom Gerou, Linda Lusk", "title": "Essential Dicionary of Music Notation", "venue": "Alfred Publishing Co., Inc.", "abstract": "", "links": [["URL", "http://www.amazon.com/Essentials-Music-Notation-Alfred-Publishing/dp/073906083X", "badge-url"]], "pdf": true, "search": "gerou2009 2009 tom gerou, linda lusk essential dicionary of music notation alfred publishing co., inc.  book", "raw": "@Book{Gerou2009,\n  title     = {{Essential Dicionary of Music Notation}},\n  publisher = {Alfred Publishing Co., Inc.},\n  year      = {2009},\n  author    = {Gerou, Tom and Lusk, Linda},\n  isbn      = {0-8828284-768-6},\n  file      = {:pdfs/2009 - Essential Dicionary of Music Notation.pdf:PDF},\n  keywords  = {music notation},\n  pages     = {161},\n  url       = {http://www.amazon.com/Essentials-Music-Notation-Alfred-Publishing/dp/073906083X},\n}"}, {"key": "Giotis2017", "type": "Article", "year": "2017", "authors": "Angelos P. Giotis, Giorgos Sfikas, Basilis Gatos, Christophoros Nikou", "title": "A survey of document image word spotting techniques", "venue": "Pattern Recognition · Vol. 68 · pp. 310--332", "abstract": "Vast collections of documents available in image format need to be indexed for information retrieval purposes. In this framework, word spotting is an alternative solution to optical character recognition (OCR), which is rather inefficient for recognizing text of degraded quality and unknown fonts usually appearing in printed text, or writing style variations in handwritten documents. Over the past decade there has been a growing interest in addressing document indexing using word spotting which is reflected by the continuously increasing number of approaches. However, there exist very few comprehensive studies which analyze the various aspects of a word spotting system. This work aims to review the recent approaches as well as fill the gaps in several topics with respect to the related works. The nature of texts and inherent challenges addressed by word spotting methods are thoroughly examined. After presenting the core steps which compose a word spotting system, we investigate the use of retrieval enhancement techniques based on relevance feedback which improve the retrieved results. Finally, we present the datasets which are widely used for word spotting, we describe the evaluation standards and measures applied for performance assessment and discuss the results achieved by the state of the art.", "links": [["DOI", "https://doi.org/10.1016/j.patcog.2017.02.023", "badge-doi"], ["URL", "http://www.sciencedirect.com/science/article/pii/S0031320317300870", "badge-url"]], "pdf": true, "search": "giotis2017 2017 angelos p. giotis, giorgos sfikas, basilis gatos, christophoros nikou a survey of document image word spotting techniques pattern recognition · vol. 68 · pp. 310--332 vast collections of documents available in image format need to be indexed for information retrieval purposes. in this framework, word spotting is an alternative solution to optical character recognition (ocr), which is rather inefficient for recognizing text of degraded quality and unknown fonts usually appearing in printed text, or writing style variations in handwritten documents. over the past decade there has been a growing interest in addressing document indexing using word spotting which is reflected by the continuously increasing number of approaches. however, there exist very few comprehensive studies which analyze the various aspects of a word spotting system. this work aims to review the recent approaches as well as fill the gaps in several topics with respect to the related works. the nature of texts and inherent challenges addressed by word spotting methods are thoroughly examined. after presenting the core steps which compose a word spotting system, we investigate the use of retrieval enhancement techniques based on relevance feedback which improve the retrieved results. finally, we present the datasets which are widely used for word spotting, we describe the evaluation standards and measures applied for performance assessment and discuss the results achieved by the state of the art. article", "raw": "@Article{Giotis2017,\n  author   = {Giotis, Angelos P. and Sfikas, Giorgos and Gatos, Basilis and Nikou, Christophoros},\n  title    = {A survey of document image word spotting techniques},\n  journal  = {Pattern Recognition},\n  year     = {2017},\n  volume   = {68},\n  pages    = {310--332},\n  issn     = {0031-3203},\n  abstract = {Vast collections of documents available in image format need to be indexed for information retrieval purposes. In this framework, word spotting is an alternative solution to optical character recognition (OCR), which is rather inefficient for recognizing text of degraded quality and unknown fonts usually appearing in printed text, or writing style variations in handwritten documents. Over the past decade there has been a growing interest in addressing document indexing using word spotting which is reflected by the continuously increasing number of approaches. However, there exist very few comprehensive studies which analyze the various aspects of a word spotting system. This work aims to review the recent approaches as well as fill the gaps in several topics with respect to the related works. The nature of texts and inherent challenges addressed by word spotting methods are thoroughly examined. After presenting the core steps which compose a word spotting system, we investigate the use of retrieval enhancement techniques based on relevance feedback which improve the retrieved results. Finally, we present the datasets which are widely used for word spotting, we describe the evaluation standards and measures applied for performance assessment and discuss the results achieved by the state of the art.},\n  doi      = {https://doi.org/10.1016/j.patcog.2017.02.023},\n  file     = {:pdfs/2017 - A Survey of Document Image Word Spotting Techniques.pdf:PDF},\n  keywords = {Word spotting, Retrieval, Document indexing, Features, Representation, Relevance feedback},\n  url      = {http://www.sciencedirect.com/science/article/pii/S0031320317300870},\n}"}, {"key": "Girshick2014", "type": "InProceedings", "year": "2014", "authors": "Ross Girshick, Jeff Donahue, Trevor Darrell, Jitendra Malik", "title": "Rich feature hierarchies for accurate object detection and semantic segmentation", "venue": "IEEE Conference On Computer Vision and Pattern Recognition · pp. 580--587", "abstract": "", "links": [["DOI", "https://doi.org/10.1109/CVPR.2014.81", "badge-doi"]], "pdf": true, "search": "girshick2014 2014 ross girshick, jeff donahue, trevor darrell, jitendra malik rich feature hierarchies for accurate object detection and semantic segmentation ieee conference on computer vision and pattern recognition · pp. 580--587  inproceedings", "raw": "@InProceedings{Girshick2014,\n  author    = {Girshick, Ross and Donahue, Jeff and Darrell, Trevor and Malik, Jitendra},\n  title     = {Rich feature hierarchies for accurate object detection and semantic segmentation},\n  booktitle = {IEEE Conference On Computer Vision and Pattern Recognition},\n  year      = {2014},\n  pages     = {580--587},\n  doi       = {10.1109/CVPR.2014.81},\n  file      = {:pdfs/2014 - Rich Feature Hierarchies for Accurate Object Detection and Semantic Segmentation.pdf:PDF},\n}"}, {"key": "Girshick2015", "type": "InProceedings", "year": "2015", "authors": "Ross Girshick", "title": "Fast R-CNN", "venue": "2015 IEEE International Conference on Computer Vision (ICCV) · pp. 1440--1448", "abstract": "This paper proposes a Fast Region-based Convolutional Network method (Fast R-CNN) for object detection. Fast R-CNN builds on previous work to efficiently classify object proposals using deep convolutional networks. Compared to previous work, Fast R-CNN employs several innovations to improve training and testing speed while also increasing detection accuracy. Fast R-CNN trains the very deep VGG16 network 9x faster than R-CNN, is 213x faster at test-time, and achieves a higher mAP on PASCAL VOC 2012. Compared to SPPnet, Fast R-CNN trains VGG16 3x faster, tests 10x faster, and is more accurate. Fast R-CNN is implemented in Python and C++ (using Caffe) and is available under the open-source MIT License at https://github.com/rbgirshick/fast-rcnn.", "links": [["DOI", "https://doi.org/10.1109/ICCV.2015.169", "badge-doi"]], "pdf": true, "search": "girshick2015 2015 ross girshick fast r-cnn 2015 ieee international conference on computer vision (iccv) · pp. 1440--1448 this paper proposes a fast region-based convolutional network method (fast r-cnn) for object detection. fast r-cnn builds on previous work to efficiently classify object proposals using deep convolutional networks. compared to previous work, fast r-cnn employs several innovations to improve training and testing speed while also increasing detection accuracy. fast r-cnn trains the very deep vgg16 network 9x faster than r-cnn, is 213x faster at test-time, and achieves a higher map on pascal voc 2012. compared to sppnet, fast r-cnn trains vgg16 3x faster, tests 10x faster, and is more accurate. fast r-cnn is implemented in python and c++ (using caffe) and is available under the open-source mit license at https://github.com/rbgirshick/fast-rcnn. inproceedings", "raw": "@InProceedings{Girshick2015,\n  author    = {Girshick, Ross},\n  title     = {Fast {R-CNN}},\n  booktitle = {2015 IEEE International Conference on Computer Vision (ICCV)},\n  year      = {2015},\n  pages     = {1440--1448},\n  abstract  = {This paper proposes a Fast Region-based Convolutional Network method (Fast R-CNN) for object detection. Fast R-CNN builds on previous work to efficiently classify object proposals using deep convolutional networks. Compared to previous work, Fast R-CNN employs several innovations to improve training and testing speed while also increasing detection accuracy. Fast R-CNN trains the very deep VGG16 network 9x faster than R-CNN, is 213x faster at test-time, and achieves a higher mAP on PASCAL VOC 2012. Compared to SPPnet, Fast R-CNN trains VGG16 3x faster, tests 10x faster, and is more accurate. Fast R-CNN is implemented in Python and C++ (using Caffe) and is available under the open-source MIT License at https://github.com/rbgirshick/fast-rcnn.},\n  doi       = {10.1109/ICCV.2015.169},\n  file      = {:pdfs/2015 - Fast R CNN.pdf:PDF},\n  keywords  = {feedforward neural nets;object detection;C++;Caffe;Python;VGG16 network;fast R-CNN;fast region-based convolutional network method;object detection;open-source MIT License;Computer architecture;Feature extraction;Object detection;Open source software;Pipelines;Proposals;Training},\n}"}, {"key": "Girshick2016", "type": "Article", "year": "2016", "authors": "Ross Girshick, Jeff Donahue, Trevor Darrell, Jitendra Malik", "title": "Region-Based Convolutional Networks for Accurate Object Detection and Segmentation", "venue": "IEEE Transactions on Pattern Analysis and Machine Intelligence · Vol. 38(1) · pp. 142--158", "abstract": "Object detection performance, as measured on the canonical PASCAL VOC Challenge datasets, plateaued in the final years of the competition. The best-performing methods were complex ensemble systems that typically combined multiple low-level image features with high-level context. In this paper, we propose a simple and scalable detection algorithm that improves mean average precision (mAP) by more than 50 percent relative to the previous best result on VOC 2012-achieving a mAP of 62.4 percent. Our approach combines two ideas: (1) one can apply high-capacity convolutional networks (CNNs) to bottom-up region proposals in order to localize and segment objects and (2) when labeled training data are scarce, supervised pre-training for an auxiliary task, followed by domain-specific fine-tuning, boosts performance significantly. Since we combine region proposals with CNNs, we call the resulting model an R-CNN or Region-based Convolutional Network. Source code for the complete system is available at http://www.cs.berkeley.edu/ rbg/rcnn.", "links": [["DOI", "https://doi.org/10.1109/TPAMI.2015.2437384", "badge-doi"]], "pdf": true, "search": "girshick2016 2016 ross girshick, jeff donahue, trevor darrell, jitendra malik region-based convolutional networks for accurate object detection and segmentation ieee transactions on pattern analysis and machine intelligence · vol. 38(1) · pp. 142--158 object detection performance, as measured on the canonical pascal voc challenge datasets, plateaued in the final years of the competition. the best-performing methods were complex ensemble systems that typically combined multiple low-level image features with high-level context. in this paper, we propose a simple and scalable detection algorithm that improves mean average precision (map) by more than 50 percent relative to the previous best result on voc 2012-achieving a map of 62.4 percent. our approach combines two ideas: (1) one can apply high-capacity convolutional networks (cnns) to bottom-up region proposals in order to localize and segment objects and (2) when labeled training data are scarce, supervised pre-training for an auxiliary task, followed by domain-specific fine-tuning, boosts performance significantly. since we combine region proposals with cnns, we call the resulting model an r-cnn or region-based convolutional network. source code for the complete system is available at http://www.cs.berkeley.edu/ rbg/rcnn. article", "raw": "@Article{Girshick2016,\n  author   = {Girshick, Ross and Donahue, Jeff and Darrell, Trevor and Malik, Jitendra},\n  title    = {Region-Based Convolutional Networks for Accurate Object Detection and Segmentation},\n  journal  = {IEEE Transactions on Pattern Analysis and Machine Intelligence},\n  year     = {2016},\n  volume   = {38},\n  number   = {1},\n  pages    = {142--158},\n  issn     = {0162-8828},\n  abstract = {Object detection performance, as measured on the canonical PASCAL VOC Challenge datasets, plateaued in the final years of the competition. The best-performing methods were complex ensemble systems that typically combined multiple low-level image features with high-level context. In this paper, we propose a simple and scalable detection algorithm that improves mean average precision (mAP) by more than 50 percent relative to the previous best result on VOC 2012-achieving a mAP of 62.4 percent. Our approach combines two ideas: (1) one can apply high-capacity convolutional networks (CNNs) to bottom-up region proposals in order to localize and segment objects and (2) when labeled training data are scarce, supervised pre-training for an auxiliary task, followed by domain-specific fine-tuning, boosts performance significantly. Since we combine region proposals with CNNs, we call the resulting model an R-CNN or Region-based Convolutional Network. Source code for the complete system is available at http://www.cs.berkeley.edu/~rbg/rcnn.},\n  doi      = {10.1109/TPAMI.2015.2437384},\n  file     = {:pdfs/2016 - Region Based Convolutional Networks for Accurate Object Detection and Segmentation.pdf:PDF},\n  keywords = {convolutional codes;image coding;image segmentation;object detection;source coding;region-based convolutional networks;object detection;object segmentation;canonical PASCAL VOC Challenge datasets;mean average precision;mAP;high-capacity convolutional networks;source code;Proposals;Object detection;Feature extraction;Training;Image segmentation;Support vector machines;Detectors;Object recognition;detection;semantic segmentation;convolutional networks;deep learning;transfer learning;Object recognition;detection;semantic segmentation;convolutional networks;deep learning;transfer learning},\n}"}, {"key": "Good2001", "type": "TechReport", "year": "2001", "authors": "Michael Good", "title": "MusicXML: An Internet-Friendly Format for Sheet Music", "venue": "Technical Report · Recordare LLC", "abstract": "", "links": [["URL", "https://pdfs.semanticscholar.org/5617/972667ff794da79a4cbb6b985e85f8487ddd.pdf", "badge-url"]], "pdf": true, "search": "good2001 2001 michael good musicxml: an internet-friendly format for sheet music technical report · recordare llc  techreport", "raw": "@TechReport{Good2001,\n  author      = {Good, Michael},\n  title       = {{MusicXML}: An Internet-Friendly Format for Sheet Music},\n  institution = {Recordare LLC},\n  year        = {2001},\n  file        = {:pdfs/2001 - MusicXML_ an Internet Friendly Format for Sheet Music.pdf:PDF},\n  url         = {https://pdfs.semanticscholar.org/5617/972667ff794da79a4cbb6b985e85f8487ddd.pdf},\n}"}, {"key": "Good2003", "type": "InProceedings", "year": "2003", "authors": "Michael Good, Geri Actor", "title": "Using MusicXML for File Interchange", "venue": "Third International Conference on WEB Delivering of Music · pp. 153", "abstract": "The MusicXML format is designed to be a universal translator for programs that understand common Western musical notation. We have made significant progress towards this goal, with over a dozen programs supporting MusicXML as of June 2003. We describe some of the ways that MusicXML has been used for file interchange, and will demonstrate several scenarios.", "links": [["DOI", "https://doi.org/10.1109/WDM.2003.1233890", "badge-doi"]], "pdf": true, "search": "good2003 2003 michael good, geri actor using musicxml for file interchange third international conference on web delivering of music · pp. 153 the musicxml format is designed to be a universal translator for programs that understand common western musical notation. we have made significant progress towards this goal, with over a dozen programs supporting musicxml as of june 2003. we describe some of the ways that musicxml has been used for file interchange, and will demonstrate several scenarios. inproceedings", "raw": "@InProceedings{Good2003,\n  author    = {Good, Michael and Actor, Geri},\n  title     = {Using {MusicXML} for File Interchange},\n  booktitle = {Third International Conference on WEB Delivering of Music},\n  year      = {2003},\n  pages     = {153},\n  abstract  = {The MusicXML format is designed to be a universal translator for programs that understand common Western musical notation. We have made significant progress towards this goal, with over a dozen programs supporting MusicXML as of June 2003. We describe some of the ways that MusicXML has been used for file interchange, and will demonstrate several scenarios.},\n  doi       = {10.1109/WDM.2003.1233890},\n  file      = {:pdfs/2003 - Using MusicXML for File Interchange.pdf:PDF},\n  keywords  = {XML;electronic data interchange;music;program interpreters;MusicXML format;Western musical notation;file interchange;universal translator;Application software;Displays;IEEE news;Markup languages;Prototypes;Software prototyping;Technological innovation;XML},\n}"}, {"key": "Goodfellow2013", "type": "Article", "year": "2013", "authors": "Ian J. Goodfellow, Yaroslav Bulatov, Julian Ibarz, Sacha Arnoud, Vinay Shet", "title": "Multi-digit Number Recognition from Street View Imagery using Deep Convolutional Neural Networks", "venue": "Computing Research Repository · Vol. abs/1312.6 · pp. 1--13", "abstract": "Recognizing arbitrary multi-character text in unconstrained natural photographs is a hard problem. In this paper, we address an equally hard sub-problem in this domain viz. recognizing arbitrary multi-digit numbers from Street View imagery. Traditional approaches to solve this problem typically separate out the localization, segmentation, and recognition steps. In this paper we propose a unified approach that integrates these three steps via the use of a deep convolutional neural network that operates directly on the image pixels. We employ the DistBelief implementation of deep neural networks in order to train large, distributed neural networks on high quality images. We find that the performance of this approach increases with the depth of the convolutional network, with the best performance occurring in the deepest architecture we trained, with eleven hidden layers. We evaluate this approach on the publicly available SVHN dataset and achieve over 96% accuracy in recognizing complete street numbers. We show that on a per-digit recognition task, we improve upon the state-of-the-art, achieving 97.84% accuracy. We also evaluate this approach on an even more challenging dataset generated from Street View imagery containing several tens of millions of street number annotations and achieve over 90% accuracy. To further explore the applicability of the proposed system to broader text recognition tasks, we apply it to synthetic distorted text from reCAPTCHA. reCAPTCHA is one of the most secure reverse turing tests that uses distorted text to distinguish humans from bots. We report a 99.8% accuracy on the hardest category of reCAPTCHA. Our evaluations on both tasks indicate that at specific operating thresholds, the performance of the proposed system is comparable to, and in some cases exceeds, that of human operators.", "links": [["arXiv", "http://arxiv.org/abs/1312.6082", "badge-arxiv"]], "pdf": true, "search": "goodfellow2013 2013 ian j. goodfellow, yaroslav bulatov, julian ibarz, sacha arnoud, vinay shet multi-digit number recognition from street view imagery using deep convolutional neural networks computing research repository · vol. abs/1312.6 · pp. 1--13 recognizing arbitrary multi-character text in unconstrained natural photographs is a hard problem. in this paper, we address an equally hard sub-problem in this domain viz. recognizing arbitrary multi-digit numbers from street view imagery. traditional approaches to solve this problem typically separate out the localization, segmentation, and recognition steps. in this paper we propose a unified approach that integrates these three steps via the use of a deep convolutional neural network that operates directly on the image pixels. we employ the distbelief implementation of deep neural networks in order to train large, distributed neural networks on high quality images. we find that the performance of this approach increases with the depth of the convolutional network, with the best performance occurring in the deepest architecture we trained, with eleven hidden layers. we evaluate this approach on the publicly available svhn dataset and achieve over 96% accuracy in recognizing complete street numbers. we show that on a per-digit recognition task, we improve upon the state-of-the-art, achieving 97.84% accuracy. we also evaluate this approach on an even more challenging dataset generated from street view imagery containing several tens of millions of street number annotations and achieve over 90% accuracy. to further explore the applicability of the proposed system to broader text recognition tasks, we apply it to synthetic distorted text from recaptcha. recaptcha is one of the most secure reverse turing tests that uses distorted text to distinguish humans from bots. we report a 99.8% accuracy on the hardest category of recaptcha. our evaluations on both tasks indicate that at specific operating thresholds, the performance of the proposed system is comparable to, and in some cases exceeds, that of human operators. article", "raw": "@Article{Goodfellow2013,\n  author        = {Goodfellow, Ian J. and Bulatov, Yaroslav and Ibarz, Julian and Arnoud, Sacha and Shet, Vinay},\n  title         = {{Multi-digit Number Recognition from Street View Imagery using Deep Convolutional Neural Networks}},\n  journal       = {{Computing Research Repository}},\n  year          = {2013},\n  volume        = {abs/1312.6},\n  pages         = {1--13},\n  abstract      = {Recognizing arbitrary multi-character text in unconstrained natural photographs is a hard problem. In this paper, we address an equally hard sub-problem in this domain viz. recognizing arbitrary multi-digit numbers from Street View imagery. Traditional approaches to solve this problem typically separate out the localization, segmentation, and recognition steps. In this paper we propose a unified approach that integrates these three steps via the use of a deep convolutional neural network that operates directly on the image pixels. We employ the DistBelief implementation of deep neural networks in order to train large, distributed neural networks on high quality images. We find that the performance of this approach increases with the depth of the convolutional network, with the best performance occurring in the deepest architecture we trained, with eleven hidden layers. We evaluate this approach on the publicly available {SVHN} dataset and achieve over 96% accuracy in recognizing complete street numbers. We show that on a per-digit recognition task, we improve upon the state-of-the-art, achieving 97.84% accuracy. We also evaluate this approach on an even more challenging dataset generated from Street View imagery containing several tens of millions of street number annotations and achieve over 90% accuracy. To further explore the applicability of the proposed system to broader text recognition tasks, we apply it to synthetic distorted text from re{CAPTCHA}. re{CAPTCHA} is one of the most secure reverse turing tests that uses distorted text to distinguish humans from bots. We report a 99.8% accuracy on the hardest category of re{CAPTCHA}. Our evaluations on both tasks indicate that at specific operating thresholds, the performance of the proposed system is comparable to, and in some cases exceeds, that of human operators.},\n  archiveprefix = {arXiv},\n  arxivid       = {1312.6082},\n  file          = {:pdfs/2013 - Multi Digit Number Recognition from Street View Imagery Using Deep Convolutional Neural Networks.pdf:PDF},\n  keywords      = {CNN},\n  url           = {http://arxiv.org/abs/1312.6082},\n}"}, {"key": "Goolsby1994", "type": "Article", "year": "1994", "authors": "Thomas W. Goolsby", "title": "Eye Movement in Music Reading: Effects of Reading Ability, Notational Complexity, and Encounters", "venue": "Music Perception: An Interdisciplinary Journal · Vol. 12(1) · pp. 77--96 · University of California Press Journals", "abstract": "Six types of eye movement were measured and recorded with an SRI Eyetracker: number of progressive and regressive fixations, durations of progressive and regressive fixations and lengths of progressive and regressive saccades. Twenty-four graduate music students were selected as skilled and less- skilled music readers. Eye position was measured every millisecond with a high degree of accuracy. The factorial design was 2 Groups x 4 Melodies x 3 Encounters (including a practice period). Results indicated that patterns of eye movement in the two groups were similar across melodies and encounters, but differed with notational complexity. Eye movement was reduced when performing melodies with more-concentrated visual information than when performing melodies with less- concentrated visual information. The main effect of encounters indicated that music readers used fewer but longer fixations after practicing the melodies. Results suggest that skilled music readers look farther ahead in the notation, and then back to the point of performance, when sightreading.", "links": [["DOI", "https://doi.org/10.2307/40285756", "badge-doi"], ["URL", "http://mp.ucpress.edu/content/12/1/77", "badge-url"]], "pdf": false, "search": "goolsby1994 1994 thomas w. goolsby eye movement in music reading: effects of reading ability, notational complexity, and encounters music perception: an interdisciplinary journal · vol. 12(1) · pp. 77--96 · university of california press journals six types of eye movement were measured and recorded with an sri eyetracker: number of progressive and regressive fixations, durations of progressive and regressive fixations and lengths of progressive and regressive saccades. twenty-four graduate music students were selected as skilled and less- skilled music readers. eye position was measured every millisecond with a high degree of accuracy. the factorial design was 2 groups x 4 melodies x 3 encounters (including a practice period). results indicated that patterns of eye movement in the two groups were similar across melodies and encounters, but differed with notational complexity. eye movement was reduced when performing melodies with more-concentrated visual information than when performing melodies with less- concentrated visual information. the main effect of encounters indicated that music readers used fewer but longer fixations after practicing the melodies. results suggest that skilled music readers look farther ahead in the notation, and then back to the point of performance, when sightreading. article", "raw": "@Article{Goolsby1994,\n  author    = {Goolsby, Thomas W.},\n  title     = {Eye Movement in Music Reading: Effects of Reading Ability, Notational Complexity, and Encounters},\n  journal   = {Music Perception: An Interdisciplinary Journal},\n  year      = {1994},\n  volume    = {12},\n  number    = {1},\n  pages     = {77--96},\n  issn      = {0730-7829},\n  abstract  = {Six types of eye movement were measured and recorded with an SRI Eyetracker: number of progressive and regressive fixations, durations of progressive and regressive fixations and lengths of progressive and regressive saccades. Twenty-four graduate music students were selected as skilled and less- skilled music readers. Eye position was measured every millisecond with a high degree of accuracy. The factorial design was 2 Groups x 4 Melodies x 3 Encounters (including a practice period). Results indicated that patterns of eye movement in the two groups were similar across melodies and encounters, but differed with notational complexity. Eye movement was reduced when performing melodies with more-concentrated visual information than when performing melodies with less- concentrated visual information. The main effect of encounters indicated that music readers used fewer but longer fixations after practicing the melodies. Results suggest that skilled music readers look farther ahead in the notation, and then back to the point of performance, when sightreading.},\n  doi       = {10.2307/40285756},\n  publisher = {University of California Press Journals},\n  url       = {http://mp.ucpress.edu/content/12/1/77},\n}"}, {"key": "Goolsby1994a", "type": "Article", "year": "1994", "authors": "Thomas W. Goolsby", "title": "Profiles of Processing: Eye Movements during Sightreading", "venue": "Music Perception: An Interdisciplinary Journal · Vol. 12(1) · pp. 97--123 · University of California Press Journals", "abstract": "Temporal and sequential components of the eye movement used by a skilled and a less-skilled sightreader were used to construct six profiles of processing. Each subject read three melodies of varying levels of concentration of visual detail. The profiles indicates the order, duration, and location of each fixation while the subjects sightread the melodies. Results indicate that music readers do not fixate on note stems or the bar lines that connect eighth notes when sightreading. The less-skilled music reader progressed through the melody virtually note-by-note using long fixations, whereas the skilled sightreader directed fixations to all areas of the notation (using more regressions than the less-skilled reader) to perform the music accurately. Results support earlier findings that skilled sightreaders look farther ahead in the notation, then back to the point of performance (Goolsby, 1994), and have a larger perceptual span than less-skilled sightreaders. Findings support Slobodans (1984) contention that music reading (i. e., sightreading) is indeed music perception, because music notation is processed before performance. Support was found for Sloboda's (1977, 1984, 1985, 1988) hypotheses on the effects of physical and structural boundaries on visual musical perception. The profiles indicate a number of differences between music perception from processing visual notation and perception resulting from language reading. These differences include: (1) opposite trends in the control of eye movement (i. e., the better music reader fixates in blank areas of the visual stimuli and not directly on each item of the information that was performed), (2) a perceptual span that is vertical as well as horizontal, (3) more eye movement associated with the better reader, and (4) greater attention used for processing language than for music, although the latter task requires an \"exact realization.\"", "links": [["DOI", "https://doi.org/10.2307/40285757", "badge-doi"], ["URL", "http://mp.ucpress.edu/content/12/1/97", "badge-url"]], "pdf": false, "search": "goolsby1994a 1994 thomas w. goolsby profiles of processing: eye movements during sightreading music perception: an interdisciplinary journal · vol. 12(1) · pp. 97--123 · university of california press journals temporal and sequential components of the eye movement used by a skilled and a less-skilled sightreader were used to construct six profiles of processing. each subject read three melodies of varying levels of concentration of visual detail. the profiles indicates the order, duration, and location of each fixation while the subjects sightread the melodies. results indicate that music readers do not fixate on note stems or the bar lines that connect eighth notes when sightreading. the less-skilled music reader progressed through the melody virtually note-by-note using long fixations, whereas the skilled sightreader directed fixations to all areas of the notation (using more regressions than the less-skilled reader) to perform the music accurately. results support earlier findings that skilled sightreaders look farther ahead in the notation, then back to the point of performance (goolsby, 1994), and have a larger perceptual span than less-skilled sightreaders. findings support slobodans (1984) contention that music reading (i. e., sightreading) is indeed music perception, because music notation is processed before performance. support was found for sloboda's (1977, 1984, 1985, 1988) hypotheses on the effects of physical and structural boundaries on visual musical perception. the profiles indicate a number of differences between music perception from processing visual notation and perception resulting from language reading. these differences include: (1) opposite trends in the control of eye movement (i. e., the better music reader fixates in blank areas of the visual stimuli and not directly on each item of the information that was performed), (2) a perceptual span that is vertical as well as horizontal, (3) more eye movement associated with the better reader, and (4) greater attention used for processing language than for music, although the latter task requires an \"exact realization.\" article", "raw": "@Article{Goolsby1994a,\n  author    = {Goolsby, Thomas W.},\n  title     = {Profiles of Processing: Eye Movements during Sightreading},\n  journal   = {Music Perception: An Interdisciplinary Journal},\n  year      = {1994},\n  volume    = {12},\n  number    = {1},\n  pages     = {97--123},\n  issn      = {0730-7829},\n  abstract  = {Temporal and sequential components of the eye movement used by a skilled and a less-skilled sightreader were used to construct six profiles of processing. Each subject read three melodies of varying levels of concentration of visual detail. The profiles indicates the order, duration, and location of each fixation while the subjects sightread the melodies. Results indicate that music readers do not fixate on note stems or the bar lines that connect eighth notes when sightreading. The less-skilled music reader progressed through the melody virtually note-by-note using long fixations, whereas the skilled sightreader directed fixations to all areas of the notation (using more regressions than the less-skilled reader) to perform the music accurately. Results support earlier findings that skilled sightreaders look farther ahead in the notation, then back to the point of performance (Goolsby, 1994), and have a larger perceptual span than less-skilled sightreaders. Findings support Slobodans (1984) contention that music reading (i. e., sightreading) is indeed music perception, because music notation is processed before performance. Support was found for Sloboda's (1977, 1984, 1985, 1988) hypotheses on the effects of physical and structural boundaries on visual musical perception. The profiles indicate a number of differences between music perception from processing visual notation and perception resulting from language reading. These differences include: (1) opposite trends in the control of eye movement (i. e., the better music reader fixates in blank areas of the visual stimuli and not directly on each item of the information that was performed), (2) a perceptual span that is vertical as well as horizontal, (3) more eye movement associated with the better reader, and (4) greater attention used for processing language than for music, although the latter task requires an \"exact realization.\"},\n  doi       = {10.2307/40285757},\n  publisher = {University of California Press Journals},\n  url       = {http://mp.ucpress.edu/content/12/1/97},\n}"}, {"key": "Gould2011", "type": "Book", "year": "2011", "authors": "Elaine Gould", "title": "Behind Bars", "venue": "Faber Music", "abstract": "", "links": [["URL", "http://behindbarsnotation.co.uk/", "badge-url"]], "pdf": true, "search": "gould2011 2011 elaine gould behind bars faber music  book", "raw": "@Book{Gould2011,\n  title     = {Behind Bars},\n  publisher = {Faber Music},\n  year      = {2011},\n  author    = {Gould, Elaine},\n  isbn      = {0-571-51456-1},\n  file      = {:pdfs/2011 - Behind Bars.pdf:PDF},\n  url       = {http://behindbarsnotation.co.uk/},\n}"}, {"key": "Graves2007", "type": "InProceedings", "year": "2007", "authors": "Alex Graves, Santiago Fernández, Marcus Liwicki, Horst Bunke, Jürgen Schmidhuber", "title": "Unconstrained Online Handwriting Recognition with Recurrent Neural Networks", "venue": "20th International Conference on Neural Information Processing Systems · pp. 577--584 · Curran Associates Inc.", "abstract": "", "links": [["URL", "http://dl.acm.org/citation.cfm?id=2981562.2981635", "badge-url"]], "pdf": true, "search": "graves2007 2007 alex graves, santiago fernández, marcus liwicki, horst bunke, jürgen schmidhuber unconstrained online handwriting recognition with recurrent neural networks 20th international conference on neural information processing systems · pp. 577--584 · curran associates inc.  inproceedings", "raw": "@InProceedings{Graves2007,\n  author    = {Graves, Alex and Fern\\'{a}ndez, Santiago and Liwicki, Marcus and Bunke, Horst and Schmidhuber, J\\\"{u}rgen},\n  title     = {Unconstrained Online Handwriting Recognition with Recurrent Neural Networks},\n  booktitle = {20th International Conference on Neural Information Processing Systems},\n  year      = {2007},\n  pages     = {577--584},\n  address   = {USA},\n  publis
