<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: "Open Sans", Arial, sans-serif; font-size: 1rem; background: #f8f9fa; color: #212529; }
a { color: #155799; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Header ── */
.page-header {
  padding: 40px 20px 24px;
  color: #fff;
  text-align: center;
  background: linear-gradient(120deg, #155799, #159957);
}
.page-header h1 { margin: 0 0 6px; font-size: 42px; font-weight: 700; }
.page-header p  { margin: 0 0 14px; opacity: 0.85; }
.btn-github {
  display: inline-block; padding: 0.75rem 1rem; margin-bottom: 1rem;
  color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 0.3rem;
  transition: color 0.2s, background-color 0.2s, border-color 0.2s;
}
.btn-github:hover { background: rgba(255,255,255,0.2); text-decoration: none; color: #fff; }
.nav-table { margin: 0 auto; border-spacing: 0; }
.nav-table td { padding: 4px 6px; }
.btn-nav {
  display: inline-block; padding: 0.75rem 1rem; margin-bottom: 1rem;
  color: rgba(255,255,255,0.7); border-radius: 0.3rem;
  transition: color 0.2s, background-color 0.2s, border-color 0.2s;
}
.btn-nav:hover { background: rgba(255,255,255,0.15); color: #fff; text-decoration: none; }
.btn-nav-active { background: rgba(255,255,255,0.2); color: #fff; font-weight: 600; }

/* ── Controls ── */
.controls {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  padding: 10px 20px; background: #fff; border-bottom: 1px solid #dee2e6;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.controls input[type=search], .controls select {
  font-family: inherit; font-size: inherit;
  padding: 5px 10px; border: 1px solid #ced4da; border-radius: 4px;
  background: #fff; outline: none;
}
.controls input[type=search] { flex: 1 1 200px; min-width: 160px; }
.controls input[type=search]:focus { border-color: #159957; box-shadow: 0 0 0 2px rgba(21,153,87,.15); }
.controls select { cursor: pointer; }
.controls label { color: #555; white-space: nowrap; }
.stat-label { color: #666; white-space: nowrap; }

/* ── Entry List ── */
.entry-list { padding: 12px 20px; max-width: 1100px; margin: 0 auto; }
.entry-card {
  background: #fff; border: 1px solid #e1e4e8; border-radius: 6px;
  margin-bottom: 10px; overflow: hidden; cursor: pointer;
  transition: box-shadow 0.15s;
}
.entry-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }

.entry-header {
  padding: 12px 14px 10px;
}
.entry-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-bottom: 4px; }
.entry-year {
  font-size: 0.75rem; font-weight: 700; color: #fff;
  background: #159957; padding: 2px 7px; border-radius: 3px;
}
.entry-type {
  font-size: 0.75rem; color: #666; background: #f0f0f0;
  padding: 2px 7px; border-radius: 3px; text-transform: lowercase;
}
.entry-authors { color: #555; margin-bottom: 3px; }
.entry-title { font-weight: 600; color: #155799; margin-bottom: 4px; line-height: 1.4; }
.entry-title a { color: #155799; }
.entry-title a:hover { color: #159957; }
.entry-venue { color: #666; margin-bottom: 0; font-style: italic; }
.badge {
  display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 2px 7px;
  border-radius: 3px; text-decoration: none; transition: opacity 0.15s;
}
.badge:hover { opacity: 0.8; text-decoration: none; }
.badge-doi   { background: #dbeafe; color: #1e40af; }
.badge-arxiv { background: #fef3c7; color: #92400e; }
.badge-url   { background: #d1fae5; color: #065f46; }

/* ── Expandable panel ── */
.entry-panel {
  display: none; border-top: 1px solid #e9ecef; background: #f8f9fa;
}
.entry-panel.open { display: block; }
.entry-abstract {
  padding: 10px 14px; line-height: 1.6; color: #333;
  border-bottom: 1px solid #e9ecef;
}
.entry-bibtex-wrap {
  position: relative; padding: 10px 14px;
}
.entry-bibtex {
  font-family: "Courier New", monospace; font-size: 0.8rem;
  white-space: pre-wrap; word-break: break-all; color: #333; margin: 0;
}
.copy-btn {
  position: absolute; top: 10px; right: 14px;
  font-family: inherit; font-size: 0.75rem; cursor: pointer;
  padding: 3px 10px; border-radius: 4px; border: 1px solid #ced4da;
  background: #fff; color: #555; transition: background 0.15s, color 0.15s;
}
.copy-btn:hover { background: #159957; color: #fff; border-color: #159957; }
.copy-btn.copied { background: #159957; color: #fff; border-color: #159957; }

.no-results { text-align: center; color: #888; padding: 40px; }
</style>
</head>

iption of music information, where multiple aspects are integrated to provide the user with an advanced multi-layer environment to experience music content. In recent times, the advancements in network technologies allowed a web implementation of this approach through W3C-compliant languages. The last obstacle to the use of personal devices is currently posed by the characteristics of mobile networks, concerning bandwidth, reliability, and the density of devices in an area. Designed to meet the requirements of future technological challenges, such as the Internet of Things and self-driving vehicles, the advent of 5G networks will solve these problems, thus paving the way also for new music-oriented applications. The possibilities described in this work range from bringing archive materials and music cultural heritage to a new life to the implementation of immersive environments for live-show remote experience.", "links": [["URL", "http://stacks.iop.org/1757-899X/364/i=1/a=012021", "badge-url"]], "pdf": true, "search": "barate2018 2018 adriano baratè, goffredo haus, luca a. ludovico advanced experience of music through 5g technologies iop conference series: materials science and engineering · vol. 364(1) · pp. 012021 this paper focuses on new models to enjoy music that will be implementable in a near future thanks to 5g technology. in the last two decades, our research mainly focused on the comprehensive description of music information, where multiple aspects are integrated to provide the user with an advanced multi-layer environment to experience music content. in recent times, the advancements in network technologies allowed a web implementation of this approach through w3c-compliant languages. the last obstacle to the use of personal devices is currently posed by the characteristics of mobile networks, concerning bandwidth, reliability, and the density of devices in an area. designed to meet the requirements of future technological challenges, such as the internet of things and self-driving vehicles, the advent of 5g networks will solve these problems, thus paving the way also for new music-oriented applications. the possibilities described in this work range from bringing archive materials and music cultural heritage to a new life to the implementation of immersive environments for live-show remote experience. article", "raw": "@Article{Barate2018,\n  author   = {Barat{\\`{e}}, Adriano and Haus, Goffredo and Ludovico, Luca A.},\n  title    = {Advanced Experience of Music through 5G Technologies},\n  journal  = {IOP Conference Series: Materials Science and Engineering},\n  year     = {2018},\n  volume   = {364},\n  number   = {1},\n  pages    = {012021},\n  abstract = {This paper focuses on new models to enjoy music that will be implementable in a near future thanks to 5G technology. In the last two decades, our research mainly focused on the comprehensive description of music information, where multiple aspects are integrated to provide the user with an advanced multi-layer environment to experience music content. In recent times, the advancements in network technologies allowed a web implementation of this approach through W3C-compliant languages. The last obstacle to the use of personal devices is currently posed by the characteristics of mobile networks, concerning bandwidth, reliability, and the density of devices in an area. Designed to meet the requirements of future technological challenges, such as the Internet of Things and self-driving vehicles, the advent of 5G networks will solve these problems, thus paving the way also for new music-oriented applications. The possibilities described in this work range from bringing archive materials and music cultural heritage to a new life to the implementation of immersive environments for live-show remote experience.},\n  file     = {:pdfs/2018 - Advanced Experience of Music through 5G Technologies.pdf:PDF},\n  url      = {http://stacks.iop.org/1757-899X/364/i=1/a=012021},\n}"}, {"key": "Bay2009", "type": "InProceedings", "year": "2009", "authors": "Mert Bay, Andreas F. Ehmann, J. Stephen Downie", "title": "Evaluation of Multiple-F0 Estimation and Tracking Systems", "venue": "10th International Society for Music Information Retrieval Conference · pp. 315--320", "abstract": "", "links": [["URL", "http://ismir2009.ismir.net/proceedings/PS2-21.pdf", "badge-url"]], "pdf": true, "search": "bay2009 2009 mert bay, andreas f. ehmann, j. stephen downie evaluation of multiple-f0 estimation and tracking systems 10th international society for music information retrieval conference · pp. 315--320  inproceedings", "raw": "@InProceedings{Bay2009,\n  author    = {Bay, Mert and Ehmann, Andreas F. and Downie, J. Stephen},\n  title     = {Evaluation of Multiple-F0 Estimation and Tracking Systems},\n  booktitle = {10th International Society for Music Information Retrieval Conference},\n  year      = {2009},\n  pages     = {315--320},\n  address   = {Kobe, Japan},\n  file      = {:pdfs/2009 - Evaluation of Multiple F0 Estimation and Tracking Systems.pdf:PDF},\n  url       = {http://ismir2009.ismir.net/proceedings/PS2-21.pdf},\n}"}, {"key": "Bellini2005", "type": "Article", "year": "2005", "authors": "Pierfrancesco Bellini, Paolo Nesi, Giorgio Zoia", "title": "Symbolic Music Representation in MPEG", "venue": "IEEE MultiMedia · Vol. 12(4) · pp. 42--49", "abstract": "", "links": [["DOI", "https://doi.org/10.1109/MMUL.2005.82", "badge-doi"]], "pdf": true, "search": "bellini2005 2005 pierfrancesco bellini, paolo nesi, giorgio zoia symbolic music representation in mpeg ieee multimedia · vol. 12(4) · pp. 42--49  article", "raw": "@Article{Bellini2005,\n  author    = {Bellini, Pierfrancesco and Nesi, Paolo and Zoia, Giorgio},\n  title     = {Symbolic Music Representation in {MPEG}},\n  journal   = {{IEEE} MultiMedia},\n  year      = {2005},\n  volume    = {12},\n  number    = {4},\n  pages     = {42--49},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/ieeemm/BelliniNZ05},\n  doi       = {10.1109/MMUL.2005.82},\n  file      = {:pdfs/2005 - Symbolic Music Representation in MPEG.pdf:PDF},\n  groups    = {datasets},\n}"}, {"key": "Benetos2013", "type": "Article", "year": "2013", "authors": "Emmanouil Benetos, Simon Dixon, Dimitrios Giannoulis, Holger Kirchhoff, Anssi Klapuri", "title": "Automatic music transcription: challenges and future directions", "venue": "Journal of Intelligent Information Systems · Vol. 41(3) · pp. 407--434", "abstract": "Automatic music transcription is considered by many to be a key enabling technology in music signal processing. However, the performance of transcription systems is still significantly below that of a human expert, and accuracies reported in recent years seem to have reached a limit, although the field is still very active. In this paper we analyse limitations of current methods and identify promising directions for future research. Current transcription methods use general purpose models which are unable to capture the rich diversity found in music signals. One way to overcome the limited performance of transcription systems is to tailor algorithms to specific use-cases. Semi-automatic approaches are another way of achieving a more reliable transcription. Also, the wealth of musical scores and corresponding audio data now available are a rich potential source of training data, via forced alignment of audio to scores, but large scale utilisation of such data has yet to be attempted. Other promising approaches include the integration of information from multiple algorithms and different musical aspects.", "links": [["DOI", "https://doi.org/10.1007/s10844-013-0258-3", "badge-doi"]], "pdf": true, "search": "benetos2013 2013 emmanouil benetos, simon dixon, dimitrios giannoulis, holger kirchhoff, anssi klapuri automatic music transcription: challenges and future directions journal of intelligent information systems · vol. 41(3) · pp. 407--434 automatic music transcription is considered by many to be a key enabling technology in music signal processing. however, the performance of transcription systems is still significantly below that of a human expert, and accuracies reported in recent years seem to have reached a limit, although the field is still very active. in this paper we analyse limitations of current methods and identify promising directions for future research. current transcription methods use general purpose models which are unable to capture the rich diversity found in music signals. one way to overcome the limited performance of transcription systems is to tailor algorithms to specific use-cases. semi-automatic approaches are another way of achieving a more reliable transcription. also, the wealth of musical scores and corresponding audio data now available are a rich potential source of training data, via forced alignment of audio to scores, but large scale utilisation of such data has yet to be attempted. other promising approaches include the integration of information from multiple algorithms and different musical aspects. article", "raw": "@Article{Benetos2013,\n  author   = {Benetos, Emmanouil and Dixon, Simon and Giannoulis, Dimitrios and Kirchhoff, Holger and Klapuri, Anssi},\n  title    = {Automatic music transcription: challenges and future directions},\n  journal  = {Journal of Intelligent Information Systems},\n  year     = {2013},\n  volume   = {41},\n  number   = {3},\n  pages    = {407--434},\n  issn     = {1573-7675},\n  abstract = {Automatic music transcription is considered by many to be a key enabling technology in music signal processing. However, the performance of transcription systems is still significantly below that of a human expert, and accuracies reported in recent years seem to have reached a limit, although the field is still very active. In this paper we analyse limitations of current methods and identify promising directions for future research. Current transcription methods use general purpose models which are unable to capture the rich diversity found in music signals. One way to overcome the limited performance of transcription systems is to tailor algorithms to specific use-cases. Semi-automatic approaches are another way of achieving a more reliable transcription. Also, the wealth of musical scores and corresponding audio data now available are a rich potential source of training data, via forced alignment of audio to scores, but large scale utilisation of such data has yet to be attempted. Other promising approaches include the integration of information from multiple algorithms and different musical aspects.},\n  doi      = {10.1007/s10844-013-0258-3},\n  file     = {:pdfs/2013 - Automatic Music Transcription_ Challenges and Future Directions.pdf:PDF},\n}"}, {"key": "Bezine2004", "type": "InProceedings", "year": "2004", "authors": "Hala Bezine, Adel M. Alimi, Nasser Sherkat", "title": "Generation and Analysis of Handwriting Script with the Beta-Elliptic Model", "venue": "Ninth International Workshop on Frontiers in Handwriting Recognition · Institute of Electrical & Electronics Engineers (IEEE)", "abstract": "", "links": [["DOI", "https://doi.org/10.1109/iwfhr.2004.45", "badge-doi"]], "pdf": true, "search": "bezine2004 2004 hala bezine, adel m. alimi, nasser sherkat generation and analysis of handwriting script with the beta-elliptic model ninth international workshop on frontiers in handwriting recognition · institute of electrical & electronics engineers (ieee)  inproceedings", "raw": "@InProceedings{Bezine2004,\n  author    = {Bezine, Hala and Alimi, Adel M. and Sherkat, Nasser},\n  title     = {Generation and Analysis of Handwriting Script with the Beta-Elliptic Model},\n  booktitle = {Ninth International Workshop on Frontiers in Handwriting Recognition},\n  year      = {2004},\n  publisher = {Institute of Electrical {\\&} Electronics Engineers ({IEEE})},\n  doi       = {10.110 L", "http://cmp.felk.cvut.cz/ftp/articles/bresler/Bresler-Prusa-Hlavac-CVWW-2015.pdf", "badge-url"]], "pdf": true, "search": "bresler2015 2015 martin bresler, daniel pr\\r u\\v sa, v\\' aclav hlavá\\v c using agglomerative clustering of strokes to perform symbols over-segmentation within a diagram recognition system 20th computer vision winter workshop · pp. 67--74 · graz university of technology  inproceedings", "raw": "@InProceedings{Bresler2015,\n  author    = {Bresler, Martin and Pr{\\r u}{\\v s}a, Daniel and Hlav{\\'a}{\\v c}, V{\\' a}clav},\n  title     = {Using Agglomerative Clustering of Strokes to Perform Symbols Over-segmentation within a Diagram Recognition System},\n  booktitle = {20th Computer Vision Winter Workshop},\n  year      = {2015},\n  editor    = {Paul Wohlhart, Vincent Lepetit},\n  pages     = {67--74},\n  address   = {Seggau, Austria},\n  publisher = {Graz University of Technology},\n  file      = {:pdfs/2015 - Using Agglomerative Clustering of Strokes to Perform Symbols Over-segmentation within a Diagram Recognition System.pdf:PDF},\n  isbn      = {978-3-85125-388-7},\n  keywords  = {Clustering, Diagram recognition, Flowcharts, Finite automata, Artificial samples},\n  url       = {http://cmp.felk.cvut.cz/ftp/articles/bresler/Bresler-Prusa-Hlavac-CVWW-2015.pdf},\n}"}, {"key": "Breuel2013", "type": "InProceedings", "year": "2013", "authors": "Thomas M. Breuel, Adnan Ul-Hasan, Mayce Al Azawi, Faisal Shafait", "title": "High-Performance OCR for Printed English and Fraktur Using LSTM Networks", "venue": "2013 12th International Conference on Document Analysis and Recognition · pp. 683--687", "abstract": "Long Short-Term Memory (LSTM) networks have yielded excellent results\n\ton handwriting recognition. This paper describes an application of\n\tbidirectional LSTM networks to the problem of machine-printed Latin\n\tand Fraktur recognition. Latin and Fraktur recognition differs significantly\n\tfrom handwriting recognition in both the statistical properties of\n\tthe data, as well as in the required, much higher levels of accuracy.\n\tApplications of LSTM networks to handwriting recognition use two-dimensional\n\trecurrent networks, since the exact position and baseline of handwritten\n\tcharacters is variable. In contrast, for printed OCR, we used a one-dimensional\n\trecurrent network combined with a novel algorithm for baseline and\n\tx-height normalization. A number of databases were used for training\n\tand testing, including the UW3 database, artificially generated and\n\tdegraded Fraktur text and scanned pages from a book digitization\n\tproject. The LSTM architecture achieved 0.6% character-level test-set\n\terror on English text. When the artificially degraded Fraktur data\n\tset is divided into training and test sets, the system achieves an\n\terror rate of 1.64%. On specific books printed in Fraktur (not part\n\tof the training set), the system achieves error rates of 0.15% (Fontane)\n\tand 1.47% (Ersch-Gruber). These recognition accuracies were found\n\twithout using any language modelling or any other post-processing\n\ttechniques.", "links": [["DOI", "https://doi.org/10.1109/ICDAR.2013.140", "badge-doi"]], "pdf": true, "search": "breuel2013 2013 thomas m. breuel, adnan ul-hasan, mayce al azawi, faisal shafait high-performance ocr for printed english and fraktur using lstm networks 2013 12th international conference on document analysis and recognition · pp. 683--687 long short-term memory (lstm) networks have yielded excellent results\n\ton handwriting recognition. this paper describes an application of\n\tbidirectional lstm networks to the problem of machine-printed latin\n\tand fraktur recognition. latin and fraktur recognition differs significantly\n\tfrom handwriting recognition in both the statistical properties of\n\tthe data, as well as in the required, much higher levels of accuracy.\n\tapplications of lstm networks to handwriting recognition use two-dimensional\n\trecurrent networks, since the exact position and baseline of handwritten\n\tcharacters is variable. in contrast, for printed ocr, we used a one-dimensional\n\trecurrent network combined with a novel algorithm for baseline and\n\tx-height normalization. a number of databases were used for training\n\tand testing, including the uw3 database, artificially generated and\n\tdegraded fraktur text and scanned pages from a book digitization\n\tproject. the lstm architecture achieved 0.6% character-level test-set\n\terror on english text. when the artificially degraded fraktur data\n\tset is divided into training and test sets, the system achieves an\n\terror rate of 1.64%. on specific books printed in fraktur (not part\n\tof the training set), the system achieves error rates of 0.15% (fontane)\n\tand 1.47% (ersch-gruber). these recognition accuracies were found\n\twithout using any language modelling or any other post-processing\n\ttechniques. inproceedings", "raw": "@InProceedings{Breuel2013,\n  author    = {Breuel, Thomas M. and Ul-Hasan, Adnan and Al Azawi, Mayce and Shafait, Faisal},\n  title     = {High-Performance {OCR} for Printed English and Fraktur Using {LSTM} Networks},\n  booktitle = {2013 12th International Conference on Document Analysis and Recognition},\n  year      = {2013},\n  pages     = {683--687},\n  abstract  = {Long Short-Term Memory (LSTM) networks have yielded excellent results\n\ton handwriting recognition. This paper describes an application of\n\tbidirectional LSTM networks to the problem of machine-printed Latin\n\tand Fraktur recognition. Latin and Fraktur recognition differs significantly\n\tfrom handwriting recognition in both the statistical properties of\n\tthe data, as well as in the required, much higher levels of accuracy.\n\tApplications of LSTM networks to handwriting recognition use two-dimensional\n\trecurrent networks, since the exact position and baseline of handwritten\n\tcharacters is variable. In contrast, for printed OCR, we used a one-dimensional\n\trecurrent network combined with a novel algorithm for baseline and\n\tx-height normalization. A number of databases were used for training\n\tand testing, including the UW3 database, artificially generated and\n\tdegraded Fraktur text and scanned pages from a book digitization\n\tproject. The LSTM architecture achieved 0.6% character-level test-set\n\terror on English text. When the artificially degraded Fraktur data\n\tset is divided into training and test sets, the system achieves an\n\terror rate of 1.64%. On specific books printed in Fraktur (not part\n\tof the training set), the system achieves error rates of 0.15% (Fontane)\n\tand 1.47% (Ersch-Gruber). These recognition accuracies were found\n\twithout using any language modelling or any other post-processing\n\ttechniques.},\n  doi       = {10.1109/ICDAR.2013.140},\n  file      = {:pdfs/2013 - High-Performance OCR for Printed English and Fraktur using LSTM Networks.pdf:PDF},\n  issn      = {1520-5363},\n  keywords  = {handwriting recognition;natural language processing;optical character recognition;statistical analysis;text analysis;English text;Fraktur;Fraktur text;LSTM networks;UW3 database;book digitization project;handwriting recognition;handwritten characters;high-performance OCR;long short term memory networks;machine printed Fraktur recognition;machine printed Latin recognition;printed English;printed OCR;recurrent networks;scanned pages;statistical properties;Error analysis;Handwriting recognition;Hidden Markov models;Optical character recognition software;Recurrent neural networks;Training;LSTM Networks;OCR;RNN},\n}"}, {"key": "Bukey2024", "type": "Misc", "year": "2024", "authors": "Irmak Bukey, Michael Feffer, Chris Donahue", "title": "Just Label the Repeats for In-The-Wild Audio-to-Score Alignment", "venue": "", "abstract": "We propose an efficient workflow for high-quality offline alignment of in-the-wild performance audio and corresponding sheet music scans (images). Recent work on audio-to-score alignment extends dynamic time warping (DTW) to be theoretically able to handle jumps in sheet music induced by repeat signs – this method requires no human annotations, but we show that it often yields low-quality alignments. As an alternative, we propose a workflow and interface that allows users to quickly annotate jumps (by clicking on repeat signs), requiring a small amount of human supervision but yielding much higher quality alignments on average.", "links": [["arXiv", "https://doi.org/10.48550/arXiv.2411.07428", "badge-arxiv"]], "pdf": true, "search": "bukey2024 2024 irmak bukey, michael feffer, chris donahue just label the repeats for in-the-wild audio-to-score alignment  we propose an efficient workflow for high-quality offline alignment of in-the-wild performance audio and corresponding sheet music scans (images). recent work on audio-to-score alignment extends dynamic time warping (dtw) to be theoretically able to handle jumps in sheet music induced by repeat signs – this method requires no human annotations, but we show that it often yields low-quality alignments. as an alternative, we propose a workflow and interface that allows users to quickly annotate jumps (by clicking on repeat signs), requiring a small amount of human supervision but yielding much higher quality alignments on average. misc", "raw": "@Misc{Bukey2024,\n  author        = {Bukey, Irmak and Feffer, Michael and Donahue, Chris},\n  title         = {Just Label the Repeats for In-The-Wild Audio-to-Score Alignment},\n  year          = {2024},\n  month     = {Nov},\n  abstract      = {We propose an efficient workflow for high-quality offline alignment of in-the-wild performance audio and corresponding sheet music scans (images). Recent work on audio-to-score alignment extends dynamic time warping (DTW) to be theoretically able to handle jumps in sheet music induced by repeat signs -- this method requires no human annotations, but we show that it often yields low-quality alignments. As an alternative, we propose a workflow and interface that allows users to quickly annotate jumps (by clicking on repeat signs), requiring a small amount of human supervision but yielding much higher quality alignments on average.},\n  doi           = {10.48550/arXiv.2411.07428},\n  file          = {:pdfs/2024 - Just Label the Repeats for In-The-Wild Audio-to-Score Alignment.pdf:PDF},\n  url           = {https://arxiv.org/abs/2411.07428},\n}"}, {"key": "Byrd2006a", "type": "TechReport", "year": "2006", "authors": "Donald Byrd", "title": "Music Notation and Music Representation", "venue": "Technical Report · Indiana University, School of informatics", "abstract": "", "links": [["URL", "http://music.informatics.indiana.edu/don_notation.html", "badge-url"]], "pdf": true, "search": "byrd2006a 2006 donald byrd music notation and music representation technical report · indiana university, school of informatics  techreport", "raw": "@TechReport{Byrd2006a,\n  author      = {Byrd, Donald},\n  title       = {Music Notation and Music Representation},\n  institution = {Indiana University, School of informatics},\n  year        = {2006},\n  file        = {:pdfs/2006 - Music Notation and Music Representation.pdf:PDF},\n  url         = {http://music.informatics.indiana.edu/don_notation.html},\n}"}, {"key": "Callison-Burch2007", "type": "InProceedings", "year": "2007", "authors": "Chris Callison-Burch, Cameron Fordyce, Philipp Koehn, Christof Monz, Josh Schroeder", "title": "(Meta-) Evaluation of Machine Translation", "venue": "Second Workshop on Statistical Machine Translation · pp. 136--158 · Association for Computational Linguistics", "abstract": "", "links": [["URL", "http://dl.acm.org/citation.cfm?id=1626355.1626373", "badge-url"]], "pdf": true, "search": "callison-burch2007 2007 chris callison-burch, cameron fordyce, philipp koehn, christof monz, josh schroeder (meta-) evaluation of machine translation second workshop on statistical machine translation · pp. 136--158 · association for computational linguistics  inproceedings", "raw": "@InProceedings{Callison-Burch2007,\n  author    = {Callison-Burch, Chris and Fordyce, Cameron and Koehn, Philipp and Monz, Christof and Schroeder, Josh},\n  title     = {(Meta-) Evaluation of Machine Translation},\n  booktitle = {Second Workshop on Statistical Machine Translation},\n  year      = {2007},\n  pages     = {136--158},\n  address   = {Stroudsburg, PA, USA},\n  publisher = {Association for Computational Linguistics},\n  acmid     = {1626373},\n  file      = {:pdfs/2007 - (Meta-) Evaluation of Machine Translation.pdf:PDF},\n  location  = {Prague, Czech Republic},\n  url       = {http://dl.acm.org/citation.cfm?id=1626355.1626373},\n}"}, {"key": "Callison-Burch2008", "type": "InProceedings", "year": "2008", "authors": "Chris Callison-Burch, Cameron Fordyce, Philipp Koehn, Christof Monz, Josh Schroeder", "title": "Further Meta-evaluation of Machine Translation", "venue": "Third Workshop on Statistical Machine Translation · pp. 70--106 · Association for Computational Linguistics", "abstract": "", "links": [["URL", "http://dl.acm.org/citation.cfm?id=1626394.1626403", "badge-url"]], "pdf": true, "search": "callison-burch2008 2008 chris callison-burch, cameron fordyce, philipp koehn, christof monz, josh schroeder further meta-evaluation of machine translation third workshop on statistical machine translation · pp. 70--106 · association for computational linguistics  inproceedings", "raw": "@InProceedings{Callison-Burch2008,\n  author    = {Callison-Burch, Chris and Fordyce, Cameron and Koehn, Philipp and Monz, Christof and Schroeder, Josh},\n  title     = {Further Meta-evaluation of Machine Translation},\n  booktitle = {Third Workshop on Statistical Machine Translation},\n  year      = {2008},\n  pages     = {70--106},\n  address   = {Stroudsburg, PA, USA},\n  publisher = {Association for Computational Linguistics},\n  acmid     = {1626403},\n  file      = {:pdfs/2008 - Further Meta-Evaluation of Machine Translation.pdf:PDF},\n  isbn      = {978-1-932432-09-1},\n  location  = {Columbus, Ohio},\n  url       = {http://dl.acm.org/citation.cfm?id=1626394.1626403},\n}"}, {"key": "Callison-Burch2010", "type": "InProceedings", "year": "2010", "authors": "Chris Callison-Burch, Philipp Koehn, Christof Monz, Kay Peterson, Mark Przybocki, Omar F. Zaidan", "title": "Findings of the 2010 Joint Workshop on Statistical Machine Translation and Metrics for Machine Translation", "venue": "Joint Fifth Workshop on Statistical Machine Translation and MetricsMATR · pp. 17--53 · Association for Computational Linguistics", "abstract": "", "links": [["URL", "http://dl.acm.org/citation.cfm?id=1868850.1868853", "badge-url"]], "pdf": true, "search": "callison-burch2010 2010 chris callison-burch, philipp koehn, christof monz, kay peterson, mark przybocki, omar f. zaidan findings of the 2010 joint workshop on statistical machine translation and metrics for machine translation joint fifth workshop on statistical machine translation and metricsmatr · pp. 17--53 · association for computational linguistics  inproceedings", "raw": "@InProceedings{Callison-Burch2010,\n  author    = {Callison-Burch, Chris and Koehn, Philipp and Monz, Christof and Peterson, Kay and Przybocki, Mark and Zaidan, Omar F.},\n  title     = {Findings of the 2010 Joint Workshop on Statistical Machine Translation and Metrics for Machine Translation},\n  booktitle = {Joint Fifth Workshop on Statistical Machine Translation and MetricsMATR},\n  year      = {2010},\n  pages     = {17--53},\n  address   = {Stroudsburg, PA, USA},\n  publisher = {Association for Computational Linguistics},\n  acmid     = {1868853},\n  file      = {:pdfs/2010 - Findings of the 2010 Joint Workshop on Statistical Machine Translation and Metrics for Machine Translation.pdf:PDF},\n  isbn      = {978-1-932432-71-8},\n  location  = {Uppsala, Sweden},\n  url       = {http://dl.acm.org/citation.cfm?id=1868850.1868853},\n}"}, {"key": "Calvo-Zaragoza2016a", "type": "Article", "year": "2016", "authors": "Jorge Calvo-Zaragoza, Jose J. Valero-Mas, Juan R. Rico-Juan", "title": "Prototype generation on structural data using dissimilarity space representation", "venue": "Neural Computing and Applications · pp. 1--10", "abstract": "Data reduction techniques play a key role in instance-based classification to lower the amount of data to be processed. Among the different existing approaches, prototype selection (PS) and prototype generation (PG) are the most representative ones. These two families differ in the way the reduced set is obtained from the initial one: While the former aims at selecting the most representative elements from the set, the latter creates new data out of it. Although PG is considered to delimit more efficiently decision boundaries, the operations required are not so well defined in scenarios involving structural data such as strings, trees, or graphs. This work studies the possibility of using dissimilarity space (DS) methods as an intermediate process for mapping the initial structural representation to a statistical one, thereby allowing the use of PG methods. A comparative experiment over string data is carried out in which our proposal is faced to PS methods on the original space. Results show that the proposed strategy is able to achieve significantly similar results to PS in the initial space, thus standing as a clear alternative to the classic approach, with some additional advantages derived from the DS representation.", "links": [["DOI", "https://doi.org/10.1007/s00521-016-2278-8", "badge-doi"]], "pdf": true, "search": "calvo-zaragoza2016a 2016 jorge calvo-zaragoza, jose j. valero-mas, juan r. rico-juan prototype generation on structural data using dissimilarity space representation neural computing and applications · pp. 1--10 data reduction techniques play a key role in instance-based classification to lower the amount of data to be processed. among the different existing approaches, prototype selection (ps) and prototype generation (pg) are the most representative ones. these two families differ in the way the reduced set is obtained from the initial one: while the former aims at selecting the most representative elements from the set, the latter creates new data out of it. although pg is considered to delimit more efficiently decision boundaries, the operations required are not so well defined in scenarios involving structural data such as strings, trees, or graphs. this work studies the possibility of using dissimilarity space (ds) methods as an intermediate process for mapping the initial structural representation to a statistical one, thereby allowing the use of pg methods. a comparative experiment over string data is carried out in which our proposal is faced to ps methods on the original space. results show that the proposed strategy is able to achieve significantly similar results to ps in the initial space, thus standing as a clear alternative to the classic approach, with some additional advantages derived from the ds representation. article", "raw": "@Article{Calvo-Zaragoza2016a,\n  author    = {Calvo-Zaragoza, Jorge and Valero-Mas, Jose J. and Rico-Juan, Juan R.},\n  title     = {Prototype generation on structural data using dissimilarity space representation},\n  journal   = {Neural Computing and Applications},\n  year      = {2016},\n  pages     = {1--10},\n  issn      = {1433-3058},\n  abstract  = {Data reduction techniques play a key role in instance-based classification to lower the amount of data to be processed. Among the different existing approaches, prototype selection ({PS}) and prototype generation ({PG}) are the most representative ones. These two families differ in the way the reduced set is obtained from the initial one: While the former aims at selecting the most representative elements from the set, the latter creates new data out of it. Although {PG} is considered to delimit more efficiently decision boundaries, the operations required are not so well defined in scenarios involving structural data such as strings, trees, or graphs. This work studies the possibility of using dissimilarity space ({DS}) methods as an intermediate process for mapping the initial structural representation to a statistical one, thereby allowing the use of {PG} methods. A comparative experiment over string data is carried out in which our proposal is faced to {PS} methods on the original space. Results show that the proposed strategy is able to achieve significantly similar results to {PS} in the initial space, thus standing as a clear alternative to the classic approach, with some additional advantages derived from the {DS} representation.},\n  doi       = {10.1007/s00521-016-2278-8},\n  file      = {:pdfs/2016 - Prototype Generation on Structural Data Using Dissimilarity Space Representation.pdf:PDF},\n}"}, {"key": "Calvo-Zaragoza2016b", "type": "Article", "year": "2016", "authors": "Jorge Calvo-Zaragoza, Jose Oncina", "title": "An efficient approach for Interactive Sequential Pattern Recognition", "venue": "Pattern Recognition · Vol. 64 · pp. 295--304 · Elsevier", "abstract": "Abstract Interactive Pattern Recognition (IPR) is an emergent framework in which the user is involved actively in the recognition process by giving feedback to the system when an error is detected. Although this framework is expected to reduce the number of errors to correct, it may increase the time required to complete the task since the machine needs to recompute its proposal after each interaction. Therefore, a fast computation is required to make the interactive system profitable and user-friendly. This work presents an efficient approach to deal with IPR tasks when data has a sequential nature. Our approach includes some computation at the very beginning of the task but it then achieves a linear complexity after user corrections. We also show how these tasks can be effectively carried out if the solution space is defined with a Regular Language. This fact has indeed proven to be the most relevant factor to improve the efficiency of the approach. Several experiments are carried out in which our proposal is faced against a classical search. Results show a reduction in time in all experiments considered, solving efficiently some complex IPR tasks thanks to our proposals.", "links": [["DOI", "https://doi.org/10.1016/j.patcog.2016.11.006", "badge-doi"], ["URL", "http://www.sciencedirect.com/science/article/pii/S0031320316303569", "badge-url"]], "pdf": true, "search": "calvo-zaragoza2016b 2016 jorge calvo-zaragoza, jose oncina an efficient approach for interactive sequential pattern recognition pattern recognition · vol. 64 · pp. 295--304 · elsevier abstract interactive pattern recognition (ipr) is an emergent framework in which the user is involved actively in the recognition process by giving feedback to the system when an error is detected. although this framework is expected to reduce the number of errors to correct, it may increase the time required to complete the task since the machine needs to recompute its proposal after each interaction. therefore, a fast computation is required to make the interactive system profitable and user-friendly. this work presents an efficient approach to deal with ipr tasks when data has a sequential nature. our approach includes some computation at the very beginning of the task but it then achieves a linear complexity after user corrections. we also show how these tasks can be effectively carried out if the solution space is defined with a regular language. this fact has indeed proven to be the most relevant factor to improve the efficiency of the approach. several experiments are carried out in which our proposal is faced against a classical search. results show a reduction in time in all experiments considered, solving efficiently some complex ipr tasks thanks to our proposals. article", "raw": "@Article{Calvo-Zaragoza2016b,\n  author    = {Calvo-Zaragoza, Jorge and Oncina, Jose},\n  title     = {An efficient approach for Interactive Sequential Pattern Recognition},\n  journal   = {Pattern Recognition},\n  year      = {2016},\n  volume    = {64},\n  pages     = {295--304},\n  issn      = {0031-3203},\n  abstract  = {Abstract Interactive Pattern Recognition (IPR) is an emergent framework in which the user is involved actively in the recognition process by giving feedback to the system when an error is detected. Although this framework is expected to reduce the number of errors to correct, it may increase the time required to complete the task since the machine needs to recompute its proposal after each interaction. Therefore, a fast computation is required to make the interactive system profitable and user-friendly. This work presents an efficient approach to deal with {IPR} tasks when data has a sequential nature. Our approach includes some computation at the very beginning of the task but it then achieves a linear complexity after user corrections. We also show how these tasks can be effectively carried out if the solution space is defined with a Regular Language. This fact has indeed proven to be the most relevant factor to improve the efficiency of the approach. Several experiments are carried out in which our proposal is faced against a classical search. Results show a reduction in time in all experiments considered, solving efficiently some complex {IPR} tasks thanks to our proposals.},\n  doi       = {10.1016/j.patcog.2016.11.006},\n  file      = {:pdfs/2017 - An efficient approach for Interactive Sequential Pattern Recognition.pdf:PDF},\n  keywords  = {Interactive Pattern Recognition},\n  publisher = {Elsevier},\n  url       = {http://www.sciencedirect.com/science/article/pii/S0031320316303569},\n}"}, {"key": "Cancino-Chacon2018", "type": "Article", "year": "2018", "authors": "Carlos E. Cancino-Chacón, Maarten Grachten, Werner Goebl, Gerhard Widmer", "title": "Computational Models of Expressive Music Performance: A Comprehensive and Critical Review", "venue": "Frontiers in Digital Humanities · Vol. 5 · pp. 25", "abstract": "Expressive performance is an indispensable part of music making.\nWhen playing a piece, expert performers shape various parameters (tempo,\ntiming, dynamics, intonation, articulation, etc.) in ways that are not\nprescribed by the notated score, in this way producing an expressive\nrendition that brings out dramatic, affective, and emotional\nqualities that may engage and affect the listeners.\nGiven the central importance of this skill for many kinds of music, expressive\nperformance has become an important research topic for disciplines like\nmusicology, music psychology, etc. \nThis paper focuses on a specific thread of research: work on\ncomputational music performance models. Computational models\nare attempts at codifying hypotheses about expressive performance in terms of\nmathematical formulas or computer programs, so that they can be evaluated in\nsystematic and quantitative ways. Such models can serve at least two main purposes:\nthey permit us to systematically study certain hypotheses regarding performance;\nand they can be used as tools to generate automated or semi-automated performances,\nin artistic or educational contexts.\nThe present article presents an up-to-date overview of the state of the art\nin this domain. We explore recent trends in the field, such as a strong focus on\ndata-driven (machine learning); a growing interest in interactive expressive systems,\nsuch as conductor simulators and automatic accompaniment systems; and an increased\ninterest in exploring cognitively plausible features and models.\nWe provide an in-depth discussion of several important design choices in\nsuch computer models, and discuss a crucial (and still largely unsolved)\nproblem that is hindering systematic progress: the question of how to\nevaluate such models in scientifically and musically meaningful ways.\nFrom all this, we finally derive some research directions that should be pursued\nwith priority, in order to advance the field and our understanding\nof expressive music performance.", "links": [["DOI", "https://doi.org/10.3389/fdigh.2018.00025", "badge-doi"]], "pdf": true, "search": "cancino-chacon2018 2018 carlos e. cancino-chacón, maarten grachten, werner goebl, gerhard widmer computational models of expressive music performance: a comprehensive and critical review frontiers in digital humanities · vol. 5 · pp. 25 expressive performance is an indispensable part of music making.\nwhen playing a piece, expert performers shape various parameters (tempo,\ntiming, dynamics, intonation, articulation, etc.) in ways that are not\nprescribed by the notated score, in this way producing an expressive\nrendition that brings out dramatic, affective, and emotional\nqualities that may engage and affect the listeners.\ngiven the central importance of this skill for many kinds of music, expressive\nperformance has become an important research topic for disciplines like\nmusicology, music psychology, etc. \nthis paper focuses on a specific thread of research: work on\ncomputational music performance models. computational models\nare attempts at codifying hypotheses about expressive performance in terms of\nmathematical formulas or computer programs, so that they can be evaluated in\nsystematic and quantitative ways. such models can serve at least two main purposes:\nthey permit us to systematically study certain hypotheses regarding performance;\nand they can be used as tools to generate automated or semi-automated performances,\nin artistic or educational contexts.\nthe present article presents an up-to-date overview of the state of the art\nin this domain. we explore recent trends in the field, such as a strong focus on\ndata-driven (machine learning); a growing interest in interactive expressive systems,\nsuch as conductor simulators and automatic accompaniment systems; and an increased\ninterest in exploring cognitively plausible features and models.\nwe provide an in-depth discussion of several important design choices in\nsuch computer models, and discuss a crucial (and still largely unsolved)\nproblem that is hindering systematic progress: the question of how to\nevaluate such models in scientifically and musically meaningful ways.\nfrom all this, we finally derive some research directions that should be pursued\nwith priority, in order to advance the field and our understanding\nof expressive music performance. article", "raw": "@Article{Cancino-Chacon2018,\n  author   = {Cancino-Chac{\\'{o}}n, Carlos E. and Grachten, Maarten and Goebl, Werner and Widmer, Gerhard},\n  title    = {Computational Models of Expressive Music Performance: A Comprehensive and Critical Review},\n  journal  = {Frontiers in Digital Humanities},\n  year     = {2018},\n  volume   = {5},\n  pages    = {25},\n  issn     = {2297-2668},\n  abstract = {Expressive performance is an indispensable part of music making.\nWhen playing a piece, expert performers shape various parameters (tempo,\ntiming, dynamics, intonation, articulation, etc.) in ways that are not\nprescribed by the notated score, in this way producing an expressive\nrendition that brings out dramatic, affective, and emotional\nqualities that may engage and affect the listeners.\nGiven the central importance of this skill for many kinds of music, expressive\nperformance has become an important research topic for disciplines like\nmusicology, music psychology, etc. \nThis paper focuses on a specific thread of research: work on\ncomputational music performance models. Computational models\nare attempts at codifying hypotheses about expressive performance in terms of\nmathematical formulas or computer programs, so that they can be evaluated in\nsystematic and quantitative ways. Such models can serve at least two main purposes:\nthey permit us to systematically study certain hypotheses regarding performance;\nand they can be used as tools to generate automated or semi-automated performances,\nin artistic or educational contexts.\nThe present article presents an up-to-date overview of the state of the art\nin this domain. We explore recent trends in the field, such as a strong focus on\ndata-driven (machine learning); a growing interest in interactive expressive systems,\nsuch as conductor simulators and automatic accompaniment systems; and an increased\ninterest in exploring cognitively plausible features and models.\nWe provide an in-depth discussion of several important design choices in\nsuch computer models, and discuss a crucial (and still largely unsolved)\nproblem that is hindering systematic progress: the question of how to\nevaluate such models in scientifically and musically meaningful ways.\nFrom all this, we finally derive some research directions that should be pursued\nwith priority, in order to advance the field and our understanding\nof expressive music performance.},\n  doi      = {10.3389/fdigh.2018.00025},\n  file     = {:pdfs/2018 - Computational Models of Expressive Music Performance_ a Comprehensive and Critical Review.pdf:PDF},\n}"}, {"key": "Carvalho2023", "type": "InProceedings", "year": "2023", "authors": "Luís Carvalho, Tobias Washüttl, Gerhard Widmer", "title": "Self-Supervised Contrastive Learning for Robust Audio-Sheet Music Retrieval Systems", "venue": "Proceedings of the 14th Conference on ACM Multimedia Systems · pp. 1--10", "abstract": "", "links": [["DOI", "https://doi.org/10.1145/3587819.3590968", "badge-doi"], ["arXiv", "https://arxiv.org/abs/2309.12134", "badge-arxiv"]], "pdf": true, "search": "carvalho2023 2023 luís carvalho, tobias washüttl, gerhard widmer self-supervised contrastive learning for robust audio-sheet music retrieval systems proceedings of the 14th conference on acm multimedia systems · pp. 1--10  inproceedings", "raw": "@InProceedings{Carvalho2023,\n  author    = {Carvalho, Lu{\\'\\i}s and Wash{\\\"u}ttl, Tobias and Widmer, Gerhard},\n  booktitle = {Proceedings of the 14th Conference on {ACM} Multimedia Systems},\n  title     = {Self-Supervised Contrastive Learning for Robust Audio-Sheet Music Retrieval Systems},\n  year      = {2023},\n  month     = {Jun},\n  pages     = {1--10},\n  publisher = {ACM},\n  doi       = {10.1145/3587819.3590968},\n  file      = {:pdfs/2023 - Self-Supervised Contrastive Learning for Robust Audio-Sheet Music Retrieval Systems.pdf:PDF},\n  url       = {https://arxiv.org/abs/2309.12134},\n}"}, {"key": "Cavez2024", "type": "InProceedings", "year": "2024", "authors": "Vincent Cavez, Catherine Letondal, Emmanuel Pietriga, Caroline Appert", "title": "Challenges of Music Score Writing and the Potentials of Interactive Surfaces", "venue": "Proceedings of the 2024 CHI Conference on Human Factors in Computing Systems · pp. 1--16 · Association for Computing Machinery", "abstract": "Music notation software has significantly transformed how composers write music, yet composing with a computer remains challenging. In this paper, we examine how interactive surfaces with pen and touch input can address these challenges. We report on 16 interviews with professional composers regarding their composition and notation practices and their experience with music notation programs. From our analysis, we derive four categories of challenges: manipulating musical elements, managing the score space, navigating the score, and communicating intent. We then present EuterPen, a prototype music score editor for large interactive displays with pen and touch input, that explores solutions for the identified challenges.", "links": [["DOI", "https://doi.org/10.1145/3613904.3642079", "badge-doi"], ["URL", "https://dl.acm.org/doi/abs/10.1145/3613904.3642079", "badge-url"]], "pdf": true, "search": "cavez2024 2024 vincent cavez, catherine letondal, emmanuel pietriga, caroline appert challenges of music score writing and the potentials of interactive surfaces proceedings of the 2024 chi conference on human factors in computing systems · pp. 1--16 · association for computing machinery music notation software has significantly transformed how composers write music, yet composing with a computer remains challenging. in this paper, we examine how interactive surfaces with pen and touch input can address these challenges. we report on 16 interviews with professional composers regarding their composition and notation practices and their experience with music notation programs. from our analysis, we derive four categories of challenges: manipulating musical elements, managing the score space, navigating the score, and communicating intent. we then present euterpen, a prototype music score editor for large interactive displays with pen and touch input, that explores solutions for the identified challenges. inproceedings", "raw": "@InProceedings{Cavez2024,\n  author    = {Cavez, Vincent and Letondal, Catherine and Pietriga, Emmanuel and Appert, Caroline},\n  booktitle = {Proceedings of the 2024 {CHI} Conference on Human Factors in Computing Systems},\n  title     = {Challenges of Music Score Writing and the Potentials of Interactive Surfaces},\n  year      = {2024},\n  month     = {May},\n  pages     = {1--16},\n  publisher = {Association for Computing Machinery},\n  address   = {New York, NY, USA},\n  abstract  = {Music notation software has significantly transformed how composers write music, yet composing with a computer remains challenging. In this paper, we examine how interactive surfaces with pen and touch input can address these challenges. We report on 16 interviews with professional composers regarding their composition and notation practices and their experience with music notation programs. From our analysis, we derive four categories of challenges: manipulating musical elements, managing the score space, navigating the score, and communicating intent. We then present EuterPen, a prototype music score editor for large interactive displays with pen and touch input, that explores solutions for the identified challenges.},\n  doi       = {10.1145/3613904.3642079},\n  file      = {:pdfs/2024 - Challenges of Music Score Writing and the Potentials of Interactive Surfaces.pdf:PDF},\n  url       = {https://dl.acm.org/doi/abs/10.1145/3613904.3642079},\n}"}, {"key": "Cavez2025", "type": "InProceedings", "year": "2025", "authors": "Vincent Cavez, Catherine Letondal, Caroline Appert, Emmanuel Pietriga", "title": "EuterPen: Unleashing Creative Expression in Music Score Writing", "venue": "Proceedings of the 2025 CHI Conference on Human Factors in Computing Systems · pp. 1--16 · ACM", "abstract": "EuterPen is a music notation program prototype that selectively relaxes both syntactic and structural constraints while editing a score. Composers can input and manipulate music symbols with increased flexibility, leveraging the affordances of pen and touch. They can make space on, between and around staves to insert additional content such as digital ink, pictures and audio samples.", "links": [["DOI", "https://doi.org/10.1145/3706598.3713488", "badge-doi"], ["URL", "https://dl.acm.org/doi/10.1145/3706598.3713488", "badge-url"]], "pdf": true, "search": "cavez2025 2025 vincent cavez, catherine letondal, caroline appert, emmanuel pietriga euterpen: unleashing creative expression in music score writing proceedings of the 2025 chi conference on human factors in computing systems · pp. 1--16 · acm euterpen is a music notation program prototype that selectively relaxes both syntactic and structural constraints while editing a score. composers can input and manipulate music symbols with increased flexibility, leveraging the affordances of pen and touch. they can make space on, between and around staves to insert additional content such as digital ink, pictures and audio samples. inproceedings", "raw": "@InProceedings{Cavez2025,\n  author    = {Cavez, Vincent and Letondal, Catherine and Appert, Caroline and Pietriga, Emmanuel},\n  booktitle = {Proceedings of the 2025 {CHI} Conference on Human Factors in Computing Systems},\n  title     = {{EuterPen}: Unleashing Creative Expression in Music Score Writing},\n  year      = {2025},\n  month     = {Apr},\n  pages     = {1--16},\n  publisher = {{ACM}},\n  abstract  = {EuterPen is a music notation program prototype that selectively relaxes both syntactic and structural constraints while editing a score. Composers can input and manipulate music symbols with increased flexibility, leveraging the affordances of pen and touch. They can make space on, between and around staves to insert additional content such as digital ink, pictures and audio samples.},\n  doi       = {10.1145/3706598.3713488},\n  file      = {:pdfs/2025 - EuterPen -- Unleashing Creative Expression in Music Score Writing.pdf:PDF},\n  isbn      = {979-8-4007-1394-1},\n  url       = {https://dl.acm.org/doi/10.1145/3706598.3713488},\n}"}, {"key": "Chen2017a", "type": "Article", "year": "2017", "authors": "Liang-Chieh Chen, Alexander Hermans, George Papandreou, Florian Schroff, Peng Wang, Hartwig Adam", "title": "MaskLab: Instance Segmentation by Refining Object Detection with Semantic and Direction Features", "venue": "CoRR · Vol. abs/1712.04837", "abstract": "", "links": [["arXiv", "http://arxiv.org/abs/1712.04837", "badge-arxiv"]], "pdf": true, "search": "chen2017a 2017 liang-chieh chen, alexander hermans, george papandreou, florian schroff, peng wang, hartwig adam masklab: instance segmentation by refining object detection with semantic and direction features corr · vol. abs/1712.04837  article", "raw": "@Article{Chen2017a,\n  author        = {Chen, Liang-Chieh and Hermans, Alexander and Papandreou, George and Schroff, Florian and Wang, Peng and Adam, Hartwig},\n  title         = {{MaskLab}: Instance Segmentation by Refining Object Detection with Semantic and Direction Features},\n  journal       = {CoRR},\n  year          = {2017},\n  volume        = {abs/1712.04837},\n  archiveprefix = {arXiv},\n  bibsource     = {dblp computer science bibliography, https://dblp.org},\n  biburl        = {https://dblp.org/rec/bib/journals/corr/abs-1712-04837},\n  file          = {:pdfs/2017 - MaskLab - Instance Segmentation by Refining Object Detection with Semantic and Direction Features.pdf:PDF},\n  url           = {http://arxiv.org/abs/1712.04837},\n}"}, {"key": "Chiu2018", "type": "InProceedings", "year": "2018", "authors": "Chung-Cheng Chiu, Tara N. Sainath, Yonghui Wu, Rohit Prabhavalkar, Patrick Nguyen, Zhifeng Chen et al.", "title": "State-of-the-Art Speech Recognition with Sequence-to-Sequence Models", "venue": "2018 IEEE International Conference on Acoustics, Speech and Signal Processing (ICASSP) · pp. 4774--4778", "abstract": "Attention-based encoder-decoder architectures such as Listen, Attend, and Spell (LAS), subsume the acoustic, pronunciation and language model components of a traditional automatic speech recognition (ASR) system into a single neural network. In previous work, we have shown that such architectures are comparable to state-of-the-art ASR systems on dictation tasks, but it was not clear if such architectures would be practical for more challenging tasks such as voice search. In this work, we explore a variety of structural and optimization improvements to our LAS model which significantly improve performance. On the structural side, we show that word piece models can be used instead of graphemes. We also introduce a multi-head attention architecture, which offers improvements over the commonly-used single-head attention. On the optimization side, we explore synchronous training, scheduled sampling, label smoothing, and minimum word error rate optimization, which are all shown to improve accuracy. We present results with a unidirectional LSTM encoder for streaming recognition. On a 12, 500 hour voice search task, we find that the proposed changes improve the WER from 9.2% to 5.6%, while the best conventional system achieves 6.7%; on a dictation task our model achieves a WER of 4.1% compared to 5% for the conventional system.", "links": [["DOI", "https://doi.org/10.1109/ICASSP.2018.8462105", "badge-doi"]], "pdf": true, "search": "chiu2018 2018 chung-cheng chiu, tara n. sainath, yonghui wu, rohit prabhavalkar, patrick nguyen, zhifeng chen et al. state-of-the-art speech recognition with sequence-to-sequence models 2018 ieee international conference on acoustics, speech and signal processing (icassp) · pp. 4774--4778 attention-based encoder-decoder architectures such as listen, attend, and spell (las), subsume the acoustic, pronunciation and language model components of a traditional automatic speech recognition (asr) system into a single neural network. in previous work, we have shown that such architectures are comparable to state-of-the-art asr systems on dictation tasks, but it was not clear if such architectures would be practical for more challenging tasks such as voice search. in this work, we explore a variety of structural and optimization improvements to our las model which significantly improve performance. on the structural side, we show that word piece models can be used instead of graphemes. we also introduce a multi-head attention architecture, which offers improvements over the commonly-used single-head attention. on the optimization side, we explore synchronous training, scheduled sampling, label smoothing, and minimum word error rate optimization, which are all shown to improve accuracy. we present results with a unidirectional lstm encoder for streaming recognition. on a 12, 500 hour voice search task, we find that the proposed changes improve the wer from 9.2% to 5.6%, while the best conventional system achieves 6.7%; on a dictation task our model achieves a wer of 4.1% compared to 5% for the conventional system. inproceedings", "raw": "@InProceedings{Chiu2018,\n  author    = {Chiu, Chung-Cheng and Sainath, Tara N. and Wu, Yonghui and Prabhavalkar, Rohit and Nguyen, Patrick and Chen, Zhifeng and Kannan, Anjuli and Weiss, Ron J. and Rao, Kanishka and Gonina, Ekaterina and Jaitly, Navdeep and Li, Bo and Chorowski, Jan and Bacchiani, Michiel},\n  title     = {State-of-the-Art Speech Recognition with Sequence-to-Sequence Models},\n  booktitle = {2018 IEEE International Conference on Acoustics, Speech and Signal Processing (ICASSP)},\n  year      = {2018},\n  pages     = {4774--4778},\n  abstract  = {Attention-based encoder-decoder architectures such as Listen, Attend, and Spell (LAS), subsume the acoustic, pronunciation and language model components of a traditional automatic speech recognition (ASR) system into a single neural network. In previous work, we have shown that such architectures are comparable to state-of-the-art ASR systems on dictation tasks, but it was not clear if such architectures would be practical for more challenging tasks such as voice search. In this work, we explore a variety of structural and optimization improvements to our LAS model which significantly improve performance. On the structural side, we show that word piece models can be used instead of graphemes. We also introduce a multi-head attention architecture, which offers improvements over the commonly-used single-head attention. On the optimization side, we explore synchronous training, scheduled sampling, label smoothing, and minimum word error rate optimization, which are all shown to improve accuracy. We present results with a unidirectional LSTM encoder for streaming recognition. On a 12, 500 hour voice search task, we find that the proposed changes improve the WER from 9.2% to 5.6%, while the best conventional system achieves 6.7%; on a dictation task our model achieves a WER of 4.1% compared to 5% for the conventional system.},\n  doi       = {10.1109/ICASSP.2018.8462105},\n  file      = {:pdfs/2018 - State of the Art Speech Recognition with Sequence to Sequence Models.pdf:PDF},\n  issn      = {2379-190X},\n  keywords  = {decoding;recurrent neural nets;speech recognition;automatic speech recognitio n  title     = {Maximum likelihood estimation of observer error-rates using the {EM} algorithm},\n  journal   = {Applied statistics},\n  year      = {1979},\n  pages     = {20--28},\n  file      = {:pdfs/1979 - Maximum Likelihood Estimation of Observer Error Rates Using the EM Algorithm.pdf:PDF},\n  publisher = {JSTOR},\n  url       = {https://www.jstor.org/stable/2346806},\n}"}, {"key": "Fuente2022", "type": "Article", "year": "2022", "authors": "Carlos de la Fuente, José J. Valero-Mas, Francisco J. Castellanos, Jorge Calvo-Zaragoza", "title": "Multimodal image and audio music transcription", "venue": "International Journal of Multimedia Information Retrieval · Vol. 11 · pp. 77--84", "abstract": "", "links": [["DOI", "https://doi.org/10.1007/s13735-021-00221-6", "badge-doi"], ["URL", "https://link.springer.com/article/10.1007/s13735-021-00221-6", "badge-url"]], "pdf": true, "search": "fuente2022 2022 carlos de la fuente, josé j. valero-mas, francisco j. castellanos, jorge calvo-zaragoza multimodal image and audio music transcription international journal of multimedia information retrieval · vol. 11 · pp. 77--84  article", "raw": "@Article{Fuente2022,\n  author   = {de la Fuente, Carlos and Valero-Mas, Jos{\\'e} J. and Castellanos, Francisco J. and Calvo-Zaragoza, Jorge},\n  journal  = {International Journal of Multimedia Information Retrieval},\n  title    = {Multimodal image and audio music transcription},\n  year     = {2022},\n  volume   = {11},\n  pages    = {77--84},\n  doi      = {10.1007/s13735-021-00221-6},\n  url      = {https://link.springer.com/article/10.1007/s13735-021-00221-6},\n  file      = {:pdfs/2022 - Multimodal image and audio music transcription.pdf:PDF},\n}"}, {"key": "Lambertye2024", "type": "MastersThesis", "year": "2024", "authors": "Grégoire de Lambertye", "title": "Music Semantic Reconstruction with Deep Learning: Learning How to Construct Music Notation Graphs With Graph Neural Networks", "venue": "Master's thesis, TU Wien", "abstract": "Music is fleeting by nature, existing briefly before fading away. Yet more than one wants to preserve it over time and many music notation systems have been developed with this intention. However, most of these formats have been designed for humans to read them. Optical Music Recognition (OMR) is a research field dedicated to investigating how to computationally read music notation and create computer-readable scores from traditional scores. The typical OMR pipeline is divided into four stages: Image preprocessing, Music object detection, Semantic reconstruction, and Encoding. The third stage of the pipeline aims at reconstructing the semantics of the music notation, reestablishing connections between the objects detected previously. This work focuses on scores written in the most common notation system called Common Western Music Notation (CWMN). In this context, the semantics are defined by the configuration of the musical primitives (accidental, noteheads, or flags), how they are grouped and arranged defines their interactions and how the music should sound. Some research exhibits the graph-like property of the music and introduces the concept of Music Notation Graph (MuNG): graphs constructed with the music primitives as nodes and their relations as edges. This graph structure makes it a candidate for leveraging the power of Graph Neural Networks (GNN). This master thesis investigates how GNNs can be used to perform the music semantic reconstruction. We propose a novel pipeline for using GNNs in OMR and discuss a few unsolved problems of the field like how to measure and compare the output of an OMR system or how to define MuNGs.", "links": [["DOI", "https://doi.org/10.34726/hss.2024.120481", "badge-doi"], ["URL", "https://repositum.tuwien.at/handle/20.500.12708/202594", "badge-url"]], "pdf": true, "search": "lambertye2024 2024 grégoire de lambertye music semantic reconstruction with deep learning: learning how to construct music notation graphs with graph neural networks master's thesis, tu wien music is fleeting by nature, existing briefly before fading away. yet more than one wants to preserve it over time and many music notation systems have been developed with this intention. however, most of these formats have been designed for humans to read them. optical music recognition (omr) is a research field dedicated to investigating how to computationally read music notation and create computer-readable scores from traditional scores. the typical omr pipeline is divided into four stages: image preprocessing, music object detection, semantic reconstruction, and encoding. the third stage of the pipeline aims at reconstructing the semantics of the music notation, reestablishing connections between the objects detected previously. this work focuses on scores written in the most common notation system called common western music notation (cwmn). in this context, the semantics are defined by the configuration of the musical primitives (accidental, noteheads, or flags), how they are grouped and arranged defines their interactions and how the music should sound. some research exhibits the graph-like property of the music and introduces the concept of music notation graph (mung): graphs constructed with the music primitives as nodes and their relations as edges. this graph structure makes it a candidate for leveraging the power of graph neural networks (gnn). this master thesis investigates how gnns can be used to perform the music semantic reconstruction. we propose a novel pipeline for using gnns in omr and discuss a few unsolved problems of the field like how to measure and compare the output of an omr system or how to define mungs. mastersthesis", "raw": "@MastersThesis{Lambertye2024,\n  author    = {de Lambertye, Gr{\\'e}goire},\n  title     = {Music Semantic Reconstruction with Deep Learning: Learning How to Construct Music Notation Graphs With Graph Neural Networks},\n  year      = {2024},\n  school    = {TU Wien},\n  abstract  = {Music is fleeting by nature, existing briefly before fading away. Yet more than one wants to preserve it over time and many music notation systems have been developed with this intention. However, most of these formats have been designed for humans to read them. Optical Music Recognition ({OMR}) is a research field dedicated to investigating how to computationally read music notation and create computer-readable scores from traditional scores. The typical {OMR} pipeline is divided into four stages: Image preprocessing, Music object detection, Semantic reconstruction, and Encoding. The third stage of the pipeline aims at reconstructing the semantics of the music notation, reestablishing connections between the objects detected previously. This work focuses on scores written in the most common notation system called Common Western Music Notation (CWMN). In this context, the semantics are defined by the configuration of the musical primitives (accidental, noteheads, or flags), how they are grouped and arranged defines their interactions and how the music should sound. Some research exhibits the graph-like property of the music and introduces the concept of Music Notation Graph (MuNG): graphs constructed with the music primitives as nodes and their relations as edges. This graph structure makes it a candidate for leveraging the power of Graph Neural Networks ({GNN}). This master thesis investigates how {GNN}s can be used to perform the music semantic reconstruction. We propose a novel pipeline for using {GNN}s in {OMR} and discuss a few unsolved problems of the field like how to measure and compare the output of an {OMR} system or how to define MuNGs.},\n  doi       = {10.34726/hss.2024.120481},\n  file      = {:pdfs/2024 - Music Semantic Reconstruction with Deep Learning.pdf:PDF},\n  url       = {https://repositum.tuwien.at/handle/20.500.12708/202594},\n}"}, {"key": "DegrootMaggetti2020", "type": "InProceedings", "year": "2020", "authors": "Jacob Degroot-Magget  corrections on OMR-generated MusicXML files of six Mendelssohn String Quartets, measuring the impact of each round of corrections on four MIR tasks: cadence detection, chord labeling, key finding, and monophonic pattern discovery.},\n  file        = {:pdfs/2020 - Data Quality Matters Iterative Corrections on a Corpus of Mendelssohn String Quartets.pdf:PDF},\n  url         = {https://hal.science/hal-02934884},\n}"}, {"key": "Delakis2008", "type": "InProceedings", "year": "2008", "authors": "Manolis Delakis, Christophe Garcia", "title": "Text detection with convolutional neural networks", "venue": "International Conference on Computer Vision Theory and Application · pp. 290--294", "abstract": "", "links": [["URL", "https://www.researchgate.net/profile/Christophe_Garcia2/publication/221415287_text_Detection_with_Convolutional_Neural_Networks/links/545251a30cf2bccc49087299/text-Detection-with-Convolutional-Neural-Networks.pdf", "badge-url"]], "pdf": true, "search": "delakis2008 2008 manolis delakis, christophe garcia text detection with convolutional neural networks international conference on computer vision theory and application · pp. 290--294  inproceedings", "raw": "@InProceedings{Delakis2008,\n  author    = {Delakis, Manolis and Garcia, Christophe},\n  title     = {{Text detection with convolutional neural networks}},\n  booktitle = {International Conference on Computer Vision Theory and Application},\n  year      = {2008},\n  pages     = {290--294},\n  file      = {:pdfs/2008 - Text Detection with Convolutional Neural Networks.pdf:PDF},\n  keywords  = {CNN},\n  url       = {https://www.researchgate.net/profile/Christophe_Garcia2/publication/221415287_text_Detection_with_Convolutional_Neural_Networks/links/545251a30cf2bccc49087299/text-Detection-with-Convolutional-Neural-Networks.pdf},\n}"}, {"key": "DIAMM", "type": "Misc", "year": "1998", "authors": "Margaret Bent, Andrew Wathey", "title": "Digital Image Archive of Medieval Music", "venue": "rlhttps://www.diamm.
