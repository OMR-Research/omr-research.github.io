nime17/papers/0022/paper0022.pdf},\n}"}, {"key": "Yang2021", "type": "Article", "year": "2021", "authors": "Daniel Yang, TJ Tsai", "title": "Piano Sheet Music Identification Using Dynamic N-gram Fingerprinting", "venue": "Transactions of the International Society for Music Information Retrieval · Vol. 4(1) · pp. 42--51", "abstract": "This paper introduces a large-scale retrieval method for piano sheet music images, studying both camera-based sheet music identification and MIDI-sheet image retrieval. The proposed method combines bootleg score features with a novel dynamic N-gram fingerprinting hashing scheme, achieving over 0.8 mean reciprocal rank on all IMSLP piano sheet images with sub-second runtimes.", "links": [["DOI", "https://doi.org/10.5334/tismir.70", "badge-doi"], ["URL", "https://transactions.ismir.net/articles/10.5334/tismir.70", "badge-url"]], "pdf": true, "search": "yang2021 2021 daniel yang, tj tsai piano sheet music identification using dynamic n-gram fingerprinting transactions of the international society for music information retrieval · vol. 4(1) · pp. 42--51 this paper introduces a large-scale retrieval method for piano sheet music images, studying both camera-based sheet music identification and midi-sheet image retrieval. the proposed method combines bootleg score features with a novel dynamic n-gram fingerprinting hashing scheme, achieving over 0.8 mean reciprocal rank on all imslp piano sheet images with sub-second runtimes. article", "raw": "@Article{Yang2021,\n  author      = {Yang, Daniel and Tsai, TJ},\n  journal     = {Transactions of the International Society for Music Information Retrieval},\n  title       = {Piano Sheet Music Identification Using Dynamic N-gram Fingerprinting},\n  year        = {2021},\n  month     = {Apr},\n  number      = {1},\n  pages       = {42--51},\n  volume      = {4},\n  abstract    = {This paper introduces a large-scale retrieval method for piano sheet music images, studying both camera-based sheet music identification and MIDI-sheet image retrieval. The proposed method combines bootleg score features with a novel dynamic N-gram fingerprinting hashing scheme, achieving over 0.8 mean reciprocal rank on all IMSLP piano sheet images with sub-second runtimes.},\n  doi         = {10.5334/tismir.70},\n  file        = {:pdfs/2021 - Piano Sheet Music Identification Using Dynamic N-gram Fingerprinting.pdf:PDF},\n  issn        = {2514-3298},\n  url         = {https://transactions.ismir.net/articles/10.5334/tismir.70},\n}"}, {"key": "Zeitler2024", "type": "Article", "year": "2024", "authors": "Johannes Zeitler, Christof Weiß, Vlora Arifi-Müller, Meinard Müller", "title": "BPSD: A Coherent Multi-Version Dataset for Analyzing the First Movements of Beethoven's Piano Sonatas", "venue": "Transactions of the International Society for Music Information Retrieval · Vol. 7(1) · pp. 195--212", "abstract": "This paper introduces the Beethoven Piano Sonata Dataset (BPSD), a multi-version dataset focusing on the first movements of Beethoven's 32 piano sonatas. The BPSD includes sheet music in different machine-readable formats and audio recordings from 11 performances, with 4 of them being in the public domain and freely accessible for research purposes. For the first movements of all 32 piano sonatas, the dataset comprises raw data in different representations such as score images, symbolic score representations, and audio recordings of different performances, with time-aligned annotations of measure positions, beats, global and local keys, chords, and structural elements.", "links": [["DOI", "https://doi.org/10.5334/tismir.196", "badge-doi"], ["URL", "https://transactions.ismir.net/articles/10.5334/tismir.196", "badge-url"]], "pdf": true, "search": "zeitler2024 2024 johannes zeitler, christof weiß, vlora arifi-müller, meinard müller bpsd: a coherent multi-version dataset for analyzing the first movements of beethoven's piano sonatas transactions of the international society for music information retrieval · vol. 7(1) · pp. 195--212 this paper introduces the beethoven piano sonata dataset (bpsd), a multi-version dataset focusing on the first movements of beethoven's 32 piano sonatas. the bpsd includes sheet music in different machine-readable formats and audio recordings from 11 performances, with 4 of them being in the public domain and freely accessible for research purposes. for the first movements of all 32 piano sonatas, the dataset comprises raw data in different representations such as score images, symbolic score representations, and audio recordings of different performances, with time-aligned annotations of measure positions, beats, global and local keys, chords, and structural elements. article", "raw": "@Article{Zeitler2024,\n  author    = {Zeitler, Johannes and Wei{\\ss}, Christof and Arifi-M{\\\"u}ller, Vlora and M{\\\"u}ller, Meinard},\n  journal   = {Transactions of the International Society for Music Information Retrieval},\n  title     = {{BPSD}: A Coherent Multi-Version Dataset for Analyzing the First Movements of {Beethoven}'s Piano Sonatas},\n  year      = {2024},\n  volume    = {7},\n  number    = {1},\n  pages     = {195--212},\n  abstract  = {This paper introduces the Beethoven Piano Sonata Dataset (BPSD), a multi-version dataset focusing on the first movements of Beethoven's 32 piano sonatas. The BPSD includes sheet music in different machine-readable formats and audio recordings from 11 performances, with 4 of them being in the public domain and freely accessible for research purposes. For the first movements of all 32 piano sonatas, the dataset comprises raw data in different representations such as score images, symbolic score representations, and audio recordings of different performances, with time-aligned annotations of measure positions, beats, global and local keys, chords, and structural elements.},\n  doi       = {10.5334/tismir.196},\n  file      = {:pdfs/2024 - BPSD A Coherent Multi-Version Dataset for Analyzing the First Movements of Beethoven's Piano Sonatas.pdf:PDF},\n  issn      = {2516-2950},\n  url       = {https://transactions.ismir.net/articles/10.5334/tismir.196},\n}"}, {"key": "Zhai2010", "type": "PhdThesis", "year": "2010", "authors": "Yun Zhai", "title": "Non-Numerical Ranking Based on Pairwise Comparisons", "venue": "PhD thesis, McMaster University", "abstract": "", "links": [["URL", "http://hdl.handle.net/11375/19476", "badge-url"]], "pdf": true, "search": "zhai2010 2010 yun zhai non-numerical ranking based on pairwise comparisons phd thesis, mcmaster university  phdthesis", "raw": "@PhdThesis{Zhai2010,\n  author  = {Zhai, Yun},\n  title   = {Non-Numerical Ranking Based on Pairwise Comparisons},\n  school  = {McMaster University},\n  year    = {2010},\n  address = {Hamilton, Ontario},\n  file    = {:pdfs/2010 - Non Numerical Ranking Based on Pairwise Comparisons.pdf:PDF},\n  url     = {http://hdl.handle.net/11375/19476},\n}"}, {"key": "Zhai2012", "type": "InProceedings", "year": "2012", "authors": "Ke Zhai, Yuening Hu, Jordan L. Boyd-Graber, Sinead Williamson", "title": "Modeling Images using Transformed Indian Buffet Processes", "venue": "29th International Conference on Machine Learning · icml.cc / Omnipress", "abstract": "", "links": [["URL", "http://icml.cc/2012/papers/750.pdf", "badge-url"]], "pdf": true, "search": "zhai2012 2012 ke zhai, yuening hu, jordan l. boyd-graber, sinead williamson modeling images using transformed indian buffet processes 29th international conference on machine learning · icml.cc / omnipress  inproceedings", "raw": "@InProceedings{Zhai2012,\n  author    = {Zhai, Ke and Hu, Yuening and Boyd{-}Graber, Jordan L. and Williamson, Sinead},\n  title     = {Modeling Images using Transformed Indian Buffet Processes},\n  booktitle = {29th International Conference on Machine Learning},\n  year      = {2012},\n  publisher = {icml.cc / Omnipress},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/conf/icml/ZhaiHBW12},\n  file      = {:pdfs/2012 - Modeling Images Using Transformed Indian Buffet Processes.pdf:PDF},\n  url       = {http://icml.cc/2012/papers/750.pdf},\n}"}, {"key": "Zhang2016", "type": "InProceedings", "year": "2016", "authors": "Xingxing Zhang, Liang Lu, Mirella Lapata", "title": "Top-down Tree Long Short-Term Memory Networks", "venue": "2016 Conference of the North American Chapter of the Association for Computational Linguistics: Human Language Technologies · pp. 310--320", "abstract": "", "links": [["URL", "http://www.aclweb.org/anthology/N16-1035", "badge-url"]], "pdf": true, "search": "zhang2016 2016 xingxing zhang, liang lu, mirella lapata top-down tree long short-term memory networks 2016 conference of the north american chapter of the association for computational linguistics: human language technologies · pp. 310--320  inproceedings", "raw": "@InProceedings{Zhang2016,\n  author    = {Zhang, Xingxing and Lu, Liang and Lapata, Mirella},\n  title     = {Top-down Tree Long Short-Term Memory Networks},\n  booktitle = {2016 Conference of the North American Chapter of the Association for Computational Linguistics: Human Language Technologies},\n  year      = {2016},\n  pages     = {310--320},\n  address   = {San Diego, California},\n  publisher = {Association for Computational Linguistics},\n  file      = {:pdfs/2016 - Top down Tree Long Short Term Memory Networks.pdf:PDF},\n  groups    = {rnn},\n  url       = {http://www.aclweb.org/anthology/N16-1035},\n}"}, {"key": "Zhang2017", "type": "Article", "year": "2017", "authors": "Jianshu Zhang, Jun Du, Shiliang Zhang, Dan Liu, Yulong Hu, Jinshui Hu et al.", "title": "Watch, Attend and Parse: An End-to-end Neural Network Based Approach to Handwritten Mathematical Expression Recognition", "venue": "Pattern Recognition", "abstract": "Abstract Machine recognition of a handwritten mathematical expression (HME) is challenging due to the ambiguities of handwritten symbols and the two-dimensional structure of mathematical expressions. Inspired by recent work in deep learning, we present Watch, Attend and Parse (WAP), a novel end-to-end approach based on neural network that learns to recognize \\HMEs\\ in a two-dimensional layout and outputs them as one-dimensional character sequences in LaTeX format. Inherently unlike traditional methods, our proposed model avoids problems that stem from symbol segmentation, and it does not require a predefined expression grammar. Meanwhile, the problems of symbol recognition and structural analysis are handled, respectively, using a watcher and a parser. We employ a convolutional neural network encoder that takes \\HME\\ images as input as the watcher and employ a recurrent neural network decoder equipped with an attention mechanism as the parser to generate LaTeX sequences. Moreover, the correspondence between the input expressions and the output LaTeX sequences is learned automatically by the attention mechanism. We validate the proposed approach on a benchmark published by the \\CROHME\\ international competition. Using the official training dataset, \\WAP\\ significantly outperformed the state-of-the-art method with an expression recognition accuracy of 46.55% on \\CROHME\\ 2014 and 44.55% on \\CROHME\\ 2016.", "links": [["DOI", "https://doi.org/10.1016/j.patcog.2017.06.017", "badge-doi"], ["URL", "http://www.sciencedirect.com/science/article/pii/S0031320317302376", "badge-url"]], "pdf": true, "search": "zhang2017 2017 jianshu zhang, jun du, shiliang zhang, dan liu, yulong hu, jinshui hu et al. watch, attend and parse: an end-to-end neural network based approach to handwritten mathematical expression recognition pattern recognition abstract machine recognition of a handwritten mathematical expression (hme) is challenging due to the ambiguities of handwritten symbols and the two-dimensional structure of mathematical expressions. inspired by recent work in deep learning, we present watch, attend and parse (wap), a novel end-to-end approach based on neural network that learns to recognize \\hmes\\ in a two-dimensional layout and outputs them as one-dimensional character sequences in latex format. inherently unlike traditional methods, our proposed model avoids problems that stem from symbol segmentation, and it does not require a predefined expression grammar. meanwhile, the problems of symbol recognition and structural analysis are handled, respectively, using a watcher and a parser. we employ a convolutional neural network encoder that takes \\hme\\ images as input as the watcher and employ a recurrent neural network decoder equipped with an attention mechanism as the parser to generate latex sequences. moreover, the correspondence between the input expressions and the output latex sequences is learned automatically by the attention mechanism. we validate the proposed approach on a benchmark published by the \\crohme\\ international competition. using the official training dataset, \\wap\\ significantly outperformed the state-of-the-art method with an expression recognition accuracy of 46.55% on \\crohme\\ 2014 and 44.55% on \\crohme\\ 2016. article", "raw": "@Article{Zhang2017,\n  author   = {Zhang, Jianshu and Du, Jun and Zhang, Shiliang and Liu, Dan and Hu, Yulong and Hu, Jinshui and Wei, Si and Dai, Lirong},\n  journal  = {Pattern Recognition},\n  title    = {Watch, Attend and Parse: An End-to-end Neural Network Based Approach to Handwritten Mathematical Expression Recognition},\n  year     = {2017},\n  issn     = {0031-3203},\n  abstract = {Abstract Machine recognition of a handwritten mathematical expression ({HME}) is challenging due to the ambiguities of handwritten symbols and the two-dimensional structure of mathematical expressions. Inspired by recent work in deep learning, we present Watch, Attend and Parse ({WAP}), a novel end-to-end approach based on neural network that learns to recognize \\{HMEs\\} in a two-dimensional layout and outputs them as one-dimensional character sequences in LaTeX format. Inherently unlike traditional methods, our proposed model avoids problems that stem from symbol segmentation, and it does not require a predefined expression grammar. Meanwhile, the problems of symbol recognition and structural analysis are handled, respectively, using a watcher and a parser. We employ a convolutional neural network encoder that takes \\{HME\\} images as input as the watcher and employ a recurrent neural network decoder equipped with an attention mechanism as the parser to generate LaTeX sequences. Moreover, the correspondence between the input expressions and the output LaTeX sequences is learned automatically by the attention mechanism. We validate the proposed approach on a benchmark published by the \\{CROHME\\} international competition. Using the official training dataset, \\{WAP\\} significantly outperformed the state-of-the-art method with an expression recognition accuracy of 46.55% on \\{CROHME\\} 2014 and 44.55% on \\{CROHME\\} 2016.},\n  doi      = {10.1016/j.patcog.2017.06.017},\n  file     = {:pdfs/2017 - Watch, Attend and Parse - an End to End Neural Network Based Approach to Handwritten Mathematical Expression Recognition.pdf:PDF},\n  keywords = {Handwritten Mathematical Expression Recognition},\n  url      = {http://www.sciencedirect.com/science/article/pii/S0031320317302376},\n}"}, {"key": "Zhu2022", "type": "Article", "year": "2022", "authors": "Tiange Zhu, Raphaël Fournier-S'niehotta, Philippe Rigaux, Nicolas Travers", "title": "A Framework for Content-Based Search in Large Music Collections", "venue": "Big Data and Cognitive Computing · Vol. 6(1) · pp. 23", "abstract": "This paper addresses the problem of scalable content-based search in large collections of music documents. A general framework is proposed based on a music description language, an extendible list of feature-extraction functions, and indexing and ranking procedures integrated into standard search engine architecture. A proof-of-concept implementation for searching large collections of XML-encoded music scores is released as open-source.", "links": [["DOI", "https://doi.org/10.3390/bdcc6010023", "badge-doi"], ["URL", "https://www.mdpi.com/2504-2289/6/1/23", "badge-url"]], "pdf": true, "search": "zhu2022 2022 tiange zhu, raphaël fournier-s'niehotta, philippe rigaux, nicolas travers a framework for content-based search in large music collections big data and cognitive computing · vol. 6(1) · pp. 23 this paper addresses the problem of scalable content-based search in large collections of music documents. a general framework is proposed based on a music description language, an extendible list of feature-extraction functions, and indexing and ranking procedures integrated into standard search engine architecture. a proof-of-concept implementation for searching large collections of xml-encoded music scores is released as open-source. article", "raw": "@Article{Zhu2022,\n  author   = {Zhu, Tiange and Fournier-S'niehotta, Rapha{\\\"e}l and Rigaux, Philippe and Travers, Nicolas},\n  journal  = {Big Data and Cognitive Computing},\n  title    = {A Framework for Content-Based Search in Large Music Collections},\n  year     = {2022},\n  month     = {Feb},\n  number   = {1},\n  pages    = {23},\n  volume   = {6},\n  abstract = {This paper addresses the problem of scalable content-based search in large collections of music documents. A general framework is proposed based on a music description language, an extendible list of feature-extraction functions, and indexing and ranking procedures integrated into standard search engine architecture. A proof-of-concept implementation for searching large collections of {XML}-encoded music scores is released as open-source.},\n  doi      = {10.3390/bdcc6010023},\n  file     = {:pdfs/2022 - A Framework for Content-Based Search in Large Music Collections.pdf:PDF},\n  issn     = {2504-2289},\n  url      = {https://www.mdpi.com/2504-2289/6/1/23},\n}"}, {"key": "Zhu2024", "type": "InProceedings", "year": "2024", "authors": "Tiange Zhu, Raphaël Fournier-S'niehotta, Philippe Rigaux", "title": "FACETS: A Tool for Improved Exploration of Large Symbolic Music Collections", "venue": "Proceedings of the 11th International Conference on Digital Libraries for Musicology · pp. 63--67 · Association for Computing Machinery", "abstract": "Large collections of symbolic music documents need efficient information retrieval tools. We introduce FACETS, a versatile tool for exploring and management of such collections. FACETS is a scalable and flexible content-based search engine, offering melodic and rhythmic querying modes.", "links": [["DOI", "https://doi.org/10.1145/3660570.3660578", "badge-doi"], ["URL", "https://dl.acm.org/doi/abs/10.1145/3660570.3660578", "badge-url"]], "pdf": true, "search": "zhu2024 2024 tiange zhu, raphaël fournier-s'niehotta, philippe rigaux facets: a tool for improved exploration of large symbolic music collections proceedings of the 11th international conference on digital libraries for musicology · pp. 63--67 · association for computing machinery large collections of symbolic music documents need efficient information retrieval tools. we introduce facets, a versatile tool for exploring and management of such collections. facets is a scalable and flexible content-based search engine, offering melodic and rhythmic querying modes. inproceedings", "raw": "@InProceedings{Zhu2024,\n  author    = {Zhu, Tiange and Fournier-S'niehotta, Rapha{\\\"e}l and Rigaux, Philippe},\n  booktitle = {Proceedings of the 11th International Conference on Digital Libraries for Musicology},\n  title     = {{FACETS}: A Tool for Improved Exploration of Large Symbolic Music Collections},\n  year      = {2024},\n  month     = {Jun},\n  pages     = {63--67},\n  publisher = {Association for Computing Machinery},\n  address   = {New York, NY, USA},\n  abstract  = {Large collections of symbolic music documents need efficient information retrieval tools. We introduce FACETS, a versatile tool for exploring and management of such collections. FACETS is a scalable and flexible content-based search engine, offering melodic and rhythmic querying modes.},\n  doi       = {10.1145/3660570.3660578},\n  file      = {:pdfs/2024 - FACETS A Tool for Improved Exploration of Large Symbolic Music Collections.pdf:PDF},\n  url       = {https://dl.acm.org/doi/abs/10.1145/3660570.3660578},\n}"}, {"key": "Zitnick2014", "type": "InProceedings", "year": "2014", "authors": "Larry Zitnick, Piotr Dollar", "title": "Edge Boxes: Locating Object Proposals from Edges", "venue": "ECCV · European Conference on Computer Vision", "abstract": "The use of object proposals is an effective recent approach for increasing\n\tthe computational efficiency of object detection. We propose a novel\n\tmethod for generating object bounding box proposals using edges.\n\tEdges provide a sparse yet informative representation of an image.\n\tOur main observation is that the number of contours that are wholly\n\tcontained in a bounding box is indicative of the likelihood of the\n\tbox containing an object. We propose a simple box objectness score\n\tthat measures the number of edges that exist in the box minus those\n\tthat are members of contours that overlap the box's boundary. Using\n\tefficient data structures, millions of candidate boxes can be evaluated\n\tin a fraction of a second, returning a ranked set of a few thousand\n\ttop-scoring proposals. Using standard metrics, we show results that\n\tare significantly more accurate than the current state-of-the-art\n\twhile being faster to compute. In particular, given just 1000 proposals\n\twe achieve over 96% object recall at overlap threshold of 0.5 and\n\tover 75% recall at the more challenging overlap of 0.7. Our approach\n\truns in 0.25 seconds and we additionally demonstrate a near real-time\n\tvariant with only minor loss in accuracy.", "links": [["URL", "https://www.microsoft.com/en-us/research/publication/edge-boxes-locating-object-proposals-from-edges/", "badge-url"]], "pdf": true, "search": "zitnick2014 2014 larry zitnick, piotr dollar edge boxes: locating object proposals from edges eccv · european conference on computer vision the use of object proposals is an effective recent approach for increasing\n\tthe computational efficiency of object detection. we propose a novel\n\tmethod for generating object bounding box proposals using edges.\n\tedges provide a sparse yet informative representation of an image.\n\tour main observation is that the number of contours that are wholly\n\tcontained in a bounding box is indicative of the likelihood of the\n\tbox containing an object. we propose a simple box objectness score\n\tthat measures the number of edges that exist in the box minus those\n\tthat are members of contours that overlap the box's boundary. using\n\tefficient data structures, millions of candidate boxes can be evaluated\n\tin a fraction of a second, returning a ranked set of a few thousand\n\ttop-scoring proposals. using standard metrics, we show results that\n\tare significantly more accurate than the current state-of-the-art\n\twhile being faster to compute. in particular, given just 1000 proposals\n\twe achieve over 96% object recall at overlap threshold of 0.5 and\n\tover 75% recall at the more challenging overlap of 0.7. our approach\n\truns in 0.25 seconds and we additionally demonstrate a near real-time\n\tvariant with only minor loss in accuracy. inproceedings", "raw": "@InProceedings{Zitnick2014,\n  author    = {Zitnick, Larry and Dollar, Piotr},\n  title     = {Edge Boxes: Locating Object Proposals from Edges},\n  booktitle = {ECCV},\n  year      = {2014},\n  publisher = {European Conference on Computer Vision},\n  abstract  = {The use of object proposals is an effective recent approach for increasing\n\tthe computational efficiency of object detection. We propose a novel\n\tmethod for generating object bounding box proposals using edges.\n\tEdges provide a sparse yet informative representation of an image.\n\tOur main observation is that the number of contours that are wholly\n\tcontained in a bounding box is indicative of the likelihood of the\n\tbox containing an object. We propose a simple box objectness score\n\tthat measures the number of edges that exist in the box minus those\n\tthat are members of contours that overlap the box's boundary. Using\n\tefficient data structures, millions of candidate boxes can be evaluated\n\tin a fraction of a second, returning a ranked set of a few thousand\n\ttop-scoring proposals. Using standard metrics, we show results that\n\tare significantly more accurate than the current state-of-the-art\n\twhile being faster to compute. In particular, given just 1000 proposals\n\twe achieve over 96% object recall at overlap threshold of 0.5 and\n\tover 75% recall at the more challenging overlap of 0.7. Our approach\n\truns in 0.25 seconds and we additionally demonstrate a near real-time\n\tvariant with only minor loss in accuracy.},\n  file      = {:pdfs/2014 - Edge Boxes - Locating Object Proposals from Edges.pdf:PDF},\n  url       = {https://www.microsoft.com/en-us/research/publication/edge-boxes-locating-object-proposals-from-edges/},\n}"}, {"key": "Balke2023", "type": "InProceedings", "year": "2023", "authors": "Stefan Balke, Adrian Maiworm", "title": "Digitalisierung in der Amateurmusik", "venue": "Proceedings of the GI Jahrestagung · pp. 841--850 · Gesellschaft für Informatik, Bonn", "abstract": "", "links": [["DOI", "https://doi.org/10.18420/INF2023_94", "badge-doi"]], "pdf": false, "search": "balke2023 2023 stefan balke, adrian maiworm digitalisierung in der amateurmusik proceedings of the gi jahrestagung · pp. 841--850 · gesellschaft für informatik, bonn  inproceedings", "raw": "@InProceedings{Balke2023,\n  author    = {Balke, Stefan and Maiworm, Adrian},\n  booktitle = {Proceedings of the {GI} Jahrestagung},\n  title     = {Digitalisierung in der Amate let filtered = [];

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderEntry(e) {
  const linkHtml = e.links.map(([label,url,cls]) =>
    `<a class="badge ${cls}" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(label)}</a>`
  ).join('');

  const titleHtml = e.links[0]
    ? `<a href="${esc(e.links[0][1])}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(e.title)}</a>`
    : esc(e.title);

  const absBlock = e.abstract
    ? `<div class="entry-abstract">${esc(e.abstract)}</div>`
    : '';

  return `
<div class="entry-card" id="card-${esc(e.key)}" onclick="toggleCard(this)">
  <div class="entry-header">
    <div class="entry-chips">
      <span class="entry-year">${esc(e.year)}</span>
      <span class="entry-type">${esc(e.type)}</span>
      ${linkHtml}
    </div>
    <div class="entry-authors">${esc(e.authors)}</div>
    <div class="entry-title">${titleHtml}</div>
    ${e.venue ? `<div class="entry-venue">${esc(e.venue)}</div>` : ''}
  </div>
  <div class="entry-panel" id="panel-${esc(e.key)}">
    ${absBlock}
    <div class="entry-bibtex-wrap">
      <button class="copy-btn" onclick="copyBib(event, this, '${esc(e.key)}')">Copy BibTeX</button>
      <pre class="entry-bibtex" id="bib-${esc(e.key)}">${esc(e.raw.trim())}</pre>
    </div>
  </div>
</div>`;
}

function toggleCard(card) {
  const panel = card.querySelector('.entry-panel');
  panel.classList.toggle('open');
}

function copyBib(event, btn, key) {
  event.stopPropagation();
  const text = document.getElementById('bib-' + key).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy BibTeX'; btn.classList.remove('copied'); }, 1800);
  });
}

function sortEntries(arr, mode) {
  return arr.slice().sort((a,b) => {
    if (mode === 'year_desc') return (b.year||'0').localeCompare(a.year||'0') || a.key.localeCompare(b.key);
    if (mode === 'year_asc')  return (a.year||'0').localeCompare(b.year||'0') || a.key.localeCompare(b.key);
    if (mode === 'author')    return a.authors.localeCompare(b.authors) || (b.year||'0').localeCompare(a.year||'0');
    if (mode === 'key')       return a.key.localeCompare(b.key);
    return 0;
  });
}

function applyFilters() {
  const q    = document.getElementById('q').value.toLowerCase();
  const yr   = document.getElementById('fYear').value;
  const tp   = document.getElementById('fType').value;
  const abs  = document.getElementById('fAbstract').checked;
  const sort = document.getElementById('fSort').value;

  filtered = ENTRIES.filter(e => {
    if (q  && !e.search.includes(q)) return false;
    if (yr && e.year !== yr)         return false;
    if (tp && e.type !== tp)         return false;
    if (abs && !e.abstract)          return false;
    return true;
  });

  filtered = sortEntries(filtered, sort);

  const list = document.getElementById('entryList');
  if (filtered.length === 0) {
    list.innerHTML = '<p class="no-results">No entries match the current filters.</p>';
  } else {
    list.innerHTML = filtered.map(renderEntry).join('');
  }

  document.getElementById('statLabel').textContent =
    `${filtered.length} of ${ENTRIES.length} entries`;
}

// Initial render
applyFilters();
</script>
