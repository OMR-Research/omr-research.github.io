pada and Alaei, Alireza},\n  title     = {{ICDAR}2013 Handwriting Segmentation Contest},\n  booktitle = {2013 12th International Conference on Document Analysis and Recognition},\n  year      = {2013},\n  doi       = {10.1109/ICDAR.2013.283},\n  file      = {:pdfs/2013 - ICDAR2013 Handwriting Segmentation Contest.pdf:PDF},\n}"}, {"key": "Stauffer2018", "type": "Article", "year": "2018", "authors": "Michael Stauffer, Andreas Fischer, Kaspar Riesen", "title": "Keyword spotting in historical handwritten documents based on graph matching", "venue": "Pattern Recognition · Vol. 81 · pp. 240--253", "abstract": "In the last decades historical handwritten documents have become increasingly available in digital form. Yet, the accessibility to these documents with respect to browsing and searching remained limited as full automatic transcription is often not possible or not sufficiently accurate. This paper proposes a novel reliable approach for template-based keyword spotting in historical handwritten documents. In particular, our framework makes use of different graph representations for segmented word images and a sophisticated matching procedure. Moreover, we extend our method to a spotting ensemble. In an exhaustive experimental evaluation on four widely used benchmark datasets we show that the proposed approach is able to keep up or even outperform several state-of-the-art methods for template- and learning-based keyword spotting.", "links": [["DOI", "https://doi.org/10.1016/j.patcog.2018.04.001", "badge-doi"], ["URL", "http://www.sciencedirect.com/science/article/pii/S0031320318301274", "badge-url"]], "pdf": true, "search": "stauffer2018 2018 michael stauffer, andreas fischer, kaspar riesen keyword spotting in historical handwritten documents based on graph matching pattern recognition · vol. 81 · pp. 240--253 in the last decades historical handwritten documents have become increasingly available in digital form. yet, the accessibility to these documents with respect to browsing and searching remained limited as full automatic transcription is often not possible or not sufficiently accurate. this paper proposes a novel reliable approach for template-based keyword spotting in historical handwritten documents. in particular, our framework makes use of different graph representations for segmented word images and a sophisticated matching procedure. moreover, we extend our method to a spotting ensemble. in an exhaustive experimental evaluation on four widely used benchmark datasets we show that the proposed approach is able to keep up or even outperform several state-of-the-art methods for template- and learning-based keyword spotting. article", "raw": "@Article{Stauffer2018,\n  author   = {Stauffer, Michael and Fischer, Andreas and Riesen, Kaspar},\n  title    = {Keyword spotting in historical handwritten documents based on graph matching},\n  journal  = {Pattern Recognition},\n  year     = {2018},\n  volume   = {81},\n  pages    = {240--253},\n  issn     = {0031-3203},\n  abstract = {In the last decades historical handwritten documents have become increasingly available in digital form. Yet, the accessibility to these documents with respect to browsing and searching remained limited as full automatic transcription is often not possible or not sufficiently accurate. This paper proposes a novel reliable approach for template-based keyword spotting in historical handwritten documents. In particular, our framework makes use of different graph representations for segmented word images and a sophisticated matching procedure. Moreover, we extend our method to a spotting ensemble. In an exhaustive experimental evaluation on four widely used benchmark datasets we show that the proposed approach is able to keep up or even outperform several state-of-the-art methods for template- and learning-based keyword spotting.},\n  doi      = {https://doi.org/10.1016/j.patcog.2018.04.001},\n  file     = {:pdfs/2018 - Keyword Spotting in Historical Handwritten Documents Based on Graph Matching.pdf:PDF},\n  keywords = {Handwritten keyword spotting, Graph representation, Bipartite graph matching, Ensemble methods},\n  url      = {http://www.sciencedirect.com/science/article/pii/S0031320318301274},\n}"}, {"key": "Stone1996", "type": "Book", "year": "1996", "authors": "Kurt Stone", "title": "Music Notation in the Twentieth Century, A Practical Guidebook", "venue": "W. W. Norton & Company", "abstract": "", "links": [], "pdf": true, "search": "stone1996 1996 kurt stone music notation in the twentieth century, a practical guidebook w. w. norton & company  book", "raw": "@Book{Stone1996,\n  title         = {{Music Notation in the Twentieth Century, A Practical Guidebook}},\n  publisher     = {W. W. Norton \\& Company},\n  year          = {1996},\n  author        = {Stone, Kurt},\n  file          = {:pdfs/1996 - Music Notation in the Twentieth Century, a Practical Guidebook.pdf:PDF},\n  keywords      = {music notation},\n}"}, {"key": "Stutter2025", "type": "PhdThesis", "year": "2025", "authors": "Joshua J. Stutter", "title": "Musical Reuse in the Notre Dame Repertory: Historiography and New Computational Directions", "venue": "PhD thesis, University of Glasgow", "abstract": "Of the many questions that we may wish to ask of the repertory of twelfth- and thirteenth-century music commonly known as Notre Dame polyphony, issues surrounding musical reuse and borrowing suffuse nearly every aspect. This dissertation tackles the issue of musical reuse in the Notre Dame repertory afresh, placing the notation of the manuscript sources at the centre of the study and considering how the broader issue of reuse can be studied holistically in the twenty-first century. Novel encoding, optical music recognition, and analysis methodologies are developed to approach these problems. Using the novel tools presented as part of this study, new and previously undetected patterns of musical reuse within the repertory are extracted.", "links": [["DOI", "https://doi.org/10.5525/gla.thesis.85172", "badge-doi"], ["URL", "https://theses.gla.ac.uk/85172/", "badge-url"]], "pdf": true, "search": "stutter2025 2025 joshua j. stutter musical reuse in the notre dame repertory: historiography and new computational directions phd thesis, university of glasgow of the many questions that we may wish to ask of the repertory of twelfth- and thirteenth-century music commonly known as notre dame polyphony, issues surrounding musical reuse and borrowing suffuse nearly every aspect. this dissertation tackles the issue of musical reuse in the notre dame repertory afresh, placing the notation of the manuscript sources at the centre of the study and considering how the broader issue of reuse can be studied holistically in the twenty-first century. novel encoding, optical music recognition, and analysis methodologies are developed to approach these problems. using the novel tools presented as part of this study, new and previously undetected patterns of musical reuse within the repertory are extracted. phdthesis", "raw": "@PhdThesis{Stutter2025,\n  author   = {Stutter, Joshua J.},\n  school   = {University of Glasgow},\n  title    = {Musical Reuse in the Notre Dame Repertory: Historiography and New Computational Directions},\n  year     = {2025},\n  abstract = {Of the many questions that we may wish to ask of the repertory of twelfth- and thirteenth-century music commonly known as Notre Dame polyphony, issues surrounding musical reuse and borrowing suffuse nearly every aspect. This dissertation tackles the issue of musical reuse in the Notre Dame repertory afresh, placing the notation of the manuscript sources at the centre of the study and considering how the broader issue of reuse can be studied holistically in the twenty-first century. Novel encoding, optical music recognition, and analysis methodologies are developed to approach these problems. Using the novel tools presented as part of this study, new and previously undetected patterns of musical reuse within the repertory are extracted.},\n  doi      = {10.5525/gla.thesis.85172},\n  file     = {:pdfs/2025 - Musical Reuse in the Notre Dame Repertory -- Historiography and New Computational Directions.pdf:PDF},\n  url      = {https://theses.gla.ac.uk/85172/},\n}"}, {"key": "Su2013", "type": "Article", "year": "2013", "authors": "Bolan Su, Shijian Lu, Chew Lim Tan", "title": "Robust document image binarization technique for degraded document images", "venue": "IEEE Transactions on Image Processing · Vol. 22(4) · pp. 1408--1417", "abstract": "Segmentation of text from badly degraded document images is a very challenging task due to the high inter/intra-variation between the document background and the foreground text of different document images. In this paper, we propose a novel document image binarization technique that addresses these issues by using adaptive image contrast. The adaptive image contrast is a combination of the local image contrast and the local image gradient that is tolerant to text and background variation caused by different types of document degradations. In the proposed technique, an adaptive contrast map is first constructed for an input degraded document image. The contrast map is then binarized and combined with Canny's edge map to identify the text stroke edge pixels. The document text is further segmented by a local threshold that is estimated based on the intensities of detected text stroke edge pixels within a local window. The proposed method is simple, robust, and involves minimum parameter tuning. It has been tested on three public datasets that are used in the recent document image binarization contest (DIBCO) 2009 & 2011 and handwritten-DIBCO 2010 and achieves accuracies of 93.5%, 87.8%, and 92.03%, respectively, that are significantly higher than or close to that of the best-performing methods reported in the three contests. Experiments on the Bickley diary dataset that consists of several challenging bad quality document images also show the superior performance of our proposed method, compared with other techniques.", "links": [["DOI", "https://doi.org/10.1109/TIP.2012.2231089", "badge-doi"]], "pdf": true, "search": "su2013 2013 bolan su, shijian lu, chew lim tan robust document image binarization technique for degraded document images ieee transactions on image processing · vol. 22(4) · pp. 1408--1417 segmentation of text from badly degraded document images is a very challenging task due to the high inter/intra-variation between the document background and the foreground text of different document images. in this paper, we propose a novel document image binarization technique that addresses these issues by using adaptive image contrast. the adaptive image contrast is a combination of the local image contrast and the local image gradient that is tolerant to text and background variation caused by different types of document degradations. in the proposed technique, an adaptive contrast map is first constructed for an input degraded document image. the contrast map is then binarized and combined with canny's edge map to identify the text stroke edge pixels. the document text is further segmented by a local threshold that is estimated based on the intensities of detected text stroke edge pixels within a local window. the proposed method is simple, robust, and involves minimum parameter tuning. it has been tested on three public datasets that are used in the recent document image binarization contest (dibco) 2009 & 2011 and handwritten-dibco 2010 and achieves accuracies of 93.5%, 87.8%, and 92.03%, respectively, that are significantly higher than or close to that of the best-performing methods reported in the three contests. experiments on the bickley diary dataset that consists of several challenging bad quality document images also show the superior performance of our proposed method, compared with other techniques. article", "raw": "@Article{Su2013,\n  author   = {Su, Bolan and Lu, Shijian and Tan, Chew Lim},\n  journal  = {IEEE Transactions on Image Processing},\n  title    = {{Robust document image binarization technique for degraded document images}},\n  year     = {2013},\n  issn     = {1057-7149},\n  number   = {4},\n  pages    = {1408--1417},\n  volume   = {22},\n  abstract = {Segmentation of text from badly degraded document images is a very challenging task due to the high inter/intra-variation between the document background and the foreground text of different document images. In this paper, we propose a novel document image binarization technique that addresses these issues by using adaptive image contrast. The adaptive image contrast is a combination of the local image contrast and the local image gradient that is tolerant to text and background variation caused by different types of document degradations. In the proposed technique, an adaptive contrast map is first constructed for an input degraded document image. The contrast map is then binarized and combined with Canny's edge map to identify the text stroke edge pixels. The document text is further segmented by a local threshold that is estimated based on the intensities of detected text stroke edge pixels within a local window. The proposed method is simple, robust, and involves minimum parameter tuning. It has been tested on three public datasets that are used in the recent document image binarization contest ({DIBCO}) 2009 {\\&} 2011 and handwritten-{DIBCO} 2010 and achieves accuracies of 93.5{\\%}, 87.8{\\%}, and 92.03{\\%}, respectively, that are significantly higher than or close to that of the best-performing methods reported in the three contests. Experiments on the Bickley diary dataset that consists of several challenging bad quality document images also show the superior performance of our proposed method, compared with other techniques.},\n  doi      = {10.1109/TIP.2012.2231089},\n  file     = {:pdfs/2013 - Robust Document Image Binarization Technique for Degraded Document Images.pdf:PDF},\n  keywords = {Adaptive image contrast, binarization, degraded document image binarization, document analysis, document image processing, pixel classification},\n  pmid     = {23221822},\n}"}, {"key": "Szegedy2017", "type": "InProceedings", "year": "2017", "authors": "Christian Szegedy, Sergey Ioffe, Vincent Vanhoucke, Alexander A. Alemi", "title": "Inception-v4, Inception-ResNet and the Impact of Residual Connections on Learning", "venue": "Thirty-First AAAI Conference on Artificial Intelligence (AAAI-17)", "abstract": "", "links": [["URL", "https://www.aaai.org/ocs/index.php/AAAI/AAAI17/paper/viewPaper/14806", "badge-url"]], "pdf": true, "search": "szegedy2017 2017 christian szegedy, sergey ioffe, vincent vanhoucke, alexander a. alemi inception-v4, inception-resnet and the impact of residual connections on learning thirty-first aaai conference on artificial intelligence (aaai-17)  inproceedings", "raw": "@InProceedings{Szegedy2017,\n  author    = {Szegedy, Christian and Ioffe, Sergey and Vanhoucke, Vincent and Alemi, Alexander A.},\n  title     = {Inception-v4, Inception-ResNet and the Impact of Residual Connections on Learning},\n  booktitle = {Thirty-First AAAI Conference on Artificial Intelligence (AAAI-17)},\n  year      = {2017},\n  file      = {:pdfs/2017 - Inception V4, Inception ResNet and the Impact of Residual Connections on Learning.pdf:PDF},\n  url       = {https://www.aaai.org/ocs/index.php/AAAI/AAAI17/paper/viewPaper/14806},\n}"}, {"key": "Szeto2018", "type": "Article", "year": "2018", "authors": "Kimmy Szeto", "title": "The Roles of Academic Libraries in Shaping Music Publishing in the Digital Age", "venue": "Johns Hopkins University Press · Vol. 67(2) · pp. 303--318", "abstract": "Libraries are positioned at the nexus of creative production, music publishing, performance, and research. The academic library community has the potential to play an influential leadership role in shaping the music publishing life cycle, making scores more readily discoverable and accessible, and establishing itself as a force that empowers a wide range of creativity and scholarship. Yet the music publishing industry has been slow to capitalize on the digital market, and academic libraries have been slow to integrate electronic music scores into their collections. In this paper, I will discuss the historical, technical, and human factors that have contributed to this moment, and the critical next steps the academic library community can take in response to the booming digital music publishing market to make a lasting impact through setting technological standards and best practices, developing education in these technologies and related intellectual property issues, and becoming an active partner in digital music publishing and in innovative research and creative possibilities.", "links": [["DOI", "https://doi.org/10.1353/lib.2018.0038", "badge-doi"]], "pdf": false, "search": "szeto2018 2018 kimmy szeto the roles of academic libraries in shaping music publishing in the digital age johns hopkins university press · vol. 67(2) · pp. 303--318 libraries are positioned at the nexus of creative production, music publishing, performance, and research. the academic library community has the potential to play an influential leadership role in shaping the music publishing life cycle, making scores more readily discoverable and accessible, and establishing itself as a force that empowers a wide range of creativity and scholarship. yet the music publishing industry has been slow to capitalize on the digital market, and academic libraries have been slow to integrate electronic music scores into their collections. in this paper, i will discuss the historical, technical, and human factors that have contributed to this moment, and the critical next steps the academic library community can take in response to the booming digital music publishing market to make a lasting impact through setting technological standards and best practices, developing education in these technologies and related intellectual property issues, and becoming an active partner in digital music publishing and in innovative research and creative possibilities. article", "raw": "@Article{Szeto2018,\n  author   = {Szeto, Kimmy},\n  title    = {The Roles of Academic Libraries in Shaping Music Publishing in the Digital Age},\n  journal  = {Johns Hopkins University Press},\n  year     = {2018},\n  volume   = {67},\n  number   = {2},\n  pages    = {303--318},\n  abstract = {Libraries are positioned at the nexus of creative production, music publishing, performance, and research. The academic library community has the potential to play an influential leadership role in shaping the music publishing life cycle, making scores more readily discoverable and accessible, and establishing itself as a force that empowers a wide range of creativity and scholarship. Yet the music publishing industry has been slow to capitalize on the digital market, and academic libraries have been slow to integrate electronic music scores into their collections. In this paper, I will discuss the historical, technical, and human factors that have contributed to this moment, and the critical next steps the academic library community can take in response to the booming digital music publishing market to make a lasting impact through setting technological standards and best practices, developing education in these technologies and related intellectual property issues, and becoming an active partner in digital music publishing and in innovative research and creative possibilities.},\n  doi      = {10.1353/lib.2018.0038},\n}"}, {"key": "Toiviainen2016", "type": "Misc", "year": "2016", "authors": "P. Toiviainen, T. Eerola", "title": "MIDI toolbox 1.1", "venue": "https://github.com/miditoolbox/ · GitHub", "abstract": "", "links": [["URL", "https://github.com/miditoolbox/", "badge-url"]], "pdf": false, "search": "toiviainen2016 2016 p. toiviainen, t. eerola midi toolbox 1.1 https://github.com/miditoolbox/ · github  misc", "raw": "@Misc{Toiviainen2016,\n  author        = {Toiviainen, P. and Eerola, T.},\n  title         = {{MIDI} toolbox 1.1},\n  howpublished  = {https://github.com/miditoolbox/},\n  year          = {2016},\n  date-modified = {2016-05-18 09:15:01 +0000},\n  journal       = {GitHub repository},\n  publisher     = {GitHub},\n  url           = {https://github.com/miditoolbox/},\n}"}, {"key": "Trier1995", "type": "Article", "year": "1995", "authors": "O. D. Trier, A. K. Jain", "title": "Goal-directed evaluation of binarization methods", "venue": "IEEE Transactions on Pattern Analysis and Machine Intelligence · Vol. 17(12) · pp. 1191--1201", "abstract": "This paper presents a methodology for evaluation of low-level image analysis methods, using binarization (two-level thresholding) as an example. Binarization of scanned gray scale images is the first step in most document image analysis systems. Selection of an appropriate binarization method for an input image domain is a difficult problem. Typically, a human expert evaluates the binarized images according to his/her visual criteria. However, to conduct an objective evaluation, one needs to investigate how well the subsequent image analysis steps will perform on the binarized image. We call this approach goal-directed evaluation, and it can be used to evaluate other low-level image processing methods as well. Our evaluation of binarization methods is in the context of digit recognition, so we define the performance of the character recognition module as the objective measure. Eleven different locally adaptive binarization methods were evaluated, and Niblack's method gave the best performance.", "links": [["DOI", "https://doi.org/10.1109/34.476511", "badge-doi"]], "pdf": true, "search": "trier1995 1995 o. d. trier, a. k. jain goal-directed evaluation of binarization methods ieee transactions on pattern analysis and machine intelligence · vol. 17(12) · pp. 1191--1201 this paper presents a methodology for evaluation of low-level image analysis methods, using binarization (two-level thresholding) as an example. binarization of scanned gray scale images is the first step in most document image analysis systems. selection of an appropriate binarization method for an input image domain is a difficult problem. typically, a human expert evaluates the binarized images according to his/her visual criteria. however, to conduct an objective evaluation, one needs to investigate how well the subsequent image analysis steps will perform on the binarized image. we call this approach goal-directed evaluation, and it can be used to evaluate other low-level image processing methods as well. our evaluation of binarization methods is in the context of digit recognition, so we define the performance of the character recognition module as the objective measure. eleven different locally adaptive binarization methods were evaluated, and niblack's method gave the best performance. article", "raw": "@Article{Trier1995,\n  author   = {O. D. Trier and A. K. Jain},\n  title    = {Goal-directed evaluation of binarization methods},\n  journal  = {IEEE Transactions on Pattern Analysis and Machine Intelligence},\n  year     = {1995},\n  volume   = {17},\n  number   = {12},\n  pages    = {1191--1201},\n  issn     = {0162-8828},\n  abstract = {This paper presents a methodology for evaluation of low-level image analysis methods, using binarization (two-level thresholding) as an example. Binarization of scanned gray scale images is the first step in most document image analysis systems. Selection of an appropriate binarization method for an input image domain is a difficult problem. Typically, a human expert evaluates the binarized images according to his/her visual criteria. However, to conduct an objective evaluation, one needs to investigate how well the subsequent image analysis steps will perform on the binarized image. We call this approach goal-directed evaluation, and it can be used to evaluate other low-level image processing methods as well. Our evaluation of binarization methods is in the context of digit recognition, so we define the performance of the character recognition module as the objective measure. Eleven different locally adaptive binarization methods were evaluated, and Niblack's method gave the best performance.},\n  doi      = {10.1109/34.476511},\n  file     = {:pdfs/1995 - Goal Directed Evaluation of Binarization Methods.pdf:PDF},\n  keywords = {document image processing;document handling;character recognition;image segmentation;performance evaluation;goal-directed evaluation;binarization;low-level image analysis;two-level thresholding;scanned gray scale images;document image processing;digit image recognition;character recognition module;Niblack's method;segmentation;Image analysis;Text analysis;Image processing;Humans;Performance evaluation;Character recognition;Image segmentation;Machine vision;Computer vision;Data mining},\n}"}, {"key": "Trier1995a", "type": "Article", "year": "1995", "authors": "Øivind Due Trier, Torfinn Taxt", "title": "Evaluation of binarization methods for utility map images", "venue": "1st International Conference on Image Processing · Vol. 2 · pp. 31--36", "abstract": "This paper presents an evaluation of locally adaptive binarization methods for gray scale images with low contrast, variable background intensity and noise. Such low quality occurs frequently in utility maps and excludes the use of global binarization methods. Only robust locally adaptive binarization methods with no need for on-line tuning of the parameters were considered since the gray scale images of utility maps often consist of a billion (10<sup>9</sup>) pixels or more. Eight locally adaptive binarization methods were tested on five different images. The postprocessing step (PS) of Yanowitz and Bruckstein's (1989) method improved all the other best binarization methods. Niblack's (1986) method with PS gave the best performance. Eikvil, Taxt and Moen's (1991) method with PS, and Yanowitz and Bruckstein's method did almost as well. Comparison was also made on the CPU requirement", "links": [["DOI", "https://doi.org/10.1109/ICIP.1994.413515", "badge-doi"]], "pdf": true, "search": "trier1995a 1995 øivind due trier, torfinn taxt evaluation of binarization methods for utility map images 1st international conference on image processing · vol. 2 · pp. 31--36 this paper presents an evaluation of locally adaptive binarization methods for gray scale images with low contrast, variable background intensity and noise. such low quality occurs frequently in utility maps and excludes the use of global binarization methods. only robust locally adaptive binarization methods with no need for on-line tuning of the parameters were considered since the gray scale images of utility maps often consist of a billion (10<sup>9</sup>) pixels or more. eight locally adaptive binarization methods were tested on five different images. the postprocessing step (ps) of yanowitz and bruckstein's (1989) method improved all the other best binarization methods. niblack's (1986) method with ps gave the best performance. eikvil, taxt and moen's (1991) method with ps, and yanowitz and bruckstein's method did almost as well. comparison was also made on the cpu requirement article", "raw": "@Article{Trier1995a,\n  author   = {Trier, {{\\O}}ivind Due and Taxt, Torfinn},\n  journal  = {1st International Conference on Image Processing},\n  title    = {{Evaluation of binarization methods for utility map images}},\n  year     = {1995},\n  issn     = {0162-8828},\n  pages    = {31--36},\n  volume   = {2},\n  abstract = {This paper presents an evaluation of locally adaptive binarization methods for gray scale images with low contrast, variable background intensity and noise. Such low quality occurs frequently in utility maps and excludes the use of global binarization methods. Only robust locally adaptive binarization methods with no need for on-line tuning of the parameters were considered since the gray scale images of utility maps often consist of a billion (10<sup>9</sup>) pixels or more. Eight locally adaptive binarization methods were tested on five different images. The postprocessing step ({PS}) of Yanowitz and Bruckstein's (1989) method improved all the other best binarization methods. Niblack's (1986) method with {PS} gave the best performance. Eikvil, Taxt and Moen's (1991) method with {PS}, and Yanowitz and Bruckstein's method did almost as well. Comparison was also made on the {CPU} requirement},\n  doi      = {10.1109/ICIP.1994.413515},\n  file     = {:pdfs/1995 - Evaluation of Binarization Methods for Utility Map Images.pdf:PDF},\n  isbn     = {0-8186-6952-7},\n  keywords = {binarization, document images, evaluation, locally adaptive binarization, thresholding, utility maps},\n}"}, {"key": "Uijlings2013", "type": "Article", "year": "2013", "authors": "J. R. R. Uijlings, K. E. A. van de Sande, T. Gevers, A. W. M. Smeulders", "title": "Selective Search for Object Recognition", "venue": "International Journal of Computer Vision · Vol. 104(2) · pp. 154--171", "abstract": "This paper addresses the problem of generating possible object locations for use in object recognition. We introduce selective search which combines the strength of both an exhaustive search and segmentation. Like segmentation, we use the image structure to guide our sampling process. Like exhaustive search, we aim to capture all possible object locations. Instead of a single technique to generate possible object locations, we diversify our search and use a variety of complementary image partitionings to deal with as many image conditions as possible. Our selective search results in a small set of data-driven, class-independent, high quality locations, yielding 99 % recall and a Mean Average Best Overlap of 0.879 at 10,097 locations. The reduced number of locations compared to an exhaustive search enables the use of stronger machine learning techniques and stronger appearance models for object recognition. In this paper we show that our selective search enables the use of the powerful Bag-of-Words model for recognition. The selective search software is made publicly available (Software:  http://disi.unitn.it/ uijlings/SelectiveSearch.html ).", "links": [["DOI", "https://doi.org/10.1007/s11263-013-0620-5", "badge-doi"]], "pdf": true, "search": "uijlings2013 2013 j. r. r. uijlings, k. e. a. van de sande, t. gevers, a. w. m. smeulders selective search for object recognition international journal of computer vision · vol. 104(2) · pp. 154--171 this paper addresses the problem of generating possible object locations for use in object recognition. we introduce selective search which combines the strength of both an exhaustive search and segmentation. like segmentation, we use the image structure to guide our sampling process. like exhaustive search, we aim to capture all possible object locations. instead of a single technique to generate possible object locations, we diversify our search and use a variety of complementary image partitionings to deal with as many image conditions as possible. our selective search results in a small set of data-driven, class-independent, high quality locations, yielding 99 % recall and a mean average best overlap of 0.879 at 10,097 locations. the reduced number of locations compared to an exhaustive search enables the use of stronger machine learning techniques and stronger appearance models for object recognition. in this paper we show that our selective search enables the use of the powerful bag-of-words model for recognition. the selective search software is made publicly available (software:  http://disi.unitn.it/ uijlings/selectivesearch.html ). article", "raw": "@Article{Uijlings2013,\n  author   = {Uijlings, J. R. R. and van de Sande, K. E. A. and Gevers, T. and Smeulders, A. W. M.},\n  title    = {Selective Search for Object Recognition},\n  journal  = {International Journal of Computer Vision},\n  year     = {2013},\n  volume   = {104},\n  number   = {2},\n  pages    = {154--171},\n  issn     = {1573-1405},\n  abstract = {This paper addresses the problem of generating possible object locations for use in object recognition. We introduce selective search which combines the strength of both an exhaustive search and segmentation. Like segmentation, we use the image structure to guide our sampling process. Like exhaustive search, we aim to capture all possible object locations. Instead of a single technique to generate possible object locations, we diversify our search and use a variety of complementary image partitionings to deal with as many image conditions as possible. Our selective search results in a small set of data-driven, class-independent, high quality locations, yielding 99 {\\%} recall and a Mean Average Best Overlap of 0.879 at 10,097 locations. The reduced number of locations compared to an exhaustive search enables the use of stronger machine learning techniques and stronger appearance models for object recognition. In this paper we show that our selective search enables the use of the powerful Bag-of-Words model for recognition. The selective search software is made publicly available (Software:  http://disi.unitn.it/~uijlings/SelectiveSearch.html ).},\n  doi      = {10.1007/s11263-013-0620-5},\n  file     = {:pdfs/2013 - Selective Search for Object Recognition.pdf:PDF},\n  url      = {https://doi.org/10.1007/s11263-013-0620-5},\n}"}, {"key": "Urbano2010", "type": "TechReport", "year": "2010", "authors": "Julián Urbano, Juan Lloréns, Jorge Morato, Sonia Sánchez-Cuadrado", "title": "MIREX 2010 Symbolic Melodic Similarity: Local Alignment with Geometric Representations", "venue": "Technical Report · Music Information Retrieval Evaluation eXchange", "abstract": "", "links": [["URL", "https://julian-urbano.info/files/publications/013-mirex-2010-symbolic  character recognition},\n  journal   = {Pattern Recognition Letters},\n  year      = {2015},\n  volume    = {58},\n  pages     = {23--28},\n  doi       = {10.1016/j.patrec.2015.02.001},\n  file      = {:pdfs/2015 - Semi-automatic ground truth generation using unsupervised clustering and limited manual labeling - Application to handwritten character recognition.pdf:PDF},\n  publisher = {Elsevier {BV}},\n}"}, {"key": "Villegas2015", "type": "InProceedings", "year": "2015", "authors": "Mauricio Villegas, Joan Andreu Sánchez, Enrique Vidal", "title": "Optical modelling and language modelling trade-off for Handwritten Text Recognition", "venue": "2015 13th International Conference on Document Analysis and Recognition (ICDAR) · pp. 831--835", "abstract": "Training the models needed for Automatic Handwritten Text Recognition of historical documents generally requires a significant amount of human effort. This is mainly due to the great differences that often exist between collections and to the lack of linguistic resources from the period when the documents were written, which results in a need of manual data labelling effort. This paper presents a study on the reuse of models trained with data from a different collection, focusing on the contribution that the language model and the optical models have on the performance. An empirical evaluation is performed using data from Jeremy Bentham manuscripts with the aim of recognising a manuscript about a very different topic written by Jane Austen.", "links": [["DOI", "https://doi.org/10.1109/ICDAR.2015.7333878", "badge-doi"]], "pdf": true, "search": "villegas2015 2015 mauricio villegas, joan andreu sánchez, enrique vidal optical modelling and language modelling trade-off for handwritten text recognition 2015 13th international conference on document analysis and recognition (icdar) · pp. 831--835 training the models needed for automatic handwritten text recognition of historical documents generally requires a significant amount of human effort. this is mainly due to the great differences that often exist between collections and to the lack of linguistic resources from the period when the documents were written, which results in a need of manual data labelling effort. this paper presents a study on the reuse of models trained with data from a different collection, focusing on the contribution that the language model and the optical models have on the performance. an empirical evaluation is performed using data from jeremy bentham manuscripts with the aim of recognising a manuscript about a very different topic written by jane austen. inproceedings", "raw": "@InProceedings{Villegas2015,\n  author    = {Villegas, Mauricio and S{\\'{a}}nchez, Joan Andreu and Vidal, Enrique},\n  title     = {Optical modelling and language modelling trade-off for Handwritten Text Recognition},\n  booktitle = {2015 13th International Conference on Document Analysis and Recognition (ICDAR)},\n  year      = {2015},\n  pages     = {831--835},\n  abstract  = {Training the models needed for Automatic Handwritten Text Recognition of historical documents generally requires a significant amount of human effort. This is mainly due to the great differences that often exist between collections and to the lack of linguistic resources from the period when the documents were written, which results in a need of manual data labelling effort. This paper presents a study on the reuse of models trained with data from a different collection, focusing on the contribution that the language model and the optical models have on the performance. An empirical evaluation is performed using data from Jeremy Bentham manuscripts with the aim of recognising a manuscript about a very different topic written by Jane Austen.},\n  doi       = {10.1109/ICDAR.2015.7333878},\n  file      = {:pdfs/2015 - Optical Modelling and Language Modelling Trade-off for Handwritten Text Recognition.pdf:PDF},\n  keywords  = {document image processing;history;linguistics;optical character recognition;text detection;Bentham Jeremy manuscript;handwritten text recognition;language modelling;linguistic resource;manual data labelling effort;optical modelling;Adaptation models;Integrated circuits;Integrated optics;Handwritten Text Recognition;Language Models;Model Retraining;Optical Models},\n}"}, {"key": "Vonikakis2011", "type": "Article", "year": "2011", "authors": "V. Vonikakis, I. Andreadis, N. Papamarkos", "title": "Robust document binarization with OFF center-surround cells", "venue": "Pattern Analysis and Applications · Vol. 14(3) · pp. 219--234", "abstract": "This paper presents a new method for degraded-document binarization, inspired by the attributes of the Human Visual System (HVS). It can deal with various types of degradations, such as uneven illumination, shadows, low contrast, smears, and heavy noise densities. The proposed algorithm combines the characteristics of the OFF center-surround cells of the HVS with the classic Otsu binarization technique. Cells of two different scales are combined, increasing the efficiency of the algorithm and reducing the extracted noise in the final output. A new response function, which regulates the output of the cell according to the local contrast and the local lighting conditions is also introduced. The Otsu technique is used to binarize the outputs of the OFF center-surround cells. Quantitative experiments performed on a set of various computer-generated degradations, such as noise, shadow, and low contrast demonstrate the superior performance of the proposed method against six other well-established techniques. Qualitative and OCR comparisons also confirm these results.", "links": [["DOI", "https://doi.org/10.1007/s10044-011-0214-1", "badge-doi"]], "pdf": true, "search": "vonikakis2011 2011 v. vonikakis, i. andreadis, n. papamarkos robust document binarization with off center-surround cells pattern analysis and applications · vol. 14(3) · pp. 219--234 this paper presents a new method for degraded-document binarization, inspired by the attributes of the human visual system (hvs). it can deal with various types of degradations, such as uneven illumination, shadows, low contrast, smears, and heavy noise densities. the proposed algorithm combines the characteristics of the off center-surround cells of the hvs with the classic otsu binarization technique. cells of two different scales are combined, increasing the efficiency of the algorithm and reducing the extracted noise in the final output. a new response function, which regulates the output of the cell according to the local contrast and the local lighting conditions is also introduced. the otsu technique is used to binarize the outputs of the off center-surround cells. quantitative experiments performed on a set of various computer-generated degradations, such as noise, shadow, and low contrast demonstrate the superior performance of the proposed method against six other well-established techniques. qualitative and ocr comparisons also confirm these results. article", "raw": "@Article{Vonikakis2011,\n  author   = {Vonikakis, V. and Andreadis, I. and Papamarkos, N.},\n  journal  = {Pattern Analysis and Applications},\n  title    = {{Robust document binarization with {OFF} center-surround cells}},\n  year     = {2011},\n  issn     = {1433-7541},\n  number   = {3},\n  pages    = {219--234},\n  volume   = {14},\n  abstract = {This paper presents a new method for degraded-document binarization, inspired by the attributes of the Human Visual System ({HVS}). It can deal with various types of degradations, such as uneven illumination, shadows, low contrast, smears, and heavy noise densities. The proposed algorithm combines the characteristics of the {OFF} center-surround cells of the {HVS} with the classic Otsu binarization technique. Cells of two different scales are combined, increasing the efficiency of the algorithm and reducing the extracted noise in the final output. A new response function, which regulates the output of the cell according to the local contrast and the local lighting conditions is also introduced. The Otsu technique is used to binarize the outputs of the {OFF} center-surround cells. Quantitative experiments performed on a set of various computer-generated degradations, such as noise, shadow, and low contrast demonstrate the superior performance of the proposed method against six other well-established techniques. Qualitative and {OCR} comparisons also confirm these results.},\n  doi      = {10.1007/s10044-011-0214-1},\n  file     = {:pdfs/2011 - Robust Document Binarization with Off Center Surround Cells.pdf:PDF},\n  isbn     = {3025410795},\n  keywords = {Document binarization, Human visual system, OFF center-surround cells, Thresholding, binarization},\n}"}, {"key": "Vos1989", "type": "Article", "year": "1989", "authors": "Piet G. Vos, Jim M. Troost", "title": "Ascending and Descending Melodic Intervals: Statistical Findings and their Perceptual Relevance", "venue": "Music Perception · Vol. 6(4) · pp. 383--396", "abstract": "", "links": [["DOI", "https://doi.org/10.2307/40285439", "badge-doi"]], "pdf": false, "search": "vos1989 1989 piet g. vos, jim m. troost ascending and descending melodic intervals: statistical findings and their perceptual relevance music perception · vol. 6(4) · pp. 383--396  article", "raw": "@Article{Vos1989,\n  author  = {Vos, Piet G. and Troost, Jim M.},\n  title   = {Ascending and Descending Melodic Intervals: Statistical Findings and their Perceptual Relevance},\n  journal = {Music Perception},\n  year    = {1989},\n  volume  = {6},\n  number  = {4},\n  pages   = {383--396},\n  doi     = {10.2307/40285439},\n}"}, {"key": "Wauthier2013", "type": "InProceedings", "year": "2013", "authors": "Fabian Wauthier, Michael Jordan, Nebojsa Jojic", "title": "Efficient ranking from pairwise comparisons", "venue": "30th International Conference on Machine Learning · pp. 109--117", "abstract": "", "links": [], "pdf": true, "search": "wauthier2013 2013 fabian wauthier, michael jordan, nebojsa jojic efficient ranking from pairwise comparisons 30th international conference on machine learning · pp. 109--117  inproceedings", "raw": "@InProceedings{Wauthier2013,\n  author    = {Wauthier, Fabian and Jordan, Michael and Jojic, Nebojsa},\n  title     = {Efficient ranking from pairwise comparisons},\n  booktitle = {30th International Conference on Machine Learning},\n  year      = {2013},\n  pages     = {109--117},\n  file      = {:pdfs/2013 - Efficient Ranking from Pairwise Comparisons.pdf:PDF},\n  groups    = {pairwise},\n}"}, {"key": "Wei2024", "type": "Misc", "year": "2024", "authors": "Haoran Wei, Chenglong Liu, Jinyue Chen, Jia Wang, Lingyu Kong, Yanming Xu et al.", "title": "General OCR Theory: Towards OCR-2.0 via a Unified End-to-end Model", "venue": "", "abstract": "Traditional OCR systems (OCR-1.0) are increasingly unable to meet people's usage due to the growing demand for intelligent processing of man-made optical characters. In this paper, we collectively refer to all artificial optical signals (e.g., plain texts, math/molecular formulas, tables, charts, sheet music, and even geometric shapes) as ``characters'' and propose the General OCR Theory along with an excellent model, namely GOT, to promote the arrival of OCR-2.0. The GOT, with 580M parameters, is a unified, elegant, and end-to-end model, consisting of a high-compression encoder and a long-contexts decoder. As an OCR-2.0 model, GOT can handle all the above ``characters'' under various OCR tasks.", "links": [["arXiv", "https://doi.org/10.48550/arXiv.2409.01704", "badge-arxiv"]], "pdf": true, "search": "wei2024 2024 haoran wei, chenglong liu, jinyue chen, jia wang, lingyu kong, yanming xu et al. general ocr theory: towards ocr-2.0 via a unified end-to-end model  traditional ocr systems (ocr-1.0) are increasingly unable to meet people's usage due to the growing demand for intelligent processing of man-made optical characters. in this paper, we collectively refer to all artificial optical signals (e.g., plain texts, math/molecular formulas, tables, charts, sheet music, and even geometric shapes) as ``characters'' and propose the general ocr theory along with an excellent model, namely got, to promote the arrival of ocr-2.0. the got, with 580m parameters, is a unified, elegant, and end-to-end model, consisting of a high-compression encoder and a long-contexts decoder. as an ocr-2.0 model, got can handle all the above ``characters'' under various ocr tasks. misc", "raw": "@Misc{Wei2024,\n  author    = {Wei, Haoran and Liu, Chenglong and Chen, Jinyue and Wang, Jia and Kong, Lingyu and Xu, Yanming and Ge, Zheng and Zhao, Liang and Sun, Jianjian and Peng, Yuang and Han, Chunrui and Zhang, Xiangyu},\n  title     = {General {OCR} Theory: Towards {OCR}-2.0 via a Unified End-to-end Model},\n  year      = {2024},\n  abstract  = {Traditional {OCR} systems ({OCR}-1.0) are increasingly unable to meet people's usage due to the growing demand for intelligent processing of man-made optical characters. In this paper, we collectively refer to all artificial optical signals (e.g., plain texts, math/molecular formulas, tables, charts, sheet music, and even geometric shapes) as ``characters'' and propose the General {OCR} Theory along with an excellent model, namely {GOT}, to promote the arrival of {OCR}-2.0. The {GOT}, with 580M parameters, is a unified, elegant, and end-to-end model, consisting of a high-compression encoder and a long-contexts decoder. As an {OCR}-2.0 model, {GOT} can handle all the above ``characters'' under various {OCR} tasks.},\n  doi       = {10.48550/arXiv.2409.01704},\n  file      = {:pdfs/2024 - General OCR Theory Towards OCR-2.0 via a Unified End-to-end Model.pdf:PDF},\n  url       = {https://arxiv.org/abs/2409.01704},\n}"}, {"key": "Weigl2020", "type": "InProceedings", "year": "2020", "authors": "David M. Weigl, Werner Goebl, Alex Hofmann, Tim Crawford, Federico Zubani, Cynthia C. S. Liem et al.", "title": "Read/Write Digital Libraries for Musicology", "venue": "7th International Conference on Digital Libraries for Musicology · pp. 48--52 · Association for Computing Machinery", "abstract": "The Web and other digital technologies have democratised music creation, reception, and analysis, putting music in the hands, ears, and minds of billions of users. Music digital libraries typically focus on an essential subset of this deluge—commercial and academic publications, and historical materials—but neglect to incorporate contributions by scholars, performers, and enthusiasts, such as annotations or performed interpretations of these artifacts, despite their potential utility for many types of users. In this paper we consider means by which digital libraries for musicology may incorporate such contributions into their collections, adhering to principles of FAIR data management and respecting contributor rights as outlined in the EU’s General Data Protection Regulation. We present an overview of centralised and decentralised approaches to this problem, and propose hybrid solutions in which contributions reside in a) user-controlled personal online datastores, b)", "links": [], "pdf": false, "search": "weigl2020 2020 david m. weigl, werner goebl, alex hofmann, tim crawford, federico zubani, cynthia c. s. liem et al. read/write digital libraries for musicology 7th international conference on digital libraries for musicology · pp. 48--52 · association for computing machinery the web and other digital technologies have democratised music creation, reception, and analysis, putting music in the hands, ears, and minds of billions of users. music digital libraries typically focus on an essential subset of this deluge—commercial and academic publications, and historical materials—but neglect to incorporate contributions by scholars, performers, and enthusiasts, such as annotations or performed interpretations of these artifacts, despite their potential utility for many types of users. in this paper we consider means by which digital libraries for musicology may incorporate such contributions into their collections, adhering to principles of fair data management and respecting contributor rights as outlined in the eu’s general data protection regulation. we present an overview of centralised and decentralised approaches to this problem, and propose hybrid solutions in which contributions reside in a) user-controlled personal online datastores, b) inproceedings", "raw": "@InProceedings{Weigl2020,\n  author    = {Weigl, David M. and Goebl, Werner and Hofmann, Alex and Crawford, Tim and Zubani, Federico and Liem, Cynthia C. S. and Porter, Alastair},\n  booktitle = {7th International Conference on Digital Libraries for Musicology},\n  title     = {Read/Write Digital Libraries for Musicology},\n  year      = {2020},\n  address   = {New York, NY, USA},\n  pages     = {48--52},\n  publisher = {Association for Computing Machinery},\n  series    = {DLfM 2020},\n  abstract  = {The Web and other digital technologies have democratised music creation, reception, and analysis, putting music in the hands, ears, and minds of billions of users. Music digital libraries typically focus on an essential subset of this deluge—commercial and academic publications, and historical materials—but neglect to incorporate contributions by scholars, performers, and enthusiasts, such as annotations or performed interpretations of these artifacts, despite their potential utility for many types of users. In this paper we consider means by which digital libraries for musicology may incorporate such contributions into their collections, adhering to principles of FAIR data management and respecting contributor rights as outlined in the EU’s General Data Protection Regulation. We present an overview of centralised and decentralised approaches to this problem, and propose hybrid solutions in which contributions reside in a) user-controlled personal online datastores, b)"}, {"key": "Wilson2003", "type": "Article", "year": "2003", "authors": "D. Randall Wilson, Tony R. Martinez", "title": "The general inefficiency of batch training for gradient descent learning", "venue": "Neural Networks · Vol. 16(10) · pp. 1429--1451", "abstract": "Abstract Gradient descent training of neural networks can be done\n\tin either a batch or on-line manner. A widely held myth in the neural\n\tnetwork community is that batch training is as fast or faster and/or\n\tmore ‘correct’ than on-line training because it supposedly uses a\n\tbetter approximation of the true gradient for its weight updates.\n\tThis paper explains why batch training is almost always slower than\n\ton-line training—often orders of magnitude slower—especially on large\n\ttraining sets. The main reason is due to the ability of on-line training\n\tto follow curves in the error surface throughout each epoch, which\n\tallows it to safely use a larger learning rate and thus converge\n\twith less iterations through the training data. Empirical results\n\ton a large (20,000-instance) speech recognition task and on 26 other\n\tlearning tasks demonstrate that convergence can be reached significantly\n\tfaster using on-line training than batch training, with no apparent\n\tdifference in accuracy.", "links": [["DOI", "https://doi.org/10.1016/S0893-6080(03)00138-2", "badge-doi"], ["URL", "http://www.sciencedirect.com/science/article/pii/S0893608003001382", "badge-url"]], "pdf": true, "search": "wilson2003 2003 d. randall wilson, tony r. martinez the general inefficiency of batch training for gradient descent learning neural networks · vol. 16(10) · pp. 1429--1451 abstract gradient descent training of neural networks can be done\n\tin either a batch or on-line manner. a widely held myth in the neural\n\tnetwork community is that batch training is as fast or faster and/or\n\tmore ‘correct’ than on-line training because it supposedly uses a\n\tbetter approximation of the true gradient for its weight updates.\n\tthis paper explains why batch training is almost always slower than\n\ton-line training—often orders of magnitude slower—especially on large\n\ttraining sets. the main reason is due to the ability of on-line training\n\tto follow curves in the error surface throughout each epoch, which\n\tallows it to safely use a larger learning rate and thus converge\n\twith less iterations through the training data. empirical results\n\ton a large (20,000-instance) speech recognition task and on 26 other\n\tlearning tasks demonstrate that convergence can be reached significantly\n\tfaster using on-line training than batch training, with no apparent\n\tdifference in accuracy. article", "raw": "@Article{Wilson2003,\n  author   = {Wilson, D. Randall and Martinez, Tony R.},\n  title    = {The general inefficiency of batch training for gradient descent learning},\n  journal  = {Neural Networks},\n  year     = {2003},\n  volume   = {16},\n  number   = {10},\n  pages    = {1429--1451},\n  issn     = {0893-6080},\n  abstract = {Abstract Gradient descent training of neural networks can be done\n\tin either a batch or on-line manner. A widely held myth in the neural\n\tnetwork community is that batch training is as fast or faster and/or\n\tmore ‘correct’ than on-line training because it supposedly uses a\n\tbetter approximation of the true gradient for its weight updates.\n\tThis paper explains why batch training is almost always slower than\n\ton-line training—often orders of magnitude slower—especially on large\n\ttraining sets. The main reason is due to the ability of on-line training\n\tto follow curves in the error surface throughout each epoch, which\n\tallows it to safely use a larger learning rate and thus converge\n\twith less iterations through the training data. Empirical results\n\ton a large (20,000-instance) speech recognition task and on 26 other\n\tlearning tasks demonstrate that convergence can be reached significantly\n\tfaster using on-line training than batch training, with no apparent\n\tdifference in accuracy.},\n  doi      = {10.1016/S0893-6080(03)00138-2},\n  file     = {:pdfs/2003 - The General Inefficiency of Batch Training for Gradient Descent Learning.pdf:PDF},\n  keywords = {Batch training},\n  url      = {http://www.sciencedirect.com/science/article/pii/S0893608003001382},\n}"}, {"key": "Wittlich1978", "type": "Article", "year": "1978", "authors": "Gary Wittlich, Donald Byrd, Rosalee Nerheim", "title": "A system for interactive encoding of music scores under computer control", "venue": "Computers and the Humanities · Vol. 12(4) · pp. 309--319", "abstract": "", "links": [["DOI", "https://doi.org/10.1007/BF02400103", "badge-doi"]], "pdf": false, "search": "wittlich1978 1978 gary wittlich, donald byrd, rosalee nerheim a system for interactive encoding of music scores under computer control computers and the humanities · vol. 12(4) · pp. 309--319  article", "raw": "@Article{Wittlich1978,\n  author  = {Wittlich, Gary and Byrd, Donald and Nerheim, Rosalee},\n  title   = {A system for interactive encoding of music scores under computer control},\n  journal = {Computers and the Humanities},\n  year    = {1978},\n  volume  = {12},\n  number  = {4},\n  pages   = {309--319},\n  issn    = {1572-8412},\n  doi     = {10.1007/BF02400103},\n  url     = {https://doi.org/10.1007/BF02400103},\n}"}, {"key": "Woo2024", "type": "InProceedings", "year": "2024", "authors": "Nolan H. Woo", "title": "Absolute Pitch: Automatic Sheet Music Navigation Based on Real-Time Music Recognition", "venue": "2024 International Conference on Artificial Intelligence, Big Data, Computing and Data Communication Systems (icABCD) · IEEE", "abstract": "This paper addresses the challenge of musicians turning pages while playing their instruments by developing an app that digitizes sheet music and automatically adjusts the displayed music at the rate of the musician's playing. The system uses MusicXML files to display music on a devi
