lind and Visually Impaired Musicians", "venue": "Information for a Better World: Normality, Virtuality, Inclusion, and Social Justice · pp. 581--597 · Springer", "abstract": "", "links": [["DOI", "https://doi.org/10.1007/978-3-031-28032-0_44", "badge-doi"], ["URL", "https://link.springer.com/chapter/10.1007/978-3-031-28032-0_44", "badge-url"]], "pdf": true, "search": "payne2023 2023 william payne, amy hurst ``we avoid pdfs'': improving notation access for blind and visually impaired musicians information for a better world: normality, virtuality, inclusion, and social justice · pp. 581--597 · springer  inproceedings", "raw": "@InProceedings{Payne2023,\n  author    = {Payne, William and Hurst, Amy},\n  booktitle = {Information for a Better World: Normality, Virtuality, Inclusion, and Social Justice},\n  title     = {{``We Avoid PDFs''}: Improving Notation Access for Blind and Visually Impaired Musicians},\n  year      = {2023},\n  month     = {Mar},\n  pages     = {581--597},\n  publisher = {Springer},\n  series    = {Lecture Notes in Computer Science},\n  doi       = {10.1007/978-3-031-28032-0_44},\n  url       = {https://link.springer.com/chapter/10.1007/978-3-031-28032-0_44},\n  file      = {:pdfs/2023 - ``We Avoid PDFs'' Improving Notation Access for Blind and Visually Impaired Musicians.pdf:PDF},\n}"}, {"key": "Payne2025", "type": "InProceedings", "year": "2025", "authors": "William Christopher Payne, Yu Lee An", "title": "Access Beyond the Score: Understanding Notation Needs and Workflows of Low Vision Musicians", "venue": "Proceedings of the 27th International ACM SIGACCESS Conference on Computers and Accessibility · pp. 1--14 · Association for Computing Machinery", "abstract": "Music notation is typically shared in print or PDF formats that are rarely accessible without intervention for blind and low vision people. This paper focuses on a potentially large population of low vision print music readers who neither read braille nor possess enough vision to read standard-sized scores. Through an interview study with 18 musicians and Teachers of the Visually Impaired (TVIs), the authors examine notation needs and adaptive workflows in music learning and performance contexts.", "links": [["DOI", "https://doi.org/10.1145/3663547.3746322", "badge-doi"], ["URL", "https://dl.acm.org/doi/10.1145/3663547.3746322", "badge-url"]], "pdf": true, "search": "payne2025 2025 william christopher payne, yu lee an access beyond the score: understanding notation needs and workflows of low vision musicians proceedings of the 27th international acm sigaccess conference on computers and accessibility · pp. 1--14 · association for computing machinery music notation is typically shared in print or pdf formats that are rarely accessible without intervention for blind and low vision people. this paper focuses on a potentially large population of low vision print music readers who neither read braille nor possess enough vision to read standard-sized scores. through an interview study with 18 musicians and teachers of the visually impaired (tvis), the authors examine notation needs and adaptive workflows in music learning and performance contexts. inproceedings", "raw": "@InProceedings{Payne2025,\n  author    = {Payne, William Christopher and An, Yu Lee},\n  booktitle = {Proceedings of the 27th International {ACM} {SIGACCESS} Conference on Computers and Accessibility},\n  title     = {Access Beyond the Score: Understanding Notation Needs and Workflows of Low Vision Musicians},\n  year      = {2025},\n  month     = {Oct},\n  pages     = {1--14},\n  publisher = {Association for Computing Machinery},\n  series    = {{ASSETS} '25},\n  abstract  = {Music notation is typically shared in print or {PDF} formats that are rarely accessible without intervention for blind and low vision people. This paper focuses on a potentially large population of low vision print music readers who neither read braille nor possess enough vision to read standard-sized scores. Through an interview study with 18 musicians and Teachers of the Visually Impaired ({TVIs}), the authors examine notation needs and adaptive workflows in music learning and performance contexts.},\n  doi       = {10.1145/3663547.3746322},\n  isbn      = {979-8-4007-1195-3},\n  url       = {https://dl.acm.org/doi/10.1145/3663547.3746322},\n  file      = {:pdfs/2025 - Access Beyond the Score Understanding Notation Needs and Workflows of Low Vision Musicians.pdf:PDF},\n}"}, {"key": "Phon-Amnuaisuk2009", "type": "InProceedings", "year": "2009", "authors": "Somnuk Phon-Amnuaisuk", "title": "Estimating HMM Parameters Using Particle Swarm Optimisation", "venue": "Applications of Evolutionary Computing · pp. 625--634 · Springer Berlin Heidelberg", "abstract": "A Hidden Markov Model (HMM) is a powerful model in describing temporal sequences. The HMM parameters are usually estimated using Baum-Welch algorithm. However, it is well known that the Baum-Welch algorithm tends to arrive at local optimal points. In this report, we investigate the potential of the Particle Swarm Optimisation (PSO) as an alternative method for HMM parameters estimation. The domain in this study is the recognition of handwritten music notations. Three observables: (i) sequence of ink patterns, (ii) stroke information and (iii) spatial information associated with eight musical symbols were recorded. Sixteen HMM models were built from the data. Eight HMM models for eight musical symbols were built from the parameters estimated using the Baum-Welch algorithm and the other eight models were built from the parameters estimated using PSO. The experiment shows that the performances of HMM models, using parameters estimated from PSO and Baum-Welch approach, are comparable. We suggest that PSO or a combination of PSO and Baum-Welch algorithm could be alternative approaches for the HMM parameters estimation.", "links": [], "pdf": false, "search": "phon-amnuaisuk2009 2009 somnuk phon-amnuaisuk estimating hmm parameters using particle swarm optimisation applications of evolutionary computing · pp. 625--634 · springer berlin heidelberg a hidden markov model (hmm) is a powerful model in describing temporal sequences. the hmm parameters are usually estimated using baum-welch algorithm. however, it is well known that the baum-welch algorithm tends to arrive at local optimal points. in this report, we investigate the potential of the particle swarm optimisation (pso) as an alternative method for hmm parameters estimation. the domain in this study is the recognition of handwritten music notations. three observables: (i) sequence of ink patterns, (ii) stroke information and (iii) spatial information associated with eight musical symbols were recorded. sixteen hmm models were built from the data. eight hmm models for eight musical symbols were built from the parameters estimated using the baum-welch algorithm and the other eight models were built from the parameters estimated using pso. the experiment shows that the performances of hmm models, using parameters estimated from pso and baum-welch approach, are comparable. we suggest that pso or a combination of pso and baum-welch algorithm could be alternative approaches for the hmm parameters estimation. inproceedings", "raw": "@InProceedings{Phon-Amnuaisuk2009,\n  author    = {Phon-Amnuaisuk, Somnuk},\n  title     = {Estimating {HMM} Parameters Using Particle Swarm Optimisation},\n  booktitle = {Applications of Evolutionary Computing},\n  year      = {2009},\n  editor    = {Giacobini, Mario and Brabazon, Anthony and Cagnoni, Stefano and Di Caro, Gianni A. and Ek{\\'a}rt, Anik{\\'o} and Esparcia-Alc{\\'a}zar, Anna Isabel and Farooq, Muddassar and Fink, Andreas and Machado, Penousal},\n  pages     = {625--634},\n  address   = {Berlin, Heidelberg},\n  publisher = {Springer Berlin Heidelberg},\n  abstract  = {A Hidden Markov Model (HMM) is a powerful model in describing temporal sequences. The HMM parameters are usually estimated using Baum-Welch algorithm. However, it is well known that the Baum-Welch algorithm tends to arrive at local optimal points. In this report, we investigate the potential of the Particle Swarm Optimisation (PSO) as an alternative method for HMM parameters estimation. The domain in this study is the recognition of handwritten music notations. Three observables: (i) sequence of ink patterns, (ii) stroke information and (iii) spatial information associated with eight musical symbols were recorded. Sixteen HMM models were built from the data. Eight HMM models for eight musical symbols were built from the parameters estimated using the Baum-Welch algorithm and the other eight models were built from the parameters estimated using PSO. The experiment shows that the performances of HMM models, using parameters estimated from PSO and Baum-Welch approach, are comparable. We suggest that PSO or a combination of PSO and Baum-Welch algorithm could be alternative approaches for the HMM parameters estimation.},\n  isbn      = {978-3-642-01129-0},\n}"}, {"key": "Presgurvic2005", "type": "Misc", "year": "2005", "authors": "Gérard Presgurvic", "title": "Songbook Romeo & Julia", "venue": "Universal Music Publishing Limited, 8-9 Frith Street, London W1D 3JB", "abstract": "", "links": [["URL", "https://www.musicalvienna.at/de/souvenirs/12/ANDERE-MUSICALS/10/Songbook-Romeo-und-Julia", "badge-url"]], "pdf": false, "search": "presgurvic2005 2005 gérard presgurvic songbook romeo & julia universal music publishing limited, 8-9 frith street, london w1d 3jb  misc", "raw": "@Misc{Presgurvic2005,\n  author      = {Presgurvic, G{\\'{e}}rard},\n  title       = {Songbook Romeo \\& Julia},\n  year        = {2005},\n  address     = {Vienna, Austria},\n  editor      = {German translation by Michaela Ronzoni; Arrangement Christian Kolonovits; Piano and vocal arrangement Wolfgang Gattringer},\n  institution = {Vereinigte B{\\\"{u}}hnen Wien},\n  publisher   = {Universal Music Publishing Limited, 8-9 Frith Street, London W1D 3JB},\n  url         = {https://www.musicalvienna.at/de/souvenirs/12/ANDERE-MUSICALS/10/Songbook-Romeo-und-Julia},\n}"}, {"key": "Ramoneda2023", "type": "InProceedings", "year": "2023", "authors": "Pedro Ramoneda, Jose J. Valero-Mas, Dasaem Jeong, Xavier Serra", "title": "Predicting Performance Difficulty From Piano Sheet Music Images", "venue": "Proceedings of the 24th International Society for Music Information Retrieval Conference · pp. 708--715", "abstract": "Estimating the performance difficulty of a musical score is crucial in music education for adequately designing the learning curriculum of the students. Although the Music Information Retrieval community has recently shown interest in this task, existing approaches mainly use machine-readable scores, leaving the broader case of sheet music images unaddressed. Based on previous works involving sheet music images, we use a mid-level representation, bootleg score, describing notehead positions relative to staff lines coupled with a transformer model. This architecture is adapted to our task by introducing an encoding scheme that reduces the encoded sequence length to one-eighth of the original size. In terms of evaluation, we consider five datasets – more than 7500 scores with up to 9 difficulty levels – , two of them particularly compiled for this work. The results obtained when pretraining the scheme on the IMSLP corpus and fine-tuning it on the considered datasets prove the proposal's validity, achieving the best-performing model with a balanced accuracy of 40.34% and a mean square error of 1.33.", "links": [["arXiv", "https://arxiv.org/abs/2309.16287", "badge-arxiv"]], "pdf": true, "search": "ramoneda2023 2023 pedro ramoneda, jose j. valero-mas, dasaem jeong, xavier serra predicting performance difficulty from piano sheet music images proceedings of the 24th international society for music information retrieval conference · pp. 708--715 estimating the performance difficulty of a musical score is crucial in music education for adequately designing the learning curriculum of the students. although the music information retrieval community has recently shown interest in this task, existing approaches mainly use machine-readable scores, leaving the broader case of sheet music images unaddressed. based on previous works involving sheet music images, we use a mid-level representation, bootleg score, describing notehead positions relative to staff lines coupled with a transformer model. this architecture is adapted to our task by introducing an encoding scheme that reduces the encoded sequence length to one-eighth of the original size. in terms of evaluation, we consider five datasets – more than 7500 scores with up to 9 difficulty levels – , two of them particularly compiled for this work. the results obtained when pretraining the scheme on the imslp corpus and fine-tuning it on the considered datasets prove the proposal's validity, achieving the best-performing model with a balanced accuracy of 40.34% and a mean square error of 1.33. inproceedings", "raw": "@InProceedings{Ramoneda2023,\n  author    = {Ramoneda, Pedro and Valero-Mas, Jose J. and Jeong, Dasaem and Serra, Xavier},\n  booktitle = {Proceedings of the 24th International Society for Music Information Retrieval Conference},\n  title     = {Predicting Performance Difficulty From Piano Sheet Music Images},\n  year      = {2023},\n  month     = {Nov},\n  pages     = {708--715},\n  address   = {Milan, Italy},\n  abstract  = {Estimating the performance difficulty of a musical score is crucial in music education for adequately designing the learning curriculum of the students. Although the Music Information Retrieval community has recently shown interest in this task, existing approaches mainly use machine-readable scores, leaving the broader case of sheet music images unaddressed. Based on previous works involving sheet music images, we use a mid-level representation, bootleg score, describing notehead positions relative to staff lines coupled with a transformer model. This architecture is adapted to our task by introducing an encoding scheme that reduces the encoded sequence length to one-eighth of the original size. In terms of evaluation, we consider five datasets -- more than 7500 scores with up to 9 difficulty levels -- , two of them particularly compiled for this work. The results obtained when pretraining the scheme on the IMSLP corpus and fine-tuning it on the considered datasets prove the proposal's validity, achieving the best-performing model with a balanced accuracy of 40.34\\% and a mean square error of 1.33.},\n  file      = {:pdfs/2023 - Predicting Performance Difficulty From Piano Sheet Music Images.pdf:PDF},\n  url       = {https://arxiv.org/abs/2309.16287},\n}"}, {"key": "Ramoneda2025", "type": "Misc", "year": "2025", "authors": "Pedro Ramoneda, Emilia Parada-Cabaleiro, Dasaem Jeong, Xavier Serra", "title": "Difficulty-Controlled Simplification of Piano Scores with Synthetic Data for Inclusive Music Education", "venue": "", "abstract": "Simplifying complex piano pieces can make music education more inclusive and accessible to learners of all ages and contexts. This work introduces a transformer-based method for adjusting the difficulty of MusicXML piano scores. The framework pretrains a model on a large corpus of MusicXML files using next-token prediction to learn symbolic music structure, then generates 128 variations for each of more than 3,000 original pieces, mining difficulty-aware training pairs using pretrained difficulty and style similarity models.", "links": [["arXiv", "https://doi.org/10.48550/arXiv.2511.16228", "badge-arxiv"]], "pdf": true, "search": "ramoneda2025 2025 pedro ramoneda, emilia parada-cabaleiro, dasaem jeong, xavier serra difficulty-controlled simplification of piano scores with synthetic data for inclusive music education  simplifying complex piano pieces can make music education more inclusive and accessible to learners of all ages and contexts. this work introduces a transformer-based method for adjusting the difficulty of musicxml piano scores. the framework pretrains a model on a large corpus of musicxml files using next-token prediction to learn symbolic music structure, then generates 128 variations for each of more than 3,000 original pieces, mining difficulty-aware training pairs using pretrained difficulty and style similarity models. misc", "raw": "@Misc{Ramoneda2025,\n  author        = {Ramoneda, Pedro and Parada-Cabaleiro, Emilia and Jeong, Dasaem and Serra, Xavier},\n  title         = {Difficulty-Controlled Simplification of Piano Scores with Synthetic Data for Inclusive Music Education},\n  year          = {2025},\n  month     = {Nov},\n  abstract      = {Simplifying complex piano pieces can make music education more inclusive and accessible to learners of all ages and contexts. This work introduces a transformer-based method for adjusting the difficulty of {MusicXML} piano scores. The framework pretrains a model on a large corpus of {MusicXML} files using next-token prediction to learn symbolic music structure, then generates 128 variations for each of more than 3,000 original pieces, mining difficulty-aware training pairs using pretrained difficulty and style similarity models.},\n  archiveprefix = {arXiv},\n  doi           = {10.48550/arXiv.2511.16228},\n  eprint        = {2511.16228},\n  file          = {:pdfs/2025 - Difficulty-Controlled Simplification of Piano Scores with Synthetic Data for Inclusive Music Education.pdf:PDF},\n  primaryclass  = {cs.SD},\n  url           = {https://arxiv.org/abs/2511.16228},\n}"}, {"key": "Rashid2017", "type": "InProceedings", "year": "2017", "authors": "Sheikh Faisal Rashid, Abdullah Akmal, Muhammad Adnan, Ali Adnan Aslam, Andreas Dengel", "title": "Table Recognition in Heterogeneous Documents Using Machine Learning", "venue": "2017 14th IAPR International Conference on Document Analysis and Recognition (ICDAR) · pp. 777--782", "abstract": "Tables are an easy way to represent information in a structural form. Table recognition is important for the extraction of such information from document images. Usually, modern OCR systems provide textual information coming from tables without recognizing actual table structure. However, recognition of table structure is important to get the contextual meaning of the contents. Table structure recognition in heterogeneous documents is challenging due to a variety of table layouts. It becomes harder where no physical rulings are present in a table. This work proposes a novel learning based methodology for the recognition of table contents in heterogeneous document images. Textual contents of documents are classified as table or non-table elements using a pre-trained neural network model. The output of the neural network is further enhanced by applying a contextual post processing on each element to correct the classifications errors if any. The system is trained using a subset of UNLV and UW3 document images and depicted more than 97% accuracy on a test set in detection of table and non-table elements.", "links": [["DOI", "https://doi.org/10.1109/ICDAR.2017.132", "badge-doi"]], "pdf": true, "search": "rashid2017 2017 sheikh faisal rashid, abdullah akmal, muhammad adnan, ali adnan aslam, andreas dengel table recognition in heterogeneous documents using machine learning 2017 14th iapr international conference on document analysis and recognition (icdar) · pp. 777--782 tables are an easy way to represent information in a structural form. table recognition is important for the extraction of such information from document images. usually, modern ocr systems provide textual information coming from tables without recognizing actual table structure. however, recognition of table structure is important to get the contextual meaning of the contents. table structure recognition in heterogeneous documents is challenging due to a variety of table layouts. it becomes harder where no physical rulings are present in a table. this work proposes a novel learning based methodology for the recognition of table contents in heterogeneous document images. textual contents of documents are classified as table or non-table elements using a pre-trained neural network model. the output of the neural network is further enhanced by applying a contextual post processing on each element to correct the classifications errors if any. the system is trained using a subset of unlv and uw3 document images and depicted more than 97% accuracy on a test set in detection of table and non-table elements. inproceedings", "raw": "@InProceedings{Rashid2017,\n  author    = {Rashid, Sheikh Faisal and Akmal, Abdullah and Adnan, Muhammad and Aslam, Ali Adnan and Dengel, Andreas},\n  title     = {Table Recognition in Heterogeneous Documents Using Machine Learning},\n  booktitle = {2017 14th IAPR International Conference on Document Analysis and Recognition (ICDAR)},\n  year      = {2017},\n  pages     = {777--782},\n  abstract  = {Tables are an easy way to represent information in a structural form. Table recognition is important for the extraction of such information from document images. Usually, modern OCR systems provide textual information coming from tables without recognizing actual table structure. However, recognition of table structure is important to get the contextual meaning of the contents. Table structure recognition in heterogeneous documents is challenging due to a variety of table layouts. It becomes harder where no physical rulings are present in a table. This work proposes a novel learning based methodology for the recognition of table contents in heterogeneous document images. Textual contents of documents are classified as table or non-table elements using a pre-trained neural network model. The output of the neural network is further enhanced by applying a contextual post processing on each element to correct the classifications errors if any. The system is trained using a subset of UNLV and UW3 document images and depicted more than 97% accuracy on a test set in detection of table and non-table elements.},\n  doi       = {10.1109/ICDAR.2017.132},\n  file      = {:pdfs/2017 - Table Recognition in Heterogeneous Documents Using Machine Learning.pdf:PDF},\n  issn      = {2379-2140},\n  keywords  = {document image processing;learning (artificial intelligence);neural nets;optical character recognition;table layouts;table contents;heterogeneous document images;nontable elements;table recognition;heterogeneous documents;table structure recognition;modern OCR systems;non-table elements;Feature extraction;Optical character recognition software;Layout;Neural networks;Training;Image recognition;Character recognition},\n}"}, {"key": "Redmon2017", "type": "InProceedings", "year": "2017", "authors": "Joseph Redmon, Ali Farhadi", "title": "YOLO9000: Better, Faster, Stronger", "venue": "2017 IEEE Conference on Computer Vision and Pattern Recognition (CVPR) · pp. 6517--6525", "abstract": "We introduce YOLO9000, a state-of-the-art, real-time object detection system that can detect over 9000 object categories. First we propose various improvements to the YOLO detection method, both novel and drawn from prior work. The improved model, YOLOv2, is state-of-the-art on standard detection tasks like PASCAL VOC and COCO. Using a novel, multi-scale training method the same YOLOv2 model can run at varying sizes, offering an easy tradeoff between speed and accuracy. At 67 FPS, YOLOv2 gets 76.8 mAP on VOC 2007. At 40 FPS, YOLOv2 gets 78.6 mAP, outperforming state-of-the-art methods like Faster RCNN with ResNet and SSD while still running significantly faster. Finally we propose a method to jointly train on object detection and classification. Using this method we train YOLO9000 simultaneously on the COCO detection dataset and the ImageNet classification dataset. Our joint training allows YOLO9000 to predict detections for object classes that dont have labelled detection data. We validate our approach on the ImageNet detection task. YOLO9000 gets 19.7 mAP on the ImageNet detection validation set despite only having detection data for 44 of the 200 classes. On the 156 classes not in COCO, YOLO9000 gets 16.0 mAP. YOLO9000 predicts detections for more than 9000 different object categories, all in real-time.", "links": [["DOI", "https://doi.org/10.1109/CVPR.2017.690", "badge-doi"]], "pdf": true, "search": "redmon2017 2017 joseph redmon, ali farhadi yolo9000: better, faster, stronger 2017 ieee conference on computer vision and pattern recognition (cvpr) · pp. 6517--6525 we introduce yolo9000, a state-of-the-art, real-time object detection system that can detect over 9000 object categories. first we propose various improvements to the yolo detection method, both novel and drawn from prior work. the improved model, yolov2, is state-of-the-art on standard detection tasks like pascal voc and coco. using a novel, multi-scale training method the same yolov2 model can run at varying sizes, offering an easy tradeoff between speed and accuracy. at 67 fps, yolov2 gets 76.8 map on voc 2007. at 40 fps, yolov2 gets 78.6 map, outperforming state-of-the-art methods like faster rcnn with resnet and ssd while still running significantly faster. finally we propose a method to jointly train on object detection and classification. using this method we train yolo9000 simultaneously on the coco detection dataset and the imagenet classification dataset. our joint training allows yolo9000 to predict detections for object classes that dont have labelled detection data. we validate our approach on the imagenet detection task. yolo9000 gets 19.7 map on the imagenet detection validation set despite only having detection data for 44 of the 200 classes. on the 156 classes not in coco, yolo9000 gets 16.0 map. yolo9000 predicts detections for more than 9000 different object categories, all in real-time. inproceedings", "raw": "@InProceedings{Redmon2017,\n  author    = {Redmon, Joseph and Farhadi, Ali},\n  title     = {{YOLO9000}: Better, Faster, Stronger},\n  booktitle = {2017 IEEE Conference on Computer Vision and Pattern Recognition (CVPR)},\n  year      = {2017},\n  pages     = {6517--6525},\n  abstract  = {We introduce YOLO9000, a state-of-the-art, real-time object detection system that can detect over 9000 object categories. First we propose various improvements to the YOLO detection method, both novel and drawn from prior work. The improved model, YOLOv2, is state-of-the-art on standard detection tasks like PASCAL VOC and COCO. Using a novel, multi-scale training method the same YOLOv2 model can run at varying sizes, offering an easy tradeoff between speed and accuracy. At 67 FPS, YOLOv2 gets 76.8 mAP on VOC 2007. At 40 FPS, YOLOv2 gets 78.6 mAP, outperforming state-of-the-art methods like Faster RCNN with ResNet and SSD while still running significantly faster. Finally we propose a method to jointly train on object detection and classification. Using this method we train YOLO9000 simultaneously on the COCO detection dataset and the ImageNet classification dataset. Our joint training allows YOLO9000 to predict detections for object classes that dont have labelled detection data. We validate our approach on the ImageNet detection task. YOLO9000 gets 19.7 mAP on the ImageNet detection validation set despite only having detection data for 44 of the 200 classes. On the 156 classes not in COCO, YOLO9000 gets 16.0 mAP. YOLO9000 predicts detections for more than 9000 different object categories, all in real-time.},\n  doi       = {10.1109/CVPR.2017.690},\n  file      = {:pdfs/2017 - YOLO9000 - Better, Faster, Stronger.pdf:PDF},\n  issn      = {1063-6919},\n  keywords  = {image classification;object detection;COCO detection dataset;ImageNet classification dataset;ImageNet detection task;PASCAL VOC;YOLO detection method;YOLO9000;YOLOv2 model;object classification;object detection system;Detectors;Feature extraction;Image resolution;Object detection;Real-time systems;Training},\n}"}, {"key": "Ren2015", "type": "InCollection", "year": "2015", "authors": "Shaoqing Ren, Kaiming He, Ross Girshick, Jian Sun", "title": "Faster R-CNN: Towards Real-Time Object Detection with Region Proposal Networks", "venue": "Curran Associates, Inc.", "abstract": "", "links": [["URL", "http://papers.nips.cc/paper/5638-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks.pdf", "badge-url"]], "pdf": true, "search": "ren2015 2015 shaoqing ren, kaiming he, ross girshick, jian sun faster r-cnn: towards real-time object detection with region proposal networks curran associates, inc.  incollection", "raw": "@InCollection{Ren2015,\n  author    = {Ren, Shaoqing and He, Kaiming and Girshick, Ross and Sun, Jian},\n  title     = {Faster {R-CNN}: Towards Real-Time Object Detection with Region Proposal Networks},\n  booktitle = {Advances in Neural Information Processing Systems 28},\n  publisher = {Curran Associates, Inc.},\n  year      = {2015},\n  editor    = {C. Cortes and N. D. Lawrence and D. D. Lee and M. Sugiyama and R. Garnett},\n  pages     = {91--99},\n  file      = {:pdfs/2015 - Faster R-CNN - Towards Real Time Object Detection with Region Proposal Networks.pdf:PDF;:2015 - Faster R CNN - Towards Real Time Object Detection with Region Proposal Networks - extended.pdf:PDF},\n  url       = {http://papers.nips.cc/paper/5638-faster-r-cnn-towards-real-time-object-detection-with-region-proposal-networks.pdf},\n}"}, {"key": "Rettinghaus2021", "type": "InProceedings", "year": "2021", "authors": "Klaus Rettinghaus, Alexander Pacha", "title": "Building a Comprehensive Sheet Music Library Application", "venue": "Music Encoding Conference Proceedings 2021", "abstract": "Digital symbolic music scores offer many benefits compared to paper-based scores, such as a flexible dynamic layout that allows adjustments of size and style, intelligent navigation features, automatic page-turning, onthe-fly modifications of the score including transposition into a different key, and rule-based annotations that can save hours of manual work by automatically highlighting relevant aspects in the score. However, most musicians still rely on paper because they don’t have access to a digital version of their sheet music, or their digital solution does not provide a satisfying experience. To bring digital scores to millions of musicians, we at Enote are building a mobile application that offers a comprehensive digital library of sheet music. These scores are obtained by a large-scale Optical Music Recognition process, combined with metadata collection and curation. Our material is stored in the MEI format and we rely on Verovio as a central component of our app to present scores and parts dynamically on mobile devices. This combination of the expressiveness of MEI with the beautiful engraving of Verovio allows us to create a flexible, mobile solution that we believe to be a powerful and true alternative to paper scores with practical features like smart annotations or instant transpositions. We also invest heavily into the open-source development of Verovio to make it the gold standard for rendering beautiful digital sheet music.", "links": [["DOI", "https://doi.org/10.17613/fc1c-mx52", "badge-doi"], ["URL", "https://hcommons.org/deposits/item/hc:45961/", "badge-url"]], "pdf": true, "search": "rettinghaus2021 2021 klaus rettinghaus, alexander pacha building a comprehensive sheet music library application music encoding conference proceedings 2021 digital symbolic music scores offer many benefits compared to paper-based scores, such as a flexible dynamic layout that allows adjustments of size and style, intelligent navigation features, automatic page-turning, onthe-fly modifications of the score including transposition into a different key, and rule-based annotations that can save hours of manual work by automatically highlighting relevant aspects in the score. however, most musicians still rely on paper because they don’t have access to a digital version of their sheet music, or their digital solution does not provide a satisfying experience. to bring digital scores to millions of musicians, we at enote are building a mobile application that offers a comprehensive digital library of sheet music. these scores are obtained by a large-scale optical music recognition process, combined with metadata collection and curation. our material is stored in the mei format and we rely on verovio as a central component of our app to present scores and parts dynamically on mobile devices. this combination of the expressiveness of mei with the beautiful engraving of verovio allows us to create a flexible, mobile solution that we believe to be a powerful and true alternative to paper scores with practical features like smart annotations or instant transpositions. we also invest heavily into the open-source development of verovio to make it the gold standard for rendering beautiful digital sheet music. inproceedings", "raw": "@InProceedings{Rettinghaus2021,\n  author    = {Rettinghaus, Klaus and Pacha, Alexander},\n  booktitle = {Music Encoding Conference Proceedings 2021},\n  title     = {Building a Comprehensive Sheet Music Library Application},\n  year      = {2021},\n  address   = {University of Alicante, Spain},\n  editor    = {M{\\\"{u}}nnich, Stefan and Rizo, David},\n  abstract  = {Digital symbolic music scores offer many benefits compared to paper-based scores, such as a flexible dynamic layout that allows adjustments of size and style, intelligent navigation features, automatic page-turning, onthe-fly modifications of the score including transposition into a different key, and rule-based annotations that can save hours of manual work by automatically highlighting relevant aspects in the score. However, most musicians still rely on paper because they don’t have access to a digital version of their sheet music, or their digital solution does not provide a satisfying experience. To bring digital scores to millions of musicians, we at Enote are building a mobile application that offers a comprehensive digital library of sheet music. These scores are obtained by a large-scale Optical Music Recognition process, combined with metadata collection and curation. Our material is stored in the MEI format and we rely on Verovio as a central component of our app to present scores and parts dynamically on mobile devices. This combination of the expressiveness of MEI with the beautiful engraving of Verovio allows us to create a flexible, mobile solution that we believe to be a powerful and true alternative to paper scores with practical features like smart annotations or instant transpositions. We also invest heavily into the open-source development of Verovio to make it the gold standard for rendering beautiful digital sheet music.},\n  doi       = {10.17613/fc1c-mx52},\n  file      = {:pdfs/2021 - Building a Comprehensive Sheet Music Library Application.pdf:PDF},\n  url       = {https://hcommons.org/deposits/item/hc:45961/},\n}"}, {"key": "Rettinghaus2022", "type": "InProceedings", "year": "2022", "authors": "Klaus Rettinghaus, Alexander Pacha", "title": "Building a Comprehensive Sheet Music Library Application", "venue": "Music Encoding Conference Proceedings 2021 · pp. 41--48", "abstract": "This paper describes a mobile application offering a comprehensive digital library of sheet music. The application combines MEI expressiveness with Verovio rendering to provide flexible dynamic layout, intelligent navigation, automatic page-turning, on-the-fly transpositions, and rule-based annotations. The work demonstrates how symbolic music encoding and OMR output can be integrated into end-user sheet music applications.", "links": [["DOI", "https://doi.org/10.17613/s315-2y29", "badge-doi"], ["URL", "https://alexanderpacha.com/wp-content/uploads/2022/05/mec-2021-building-a-comprehensive-sheet-music-library-application.pdf", "badge-url"]], "pdf": true, "search": "rettinghaus2022 2022 klaus rettinghaus, alexander pacha building a comprehensive sheet music library application music encoding conference proceedings 2021 · pp. 41--48 this paper describes a mobile application offering a comprehensive digital library of sheet music. the application combines mei expressiveness with verovio rendering to provide flexible dynamic layout, intelligent navigation, automatic page-turning, on-the-fly transpositions, and rule-based annotations. the work demonstrates how symbolic music encoding and omr output can be integrated into end-user sheet music applications. inproceedings", "raw": "@InProceedings{Rettinghaus2022,\n  author    = {Rettinghaus, Klaus and Pacha, Alexander},\n  booktitle = {Music Encoding Conference Proceedings 2021},\n  title     = {Building a Comprehensive Sheet Music Library Application},\n  year      = {2022},\n  pages     = {41--48},\n  abstract  = {This paper describes a mobile application offering a comprehensive digital library of sheet music. The application combines {MEI} expressiveness with Verovio rendering to provide flexible dynamic layout, intelligent navigation, automatic page-turning, on-the-fly transpositions, and rule-based annotations. The work demonstrates how symbolic music encoding and {OMR} output can be integrated into end-user sheet music applications.},\n  doi       = {10.17613/s315-2y29},\n  file      = {:pdfs/2022 - Building a Comprehensive Sheet Music Library Application.pdf:PDF},\n  isbn      = {978-84-1302-173-7},\n  url       = {https://alexanderpacha.com/wp-content/uploads/2022/05/mec-2021-building-a-comprehensive-sheet-music-library-application.pdf},\n}"}, {"key": "Roman2018", "type": "InProceedings", "year": "2018", "authors": "Miguel A. Román, Antonio Pertusa, Jorge Calvo-Zaragoza", "title": "And End-To-End Framework for Audio-to-Score Music Transcription on Monophonic Excerpts", "venue": "19th International Society for Music Information Retrieval Conference · pp. 34--41", "abstract": "", "links": [["URL", "http://ismir2018.ircam.fr/doc/pdfs/87_Paper.pdf", "badge-url"]], "pdf": true, "search": "roman2018 2018 miguel a. román, antonio pertusa, jorge calvo-zaragoza and end-to-end framework for audio-to-score music transcription on monophonic excerpts 19th international society for music information retrieval conference · pp. 34--41  inproceedings", "raw": "@InProceedings{Roman2018,\n  author    = {Rom{\\'{a}}n, Miguel A. and Pertusa, Antonio and Calvo-Zaragoza, Jorge},\n  title     = {And End-To-End Framework for Audio-to-Score Music Transcription on Monophonic Excerpts},\n  booktitle = {19th International Society for Music Information Retrieval Conference},\n  year      = {2018},\n  pages     = {34--41},\n  address   = {Paris, France},\n  file      = {:pdfs/2018 - And End to End Framework for Audio to Score Music Transcription on Monophonic Excerpts.pdf:PDF},\n  isbn      = {978-2-9540351-2-3},\n  url       = {http://ismir2018.ircam.fr/doc/pdfs/87_Paper.pdf},\n}"}, {"key": "Ronneberger2015", "type": "InProceedings", "year": "2015", "authors": "Olaf Ronneberger, Philipp Fischer, Thomas Brox", "title": "U-Net: Convolutional Networks for Biomedical Image Segmentation", "venue": "18th International Conference on Medical Image Computing and Computer-Assisted Intervention (MICCAI) · pp. 234--241 · Springer International Publishing", "abstract": "There is large consent that successful training of deep networks requires many thousand annotated training samples. In this paper, we present a network and training strategy that relies on the strong use of data augmentation to use the available annotated samples more efficiently. The architecture consists of a contracting path to capture context and a symmetric expanding path that enables precise localization. We show that such a network can be trained end-to-end from very few images and outperforms the prior best method (a sliding-window convolutional network) on the ISBI challenge for segmentation of neuronal structures in electron microscopic stacks. Using the same network trained on transmitted light microscopy images (phase contrast and DIC) we won the ISBI cell tracking challenge 2015 in these categories by a large margin. Moreover, the network is fast. Segmentation of a 512x512 image takes less than a second on a recent GPU. The full implementation (based on Caffe) and the trained networks are available at http://lmb.informatik.uni-freiburg.de/people/ronneber/u-net .", "links": [["DOI", "https://doi.org/10.1007/978-3-319-24574-4_28", "badge-doi"]], "pdf": true, "search": "ronneberger2015 2015 olaf ronneberger, philipp fischer, thomas brox u-net: convolutional networks for biomedical image segmentation 18th international conference on medical image computing and computer-assisted intervention (miccai) · pp. 234--241 · springer international publishing there is large consent that successful training of deep networks requires many thousand annotated training samples. in this paper, we present a network and training strategy that relies on the strong use of data augmentation to use the available annotated samples more efficiently. the architecture consists of a contracting path to capture context and a symmetric expanding path that enables precise localization. we show that such a network can be trained end-to-end from very few images and outperforms the prior best method (a sliding-window convolutional network) on the isbi challenge for segmentation of neuronal structures in electron microscopic stacks. using the same network trained on transmitted light microscopy images (phase contrast and dic) we won the isbi cell tracking challenge 2015 in these categories by a large margin. moreover, the network is fast. segmentation of a 512x512 image takes less than a second on a recent gpu. the full implementation (based on caffe) and the trained networks are available at http://lmb.informatik.uni-freiburg.de/people/ronneber/u-net . inproceedings", "raw": "@InProceedings{Ronneberger2015,\n  author    = {Ronneberger, Olaf and Fischer, Philipp and Brox, Thomas},\n  title     = {U-Net: Convolutional Networks for Biomedical Image Segmentation},\n  booktitle = {18th International Conference on Medical Image Computing and Computer-Assisted Intervention (MICCAI)},\n  year      = {2015},\n  editor    = {Navab, Nassir and Hornegger, Joachim and Wells, William M. and Frangi, Alejandro F.},\n  pages     = {234--241},\n  address   = {Munich, Germany},\n  publisher = {Springer International Publishing},\n  abstract  = {There is large consent that successful training of deep networks requires many thousand annotated training samples. In this paper, we present a network and training strategy that relies on the strong use of data augmentation to use the available annotated samples more efficiently. The architecture consists of a contracting path to capture context and a symmetric expanding path that enables precise localization. We show that such a network can be trained end-to-end from very few images and outperforms the prior best method (a sliding-window convolutional network) on the {ISBI} challenge for segmentation of neuronal structures in electron microscopic stacks. Using the same network trained on transmitted light microscopy images (phase contrast and {DIC}) we won the {ISBI} cell tracking challenge 2015 in these categories by a large margin. Moreover, the network is fast. Segmentation of a 512x512 image takes less than a second on a recent {GPU}. The full implementation (based on Caffe) and the trained networks are available at http://lmb.informatik.uni-freiburg.de/people/ronneber/u-net .},\n  doi       = {10.1007/978-3-319-24574-4_28},\n  file      = {:pdfs/2015 - U Net - Convolutional Networks for Biomedical Image Segmentation.pdf:PDF},\n  isbn      = {978-3-319-24574-4},\n}"}, {"key": "Rui2026", "type": "Article", "year": "2026", "authors": "Ruiqing Rui, Muhammad Syawal Amran, Nurfara ognition Competitions with the TranScriptorium Dataset.pdf:PDF},\n}"}, {"key": "Sauvola2000", "type": "Article", "year": "2000", "authors": "J. Sauvola, M. Pietikäinen", "title": "Adaptive document image binarization", "venue": "Pattern Recognition · Vol. 33(2) · pp. 225--236", "abstract": "A new method is presented for adaptive document image binarization, where the page is considered as a collection of subcomponents such as text, background and picture. The problems caused by noise, illumination and many source type-related degradations are addressed. Two new algorithms are applied to determine a local threshold for each pixel. The performance evaluation of the algorithm utilizes test images with ground-truth, evaluation metrics for binarization of textual and synthetic images, and a weight-based ranking procedure for the final result presentation. The proposed algorithms were tested with images including different types of document components and degradations. The results were compared with a number of known techniques in the literature. The benchmarking results show that the method adapts and performs well in each case qualitatively and quantitatively.", "links": [["DOI", "https://doi.org/10.1016/S0031-3203(99)00055-2", "badge-doi"]], "pdf": true, "search": "sauvola2000 2000 j. sauvola, m. pietikäinen adaptive document image binarization pattern recognition · vol. 33(2) · pp. 225--236 a new method is presented for adaptive document image binarization, where the page is considered as a collection of subcomponents such as text, background and picture. the problems caused by noise, illumination and many source type-related degradations are addressed. two new algorithms are applied to determine a local threshold for each pixel. the performance evaluation of the algorithm utilizes test images with ground-truth, evaluation metrics for binarization of textual and synthetic images, and a weight-based ranking procedure for the final result presentation. the proposed algorithms were tested with images including different types of document components and degradations. the results were compared with a number of known techniques in the literature. the benchmarking results show that the method adapts and performs well in each case qualitatively and quantitatively. article", "raw": "@Article{Sauvola2000,\n  author   = {Sauvola, J. and Pietik{\\\"{a}}inen, M.},\n  journal  = {Pattern Recognition},\n  title    = {Adaptive document image binarization},\n  year     = {2000},\n  issn     = {0031-3203},\n  number   = {2},\n  pages    = {225--236},\n  volume   = {33},\n  abstract = {A new method is presented for adaptive document image binarization, where the page is considered as a collection of subcomponents such as text, background and picture. The problems caused by noise, illumination and many source type-related degradations are addressed. Two new algorithms are applied to determine a local threshold for each pixel. The performance evaluation of the algorithm utilizes test images with ground-truth, evaluation metrics for binarization of textual and synthetic images, and a weight-based ranking procedure for the final result presentation. The proposed algorithms were tested with images including different types of document components and degradations. The results were compared with a number of known techniques in the literature. The benchmarking results show that the method adapts and performs well in each case qualitatively and quantitatively.},\n  doi      = {10.1016/S0031-3203(99)00055-2},\n  file     = {:pdfs/2000 - Adaptive Document Image Binarization.pdf:PDF},\n  isbn     = {0818678984},\n  keywords = {adaptive binarization, binarization, document analysis, document segmentation, document understanding, soft decision},\n  pmid     = {84262800005},\n}"}, {"key": "Saxena2017", "type": "Article", "year": "2017", "authors": "Lalit Prakash Saxena", "title": "Niblack's binarization method and its modifications to real-time applications: a r 73 frames in total) yields 86.45 percent correct classification,\n\tdemonstrating the generalization and scalability of the approach", "links": [["DOI", "https://doi.org/10.1109/TPAMI.2007.40", "badge-doi"]], "pdf": true, "search": "siagian2007 2007 christian siagian, laurent itti rapid biologically-inspired scene classification using features shared with visual attention ieee transactions on pattern analysis and machine intelligence · vol. 29(2) · pp. 300--312 we describe and validate a simple context-based scene recognition\n\talgorithm for mobile robotics applications. the system can differentiate\n\toutdoor scenes from various sites on a college campus using a multiscale\n\tset of early-visual features, which capture the \"gist\" of the scene\n\tinto a low-dimensional signature vector. distinct from previous approaches,\n\tthe algorithm presents the advantage of being biologically plausible\n\tand of having low-computational complexity, sharing its low-level\n\tfeatures with a model for visual attention that may operate concurrently\n\ton a robot. we compare classification accuracy using scenes filmed\n\tat three outdoor sites on campus (13,965 to 34,711 frames per site).\n\tdividing each site into nine segments, we obtain segment classification\n\trates between 84.21 percent and 88.62 percent. combining scenes from\n\tall sites (75,073 frames in total) yields 86.45 percent correct classification,\n\tdemonstrating the generalization and scalability of the approach article", "raw": "@Article{Siagian2007,\n  author   = {Siagian, Christian and Itti, Laurent},\n  title    = {Rapid Biologically-Inspired Scene Classification Using Features Shared with Visual Attention},\n  journal  = {IEEE Transactions on Pattern Analysis and Machine Intelligence},\n  year     = {2007},\n  volume   = {29},\n  number   = {2},\n  pages    = {300--312},\n  issn     = {0162-8828},\n  abstract = {We describe and validate a simple context-based scene recognition\n\talgorithm for mobile robotics applications. The system can differentiate\n\toutdoor scenes from various sites on a college campus using a multiscale\n\tset of early-visual features, which capture the \"gist\" of the scene\n\tinto a low-dimensional signature vector. Distinct from previous approaches,\n\tthe algorithm presents the advantage of being biologically plausible\n\tand of having low-computational complexity, sharing its low-level\n\tfeatures with a model for visual attention that may operate concurrently\n\ton a robot. We compare classification accuracy using scenes filmed\n\tat three outdoor sites on campus (13,965 to 34,711 frames per site).\n\tDividing each site into nine segments, we obtain segment classification\n\trates between 84.21 percent and 88.62 percent. Combining scenes from\n\tall sites (75,073 frames in total) yields 86.45 percent correct classification,\n\tdemonstrating the generalization and scalability of the approach},\n  doi      = {10.1109/TPAMI.2007.40},\n  file     = {:pdfs/2007 - Rapid Biologically Inspired Scene Classification Using Features Shared with Visual Attention.pdf:PDF},\n  keywords = {computational complexity;image recognition;mobile robots;robot vision;biologically-inspired scene classification;college campus;computational complexity;context-based scene recognition;mobile robotics;outdoor scenes;Computer vision;Educational institutions;Image segmentation;Layout;Mobile robots;Object recognition;Robot sensing systems;Robot vision systems;Robustness;Sonar navigation;Gist of a scene;computational neuroscience;image classification;image statistics;robot localization.;robot vision;saliency;scene recognition;Algorithms;Artificial Intelligence;Attention;Biomimetics;Computer Systems;Image Enhancement;Image Interpretation, Computer-Assisted;Imaging, Three-Dimensional;Information Storage and Retrieval;Pattern Recognition, Automated;Robotics;Visual Perception},\n}"}, {"key": "Sigtia2015", "type": "Article", "year": "2015", "authors": "Siddharth Sigtia, Emmanouil Benetos, Simon Dixon", "title": "An End-to-End Neural Network for Polyphonic Piano Music Transcription", "venue": "Computing Research Repository · Vol. abs/1508.01774", "abstract": "", "links": [["arXiv", "http://arxiv.org/abs/1508.01774", "badge-arxiv"]], "pdf": true, "search": "sigtia2015 2015 siddharth sigtia, emmanouil benetos, simon dixon an end-to-end neural network for polyphonic piano music transcription computing research repository · vol. abs/1508.01774  article", "raw": "@Article{Sigtia2015,\n  author    = {Sigtia, Siddharth and Benetos, Emmanouil and Dixon, Simon},\n  title     = {An End-to-End Neural Network for Polyphonic Piano Music Transcription},\n  journal   = {{Computing Research Repository}},\n  year      = {2015},\n  volume    = {abs/1508.01774},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/corr/abs-1508-01774},\n  file      = {:pdfs/2015 - An End to End Neural Network for Polyphonic Piano Music Transcription.pdf:PDF},\n  url       = {http://arxiv.org/abs/1508.01774},\n}"}, {"key": "Simard2003", "type": "Article", "year": "2003", "authors": "Patrice Y. Simard, Dave Steinkraus, John C. Platt", "title": "Best practices for convolutional neural networks applied to visual document analysis", "venue": "Seventh International Conference on Document Analysis and Recognition · pp. 958--963", "abstract": "Not Available", "links": [["DOI", "https://doi.org/10.1109/ICDAR.2003.1227801", "badge-doi"]], "pdf": true, "search": "simard2003 2003 patrice y. simard, dave steinkraus, john c. platt best practices for convolutional neural networks applied to visual document analysis seventh international conference on document analysis and recognition · pp. 958--963 not available article", "raw": "@Article{Simard2003,\n  author   = {Simard, Patrice Y. and Steinkraus, Dave and Platt, John C.},\n  journal  = {Seventh International Conference on Document Analysis and Recognition},\n  title    = {{Best practices for convolutional neural networks applied to visual document analysis}},\n  year     = {2003},\n  pages    = {958--963},\n  abstract = {Not Available},\n  doi      = {10.1109/ICDAR.2003.1227801},\n  file     = {:pdfs/2003 - Best Practices for Convolutional Neural Networks Applied to Visual Document Analysis.pdf:PDF},\n  isbn     = {0-7695-1960-1},\n  keywords = {Best practices, CNN, Concrete, Convolution, Handwriting recognition, Industrial training, Information processing, Neural networks, Performance analysis, Support vector machines, Text analysis},\n}"}, {"key": "Simonetta2024", "type": "InProceedings", "year": "2024", "authors": "Federico Simonetta, Rishav Mondal, Luca Andrea Ludovico, Stavros Ntalampiras", "title": "Optical Music Recognition in Manuscripts from the Ricordi Archive", "venue": "Proceedings of the 32nd ACM International Conference on Multimedia", "abstract": "The Ricordi archive, a prestigious collection of significant musical manuscripts from renowned opera composers such as Donizetti, Verdi and Puccini, has been digitized. This process has allowed us to automatically extract samples that represent various musical elements depicted on the manuscripts, including notes, staves, clefs, erasures, and composer's annotations, among others. To distinguish between digitization noise and actual music elements, a subset of these images was meticulously grouped and labeled by multiple individuals into several classes. After assessing the consistency of the annotations, we trained multiple neural network-based classifiers to differentiate between the identified music elements. The primary objective of this study was to evaluate the reliability of these classifiers, with the ultimate goal of using them for the automatic categorization of the remaining unannotated data set.", "links": [["DOI", "https://doi.org/10.1145/3678299.3678324", "badge-doi"], ["arXiv", "https://arxiv.org/abs/2408.10260", "badge-arxiv"]], "pdf": true, "search": "simonetta2024 2024 federico simonetta, rishav mondal, luca andrea ludovico, stavros ntalampiras optical music recognition in manuscripts from the ricordi archive proceedings of the 32nd acm international conference on multimedia the ricordi archive, a prestigious collection of significant musical manuscripts from renowned opera composers such as donizetti, verdi and puccini, has been digitized. this process has allowed us to automatically extract samples that represent various musical elements depicted on the manuscripts, including notes, staves, clefs, erasures, and composer's annotations, among others. to distinguish between digitization noise and actual music elements, a subset of these images was meticulously grouped and labeled by multiple individuals into several classes. after assessing the consistency of the annotations, we trained multiple neural network-based classifiers to differentiate between the identified music elements. the primary objective of this study was to evaluate the reliability of these classifiers, with the ultimate goal of using them for the automatic categorization of the remaining unannotated data set. inproceedings", "raw": "@InProceedings{Simonetta2024,\n  author    = {Simonetta, Federico and Mondal, Rishav and Ludovico, Luca Andrea and Ntalampiras, Stavros},\n  booktitle = {Proceedings of the 32nd {ACM} International Conference on Multimedia},\n  title     = {Optical Music Recognition in Manuscripts from the Ricordi Archive},\n  year      = {2024},\n  abstract  = {The Ricordi archive, a prestigious collection of significant musical manuscripts from renowned opera composers such as Donizetti, Verdi and Puccini, has been digitized. This process has allowed us to automatically extract samples that represent various musical elements depicted on the manuscripts, including notes, staves, clefs, erasures, and composer's annotations, among others. To distinguish between digitization noise and actual music elements, a subset of these images was meticulously grouped and labeled by multiple individuals into several classes. After assessing the consistency of the annotations, we trained multiple neural network-based classifiers to differentiate between the identified music elements. The primary objective of this study was to evaluate the reliability of these classifiers, with the ultimate goal of using them for the automatic categorization of the remaining unannotated data set.},\n  doi       = {10.1145/3678299.3678324},\n  file      = {:pdfs/2024 - Optical Music Recognition in Manuscripts from the Ricordi Archive.pdf:PDF},\n  url       = {https://arxiv.org/abs/2408.10260},\n}"}, {"key": "Simonyan2014", "type": "Article", "year": "2014", "authors": "Karen Simonyan, Andrew Zisserman", "title": "Very Deep Convolutional Networks for Large-Scale Image Recognition", "venue": "Computing Research Repository · Vol. abs/1409.1556", "abstract": "", "links": [["arXiv", "http://arxiv.org/abs/1409.1556", "badge-arxiv"]], "pdf": true, "search": "simonyan2014 2014 karen simonyan, andrew zisserman very deep convolutional networks for large-scale image recognition computing research repository · vol. abs/1409.1556  article", "raw": "@Article{Simonyan2014,\n  author    = {Simonyan, Karen and Zisserman, Andrew},\n  title     = {Very Deep Convolutional Networks for Large-Scale Image Recognition},\n  journal   = {{Computing Research Repository}},\n  year      = {2014},\n  volume    = {abs/1409.1556},\n  bibsource = {dblp computer science bibliography, http://dblp.org},\n  biburl    = {http://dblp.uni-trier.de/rec/bib/journals/corr/SimonyanZ14a},\n  file      = {:pdfs/2014 - Very Deep Convolutional Networks for Large Scale Image Recognition.pdf:PDF},\n  url       = {http://arxiv.org/abs/1409.1556},\n}"}, {"key": "Sloboda2005", "type": "Book", "year": "2005", "authors": "John Sloboda", "title": "Exploring the musical mind", "venue": "Oxford University Press", "abstract": "", "links": [["DOI", "https://doi.org/10.1093/acprof:os
